 레벨링, 플랫폼 손상, 과도한 리프트 속도로 구분한다. 실제 현장에서는 여러 원인이 겹칠 수 있으므로 플랫폼 상태와 레벨링부터 확인한 뒤 모션과 냉각 조건을 한 항목씩 조정한다."}, {"type": "table", "rows": [["대표 증상", "우선 확인", "판단 포인트"], ["바닥 가장자리 말림", "열변형·레진 수축", "플랫폼 쪽 구속면에서 자유면 방향으로 휘는지 확인"], ["바닥 일부 탈락", "레벨링·잔여물", "특정 위치에서만 반복되는지 확인"], ["출력물 전체 탈락", "첫 레이어 접착·박리력", "바닥 노광과 리프트 조건을 함께 점검"], ["바닥면 국부 요철", "플랫폼 손상·오염", "스크래치 또는 경화 잔여물 위치와 비교"]]}, {"type": "table", "rows": [["진단 원칙 한 번에 하나의 변수만 변경하고 동일한 테스트 모델로 결과를 비교한다. 여러 설정을 동시에 바꾸면 개선 원인을 판별하기 어렵다."]]}, {"type": "heading", "level": 2, "text": "1. 현상과 발생 메커니즘", "id": "section-2"}, {"type": "heading", "level": 3, "text": "1.1 바닥면 말림과 탈락", "id": "section-3"}, {"type": "paragraph", "text": "경화 직후의 레진은 광중합 반응과 온도 변화에 의해 수축하려는 경향이 있다. 바닥층은 빌드 플랫폼에 고정되어 자유롭게 변형되지 못하므로 내부 응력이 집중된다. 플랫폼의 구속이 약해지거나 박리력이 커지면 바닥 가장자리가 들리거나 출력물이 플랫폼에서 떨어질 수 있다."}, {"type": "image", "path": "assets/manuals/5_바닥면 말림 및 탈락/upwarped-bottom-layers.png", "alt": "바닥면 말림 및 탈락 시각 자료", "fileName": "upwarped-bottom-layers.png"}, {"type": "paragraph", "text": "플랫폼 방향으로 말린 바닥 레이어 사례"}, {"type": "heading", "level": 3, "text": "1.2 열응력의 방향", "id": "section-4"}, {"type": "paragraph", "text": "플랫폼과 맞닿은 면은 이동이 제한되지만 반대쪽 자유면은 상대적으로 쉽게 수축한다. 이 비대칭 구속이 휨 모멘트를 만들며, 출력물이 플랫폼에서 멀어지는 방향으로 말리는 형태가 나타날 수 있다."}, {"type": "image", "path": "assets/manuals/5_바닥면 말림 및 탈락/thermal-deformation.png", "alt": "바닥면 말림 및 탈락 시각 자료", "fileName": "thermal-deformation.png"}, {"type": "paragraph", "text": "열변형과 구속 조건 개념도"}, {"type": "table", "rows": [["핵심 해석 말림은 단순히 접착력이 부족한 문제만이 아니다. 레진의 수축, 바닥층의 구속, 층간 온도 차이, 박리력이 함께 작용하는 결과다."]]}, {"type": "heading", "level": 2, "text": "2. 열변형과 레진 수축", "id": "section-5"}, {"type": "heading", "level": 3, "text": "2.1 온도 차이와 냉각", "id": "section-6"}, {"type": "paragraph", "text": "노광 중 발생한 열이 출력물 내부와 표면에서 서로 다른 속도로 빠져나가면 부위별 수축량이 달라진다. 외부 팬은 열을 빠르게 제거할 수 있지만, 특정 방향에만 강한 바람이 닿으면 온도 구배가 커져 오히려 변형을 악화시킬 수 있다."}, {"type": "table", "rows": [["조건", "기대 효과", "주의사항"], ["자연 냉각", "급격한 국부 냉각 방지", "연속 노광이 길면 열 축적 여부 확인"], ["균일한 약풍", "표면 열 제거 보조", "한쪽 면에만 직접 바람이 집중되지 않게 배치"], ["강한 외부 팬", "빠른 냉각", "온도 차이 확대와 레진 점도 변화 가능성"], ["Rest Time 증가", "다음 노광 전 열 안정화", "출력 시간 증가와 침전 가능성 고려"]]}, {"type": "table", "rows": [["냉각 주의 외부 팬 사용으로 과도한 온도 차이가 발생하면 변형이 악화될 수 있다. 장비 제조사 지침을 우선하고, 팬을 사용할 때는 약하고 균일한 기류로 단계적으로 검증한다."]]}, {"type": "heading", "level": 3, "text": "2.2 레진 수축률", "id": "section-7"}, {"type": "paragraph", "text": "일반 레진의 수축률은 약 1~5% 범위로 관리된다. 수축률이 낮을수록 열응력과 치수 변형을 줄이는 데 유리하며, 정밀 레진은 수축률이 1%에 가까울 수 있다. 다만 가격과 기계적 특성의 균형을 함께 검토해야 한다."}, {"type": "table", "rows": [["구분", "초기 검토 기준", "선정 시 확인"], ["일반 레진", "수축률 약 1~5%", "제조사 데이터시트의 선형·체적 수축 정의 확인"], ["저수축·정밀 레진", "1%에 가까운 제품 가능", "가격, 취성, 내열성, 후경화 조건을 함께 비교"]]}, {"type": "paragraph", "text": "주의: 수축률 표기 방식과 시험 조건은 제조사마다 다르므로 동일 기준으로 비교한다."}, {"type": "heading", "level": 2, "text": "3. 빌드 플랫폼 표면 상태", "id": "section-8"}, {"type": "heading", "level": 3, "text": "3.1 경화 잔여물", "id": "section-9"}, {"type": "paragraph", "text": "플랫폼에 얇은 경화 레진이나 작은 파편이 남으면 첫 레이어의 실제 간격이 위치별로 달라지고, 출력물에 국부 응력이 생긴다. 잔여물이 반복적으로 남는 위치에서 말림이나 탈락이 재현되는지 확인한다."}, {"type": "image", "path": "assets/manuals/5_바닥면 말림 및 탈락/warp-caused-by-residue.png", "alt": "바닥면 말림 및 탈락 시각 자료", "fileName": "warp-caused-by-residue.png"}, {"type": "paragraph", "text": "플랫폼 잔여물로 인해 휘어진 출력 사례"}, {"type": "heading", "level": 3, "text": "3.2 청소 절차", "id": "section-10"}, {"type": "table", "rows": [["1", "플랫폼 분리 장비 전원을 끄고 장갑을 착용한 뒤 플랫폼을 분리한다."]]}, {"type": "table", "rows": [["2", "잔여물 제거 스크레이퍼를 낮은 각도로 사용해 경화 잔여물을 제거한다."]]}, {"type": "table", "rows": [["3", "세척과 건조 레진 제조사 권장 세척제로 표면을 닦고 완전히 건조한다."]]}, {"type": "table", "rows": [["4", "평탄도 확인 사광 또는 직선자를 이용해 돌출, 함몰, 국부 손상을 확인한다."]]}, {"type": "table", "rows": [["도구 사용 주의 금속 스크레이퍼를 세워 사용하면 깊은 흠집이 생길 수 있다. 플랫폼 표면을 깎거나 연마하기 전에는 장비 제조사의 유지보수 지침과 보증 조건을 확인한다."]]}, {"type": "heading", "level": 2, "text": "4. 레벨링과 플랫폼 손상", "id": "section-11"}, {"type": "heading", "level": 3, "text": "4.1 부적절한 레벨링", "id": "section-12"}, {"type": "paragraph", "text": "빌드 플랫폼이 LCD 화면 및 FEP 필름과 평행하지 않으면 바닥층의 압착 간격이 위치별로 달라진다. 간격이 큰 쪽은 접착이 약해지고, 간격이 지나치게 작은 쪽은 과도한 압력과 국부 응력이 발생할 수 있다."}, {"type": "table", "rows": [["점검 항목", "정상 판단", "이상 징후"], ["플랫폼 고정", "조임 후에도 각도 변화 없음", "볼트 체결 중 플랫폼이 비틀림"], ["영점 설정", "장비 절차에 따라 재현 가능", "재홈 후 간격이 달라짐"], ["종이 저항", "좌우·전후 저항이 유사", "특정 모서리만 쉽게 움직임"], ["테스트 패턴", "전 영역 바닥 두께가 균일", "한쪽만 얇거나 탈락"]]}, {"type": "heading", "level": 3, "text": "4.2 플랫폼 스크래치와 평탄도", "id": "section-13"}, {"type": "paragraph", "text": "출력물 제거 과정에서 생긴 깊은 스크래치나 돌출 버는 바닥층에 국부 응력을 만들며, 플랫폼 손상은 말림의 원인이 될 수 있다. 손상 부위를 무작정 연마하면 평탄도와 표면 처리 상태가 달라질 수 있으므로 먼저 제조사 권장 절차를 확인한다."}, {"type": "table", "rows": [["권장 조치 순서 세척 → 육안 확인 → 평탄도 검사 → 재레벨링 → 테스트 출력 순서로 진행한다. 문제가 지속되고 플랫폼 손상이 명확하면 교체 또는 제조사 승인 연마를 검토한다."]]}, {"type": "paragraph", "text": "• 플랫폼 모서리와 중앙의 평탄도를 모두 비교한다."}, {"type": "paragraph", "text": "• 표면 손상 위치와 탈락 위치가 반복적으로 일치하는지 기록한다."}, {"type": "paragraph", "text": "• 연마 후에는 분진을 완전히 제거하고 다시 레벨링한다."}, {"type": "heading", "level": 2, "text": "5. 리프트 속도와 모션 파라미터", "id": "section-14"}, {"type": "paragraph", "text": "경화층이 FEP 필름에서 분리될 때 발생하는 박리력은 출력 단면적, FEP 상태, 레진 점도, 리프트 속도와 가속 특성에 영향을 받는다. 리프트 속도가 지나치게 높으면 순간 하중이 커져 바닥층 또는 플랫폼 접착부가 분리될 수 있다."}, {"type": "image", "path": "assets/manuals/5_바닥면 말림 및 탈락/motion-params.png", "alt": "바닥면 말림 및 탈락 시각 자료", "fileName": "motion-params.png"}, {"type": "paragraph", "text": "CHITUBOX 모션 파라미터 설정 화면"}, {"type": "table", "rows": [["파라미터", "낮추거나 늘릴 때의 효과", "조정 원칙"], ["Lift Speed", "속도를 낮추면 순간 박리력 감소", "장비·레진 기본값에서 소폭씩 낮춰 비교"], ["Retract Speed", "복귀 충격과 레진 흐름 변화", "과도한 고속 복귀를 피하고 안정성 확인"], ["Rest Time After Retract", "다음 노광 전 레진 흐름과 열 안정화", "짧은 증가부터 시작하고 출력 시간 평가"], ["리프트 거리", "완전 박리와 레진 재유입 확보", "FEP 장력과 모델 단면에 맞춰 설정"]]}, {"type": "table", "rows": [["조정 방향 말림 또는 탈락이 발생하면 리프트 속도를 낮추고 Rest Time After Retract를 늘려 박리 하중과 열 축적을 함께 완화한다. 절대값보다 현재 정상 프로파일을 기준으로 단계적으로 조정하는 것이 중요하다."]]}, {"type": "heading", "level": 2, "text": "6. 단계별 문제 해결 절차", "id": "section-15"}, {"type": "paragraph", "text": "아래 순서는 비용과 변경 범위가 작은 점검부터 시작하도록 구성했다. 각 단계 후 동일한 테스트 모델을 출력하고 결과를 기록한다."}, {"type": "table", "rows": [["1", "증상 분류 말림 위치, 탈락 범위, 플랫폼상의 반복 위치, 발생 레이어를 사진으로 기록한다."]]}, {"type": "table", "rows": [["2", "플랫폼 청소 경화 잔여물과 오염을 제거하고 돌출 또는 깊은 흠집이 없는지 확인한다."]]}, {"type": "table", "rows": [["3", "레벨링·영점 재설정 장비 제조사 절차에 따라 플랫폼 평행도와 영점을 다시 설정한다."]]}, {"type": "table", "rows": [["4", "첫 레이어 확인 바닥 노광, 바닥 레이어 수, 바닥 전이층을 기존 검증값과 비교한다."]]}, {"type": "table", "rows": [["5", "리프트 속도 완화 바닥층과 일반층의 리프트 속도를 구분해 소폭 낮추고 박리 안정성을 확인한다."]]}, {"type": "table", "rows": [["6", "Rest Time 증가 복귀 후 대기 시간을 조금 늘려 레진 재유입과 열 안정화 시간을 확보한다."]]}, {"type": "table", "rows": [["7", "냉각 조건 검토 외부 팬의 직접풍을 피하고 장비 주변 온도와 기류를 일정하게 유지한다."]]}, {"type": "table", "rows": [["8", "레진 변경 검토 동일 조건에서 문제가 지속되면 수축률이 더 낮은 레진을 비교 시험한다."]]}, {"type": "table", "rows": [["기록 항목 레진명·배치, 실내 온도, 레이어 높이, 바닥/일반 노광, 리프트 속도, Rest Time, 플랫폼 위치, 결과 사진을 함께 남긴다."]]}, {"type": "heading", "level": 2, "text": "7. 증상별 원인-조치 매트릭스", "id": "section-16"}, {"type": "table", "rows": [["관찰 결과", "가능성 높은 원인", "우선 조치", "다음 확인"], ["한쪽 모서리만 탈락", "레벨링 불량", "재레벨링·영점", "전 영역 테스트 패턴"], ["항상 같은 위치에서 말림", "잔여물·스크래치", "세척·평탄도 검사", "플랫폼 위치를 바꿔 재현"], ["넓은 바닥 전체가 들림", "열응력·수축", "Rest Time·저수축 레진", "단면 축소 또는 방향 변경"], ["출력 중 전체 탈락", "박리력 과다", "리프트 속도 완화", "FEP 상태와 바닥 노광"], ["외부 팬 방향에서만 휨", "불균일 냉각", "직접풍 제거", "주변 온도 균일성"], ["플랫폼 바닥면 요철", "표면 손상·경화물", "청소 후 표면 검사", "교체 또는 승인 정비"]]}, {"type": "heading", "level": 3, "text": "7.1 조정 후 합격 기준", "id": "section-17"}, {"type": "paragraph", "text": "• 바닥 가장자리가 플랫폼 기준면에서 육안상 들리지 않는다."}, {"type": "paragraph", "text": "• 동일 위치에서 3회 연속 말림 또는 탈락이 재현되지 않는다."}, {"type": "paragraph", "text": "• 바닥 치수와 두께가 내부 품질 기준 범위에 들어온다."}, {"type": "paragraph", "text": "• 플랫폼에서 제거할 때 특정 부위만 비정상적으로 약하지 않다."}, {"type": "paragraph", "text": "• 모션 변경으로 표면 결함이나 출력 시간 증가가 과도하지 않다."}, {"type": "table", "rows": [["판정 팁 접착력이 지나치게 강한 상태도 정답은 아니다. 출력물 제거가 어렵거나 바닥 치수가 크게 팽창하면 바닥 노광 과다 여부를 별도로 확인한다."]]}, {"type": "heading", "level": 2, "text": "8. 안전 및 유지보수 주의사항", "id": "section-18"}, {"type": "paragraph", "text": "• 미경화 레진을 다룰 때는 니트릴 장갑과 보안경을 착용한다."}, {"type": "paragraph", "text": "• 플랫폼 청소 전 장비 전원을 끄고 움직임이 멈췄는지 확인한다."}, {"type": "paragraph", "text": "• 날카로운 스크레이퍼는 몸 반대 방향으로 사용한다."}, {"type": "paragraph", "text": "• 레진과 세척액은 제조사 SDS 및 지역 규정에 따라 보관·폐기한다."}, {"type": "paragraph", "text": "• 플랫폼 연마나 교체는 장비 제조사의 승인 절차를 우선한다."}, {"type": "heading", "level": 2, "text": "9. 핵심 요약", "id": "section-19"}, {"type": "table", "rows": [["구분", "핵심 내용"], ["메커니즘", "플랫폼 구속, 열수축, 불균일 냉각, 박리력이 바닥부에 응력을 집중시킨다."], ["기본 점검", "플랫폼 청결과 평탄도, 레벨링과 영점부터 확인한다."], ["모션 조정", "리프트 속도를 낮추고 Rest Time After Retract를 늘려 비교한다."], ["재료 선택", "일반 레진의 수축률 범위는 약 1~5%이며 저수축 레진을 검토할 수 있다."], ["냉각", "외부 팬의 강한 직접풍을 피하고 균일한 온도 환경을 유지한다."]]}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "motion-params.png", "path": "assets/manuals/5_바닥면 말림 및 탈락/motion-params.png", "kind": "image", "alt": "바닥면 말림 및 탈락 시각 자료 5-1"}, {"fileName": "thermal-deformation.png", "path": "assets/manuals/5_바닥면 말림 및 탈락/thermal-deformation.png", "kind": "image", "alt": "바닥면 말림 및 탈락 시각 자료 5-2"}, {"fileName": "upwarped-bottom-layers.png", "path": "assets/manuals/5_바닥면 말림 및 탈락/upwarped-bottom-layers.png", "kind": "image", "alt": "바닥면 말림 및 탈락 시각 자료 5-3"}, {"fileName": "warp-caused-by-residue.png", "path": "assets/manuals/5_바닥면 말림 및 탈락/warp-caused-by-residue.png", "kind": "image", "alt": "바닥면 말림 및 탈락 시각 자료 5-4"}], "searchText": "0. 개요 바텀업 방식 레진 3D 프린팅에서는 경화층이 FEP 필름에서 분리될 때마다 출력물과 빌드 플랫폼에 박리력이 작용한다. 이 과정에서 첫 레이어 또는 바닥부가 위로 말리거나, 플랫폼에서 일부·전체가 떨어지는 현상이 발생할 수 있다. 주요 원인은 열변형, 빌드 플랫폼의 경화 잔여물, 부적절한 레벨링, 플랫폼 손상, 과도한 리프트 속도로 구분한다. 실제 현장에서는 여러 원인이 겹칠 수 있으므로 플랫폼 상태와 레벨링부터 확인한 뒤 모션과 냉각 조건을 한 항목씩 조정한다. 대표 증상 우선 확인 판단 포인트 바닥 가장자리 말림 열변형·레진 수축 플랫폼 쪽 구속면에서 자유면 방향으로 휘는지 확인 바닥 일부 탈락 레벨링·잔여물 특정 위치에서만 반복되는지 확인 출력물 전체 탈락 첫 레이어 접착·박리력 바닥 노광과 리프트 조건을 함께 점검 바닥면 국부 요철 플랫폼 손상·오염 스크래치 또는 경화 잔여물 위치와 비교 진단 원칙 한 번에 하나의 변수만 변경하고 동일한 테스트 모델로 결과를 비교한다. 여러 설정을 동시에 바꾸면 개선 원인을 판별하기 어렵다. 1. 현상과 발생 메커니즘 1.1 바닥면 말림과 탈락 경화 직후의 레진은 광중합 반응과 온도 변화에 의해 수축하려는 경향이 있다. 바닥층은 빌드 플랫폼에 고정되어 자유롭게 변형되지 못하므로 내부 응력이 집중된다. 플랫폼의 구속이 약해지거나 박리력이 커지면 바닥 가장자리가 들리거나 출력물이 플랫폼에서 떨어질 수 있다. 플랫폼 방향으로 말린 바닥 레이어 사례 1.2 열응력의 방향 플랫폼과 맞닿은 면은 이동이 제한되지만 반대쪽 자유면은 상대적으로 쉽게 수축한다. 이 비대칭 구속이 휨 모멘트를 만들며, 출력물이 플랫폼에서 멀어지는 방향으로 말리는 형태가 나타날 수 있다. 열변형과 구속 조건 개념도 핵심 해석 말림은 단순히 접착력이 부족한 문제만이 아니다. 레진의 수축, 바닥층의 구속, 층간 온도 차이, 박리력이 함께 작용하는 결과다. 2. 열변형과 레진 수축 2.1 온도 차이와 냉각 노광 중 발생한 열이 출력물 내부와 표면에서 서로 다른 속도로 빠져나가면 부위별 수축량이 달라진다. 외부 팬은 열을 빠르게 제거할 수 있지만, 특정 방향에만 강한 바람이 닿으면 온도 구배가 커져 오히려 변형을 악화시킬 수 있다. 조건 기대 효과 주의사항 자연 냉각 급격한 국부 냉각 방지 연속 노광이 길면 열 축적 여부 확인 균일한 약풍 표면 열 제거 보조 한쪽 면에만 직접 바람이 집중되지 않게 배치 강한 외부 팬 빠른 냉각 온도 차이 확대와 레진 점도 변화 가능성 Rest Time 증가 다음 노광 전 열 안정화 출력 시간 증가와 침전 가능성 고려 냉각 주의 외부 팬 사용으로 과도한 온도 차이가 발생하면 변형이 악화될 수 있다. 장비 제조사 지침을 우선하고, 팬을 사용할 때는 약하고 균일한 기류로 단계적으로 검증한다. 2.2 레진 수축률 일반 레진의 수축률은 약 1~5% 범위로 관리된다. 수축률이 낮을수록 열응력과 치수 변형을 줄이는 데 유리하며, 정밀 레진은 수축률이 1%에 가까울 수 있다. 다만 가격과 기계적 특성의 균형을 함께 검토해야 한다. 구분 초기 검토 기준 선정 시 확인 일반 레진 수축률 약 1~5% 제조사 데이터시트의 선형·체적 수축 정의 확인 저수축·정밀 레진 1%에 가까운 제품 가능 가격, 취성, 내열성, 후경화 조건을 함께 비교 주의: 수축률 표기 방식과 시험 조건은 제조사마다 다르므로 동일 기준으로 비교한다. 3. 빌드 플랫폼 표면 상태 3.1 경화 잔여물 플랫폼에 얇은 경화 레진이나 작은 파편이 남으면 첫 레이어의 실제 간격이 위치별로 달라지고, 출력물에 국부 응력이 생긴다. 잔여물이 반복적으로 남는 위치에서 말림이나 탈락이 재현되는지 확인한다. 플랫폼 잔여물로 인해 휘어진 출력 사례 3.2 청소 절차 1 플랫폼 분리 장비 전원을 끄고 장갑을 착용한 뒤 플랫폼을 분리한다. 2 잔여물 제거 스크레이퍼를 낮은 각도로 사용해 경화 잔여물을 제거한다. 3 세척과 건조 레진 제조사 권장 세척제로 표면을 닦고 완전히 건조한다. 4 평탄도 확인 사광 또는 직선자를 이용해 돌출, 함몰, 국부 손상을 확인한다. 도구 사용 주의 금속 스크레이퍼를 세워 사용하면 깊은 흠집이 생길 수 있다. 플랫폼 표면을 깎거나 연마하기 전에는 장비 제조사의 유지보수 지침과 보증 조건을 확인한다. 4. 레벨링과 플랫폼 손상 4.1 부적절한 레벨링 빌드 플랫폼이 LCD 화면 및 FEP 필름과 평행하지 않으면 바닥층의 압착 간격이 위치별로 달라진다. 간격이 큰 쪽은 접착이 약해지고, 간격이 지나치게 작은 쪽은 과도한 압력과 국부 응력이 발생할 수 있다. 점검 항목 정상 판단 이상 징후 플랫폼 고정 조임 후에도 각도 변화 없음 볼트 체결 중 플랫폼이 비틀림 영점 설정 장비 절차에 따라 재현 가능 재홈 후 간격이 달라짐 종이 저항 좌우·전후 저항이 유사 특정 모서리만 쉽게 움직임 테스트 패턴 전 영역 바닥 두께가 균일 한쪽만 얇거나 탈락 4.2 플랫폼 스크래치와 평탄도 출력물 제거 과정에서 생긴 깊은 스크래치나 돌출 버는 바닥층에 국부 응력을 만들며, 플랫폼 손상은 말림의 원인이 될 수 있다. 손상 부위를 무작정 연마하면 평탄도와 표면 처리 상태가 달라질 수 있으므로 먼저 제조사 권장 절차를 확인한다. 권장 조치 순서 세척 → 육안 확인 → 평탄도 검사 → 재레벨링 → 테스트 출력 순서로 진행한다. 문제가 지속되고 플랫폼 손상이 명확하면 교체 또는 제조사 승인 연마를 검토한다. • 플랫폼 모서리와 중앙의 평탄도를 모두 비교한다. • 표면 손상 위치와 탈락 위치가 반복적으로 일치하는지 기록한다. • 연마 후에는 분진을 완전히 제거하고 다시 레벨링한다. 5. 리프트 속도와 모션 파라미터 경화층이 FEP 필름에서 분리될 때 발생하는 박리력은 출력 단면적, FEP 상태, 레진 점도, 리프트 속도와 가속 특성에 영향을 받는다. 리프트 속도가 지나치게 높으면 순간 하중이 커져 바닥층 또는 플랫폼 접착부가 분리될 수 있다. CHITUBOX 모션 파라미터 설정 화면 파라미터 낮추거나 늘릴 때의 효과 조정 원칙 Lift Speed 속도를 낮추면 순간 박리력 감소 장비·레진 기본값에서 소폭씩 낮춰 비교 Retract Speed 복귀 충격과 레진 흐름 변화 과도한 고속 복귀를 피하고 안정성 확인 Rest Time After Retract 다음 노광 전 레진 흐름과 열 안정화 짧은 증가부터 시작하고 출력 시간 평가 리프트 거리 완전 박리와 레진 재유입 확보 FEP 장력과 모델 단면에 맞춰 설정 조정 방향 말림 또는 탈락이 발생하면 리프트 속도를 낮추고 Rest Time After Retract를 늘려 박리 하중과 열 축적을 함께 완화한다. 절대값보다 현재 정상 프로파일을 기준으로 단계적으로 조정하는 것이 중요하다. 6. 단계별 문제 해결 절차 아래 순서는 비용과 변경 범위가 작은 점검부터 시작하도록 구성했다. 각 단계 후 동일한 테스트 모델을 출력하고 결과를 기록한다. 1 증상 분류 말림 위치, 탈락 범위, 플랫폼상의 반복 위치, 발생 레이어를 사진으로 기록한다. 2 플랫폼 청소 경화 잔여물과 오염을 제거하고 돌출 또는 깊은 흠집이 없는지 확인한다. 3 레벨링·영점 재설정 장비 제조사 절차에 따라 플랫폼 평행도와 영점을 다시 설정한다. 4 첫 레이어 확인 바닥 노광, 바닥 레이어 수, 바닥 전이층을 기존 검증값과 비교한다. 5 리프트 속도 완화 바닥층과 일반층의 리프트 속도를 구분해 소폭 낮추고 박리 안정성을 확인한다. 6 Rest Time 증가 복귀 후 대기 시간을 조금 늘려 레진 재유입과 열 안정화 시간을 확보한다. 7 냉각 조건 검토 외부 팬의 직접풍을 피하고 장비 주변 온도와 기류를 일정하게 유지한다. 8 레진 변경 검토 동일 조건에서 문제가 지속되면 수축률이 더 낮은 레진을 비교 시험한다. 기록 항목 레진명·배치, 실내 온도, 레이어 높이, 바닥/일반 노광, 리프트 속도, Rest Time, 플랫폼 위치, 결과 사진을 함께 남긴다. 7. 증상별 원인-조치 매트릭스 관찰 결과 가능성 높은 원인 우선 조치 다음 확인 한쪽 모서리만 탈락 레벨링 불량 재레벨링·영점 전 영역 테스트 패턴 항상 같은 위치에서 말림 잔여물·스크래치 세척·평탄도 검사 플랫폼 위치를 바꿔 재현 넓은 바닥 전체가 들림 열응력·수축 Rest Time·저수축 레진 단면 축소 또는 방향 변경 출력 중 전체 탈락 박리력 과다 리프트 속도 완화 FEP 상태와 바닥 노광 외부 팬 방향에서만 휨 불균일 냉각 직접풍 제거 주변 온도 균일성 플랫폼 바닥면 요철 표면 손상·경화물 청소 후 표면 검사 교체 또는 승인 정비 7.1 조정 후 합격 기준 • 바닥 가장자리가 플랫폼 기준면에서 육안상 들리지 않는다. • 동일 위치에서 3회 연속 말림 또는 탈락이 재현되지 않는다. • 바닥 치수와 두께가 내부 품질 기준 범위에 들어온다. • 플랫폼에서 제거할 때 특정 부위만 비정상적으로 약하지 않다. • 모션 변경으로 표면 결함이나 출력 시간 증가가 과도하지 않다. 판정 팁 접착력이 지나치게 강한 상태도 정답은 아니다. 출력물 제거가 어렵거나 바닥 치수가 크게 팽창하면 바닥 노광 과다 여부를 별도로 확인한다. 8. 안전 및 유지보수 주의사항 • 미경화 레진을 다룰 때는 니트릴 장갑과 보안경을 착용한다. • 플랫폼 청소 전 장비 전원을 끄고 움직임이 멈췄는지 확인한다. • 날카로운 스크레이퍼는 몸 반대 방향으로 사용한다. • 레진과 세척액은 제조사 SDS 및 지역 규정에 따라 보관·폐기한다. • 플랫폼 연마나 교체는 장비 제조사의 승인 절차를 우선한다. 9. 핵심 요약 구분 핵심 내용 메커니즘 플랫폼 구속, 열수축, 불균일 냉각, 박리력이 바닥부에 응력을 집중시킨다. 기본 점검 플랫폼 청결과 평탄도, 레벨링과 영점부터 확인한다. 모션 조정 리프트 속도를 낮추고 Rest Time After Retract를 늘려 비교한다. 재료 선택 일반 레진의 수축률 범위는 약 1~5%이며 저수축 레진을 검토할 수 있다. 냉각 외부 팬의 강한 직접풍을 피하고 균일한 온도 환경을 유지한다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 5}, "6": {"manualId": 6, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "CHITUBOX의 서포트 팁에는 모델과 맞닿는 끝단의 형상을 지정하는 Contact Shape 파라미터가 있다. 접촉 형상을 Sphere와 None으로 설정했을 때 서포트 제거성, 구조 강도, 제거 후 잔여물과 최종 표면 품질이 어떻게 달라지는지 비교한다."}, {"type": "paragraph", "text": "시험에는 GS-B11 Rigid Resin과 Spider Man - Miles Morales 모델을 사용하였다. 비교 결과는 단단하고 상대적으로 취성이 있는 해당 레진과 설정된 서포트 조건에서 얻은 것이므로, 다른 레진과 모델에는 동일한 경향이 나타나는지 별도 검증이 필요하다."}, {"type": "table", "rows": [["시험 항목", "시험 조건", "평가 내용"], ["사용 레진", "GS-B11 Rigid Resin", "취성 재료에서의 제거 손상과 표면 결함"], ["모델", "Spider Man - Miles Morales", "섬세한 형상과 서포트 접촉부"], ["비교 변수", "Contact Shape: Sphere / None", "강도, 제거성, 잔여물, 패임"], ["후처리", "전동 샌딩 펜과 미세 사포 롤", "연마 후 최종 표면 품질"]]}, {"type": "table", "rows": [["핵심 결론 Sphere는 제거가 쉽고 연마 후 표면이 더 매끄럽다. None은 서포트 연결 강도가 높지만 제거가 어렵고, 취성 레진에서는 모델 표면 패임과 손상 위험이 더 크다."]]}, {"type": "heading", "level": 2, "text": "1. Contact Shape의 정의", "id": "section-2"}, {"type": "heading", "level": 3, "text": "1.1 Sphere 접촉 형상", "id": "section-3"}, {"type": "paragraph", "text": "Sphere는 서포트 팁과 모델 사이에 구형 접촉부를 만든다. 제거 시 구형 부분이 모델 표면에서 분리되면서 돌출된 잔여물이 비교적 뚜렷하게 남을 수 있지만, 모델 본체가 직접 뜯겨 나가는 위험을 낮추는 완충 영역으로 작용한다."}, {"type": "heading", "level": 3, "text": "1.2 None 접촉 형상", "id": "section-4"}, {"type": "paragraph", "text": "None은 별도의 구형 접촉부 없이 서포트 팁이 모델 표면에 직접 연결된다. 출력 과정에서 접촉 부위가 함께 노광되고 강화되며 연결부가 점차 두꺼워질 수 있어 서포트와 모델의 결합은 안정적이지만 제거는 어려워진다."}, {"type": "image", "path": "assets/manuals/6_서포트 접촉 형상과 표면 품질/different-contact-shapes-of-supports-01.png", "alt": "서포트 접촉 형상과 표면 품질 시각 자료", "fileName": "different-contact-shapes-of-supports-01.png"}, {"type": "paragraph", "text": "Contact Shape None과 Sphere의 전체 형상 비교"}, {"type": "paragraph", "text": "확대 비교에서 None은 끝단이 모델에 직접 닿고, Sphere는 작은 구형 접촉부가 모델 표면과 서포트 팁 사이에 위치한다. 이 차이가 제거 방식과 제거 후 결함 형태를 결정한다."}, {"type": "image", "path": "assets/manuals/6_서포트 접촉 형상과 표면 품질/different-contact-shapes-of-supports-02.png", "alt": "서포트 접촉 형상과 표면 품질 시각 자료", "fileName": "different-contact-shapes-of-supports-02.png"}, {"type": "paragraph", "text": "Sphere 접촉부와 None 접촉부의 확대 비교"}, {"type": "heading", "level": 2, "text": "2. 서포트 설정", "id": "section-5"}, {"type": "paragraph", "text": "Sphere 팁의 비교 설정은 다음과 같다. 핵심 변수는 Contact Shape이며, 서포트 연결부의 나머지 치수는 동일한 조건으로 유지하였다."}, {"type": "table", "rows": [["파라미터", "설정값", "기술적 의미"], ["Contact Shape", "Sphere", "모델과 팁 사이에 구형 접촉부 생성"], ["Contact Diameter", "1.00 mm", "구형 접촉부의 직경"], ["Contact Depth", "0.50 mm", "접촉부가 모델에 들어가는 깊이"], ["Connection Shape", "Cone", "접촉부 아래 연결 형상"], ["Upper Diameter", "0.60 mm", "연결부 상단 직경"], ["Lower Diameter", "1.20 mm", "연결부 하단 직경"], ["Connection Length", "2.00 mm", "접촉 연결부 길이"]]}, {"type": "image", "path": "assets/manuals/6_서포트 접촉 형상과 표면 품질/support-params.png", "alt": "서포트 접촉 형상과 표면 품질 시각 자료", "fileName": "support-params.png"}, {"type": "paragraph", "text": "CHITUBOX Top 서포트 파라미터"}, {"type": "table", "rows": [["비교 시 주의 Contact Shape 효과를 판단하려면 팁 직경, 접촉 깊이, 연결부 치수, 서포트 수와 배치, 노광 조건을 고정해야 한다. 여러 파라미터를 함께 변경하면 접촉 형상 자체의 영향을 분리하기 어렵다."]]}, {"type": "heading", "level": 2, "text": "3. 모델 표면에 미치는 영향", "id": "section-6"}, {"type": "paragraph", "text": "접촉 형상을 바꾸면 출력 중 연결부의 경화 방식과 제거 시 파괴 경로가 달라진다. None에서는 서포트 끝단이 모델 표면과 직접 노광되어 결합부가 강화되고 두꺼워지므로 안정적인 지지가 가능하다. 반면 강한 결합은 제거 과정에서 모델 표면까지 함께 뜯어낼 가능성을 높인다."}, {"type": "table", "rows": [["평가 항목", "Sphere", "None"], ["접촉 구조", "구형 접촉부를 사이에 둠", "팁이 모델 표면에 직접 연결"], ["출력 중 결합", "상대적으로 분리 가능한 연결", "노광으로 연결부가 강화·확장"], ["제거 후 흔적", "돌출 잔여물이 비교적 뚜렷함", "돌출은 적어도 패임 발생 가능"], ["표면 보호", "제거 시 모델 본체 손상 억제", "취성 재료에서 표면 결손 위험"], ["연마 결과", "돌출부 제거가 쉬워 매끄러움", "패임은 복구가 어려움"]]}, {"type": "heading", "level": 3, "text": "3.1 돌출 잔여물과 표면 패임", "id": "section-7"}, {"type": "paragraph", "text": "Sphere는 제거 후 구형 접촉부의 일부가 볼록한 잔여물로 남는 경향이 있다. 육안으로는 흔적이 더 크게 보이지만 재료가 표면 위에 남은 형태이므로 샌딩으로 높이를 낮추기 쉽다."}, {"type": "paragraph", "text": "None은 돌출 잔여물이 상대적으로 적을 수 있으나, 강하게 결합된 팁을 절단하거나 떼어낼 때 모델 재료가 함께 떨어져 나가 오목한 패임이 생길 수 있다. 패임은 재료를 추가하거나 전체 표면을 더 깊게 연마해야 하므로 후처리 난도가 높다."}, {"type": "table", "rows": [["평가 기준 제거 직후 흔적의 크기만으로 표면 품질을 판단하지 않는다. 돌출부는 연마로 제거할 수 있지만 패임과 결손은 원래 형상을 복원하기 어렵다."]]}, {"type": "heading", "level": 2, "text": "4. 서포트 강도 비교", "id": "section-8"}, {"type": "paragraph", "text": "None 접촉 형상은 Sphere보다 더 강한 서포트 구조를 형성한다. None의 끝단이 모델 표면과 직접 연결되고 접촉부가 노광 중 강화되기 때문에 박리력이나 중력에 대한 연결 안정성이 높아진다."}, {"type": "image", "path": "assets/manuals/6_서포트 접촉 형상과 표면 품질/with-contact-shape.png", "alt": "서포트 접촉 형상과 표면 품질 시각 자료", "fileName": "with-contact-shape.png"}, {"type": "paragraph", "text": "Sphere 접촉 형상의 서포트 치수 개념도"}, {"type": "image", "path": "assets/manuals/6_서포트 접촉 형상과 표면 품질/without-contact-shape.png", "alt": "서포트 접촉 형상과 표면 품질 시각 자료", "fileName": "without-contact-shape.png"}, {"type": "paragraph", "text": "None 접촉 형상의 서포트 치수 개념도"}, {"type": "table", "rows": [["구분", "Sphere", "None"], ["연결 강도", "상대적으로 낮음", "상대적으로 높음"], ["제거 용이성", "높음", "낮음"], ["섬세한 모델 보호", "유리", "제거 중 손상 위험"], ["강한 고정이 필요한 부위", "직경·깊이 보강 검토", "연결 안정성에 유리"]]}, {"type": "paragraph", "text": "강도 평가는 정량적인 파단 하중 수치가 아니라 출력 및 제거 결과를 바탕으로 한 상대 비교다."}, {"type": "heading", "level": 2, "text": "5. 서포트 제거와 모델 손상", "id": "section-9"}, {"type": "heading", "level": 3, "text": "5.1 제거 난이도", "id": "section-10"}, {"type": "paragraph", "text": "서포트를 제거할 때 Sphere는 None보다 쉽게 분리된다. 반대로 None은 구조적으로 더 안정적이지만 결합이 강해 니퍼나 절단 도구에 더 큰 힘이 필요하며, 힘이 모델 쪽으로 전달될 가능성이 높다."}, {"type": "heading", "level": 3, "text": "5.2 섬세한 모델의 위험", "id": "section-11"}, {"type": "paragraph", "text": "섬세한 모델에서 None 접촉 형상을 제거하면 Sphere보다 모델을 우발적으로 손상시킬 가능성이 높다. 얇은 손가락, 장식, 날카로운 모서리와 같은 취약부에는 제거 하중을 줄일 수 있는 접촉 형상이 유리하다."}, {"type": "table", "rows": [["제거 단계", "권장 작업", "주의사항"], ["사전 연화", "레진 제조사 허용 범위에서 온수 또는 적절한 방법 검토", "과열과 변형 방지"], ["1차 절단", "모델에서 떨어진 기둥 부분부터 제거", "접촉부를 비틀지 않음"], ["팁 분리", "얇은 니퍼로 접촉부 가까이 절단", "모델 표면을 물지 않게 함"], ["잔여물 확인", "돌출과 패임을 구분", "즉시 과도하게 연마하지 않음"]]}, {"type": "table", "rows": [["실무 해석 None의 높은 강도는 출력 안정성에는 장점이지만 제거 공정에서는 위험 요인이 된다. 강도와 제거성은 서로 반대되는 특성이므로 모델 부위별로 접촉 형상을 선택해야 한다."]]}, {"type": "heading", "level": 2, "text": "6. 연마와 최종 표면 품질", "id": "section-12"}, {"type": "paragraph", "text": "후처리에는 교체식 샌딩 헤드를 사용하는 전동 샌딩 펜을 사용할 수 있다. 휠 형태의 헤드로 돌출부를 먼저 제거하고, 미세 사포 롤로 표면을 연마한다."}, {"type": "image", "path": "assets/manuals/6_서포트 접촉 형상과 표면 품질/electric-sanding-pen.png", "alt": "서포트 접촉 형상과 표면 품질 시각 자료", "fileName": "electric-sanding-pen.png"}, {"type": "paragraph", "text": "교체식 샌딩 헤드를 사용하는 전동 샌딩 펜"}, {"type": "paragraph", "text": "Sphere는 제거 직후 돌출 잔여물이 더 뚜렷하지만 대부분 볼록한 형태라 연마하기 쉽다. 연마 후에는 None보다 표면이 더 매끄럽고 원래 형상에 가깝게 정리된다."}, {"type": "paragraph", "text": "None에서는 단단하고 취성인 레진을 절단하는 과정에서 뚜렷한 패임이 발생할 수 있다. 오목한 결함은 주변 표면을 패임 깊이까지 낮추거나 충전재로 보수해야 하므로 단순한 돌출 잔여물보다 복원이 어렵다."}, {"type": "table", "rows": [["1", "돌출 높이 확인 접촉 흔적이 볼록한 잔여물인지 오목한 패임인지 먼저 구분한다."]]}, {"type": "table", "rows": [["2", "거친 돌출부 제거 휠 또는 적절한 공구를 낮은 속도로 사용해 돌출부만 줄인다."]]}, {"type": "table", "rows": [["3", "미세 연마 미세 사포 롤로 주변 곡면과 자연스럽게 이어지도록 마감한다."]]}, {"type": "table", "rows": [["4", "형상 검사 조명 방향을 바꿔 패임, 평탄화, 디테일 손실을 확인한다."]]}, {"type": "table", "rows": [["안전 주의 전동 샌딩 공구는 과열과 과삭을 유발할 수 있다. 낮은 속도와 짧은 접촉을 사용하고, 분진 흡입을 막기 위한 보호구와 집진 환경을 갖춘다."]]}, {"type": "heading", "level": 2, "text": "7. 접촉 형상 선택 기준", "id": "section-13"}, {"type": "table", "rows": [["작업 조건", "권장 방향", "선정 이유"], ["표면 품질이 최우선인 외관면", "Sphere 우선", "돌출 흔적은 연마가 쉽고 패임 위험이 낮음"], ["얇고 섬세한 디테일", "Sphere 우선", "제거 하중과 우발 손상 가능성 감소"], ["박리력이 큰 넓은 단면", "None 또는 Sphere 보강", "강한 연결이 필요하나 손상 위험 평가"], ["후처리가 어려운 내부면", "접촉 자체 최소화", "어느 형상이든 흔적 제거가 어려움"], ["취성이 높은 레진", "Sphere 우선 검토", "직접 연결부 절단 시 패임 가능성 완화"], ["강도 부족으로 반복 실패", "None 또는 팁 치수 증가", "연결 안정성을 높여 출력 실패 방지"]]}, {"type": "heading", "level": 3, "text": "7.1 실무 적용 절차", "id": "section-14"}, {"type": "table", "rows": [["1", "외관면 지정 완성품에서 보이는 면과 연마가 어려운 면을 먼저 구분한다."]]}, {"type": "table", "rows": [["2", "하중 구간 파악 초기 아일랜드와 넓은 단면 등 강한 지지가 필요한 부위를 찾는다."]]}, {"type": "table", "rows": [["3", "형상 배분 외관·취약부는 Sphere, 고하중 부위는 강도 보강안을 적용한다."]]}, {"type": "table", "rows": [["4", "소형 시험 출력 동일 레진과 노광 조건에서 제거성과 흔적을 비교한다."]]}, {"type": "table", "rows": [["5", "후처리까지 평가 제거 직후가 아니라 연마 완료 후 표면 품질을 기준으로 결정한다."]]}, {"type": "table", "rows": [["설정 최적화 Sphere가 약하다고 판단되면 곧바로 None으로 바꾸기 전에 접촉 직경, 접촉 깊이, 서포트 수와 배치를 소폭 조정한다. 표면 보호와 출력 안정성을 동시에 확보할 수 있는지 확인한다."]]}, {"type": "heading", "level": 2, "text": "8. 결과 정리", "id": "section-15"}, {"type": "table", "rows": [["평가", "Sphere", "None"], ["서포트 제거", "더 쉬움", "더 어려움"], ["서포트 구조 강도", "상대적으로 낮음", "더 강함"], ["제거 후 돌출 잔여물", "더 뚜렷함", "상대적으로 적음"], ["표면 패임", "적음", "취성 레진에서 뚜렷함"], ["연마 난이도", "볼록한 잔여물이라 비교적 쉬움", "오목한 결함 복원이 어려움"], ["최종 표면 품질", "더 우수함", "상대적으로 낮음"]]}, {"type": "table", "rows": [["결론 Sphere 접촉 형상은 제거성과 최종 표면 품질에 유리하다. None 접촉 형상은 더 강한 지지를 제공하지만 제거 과정에서 모델 손상과 표면 패임이 발생할 수 있다. 모델의 취약도, 필요한 지지 강도, 후처리 접근성을 함께 고려해 선택한다."]]}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "different-contact-shapes-of-supports-01.png", "path": "assets/manuals/6_서포트 접촉 형상과 표면 품질/different-contact-shapes-of-supports-01.png", "kind": "image", "alt": "서포트 접촉 형상과 표면 품질 시각 자료 6-1"}, {"fileName": "different-contact-shapes-of-supports-02.png", "path": "assets/manuals/6_서포트 접촉 형상과 표면 품질/different-contact-shapes-of-supports-02.png", "kind": "image", "alt": "서포트 접촉 형상과 표면 품질 시각 자료 6-2"}, {"fileName": "electric-sanding-pen.png", "path": "assets/manuals/6_서포트 접촉 형상과 표면 품질/electric-sanding-pen.png", "kind": "image", "alt": "서포트 접촉 형상과 표면 품질 시각 자료 6-3"}, {"fileName": "support-params.png", "path": "assets/manuals/6_서포트 접촉 형상과 표면 품질/support-params.png", "kind": "image", "alt": "서포트 접촉 형상과 표면 품질 시각 자료 6-4"}, {"fileName": "with-contact-shape.png", "path": "assets/manuals/6_서포트 접촉 형상과 표면 품질/with-contact-shape.png", "kind": "image", "alt": "서포트 접촉 형상과 표면 품질 시각 자료 6-5"}, {"fileName": "without-contact-shape.png", "path": "assets/manuals/6_서포트 접촉 형상과 표면 품질/without-contact-shape.png", "kind": "image", "alt": "서포트 접촉 형상과 표면 품질 시각 자료 6-6"}], "searchText": "0. 개요 CHITUBOX의 서포트 팁에는 모델과 맞닿는 끝단의 형상을 지정하는 Contact Shape 파라미터가 있다. 접촉 형상을 Sphere와 None으로 설정했을 때 서포트 제거성, 구조 강도, 제거 후 잔여물과 최종 표면 품질이 어떻게 달라지는지 비교한다. 시험에는 GS-B11 Rigid Resin과 Spider Man - Miles Morales 모델을 사용하였다. 비교 결과는 단단하고 상대적으로 취성이 있는 해당 레진과 설정된 서포트 조건에서 얻은 것이므로, 다른 레진과 모델에는 동일한 경향이 나타나는지 별도 검증이 필요하다. 시험 항목 시험 조건 평가 내용 사용 레진 GS-B11 Rigid Resin 취성 재료에서의 제거 손상과 표면 결함 모델 Spider Man - Miles Morales 섬세한 형상과 서포트 접촉부 비교 변수 Contact Shape: Sphere / None 강도, 제거성, 잔여물, 패임 후처리 전동 샌딩 펜과 미세 사포 롤 연마 후 최종 표면 품질 핵심 결론 Sphere는 제거가 쉽고 연마 후 표면이 더 매끄럽다. None은 서포트 연결 강도가 높지만 제거가 어렵고, 취성 레진에서는 모델 표면 패임과 손상 위험이 더 크다. 1. Contact Shape의 정의 1.1 Sphere 접촉 형상 Sphere는 서포트 팁과 모델 사이에 구형 접촉부를 만든다. 제거 시 구형 부분이 모델 표면에서 분리되면서 돌출된 잔여물이 비교적 뚜렷하게 남을 수 있지만, 모델 본체가 직접 뜯겨 나가는 위험을 낮추는 완충 영역으로 작용한다. 1.2 None 접촉 형상 None은 별도의 구형 접촉부 없이 서포트 팁이 모델 표면에 직접 연결된다. 출력 과정에서 접촉 부위가 함께 노광되고 강화되며 연결부가 점차 두꺼워질 수 있어 서포트와 모델의 결합은 안정적이지만 제거는 어려워진다. Contact Shape None과 Sphere의 전체 형상 비교 확대 비교에서 None은 끝단이 모델에 직접 닿고, Sphere는 작은 구형 접촉부가 모델 표면과 서포트 팁 사이에 위치한다. 이 차이가 제거 방식과 제거 후 결함 형태를 결정한다. Sphere 접촉부와 None 접촉부의 확대 비교 2. 서포트 설정 Sphere 팁의 비교 설정은 다음과 같다. 핵심 변수는 Contact Shape이며, 서포트 연결부의 나머지 치수는 동일한 조건으로 유지하였다. 파라미터 설정값 기술적 의미 Contact Shape Sphere 모델과 팁 사이에 구형 접촉부 생성 Contact Diameter 1.00 mm 구형 접촉부의 직경 Contact Depth 0.50 mm 접촉부가 모델에 들어가는 깊이 Connection Shape Cone 접촉부 아래 연결 형상 Upper Diameter 0.60 mm 연결부 상단 직경 Lower Diameter 1.20 mm 연결부 하단 직경 Connection Length 2.00 mm 접촉 연결부 길이 CHITUBOX Top 서포트 파라미터 비교 시 주의 Contact Shape 효과를 판단하려면 팁 직경, 접촉 깊이, 연결부 치수, 서포트 수와 배치, 노광 조건을 고정해야 한다. 여러 파라미터를 함께 변경하면 접촉 형상 자체의 영향을 분리하기 어렵다. 3. 모델 표면에 미치는 영향 접촉 형상을 바꾸면 출력 중 연결부의 경화 방식과 제거 시 파괴 경로가 달라진다. None에서는 서포트 끝단이 모델 표면과 직접 노광되어 결합부가 강화되고 두꺼워지므로 안정적인 지지가 가능하다. 반면 강한 결합은 제거 과정에서 모델 표면까지 함께 뜯어낼 가능성을 높인다. 평가 항목 Sphere None 접촉 구조 구형 접촉부를 사이에 둠 팁이 모델 표면에 직접 연결 출력 중 결합 상대적으로 분리 가능한 연결 노광으로 연결부가 강화·확장 제거 후 흔적 돌출 잔여물이 비교적 뚜렷함 돌출은 적어도 패임 발생 가능 표면 보호 제거 시 모델 본체 손상 억제 취성 재료에서 표면 결손 위험 연마 결과 돌출부 제거가 쉬워 매끄러움 패임은 복구가 어려움 3.1 돌출 잔여물과 표면 패임 Sphere는 제거 후 구형 접촉부의 일부가 볼록한 잔여물로 남는 경향이 있다. 육안으로는 흔적이 더 크게 보이지만 재료가 표면 위에 남은 형태이므로 샌딩으로 높이를 낮추기 쉽다. None은 돌출 잔여물이 상대적으로 적을 수 있으나, 강하게 결합된 팁을 절단하거나 떼어낼 때 모델 재료가 함께 떨어져 나가 오목한 패임이 생길 수 있다. 패임은 재료를 추가하거나 전체 표면을 더 깊게 연마해야 하므로 후처리 난도가 높다. 평가 기준 제거 직후 흔적의 크기만으로 표면 품질을 판단하지 않는다. 돌출부는 연마로 제거할 수 있지만 패임과 결손은 원래 형상을 복원하기 어렵다. 4. 서포트 강도 비교 None 접촉 형상은 Sphere보다 더 강한 서포트 구조를 형성한다. None의 끝단이 모델 표면과 직접 연결되고 접촉부가 노광 중 강화되기 때문에 박리력이나 중력에 대한 연결 안정성이 높아진다. Sphere 접촉 형상의 서포트 치수 개념도 None 접촉 형상의 서포트 치수 개념도 구분 Sphere None 연결 강도 상대적으로 낮음 상대적으로 높음 제거 용이성 높음 낮음 섬세한 모델 보호 유리 제거 중 손상 위험 강한 고정이 필요한 부위 직경·깊이 보강 검토 연결 안정성에 유리 강도 평가는 정량적인 파단 하중 수치가 아니라 출력 및 제거 결과를 바탕으로 한 상대 비교다. 5. 서포트 제거와 모델 손상 5.1 제거 난이도 서포트를 제거할 때 Sphere는 None보다 쉽게 분리된다. 반대로 None은 구조적으로 더 안정적이지만 결합이 강해 니퍼나 절단 도구에 더 큰 힘이 필요하며, 힘이 모델 쪽으로 전달될 가능성이 높다. 5.2 섬세한 모델의 위험 섬세한 모델에서 None 접촉 형상을 제거하면 Sphere보다 모델을 우발적으로 손상시킬 가능성이 높다. 얇은 손가락, 장식, 날카로운 모서리와 같은 취약부에는 제거 하중을 줄일 수 있는 접촉 형상이 유리하다. 제거 단계 권장 작업 주의사항 사전 연화 레진 제조사 허용 범위에서 온수 또는 적절한 방법 검토 과열과 변형 방지 1차 절단 모델에서 떨어진 기둥 부분부터 제거 접촉부를 비틀지 않음 팁 분리 얇은 니퍼로 접촉부 가까이 절단 모델 표면을 물지 않게 함 잔여물 확인 돌출과 패임을 구분 즉시 과도하게 연마하지 않음 실무 해석 None의 높은 강도는 출력 안정성에는 장점이지만 제거 공정에서는 위험 요인이 된다. 강도와 제거성은 서로 반대되는 특성이므로 모델 부위별로 접촉 형상을 선택해야 한다. 6. 연마와 최종 표면 품질 후처리에는 교체식 샌딩 헤드를 사용하는 전동 샌딩 펜을 사용할 수 있다. 휠 형태의 헤드로 돌출부를 먼저 제거하고, 미세 사포 롤로 표면을 연마한다. 교체식 샌딩 헤드를 사용하는 전동 샌딩 펜 Sphere는 제거 직후 돌출 잔여물이 더 뚜렷하지만 대부분 볼록한 형태라 연마하기 쉽다. 연마 후에는 None보다 표면이 더 매끄럽고 원래 형상에 가깝게 정리된다. None에서는 단단하고 취성인 레진을 절단하는 과정에서 뚜렷한 패임이 발생할 수 있다. 오목한 결함은 주변 표면을 패임 깊이까지 낮추거나 충전재로 보수해야 하므로 단순한 돌출 잔여물보다 복원이 어렵다. 1 돌출 높이 확인 접촉 흔적이 볼록한 잔여물인지 오목한 패임인지 먼저 구분한다. 2 거친 돌출부 제거 휠 또는 적절한 공구를 낮은 속도로 사용해 돌출부만 줄인다. 3 미세 연마 미세 사포 롤로 주변 곡면과 자연스럽게 이어지도록 마감한다. 4 형상 검사 조명 방향을 바꿔 패임, 평탄화, 디테일 손실을 확인한다. 안전 주의 전동 샌딩 공구는 과열과 과삭을 유발할 수 있다. 낮은 속도와 짧은 접촉을 사용하고, 분진 흡입을 막기 위한 보호구와 집진 환경을 갖춘다. 7. 접촉 형상 선택 기준 작업 조건 권장 방향 선정 이유 표면 품질이 최우선인 외관면 Sphere 우선 돌출 흔적은 연마가 쉽고 패임 위험이 낮음 얇고 섬세한 디테일 Sphere 우선 제거 하중과 우발 손상 가능성 감소 박리력이 큰 넓은 단면 None 또는 Sphere 보강 강한 연결이 필요하나 손상 위험 평가 후처리가 어려운 내부면 접촉 자체 최소화 어느 형상이든 흔적 제거가 어려움 취성이 높은 레진 Sphere 우선 검토 직접 연결부 절단 시 패임 가능성 완화 강도 부족으로 반복 실패 None 또는 팁 치수 증가 연결 안정성을 높여 출력 실패 방지 7.1 실무 적용 절차 1 외관면 지정 완성품에서 보이는 면과 연마가 어려운 면을 먼저 구분한다. 2 하중 구간 파악 초기 아일랜드와 넓은 단면 등 강한 지지가 필요한 부위를 찾는다. 3 형상 배분 외관·취약부는 Sphere, 고하중 부위는 강도 보강안을 적용한다. 4 소형 시험 출력 동일 레진과 노광 조건에서 제거성과 흔적을 비교한다. 5 후처리까지 평가 제거 직후가 아니라 연마 완료 후 표면 품질을 기준으로 결정한다. 설정 최적화 Sphere가 약하다고 판단되면 곧바로 None으로 바꾸기 전에 접촉 직경, 접촉 깊이, 서포트 수와 배치를 소폭 조정한다. 표면 보호와 출력 안정성을 동시에 확보할 수 있는지 확인한다. 8. 결과 정리 평가 Sphere None 서포트 제거 더 쉬움 더 어려움 서포트 구조 강도 상대적으로 낮음 더 강함 제거 후 돌출 잔여물 더 뚜렷함 상대적으로 적음 표면 패임 적음 취성 레진에서 뚜렷함 연마 난이도 볼록한 잔여물이라 비교적 쉬움 오목한 결함 복원이 어려움 최종 표면 품질 더 우수함 상대적으로 낮음 결론 Sphere 접촉 형상은 제거성과 최종 표면 품질에 유리하다. None 접촉 형상은 더 강한 지지를 제공하지만 제거 과정에서 모델 손상과 표면 패임이 발생할 수 있다. 모델의 취약도, 필요한 지지 강도, 후처리 접근성을 함께 고려해 선택한다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 5}, "7": {"manualId": 7, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "SLA/DLP/LCD 방식은 모델을 얇은 층으로 나누어 Z축 방향으로 적층한다. 레이어 두께는 각 층의 높이를 뜻하며, 표면의 계단 현상, 세부 표현, 전체 적층 횟수와 출력 시간, 노광 조건 및 출력 안정성에 직접 관여한다."}, {"type": "table", "rows": [["핵심 판단 레이어 두께를 작게 설정하면 일반적으로 곡면과 경사면이 더 매끄러워지지만 레이어 수가 늘어 출력 시간이 길어진다. 반대로 두껍게 설정하면 속도 이점이 있으나 노광량과 장비의 Z축 안정성을 함께 검증해야 한다."]]}, {"type": "heading", "level": 2, "text": "1. 레이어 두께의 정의", "id": "section-2"}, {"type": "paragraph", "text": "레이어 두께(Layer Height)는 슬라이싱된 두 인접 층 사이의 Z축 높이이다. 단위는 mm 또는 µm를 사용하며, 50µm(0.05mm)는 가장 일반적으로 사용하는 설정이다. 다만 실제 사용 범위는 장비 구조, 광학계, 레진 특성과 목표 품질에 따라 달라진다."}, {"type": "heading", "level": 3, "text": "1.1 계단 현상", "id": "section-3"}, {"type": "paragraph", "text": "원통의 외곽처럼 곡률이 있는 면을 수평 층으로 나누면 각 층의 경계가 미세한 계단처럼 드러난다. 이를 계단 현상(ladder effect)이라고 하며, 곡률이 큰 표면일수록 층 경계가 더 눈에 띈다."}, {"type": "image", "path": "assets/manuals/7_레이어 두께 영향/a-cylinder-with-layer-height-of-02mm.jpg", "alt": "레이어 두께 영향 시각 자료", "fileName": "a-cylinder-with-layer-height-of-02mm.jpg"}, {"type": "paragraph", "text": "그림 1. 0.2mm 레이어 두께로 출력한 원통에서 관찰되는 층 경계"}, {"type": "table", "rows": [["해석 시 주의 수직에 가까운 평면보다 곡면과 경사면에서 레이어 두께의 시각적 영향이 크다. 따라서 품질 평가는 모델의 가장 민감한 곡면과 모서리를 기준으로 수행한다."]]}, {"type": "heading", "level": 2, "text": "2. 표면 품질과 출력 시간에 미치는 영향", "id": "section-4"}, {"type": "paragraph", "text": "같은 높이의 모델에서 레이어 두께를 줄이면 더 많은 층이 생성된다. 층 간 높이 차가 작아져 표면이 부드럽고 Z축 세부 형상이 또렷해지는 대신, 반복해야 할 노광·리프트·복귀 횟수가 증가해 전체 출력 시간이 길어진다."}, {"type": "table", "rows": [["구분", "얇은 레이어", "두꺼운 레이어"], ["표면 품질", "곡면과 경사면의 계단 현상 감소", "층 경계가 상대적으로 뚜렷함"], ["세부 표현", "Z축 방향 형상 표현에 유리", "미세 높이 변화가 단순화될 수 있음"], ["출력 시간", "레이어 수 증가로 길어짐", "레이어 수 감소로 짧아질 수 있음"], ["공정 조건", "기본 검증값에서 단계적으로 조정", "층 전체 경화를 위한 노광 재검증 필요"]]}, {"type": "image", "path": "assets/manuals/7_레이어 두께 영향/different-layer-heights-of-the-cylinder.jpg", "alt": "레이어 두께 영향 시각 자료", "fileName": "different-layer-heights-of-the-cylinder.jpg"}, {"type": "paragraph", "text": "그림 2. 0.05mm, 0.1mm, 0.2mm 조건의 표면 품질 비교"}, {"type": "paragraph", "text": "0.05mm, 0.1mm, 0.2mm 조건을 비교하면 레이어가 얇을수록 표면 정밀도가 높아지는 경향을 확인할 수 있다. 설정값을 선택할 때에는 품질과 속도 중 어느 항목을 우선할지 먼저 결정해야 한다."}, {"type": "heading", "level": 2, "text": "3. 레이어 두께와 노광 조건", "id": "section-5"}, {"type": "paragraph", "text": "레이어를 두껍게 변경하면서 일반 레이어 노광 시간을 그대로 유지하면 층 전체가 충분히 경화되지 않을 수 있다. 0.2mm 레이어 비교 사례에서는 일반 노광 3초로 완전 경화되지 않았고, 바닥 노광 50초가 적용된 초기 6개 바닥층만 정상적으로 형성되었다."}, {"type": "table", "rows": [["검증 결과 출력 실패 원인이 일반 레이어의 노광 부족인지 확인하기 위해 일반 노광 시간을 30초로 늘렸고, 0.2mm 레이어 높이의 원통이 정상 출력되었다."]]}, {"type": "heading", "level": 3, "text": "3.1 설정 변경 원칙", "id": "section-6"}, {"type": "paragraph", "text": "레이어 두께를 변경하면 일반 노광 시간도 별도의 시험편으로 다시 검증한다."}, {"type": "paragraph", "text": "바닥층만 형성되고 일반층에서 출력이 중단되면 일반 노광 부족 가능성을 우선 확인한다."}, {"type": "paragraph", "text": "노광 시간을 한 번에 크게 올리기보다 단계적으로 조정하고 치수 변화와 과경화 흔적을 함께 기록한다."}, {"type": "paragraph", "text": "레진 종류, 온도, 광원 상태와 장비별 광학 특성이 다르므로 사례 수치를 보편적인 권장값으로 그대로 적용하지 않는다."}, {"type": "table", "rows": [["관찰 결과", "가능 원인", "확인 항목"], ["바닥층만 형성됨", "일반층 노광 부족", "일반 노광 시간, 레이어 두께"], ["세부가 뭉개짐", "과도한 노광 또는 두꺼운 층", "노광 시간, XY 확산, 레이어 두께"], ["층간 분리", "경화 부족 또는 박리 부하", "노광, 리프트 속도, 대기 시간"], ["표면 계단이 큼", "레이어 두께가 목표 품질 대비 큼", "곡면 기준 레이어 두께 재선정"]]}, {"type": "heading", "level": 2, "text": "4. 출력 성공률과 Z축 안정성", "id": "section-7"}, {"type": "paragraph", "text": "레이어 두께의 영향은 품질과 시간에 그치지 않는다. 장비의 Z축이 충분히 안정적이지 않은 상태에서 두꺼운 레이어와 높은 이동 속도를 함께 사용하면 불안정성이 커져 층 분리, 파편화, 위치 이동이 발생할 수 있다."}, {"type": "image", "path": "assets/manuals/7_레이어 두께 영향/the-effect-of-different-layer-heights-on-printing.jpg", "alt": "레이어 두께 영향 시각 자료", "fileName": "the-effect-of-different-layer-heights-on-printing.jpg"}, {"type": "paragraph", "text": "그림 3. 레이어 두께와 고속 Z축 이동 조건에서 발생한 출력 손상 비교"}, {"type": "table", "rows": [["고속 조건 예시 리프트 속도 100mm/min, 복귀 속도 200mm/min과 같은 높은 이동 속도는 Z축 불안정성을 악화시킬 수 있다. 이 수치는 사례 조건이며, 장비별 기구 강성 및 박리 조건에 맞춰 검증해야 한다."]]}, {"type": "heading", "level": 3, "text": "4.1 실패 시 점검 순서", "id": "section-8"}, {"type": "paragraph", "text": "동일한 레이어 두께에서 일반 노광 부족 여부를 먼저 확인한다."}, {"type": "paragraph", "text": "리프트 및 복귀 속도를 낮춰 층 분리와 진동 흔적이 감소하는지 비교한다."}, {"type": "paragraph", "text": "Z축 가이드·리드스크루·플랫폼 체결을 점검하고 배치 각도와 서포트를 함께 검토한다."}, {"type": "heading", "level": 2, "text": "5. 실무 레이어 두께 선정 가이드", "id": "section-9"}, {"type": "paragraph", "text": "레이어 두께는 단독으로 결정하지 않고 목표 표면 품질, 납기, 모델 형상, 레진 반응성과 장비 안정성을 함께 고려한다. 아래 절차는 기존에 검증된 기준 조건에서 출발해 한 번에 하나의 변수만 변경하는 방식이다."}, {"type": "table", "rows": [["단계", "판단 내용", "실행"], ["1", "요구 품질 정의", "곡면, 경사면, 미세 문자 등 가장 민감한 영역을 지정"], ["2", "기준값 선택", "검증된 0.05mm 등 기존 프로파일을 기준으로 시작"], ["3", "레이어 두께 변경", "품질 또는 속도 목표에 맞춰 한 단계씩 변경"], ["4", "노광 재검증", "일반층 경화와 치수 변화를 시험편으로 확인"], ["5", "동작 안정성 확인", "리프트·복귀 속도와 층 분리 여부를 점검"], ["6", "결과 기록", "표면, 치수, 시간, 성공 여부를 프로파일에 기록"]]}, {"type": "heading", "level": 3, "text": "5.1 목적별 판단 기준", "id": "section-10"}, {"type": "table", "rows": [["목적", "우선 검토", "주의 사항"], ["곡면 품질 우선", "더 얇은 레이어", "출력 시간 증가와 레이어 수 증가"], ["빠른 시제품", "상대적으로 두꺼운 레이어", "표면 계단과 노광 부족"], ["대형 모델", "시간과 안정성의 균형", "단면적, 박리 부하, Z축 진동"], ["새 레진 적용", "기준 레이어부터 재검증", "기존 노광값의 단순 재사용 금지"]]}, {"type": "table", "rows": [["변수 관리 레이어 두께, 노광 시간, 리프트 속도를 동시에 변경하면 실패 원인을 구분하기 어렵다. 기준 출력물을 확보한 뒤 한 번에 하나의 조건만 변경한다."]]}, {"type": "heading", "level": 2, "text": "6. 최종 점검 체크리스트", "id": "section-11"}, {"type": "paragraph", "text": "목표 품질이 필요한 곡면과 경사면을 기준으로 레이어 두께를 선택했는가?"}, {"type": "paragraph", "text": "레이어 두께 변경 후 일반 노광 시간을 별도로 검증했는가?"}, {"type": "paragraph", "text": "바닥층만 남는 실패가 일반 노광 부족 때문인지 확인했는가?"}, {"type": "paragraph", "text": "리프트 및 복귀 속도가 장비의 Z축 안정성에 적합한가?"}, {"type": "paragraph", "text": "층 분리, 파편화, 위치 이동 등의 징후를 확인했는가?"}, {"type": "paragraph", "text": "표면 품질, 치수, 총 출력 시간과 성공 여부를 기록했는가?"}, {"type": "heading", "level": 2, "text": "7. 결론", "id": "section-12"}, {"type": "paragraph", "text": "레이어 두께가 작을수록 곡면과 경사면의 표면 품질은 향상되는 경향이 있지만, 레이어 수 증가로 출력 시간이 길어진다. 두꺼운 레이어는 출력 시간을 줄일 수 있으나 층 전체를 경화할 수 있는 노광량과 안정적인 Z축 이동 조건이 필요하다."}, {"type": "paragraph", "text": "따라서 레이어 두께는 품질과 속도의 단순한 선택값이 아니라 노광, 이동 속도, 장비 기구 안정성을 함께 검증해야 하는 공정 변수이다. 기존에 검증된 프로파일을 기준으로 단계적으로 조정하고 결과를 기록하는 것이 재현성과 성공률을 높이는 가장 확실한 방법이다."}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "a-cylinder-with-layer-height-of-02mm.jpg", "path": "assets/manuals/7_레이어 두께 영향/a-cylinder-with-layer-height-of-02mm.jpg", "kind": "image", "alt": "레이어 두께 영향 시각 자료 7-1"}, {"fileName": "different-layer-heights-of-the-cylinder.jpg", "path": "assets/manuals/7_레이어 두께 영향/different-layer-heights-of-the-cylinder.jpg", "kind": "image", "alt": "레이어 두께 영향 시각 자료 7-2"}, {"fileName": "the-effect-of-different-layer-heights-on-printing.jpg", "path": "assets/manuals/7_레이어 두께 영향/the-effect-of-different-layer-heights-on-printing.jpg", "kind": "image", "alt": "레이어 두께 영향 시각 자료 7-3"}], "searchText": "0. 개요 SLA/DLP/LCD 방식은 모델을 얇은 층으로 나누어 Z축 방향으로 적층한다. 레이어 두께는 각 층의 높이를 뜻하며, 표면의 계단 현상, 세부 표현, 전체 적층 횟수와 출력 시간, 노광 조건 및 출력 안정성에 직접 관여한다. 핵심 판단 레이어 두께를 작게 설정하면 일반적으로 곡면과 경사면이 더 매끄러워지지만 레이어 수가 늘어 출력 시간이 길어진다. 반대로 두껍게 설정하면 속도 이점이 있으나 노광량과 장비의 Z축 안정성을 함께 검증해야 한다. 1. 레이어 두께의 정의 레이어 두께(Layer Height)는 슬라이싱된 두 인접 층 사이의 Z축 높이이다. 단위는 mm 또는 µm를 사용하며, 50µm(0.05mm)는 가장 일반적으로 사용하는 설정이다. 다만 실제 사용 범위는 장비 구조, 광학계, 레진 특성과 목표 품질에 따라 달라진다. 1.1 계단 현상 원통의 외곽처럼 곡률이 있는 면을 수평 층으로 나누면 각 층의 경계가 미세한 계단처럼 드러난다. 이를 계단 현상(ladder effect)이라고 하며, 곡률이 큰 표면일수록 층 경계가 더 눈에 띈다. 그림 1. 0.2mm 레이어 두께로 출력한 원통에서 관찰되는 층 경계 해석 시 주의 수직에 가까운 평면보다 곡면과 경사면에서 레이어 두께의 시각적 영향이 크다. 따라서 품질 평가는 모델의 가장 민감한 곡면과 모서리를 기준으로 수행한다. 2. 표면 품질과 출력 시간에 미치는 영향 같은 높이의 모델에서 레이어 두께를 줄이면 더 많은 층이 생성된다. 층 간 높이 차가 작아져 표면이 부드럽고 Z축 세부 형상이 또렷해지는 대신, 반복해야 할 노광·리프트·복귀 횟수가 증가해 전체 출력 시간이 길어진다. 구분 얇은 레이어 두꺼운 레이어 표면 품질 곡면과 경사면의 계단 현상 감소 층 경계가 상대적으로 뚜렷함 세부 표현 Z축 방향 형상 표현에 유리 미세 높이 변화가 단순화될 수 있음 출력 시간 레이어 수 증가로 길어짐 레이어 수 감소로 짧아질 수 있음 공정 조건 기본 검증값에서 단계적으로 조정 층 전체 경화를 위한 노광 재검증 필요 그림 2. 0.05mm, 0.1mm, 0.2mm 조건의 표면 품질 비교 0.05mm, 0.1mm, 0.2mm 조건을 비교하면 레이어가 얇을수록 표면 정밀도가 높아지는 경향을 확인할 수 있다. 설정값을 선택할 때에는 품질과 속도 중 어느 항목을 우선할지 먼저 결정해야 한다. 3. 레이어 두께와 노광 조건 레이어를 두껍게 변경하면서 일반 레이어 노광 시간을 그대로 유지하면 층 전체가 충분히 경화되지 않을 수 있다. 0.2mm 레이어 비교 사례에서는 일반 노광 3초로 완전 경화되지 않았고, 바닥 노광 50초가 적용된 초기 6개 바닥층만 정상적으로 형성되었다. 검증 결과 출력 실패 원인이 일반 레이어의 노광 부족인지 확인하기 위해 일반 노광 시간을 30초로 늘렸고, 0.2mm 레이어 높이의 원통이 정상 출력되었다. 3.1 설정 변경 원칙 레이어 두께를 변경하면 일반 노광 시간도 별도의 시험편으로 다시 검증한다. 바닥층만 형성되고 일반층에서 출력이 중단되면 일반 노광 부족 가능성을 우선 확인한다. 노광 시간을 한 번에 크게 올리기보다 단계적으로 조정하고 치수 변화와 과경화 흔적을 함께 기록한다. 레진 종류, 온도, 광원 상태와 장비별 광학 특성이 다르므로 사례 수치를 보편적인 권장값으로 그대로 적용하지 않는다. 관찰 결과 가능 원인 확인 항목 바닥층만 형성됨 일반층 노광 부족 일반 노광 시간, 레이어 두께 세부가 뭉개짐 과도한 노광 또는 두꺼운 층 노광 시간, XY 확산, 레이어 두께 층간 분리 경화 부족 또는 박리 부하 노광, 리프트 속도, 대기 시간 표면 계단이 큼 레이어 두께가 목표 품질 대비 큼 곡면 기준 레이어 두께 재선정 4. 출력 성공률과 Z축 안정성 레이어 두께의 영향은 품질과 시간에 그치지 않는다. 장비의 Z축이 충분히 안정적이지 않은 상태에서 두꺼운 레이어와 높은 이동 속도를 함께 사용하면 불안정성이 커져 층 분리, 파편화, 위치 이동이 발생할 수 있다. 그림 3. 레이어 두께와 고속 Z축 이동 조건에서 발생한 출력 손상 비교 고속 조건 예시 리프트 속도 100mm/min, 복귀 속도 200mm/min과 같은 높은 이동 속도는 Z축 불안정성을 악화시킬 수 있다. 이 수치는 사례 조건이며, 장비별 기구 강성 및 박리 조건에 맞춰 검증해야 한다. 4.1 실패 시 점검 순서 동일한 레이어 두께에서 일반 노광 부족 여부를 먼저 확인한다. 리프트 및 복귀 속도를 낮춰 층 분리와 진동 흔적이 감소하는지 비교한다. Z축 가이드·리드스크루·플랫폼 체결을 점검하고 배치 각도와 서포트를 함께 검토한다. 5. 실무 레이어 두께 선정 가이드 레이어 두께는 단독으로 결정하지 않고 목표 표면 품질, 납기, 모델 형상, 레진 반응성과 장비 안정성을 함께 고려한다. 아래 절차는 기존에 검증된 기준 조건에서 출발해 한 번에 하나의 변수만 변경하는 방식이다. 단계 판단 내용 실행 1 요구 품질 정의 곡면, 경사면, 미세 문자 등 가장 민감한 영역을 지정 2 기준값 선택 검증된 0.05mm 등 기존 프로파일을 기준으로 시작 3 레이어 두께 변경 품질 또는 속도 목표에 맞춰 한 단계씩 변경 4 노광 재검증 일반층 경화와 치수 변화를 시험편으로 확인 5 동작 안정성 확인 리프트·복귀 속도와 층 분리 여부를 점검 6 결과 기록 표면, 치수, 시간, 성공 여부를 프로파일에 기록 5.1 목적별 판단 기준 목적 우선 검토 주의 사항 곡면 품질 우선 더 얇은 레이어 출력 시간 증가와 레이어 수 증가 빠른 시제품 상대적으로 두꺼운 레이어 표면 계단과 노광 부족 대형 모델 시간과 안정성의 균형 단면적, 박리 부하, Z축 진동 새 레진 적용 기준 레이어부터 재검증 기존 노광값의 단순 재사용 금지 변수 관리 레이어 두께, 노광 시간, 리프트 속도를 동시에 변경하면 실패 원인을 구분하기 어렵다. 기준 출력물을 확보한 뒤 한 번에 하나의 조건만 변경한다. 6. 최종 점검 체크리스트 목표 품질이 필요한 곡면과 경사면을 기준으로 레이어 두께를 선택했는가? 레이어 두께 변경 후 일반 노광 시간을 별도로 검증했는가? 바닥층만 남는 실패가 일반 노광 부족 때문인지 확인했는가? 리프트 및 복귀 속도가 장비의 Z축 안정성에 적합한가? 층 분리, 파편화, 위치 이동 등의 징후를 확인했는가? 표면 품질, 치수, 총 출력 시간과 성공 여부를 기록했는가? 7. 결론 레이어 두께가 작을수록 곡면과 경사면의 표면 품질은 향상되는 경향이 있지만, 레이어 수 증가로 출력 시간이 길어진다. 두꺼운 레이어는 출력 시간을 줄일 수 있으나 층 전체를 경화할 수 있는 노광량과 안정적인 Z축 이동 조건이 필요하다. 따라서 레이어 두께는 품질과 속도의 단순한 선택값이 아니라 노광, 이동 속도, 장비 기구 안정성을 함께 검증해야 하는 공정 변수이다. 기존에 검증된 프로파일을 기준으로 단계적으로 조정하고 결과를 기록하는 것이 재현성과 성공률을 높이는 가장 확실한 방법이다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 4}, "8": {"manualId": 8, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "속이 비워진 출력물(Hollow Model)은 재료 사용량과 출력 무게를 줄이는 데 효과적이지만, 내부 세척과 후경화가 충분하지 않으면 출력 직후에는 정상으로 보이던 부품이 보관 중 균열되거나 파손될 수 있다. 대표적인 영향 요인은 후경화 부족, 내부 벽면의 미경화 레진 잔류, 성형 과정에서 남은 내부 응력, 레진 자체의 낮은 인성이다."}, {"type": "paragraph", "text": "속이 빈 출력물은 외부 표면만 확인해서는 품질을 판정하기 어렵다. 내부 배출 경로, 세척액의 순환, 완전 건조, 내부면을 포함한 경화 상태와 레진 물성을 함께 관리해야 장기 보관 안정성을 확보할 수 있다."}, {"type": "table", "rows": [["관찰 증상", "가능 원인", "우선 확인"], ["표면이 끈적이고 무름", "후경화 부족", "세척·건조 상태와 UV 후경화 조건"], ["배출구에서 액체가 나옴", "내부 레진 잔류", "배출구 위치, 내부 세척과 건조"], ["시간이 지나 균열 확대", "내부 응력·화학적 작용", "균열 시작점과 내부 벽면 상태"], ["작은 충격에도 파손", "낮은 레진 인성", "레진 용도, 강도와 연성의 균형"]]}, {"type": "heading", "level": 2, "text": "1. 시간 경과 후 발생하는 균열과 파손", "id": "section-2"}, {"type": "paragraph", "text": "속이 빈 출력물은 출력 완료 시점에는 형상을 유지하더라도 내부에 미경화 레진이나 세척 잔류물이 남아 있을 수 있다. 외부 표면이 경화된 상태에서도 내부 벽면의 반응과 체적 변화가 계속되면 응력이 축적되고, 얇은 벽이나 형상 전환부에서 균열이 시작되어 넓은 파손으로 이어질 수 있다."}, {"type": "image", "path": "assets/manuals/8_속이 비워진 출력물의 시간 경과 후 균열 및 파손/a-broken-hollow-model.jpg", "alt": "속이 비워진 출력물의 시간 경과 후 균열 및 파손 시각 자료", "fileName": "a-broken-hollow-model.jpg"}, {"type": "paragraph", "text": "그림 1. 보관 중 균열이 확대되어 외벽이 파손된 속이 빈 출력물 사례"}, {"type": "paragraph", "text": "파손면이 넓게 벌어지거나 껍질처럼 분리된 경우에는 파손 부위만 접착하기보다 내부 상태를 먼저 확인한다. 같은 조건으로 제작한 다른 부품에도 잔류 레진과 균열 징후가 있을 수 있으므로 동일 배치의 출력물을 함께 점검한다."}, {"type": "heading", "level": 2, "text": "2. 후경화 부족", "id": "section-3"}, {"type": "paragraph", "text": "출력 장비에서 꺼낸 부품은 형상은 완성되었더라도 광중합 반응이 완전히 끝난 상태가 아닐 수 있다. 표면이 끈적이거나 상대적으로 부드럽게 느껴지는 것은 미반응 성분과 불충분한 경화 상태를 점검해야 하는 신호다."}, {"type": "paragraph", "text": "적절한 UV 후경화는 남아 있는 반응을 진행시켜 탄성률, 강도와 치수 안정성을 높이고 표면을 더 단단하고 건조하게 만든다. 속이 빈 구조에서는 외부뿐 아니라 내부 벽면도 충분히 세척·건조된 상태에서 경화되도록 형상과 배출구를 고려해야 한다."}, {"type": "table", "rows": [["후경화 원칙 레진 제조사가 제시한 파장, 시간과 온도 조건을 우선한다. 과도한 후경화는 일부 레진의 취성을 높일 수 있으므로 시간을 임의로 크게 늘리지 말고 검증된 조건에서 회전 또는 방향 전환으로 노출 편차를 줄인다."]]}, {"type": "table", "rows": [["상태", "가능한 의미", "조치"], ["표면 점착", "세척 부족 또는 반응 미완료", "재세척 가능 여부 확인 후 완전 건조"], ["표면이 쉽게 눌림", "경화도 부족", "제조사 조건에 따라 후경화 재검토"], ["외부만 단단함", "내부면 경화 편차", "배출구와 내부 광 도달 경로 점검"], ["후경화 후 쉽게 깨짐", "과경화 또는 낮은 인성", "경화 조건과 레진 선정 재검토"]]}, {"type": "heading", "level": 3, "text": "2.1 후경화 전 확인 사항", "id": "section-4"}, {"type": "paragraph", "text": "내부의 미경화 레진과 세척액이 완전히 배출되었는지 확인한다."}, {"type": "paragraph", "text": "배출구와 통기구가 막히지 않았는지 확인한다."}, {"type": "paragraph", "text": "표면과 내부가 충분히 건조된 후 UV 후경화를 시작한다."}, {"type": "paragraph", "text": "레진명, 출력 조건, 세척 시간과 후경화 조건을 작업 기록에 남긴다."}, {"type": "paragraph", "text": "대형 또는 복잡한 속이 빈 구조는 방향을 바꾸어 노출 편차를 줄인다."}, {"type": "heading", "level": 2, "text": "3. 내부 세척과 미경화 레진 잔류", "id": "section-5"}, {"type": "paragraph", "text": "속이 빈 출력물의 내부 벽면이 충분히 세척되지 않으면 액상 레진이 내부에 남는다. 잔류 레진은 장기간 내부 벽면과 접촉하면서 경화층으로 침투하거나 재료를 팽윤·약화시키는 화학적 작용을 일으킬 수 있으며, 결국 균열 또는 파손으로 이어질 수 있다."}, {"type": "image", "path": "assets/manuals/8_속이 비워진 출력물의 시간 경과 후 균열 및 파손/unclean-inner-wall-01.jpg", "alt": "속이 비워진 출력물의 시간 경과 후 균열 및 파손 시각 자료", "fileName": "unclean-inner-wall-01.jpg"}, {"type": "paragraph", "text": "그림 2. 배출구 주변과 내부 바닥에 액상 레진이 남아 있는 상태"}, {"type": "table", "rows": [["관찰 포인트 배출구가 존재하더라도 위치가 내부 최저점과 맞지 않거나 세척액이 순환하지 못하면 웅덩이처럼 잔류물이 남을 수 있다. 출력 방향을 기준으로 배출 경로를 확인한다."]]}, {"type": "heading", "level": 3, "text": "3.1 내부 벽면의 균열 징후", "id": "section-6"}, {"type": "image", "path": "assets/manuals/8_속이 비워진 출력물의 시간 경과 후 균열 및 파손/unclean-inner-wall-02.jpg", "alt": "속이 비워진 출력물의 시간 경과 후 균열 및 파손 시각 자료", "fileName": "unclean-inner-wall-02.jpg"}, {"type": "paragraph", "text": "그림 3. 내부 벽면에서 확인되는 세척 불량 흔적과 균열선"}, {"type": "paragraph", "text": "내부 벽면의 광택이 부분적으로 다르거나 끈적임, 침전물, 변색과 균열선이 함께 관찰되면 단순한 외부 충격보다 내부 세척과 경화 편차를 우선 의심한다. 균열은 두께가 급격히 바뀌는 경계나 내부 보강 구조 주변에서 시작될 수 있다."}, {"type": "heading", "level": 3, "text": "3.2 권장 세척 절차", "id": "section-7"}, {"type": "table", "rows": [["1", "자유 배출 출력물을 여러 방향으로 기울여 내부 액상 레진을 충분히 배출한다."]]}, {"type": "table", "rows": [["2", "1차 세척 레진 제조사가 허용한 세척액을 내부로 순환시켜 잔류 레진을 희석·제거한다."]]}, {"type": "table", "rows": [["3", "반복 세척 배출되는 세척액이 탁하거나 점성이 남아 있으면 새 세척액으로 과정을 반복한다."]]}, {"type": "table", "rows": [["4", "통로 확인 배출구와 통기구를 통해 세척액과 공기가 실제로 통과하는지 확인한다."]]}, {"type": "table", "rows": [["5", "완전 건조 내부 세척액이 남지 않도록 충분히 배출하고 환기된 환경에서 건조한다."]]}, {"type": "table", "rows": [["6", "후경화 완전히 건조된 뒤 레진 제조사 조건에 맞추어 외부와 내부면의 경화를 진행한다."]]}, {"type": "heading", "level": 2, "text": "4. 내부 응력", "id": "section-8"}, {"type": "paragraph", "text": "내부 응력은 외부 하중을 제거한 뒤에도 물체 내부에 남아 있는 응력이다. 재료의 거시적 또는 미시적 구조에서 체적 변화가 균일하지 않을 때 발생하며, 외력이 없는 상태에서도 가공과 성형 조건, 온도 변화, 용제의 작용 등에 의해 균열과 파단을 유발할 수 있다."}, {"type": "paragraph", "text": "속이 빈 구조에서는 외부와 내부 벽면의 경화도, 세척 상태와 건조 속도가 서로 다르면 부위별 체적 변화가 달라진다. 이 차이가 얇은 벽, 날카로운 모서리, 두께 전환부에 집중되면 보관 중 미세 균열이 성장할 수 있다."}, {"type": "table", "rows": [["주요 유발 요인 외부와 내부의 불균일한 경화, 급격한 온도 변화, 용제 잔류, 벽 두께의 급변, 강성이 다른 보강 구조의 경계는 체적 변화와 응력을 한 부위에 집중시킬 수 있다."]]}, {"type": "table", "rows": [["진단 원칙 외부 충격이 없었는데 균열이 확대되었다면 균열 시작점, 내부 잔류물, 벽 두께 변화, 후경화 조건을 함께 확인한다. 파손된 결과만 보고 레진 강도 부족으로 단정하지 않는다."]]}, {"type": "heading", "level": 2, "text": "5. 레진 물성과 파손 민감도", "id": "section-9"}, {"type": "paragraph", "text": "광경화성 레진은 배합과 생산 방식에 따라 강도, 연성, 탄성률과 내환경성이 다르며 용도도 달라진다. ABS-like 계열과 같은 인성 재료는 일반적으로 강도와 연성의 균형이 좋아 더 높은 응력 또는 더 큰 변형을 견딜 수 있어 취성 레진보다 파손에 대한 여유가 크다."}, {"type": "paragraph", "text": "강도는 재료가 견딜 수 있는 응력의 크기이고, 연성은 파단 전까지 허용되는 늘어남 또는 변형률의 정도다. 강도 수치만 높고 연성이 낮은 재료는 충격이나 내부 응력에 의해 갑작스럽게 깨질 수 있으므로 속이 빈 부품의 사용 환경에 맞는 균형이 필요하다."}, {"type": "table", "rows": [["선정 항목", "확인 내용", "속이 빈 구조 적용 시 판단"], ["강도", "허용 가능한 최대 응력", "사용 하중과 체결 조건을 견딜 수 있는지 확인"], ["연성·인성", "파단 전 변형과 에너지 흡수", "보관·운반 중 충격과 내부 응력에 대한 여유"], ["경화 조건", "권장 파장·시간·온도", "내부면까지 적용 가능한 공정인지 확인"], ["용제 영향", "세척액 접촉 허용 조건", "장시간 침지와 내부 잔류를 피함"], ["장기 안정성", "열·습도·광 노출에 따른 변화", "실제 사용 환경과 보관 조건을 반영"]]}, {"type": "table", "rows": [["선정 주의 인성이 낮은 레진은 세척과 후경화를 정상적으로 수행해도 균열에 더 민감할 수 있다. 기능 부품은 외관 품질뿐 아니라 파단 형태와 장기 보관 시험을 함께 평가한다."]]}, {"type": "heading", "level": 2, "text": "6. 속이 빈 출력물 설계와 후처리 예방 기준", "id": "section-10"}, {"type": "paragraph", "text": "균열을 예방하려면 출력이 끝난 뒤의 세척만 개선하는 것이 아니라 슬라이싱 단계에서 내부 액체가 빠지고 세척액과 공기가 순환할 수 있는 구조를 확보해야 한다. 배출구는 출력 방향에서 액체가 모이는 낮은 지점과 연결하고, 통기 경로를 함께 고려한다."}, {"type": "table", "rows": [["설계 항목", "권장 방향", "피해야 할 상태"], ["배출구", "내부 최저점과 연결하고 막힘을 확인", "액체가 남는 막힌 포켓"], ["통기구", "세척액과 공기가 순환할 보조 경로 확보", "하나의 작은 구멍에만 의존"], ["벽 두께", "가능한 한 균일하고 완만하게 전환", "급격한 두께 변화와 날카로운 내부 모서리"], ["내부 보강", "세척·건조 경로를 방해하지 않게 배치", "격벽이 배출 경로를 차단"], ["검사성", "배출 상태와 내부 청결을 확인할 구조", "후처리 후 내부 상태를 확인할 수 없음"]]}, {"type": "heading", "level": 3, "text": "6.1 공정 관리 순서", "id": "section-11"}, {"type": "paragraph", "text": "슬라이싱 화면에서 밀폐 공간과 액체 고임 영역을 확인한다."}, {"type": "paragraph", "text": "출력 방향을 기준으로 배출구와 통기구의 위치를 결정한다."}, {"type": "paragraph", "text": "출력 직후 내부 레진을 먼저 배출하고 외부 서포트를 제거한다."}, {"type": "paragraph", "text": "내부 세척액이 실제로 순환하는지 확인하면서 반복 세척한다."}, {"type": "paragraph", "text": "완전히 배출·건조된 뒤 레진 제조사 조건에 따라 후경화한다."}, {"type": "paragraph", "text": "초기 검사 후 일정 기간 보관하여 균열, 누액과 변형 여부를 재확인한다."}, {"type": "table", "rows": [["변수 관리 배출구 설계, 세척 시간, 후경화 시간과 레진을 동시에 변경하면 개선 원인을 구분하기 어렵다. 기준 시편을 정하고 한 번에 하나의 변수만 변경한다."]]}, {"type": "heading", "level": 2, "text": "7. 단계별 문제 해결 절차", "id": "section-12"}, {"type": "table", "rows": [["1", "격리와 기록 균열 또는 누액이 있는 출력물을 격리하고 파손 위치와 보관 기간을 사진으로 기록한다."]]}, {"type": "table", "rows": [["2", "내부 잔류 확인 배출구에서 액체, 끈적임, 냄새 또는 침전물이 나오는지 확인한다."]]}, {"type": "table", "rows": [["3", "후경화 이력 확인 레진명과 세척·건조·후경화 조건이 제조사 기준과 일치하는지 검토한다."]]}, {"type": "table", "rows": [["4", "균열 시작점 분석 두께 전환부, 모서리, 보강 구조와 배출구 주변에서 균열이 시작되었는지 확인한다."]]}, {"type": "table", "rows": [["5", "동일 배치 점검 같은 레진과 공정으로 제작한 다른 속이 빈 출력물에도 이상 징후가 있는지 확인한다."]]}, {"type": "table", "rows": [["6", "원인별 재시험 설계, 세척, 후경화 또는 레진을 한 항목씩 변경해 동일 시험 모델로 비교한다."]]}, {"type": "table", "rows": [["관찰 결과", "가능성 높은 원인", "우선 조치"], ["배출구에서 액상 레진 확인", "내부 세척·배출 불량", "배출 경로 재설계와 반복 세척"], ["표면과 내부가 끈적임", "세척·후경화 부족", "완전 건조 후 제조사 조건 재검토"], ["두께 전환부에서 균열", "내부 응력 집중", "벽 두께와 연결 형상 완화"], ["후경화 후 취성 파손", "과경화 또는 낮은 인성", "경화 조건과 레진 종류 비교"], ["장기 보관 중 균열 확대", "잔류물과 응력의 복합 작용", "동일 배치 격리 후 내부 상태 점검"]]}, {"type": "heading", "level": 2, "text": "8. 최종 점검 체크리스트", "id": "section-13"}, {"type": "paragraph", "text": "모델 내부에 밀폐 공간이나 액체가 고이는 영역이 없는가?"}, {"type": "paragraph", "text": "배출구와 통기구가 실제 출력 방향의 배출 경로와 연결되어 있는가?"}, {"type": "paragraph", "text": "내부 세척액이 충분히 순환했고 잔류물이 더 이상 나오지 않는가?"}, {"type": "paragraph", "text": "후경화 전에 내부 세척액이 완전히 배출되고 건조되었는가?"}, {"type": "paragraph", "text": "레진 제조사의 후경화 조건을 적용하고 작업 기록을 남겼는가?"}, {"type": "paragraph", "text": "배출구 주변과 내부 벽면의 점착·균열을 확인했는가?"}, {"type": "paragraph", "text": "기능 부품에 적합한 인성 레진을 선택하고 보관 후 재검사했는가?"}, {"type": "heading", "level": 2, "text": "9. 안전 및 취급 주의사항", "id": "section-14"}, {"type": "paragraph", "text": "균열된 속이 빈 출력물 내부에는 미경화 레진이 남아 있을 수 있으므로 니트릴 장갑과 보안경을 착용한다."}, {"type": "paragraph", "text": "파손 부위를 다루기 전에 누액 가능성을 확인하고 작업대를 보호한다."}, {"type": "paragraph", "text": "세척액과 미경화 레진은 SDS 및 지역 규정에 따라 처리하고 UV 광원을 직접 보지 않는다."}, {"type": "heading", "level": 2, "text": "10. 핵심 요약", "id": "section-15"}, {"type": "table", "rows": [["구분", "핵심 내용"], ["후경화", "미완료 반응을 진행시켜 강도와 안정성을 확보하되 제조사 조건을 따른다."], ["내부 세척", "액상 레진과 세척액을 완전히 배출하고 내부 벽면까지 건조한다."], ["내부 응력", "불균일한 체적 변화와 용제 작용이 균열을 성장시킬 수 있다."], ["레진 물성", "강도뿐 아니라 연성과 인성의 균형을 확인한다."], ["예방", "배출 가능한 속이 빈 구조 설계와 기록 기반의 후처리 검증을 함께 수행한다."]]}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "a-broken-hollow-model.jpg", "path": "assets/manuals/8_속이 비워진 출력물의 시간 경과 후 균열 및 파손/a-broken-hollow-model.jpg", "kind": "image", "alt": "속이 비워진 출력물의 시간 경과 후 균열 및 파손 시각 자료 8-1"}, {"fileName": "unclean-inner-wall-01.jpg", "path": "assets/manuals/8_속이 비워진 출력물의 시간 경과 후 균열 및 파손/unclean-inner-wall-01.jpg", "kind": "image", "alt": "속이 비워진 출력물의 시간 경과 후 균열 및 파손 시각 자료 8-2"}, {"fileName": "unclean-inner-wall-02.jpg", "path": "assets/manuals/8_속이 비워진 출력물의 시간 경과 후 균열 및 파손/unclean-inner-wall-02.jpg", "kind": "image", "alt": "속이 비워진 출력물의 시간 경과 후 균열 및 파손 시각 자료 8-3"}], "searchText": "0. 개요 속이 비워진 출력물(Hollow Model)은 재료 사용량과 출력 무게를 줄이는 데 효과적이지만, 내부 세척과 후경화가 충분하지 않으면 출력 직후에는 정상으로 보이던 부품이 보관 중 균열되거나 파손될 수 있다. 대표적인 영향 요인은 후경화 부족, 내부 벽면의 미경화 레진 잔류, 성형 과정에서 남은 내부 응력, 레진 자체의 낮은 인성이다. 속이 빈 출력물은 외부 표면만 확인해서는 품질을 판정하기 어렵다. 내부 배출 경로, 세척액의 순환, 완전 건조, 내부면을 포함한 경화 상태와 레진 물성을 함께 관리해야 장기 보관 안정성을 확보할 수 있다. 관찰 증상 가능 원인 우선 확인 표면이 끈적이고 무름 후경화 부족 세척·건조 상태와 UV 후경화 조건 배출구에서 액체가 나옴 내부 레진 잔류 배출구 위치, 내부 세척과 건조 시간이 지나 균열 확대 내부 응력·화학적 작용 균열 시작점과 내부 벽면 상태 작은 충격에도 파손 낮은 레진 인성 레진 용도, 강도와 연성의 균형 1. 시간 경과 후 발생하는 균열과 파손 속이 빈 출력물은 출력 완료 시점에는 형상을 유지하더라도 내부에 미경화 레진이나 세척 잔류물이 남아 있을 수 있다. 외부 표면이 경화된 상태에서도 내부 벽면의 반응과 체적 변화가 계속되면 응력이 축적되고, 얇은 벽이나 형상 전환부에서 균열이 시작되어 넓은 파손으로 이어질 수 있다. 그림 1. 보관 중 균열이 확대되어 외벽이 파손된 속이 빈 출력물 사례 파손면이 넓게 벌어지거나 껍질처럼 분리된 경우에는 파손 부위만 접착하기보다 내부 상태를 먼저 확인한다. 같은 조건으로 제작한 다른 부품에도 잔류 레진과 균열 징후가 있을 수 있으므로 동일 배치의 출력물을 함께 점검한다. 2. 후경화 부족 출력 장비에서 꺼낸 부품은 형상은 완성되었더라도 광중합 반응이 완전히 끝난 상태가 아닐 수 있다. 표면이 끈적이거나 상대적으로 부드럽게 느껴지는 것은 미반응 성분과 불충분한 경화 상태를 점검해야 하는 신호다. 적절한 UV 후경화는 남아 있는 반응을 진행시켜 탄성률, 강도와 치수 안정성을 높이고 표면을 더 단단하고 건조하게 만든다. 속이 빈 구조에서는 외부뿐 아니라 내부 벽면도 충분히 세척·건조된 상태에서 경화되도록 형상과 배출구를 고려해야 한다. 후경화 원칙 레진 제조사가 제시한 파장, 시간과 온도 조건을 우선한다. 과도한 후경화는 일부 레진의 취성을 높일 수 있으므로 시간을 임의로 크게 늘리지 말고 검증된 조건에서 회전 또는 방향 전환으로 노출 편차를 줄인다. 상태 가능한 의미 조치 표면 점착 세척 부족 또는 반응 미완료 재세척 가능 여부 확인 후 완전 건조 표면이 쉽게 눌림 경화도 부족 제조사 조건에 따라 후경화 재검토 외부만 단단함 내부면 경화 편차 배출구와 내부 광 도달 경로 점검 후경화 후 쉽게 깨짐 과경화 또는 낮은 인성 경화 조건과 레진 선정 재검토 2.1 후경화 전 확인 사항 내부의 미경화 레진과 세척액이 완전히 배출되었는지 확인한다. 배출구와 통기구가 막히지 않았는지 확인한다. 표면과 내부가 충분히 건조된 후 UV 후경화를 시작한다. 레진명, 출력 조건, 세척 시간과 후경화 조건을 작업 기록에 남긴다. 대형 또는 복잡한 속이 빈 구조는 방향을 바꾸어 노출 편차를 줄인다. 3. 내부 세척과 미경화 레진 잔류 속이 빈 출력물의 내부 벽면이 충분히 세척되지 않으면 액상 레진이 내부에 남는다. 잔류 레진은 장기간 내부 벽면과 접촉하면서 경화층으로 침투하거나 재료를 팽윤·약화시키는 화학적 작용을 일으킬 수 있으며, 결국 균열 또는 파손으로 이어질 수 있다. 그림 2. 배출구 주변과 내부 바닥에 액상 레진이 남아 있는 상태 관찰 포인트 배출구가 존재하더라도 위치가 내부 최저점과 맞지 않거나 세척액이 순환하지 못하면 웅덩이처럼 잔류물이 남을 수 있다. 출력 방향을 기준으로 배출 경로를 확인한다. 3.1 내부 벽면의 균열 징후 그림 3. 내부 벽면에서 확인되는 세척 불량 흔적과 균열선 내부 벽면의 광택이 부분적으로 다르거나 끈적임, 침전물, 변색과 균열선이 함께 관찰되면 단순한 외부 충격보다 내부 세척과 경화 편차를 우선 의심한다. 균열은 두께가 급격히 바뀌는 경계나 내부 보강 구조 주변에서 시작될 수 있다. 3.2 권장 세척 절차 1 자유 배출 출력물을 여러 방향으로 기울여 내부 액상 레진을 충분히 배출한다. 2 1차 세척 레진 제조사가 허용한 세척액을 내부로 순환시켜 잔류 레진을 희석·제거한다. 3 반복 세척 배출되는 세척액이 탁하거나 점성이 남아 있으면 새 세척액으로 과정을 반복한다. 4 통로 확인 배출구와 통기구를 통해 세척액과 공기가 실제로 통과하는지 확인한다. 5 완전 건조 내부 세척액이 남지 않도록 충분히 배출하고 환기된 환경에서 건조한다. 6 후경화 완전히 건조된 뒤 레진 제조사 조건에 맞추어 외부와 내부면의 경화를 진행한다. 4. 내부 응력 내부 응력은 외부 하중을 제거한 뒤에도 물체 내부에 남아 있는 응력이다. 재료의 거시적 또는 미시적 구조에서 체적 변화가 균일하지 않을 때 발생하며, 외력이 없는 상태에서도 가공과 성형 조건, 온도 변화, 용제의 작용 등에 의해 균열과 파단을 유발할 수 있다. 속이 빈 구조에서는 외부와 내부 벽면의 경화도, 세척 상태와 건조 속도가 서로 다르면 부위별 체적 변화가 달라진다. 이 차이가 얇은 벽, 날카로운 모서리, 두께 전환부에 집중되면 보관 중 미세 균열이 성장할 수 있다. 주요 유발 요인 외부와 내부의 불균일한 경화, 급격한 온도 변화, 용제 잔류, 벽 두께의 급변, 강성이 다른 보강 구조의 경계는 체적 변화와 응력을 한 부위에 집중시킬 수 있다. 진단 원칙 외부 충격이 없었는데 균열이 확대되었다면 균열 시작점, 내부 잔류물, 벽 두께 변화, 후경화 조건을 함께 확인한다. 파손된 결과만 보고 레진 강도 부족으로 단정하지 않는다. 5. 레진 물성과 파손 민감도 광경화성 레진은 배합과 생산 방식에 따라 강도, 연성, 탄성률과 내환경성이 다르며 용도도 달라진다. ABS-like 계열과 같은 인성 재료는 일반적으로 강도와 연성의 균형이 좋아 더 높은 응력 또는 더 큰 변형을 견딜 수 있어 취성 레진보다 파손에 대한 여유가 크다. 강도는 재료가 견딜 수 있는 응력의 크기이고, 연성은 파단 전까지 허용되는 늘어남 또는 변형률의 정도다. 강도 수치만 높고 연성이 낮은 재료는 충격이나 내부 응력에 의해 갑작스럽게 깨질 수 있으므로 속이 빈 부품의 사용 환경에 맞는 균형이 필요하다. 선정 항목 확인 내용 속이 빈 구조 적용 시 판단 강도 허용 가능한 최대 응력 사용 하중과 체결 조건을 견딜 수 있는지 확인 연성·인성 파단 전 변형과 에너지 흡수 보관·운반 중 충격과 내부 응력에 대한 여유 경화 조건 권장 파장·시간·온도 내부면까지 적용 가능한 공정인지 확인 용제 영향 세척액 접촉 허용 조건 장시간 침지와 내부 잔류를 피함 장기 안정성 열·습도·광 노출에 따른 변화 실제 사용 환경과 보관 조건을 반영 선정 주의 인성이 낮은 레진은 세척과 후경화를 정상적으로 수행해도 균열에 더 민감할 수 있다. 기능 부품은 외관 품질뿐 아니라 파단 형태와 장기 보관 시험을 함께 평가한다. 6. 속이 빈 출력물 설계와 후처리 예방 기준 균열을 예방하려면 출력이 끝난 뒤의 세척만 개선하는 것이 아니라 슬라이싱 단계에서 내부 액체가 빠지고 세척액과 공기가 순환할 수 있는 구조를 확보해야 한다. 배출구는 출력 방향에서 액체가 모이는 낮은 지점과 연결하고, 통기 경로를 함께 고려한다. 설계 항목 권장 방향 피해야 할 상태 배출구 내부 최저점과 연결하고 막힘을 확인 액체가 남는 막힌 포켓 통기구 세척액과 공기가 순환할 보조 경로 확보 하나의 작은 구멍에만 의존 벽 두께 가능한 한 균일하고 완만하게 전환 급격한 두께 변화와 날카로운 내부 모서리 내부 보강 세척·건조 경로를 방해하지 않게 배치 격벽이 배출 경로를 차단 검사성 배출 상태와 내부 청결을 확인할 구조 후처리 후 내부 상태를 확인할 수 없음 6.1 공정 관리 순서 슬라이싱 화면에서 밀폐 공간과 액체 고임 영역을 확인한다. 출력 방향을 기준으로 배출구와 통기구의 위치를 결정한다. 출력 직후 내부 레진을 먼저 배출하고 외부 서포트를 제거한다. 내부 세척액이 실제로 순환하는지 확인하면서 반복 세척한다. 완전히 배출·건조된 뒤 레진 제조사 조건에 따라 후경화한다. 초기 검사 후 일정 기간 보관하여 균열, 누액과 변형 여부를 재확인한다. 변수 관리 배출구 설계, 세척 시간, 후경화 시간과 레진을 동시에 변경하면 개선 원인을 구분하기 어렵다. 기준 시편을 정하고 한 번에 하나의 변수만 변경한다. 7. 단계별 문제 해결 절차 1 격리와 기록 균열 또는 누액이 있는 출력물을 격리하고 파손 위치와 보관 기간을 사진으로 기록한다. 2 내부 잔류 확인 배출구에서 액체, 끈적임, 냄새 또는 침전물이 나오는지 확인한다. 3 후경화 이력 확인 레진명과 세척·건조·후경화 조건이 제조사 기준과 일치하는지 검토한다. 4 균열 시작점 분석 두께 전환부, 모서리, 보강 구조와 배출구 주변에서 균열이 시작되었는지 확인한다. 5 동일 배치 점검 같은 레진과 공정으로 제작한 다른 속이 빈 출력물에도 이상 징후가 있는지 확인한다. 6 원인별 재시험 설계, 세척, 후경화 또는 레진을 한 항목씩 변경해 동일 시험 모델로 비교한다. 관찰 결과 가능성 높은 원인 우선 조치 배출구에서 액상 레진 확인 내부 세척·배출 불량 배출 경로 재설계와 반복 세척 표면과 내부가 끈적임 세척·후경화 부족 완전 건조 후 제조사 조건 재검토 두께 전환부에서 균열 내부 응력 집중 벽 두께와 연결 형상 완화 후경화 후 취성 파손 과경화 또는 낮은 인성 경화 조건과 레진 종류 비교 장기 보관 중 균열 확대 잔류물과 응력의 복합 작용 동일 배치 격리 후 내부 상태 점검 8. 최종 점검 체크리스트 모델 내부에 밀폐 공간이나 액체가 고이는 영역이 없는가? 배출구와 통기구가 실제 출력 방향의 배출 경로와 연결되어 있는가? 내부 세척액이 충분히 순환했고 잔류물이 더 이상 나오지 않는가? 후경화 전에 내부 세척액이 완전히 배출되고 건조되었는가? 레진 제조사의 후경화 조건을 적용하고 작업 기록을 남겼는가? 배출구 주변과 내부 벽면의 점착·균열을 확인했는가? 기능 부품에 적합한 인성 레진을 선택하고 보관 후 재검사했는가? 9. 안전 및 취급 주의사항 균열된 속이 빈 출력물 내부에는 미경화 레진이 남아 있을 수 있으므로 니트릴 장갑과 보안경을 착용한다. 파손 부위를 다루기 전에 누액 가능성을 확인하고 작업대를 보호한다. 세척액과 미경화 레진은 SDS 및 지역 규정에 따라 처리하고 UV 광원을 직접 보지 않는다. 10. 핵심 요약 구분 핵심 내용 후경화 미완료 반응을 진행시켜 강도와 안정성을 확보하되 제조사 조건을 따른다. 내부 세척 액상 레진과 세척액을 완전히 배출하고 내부 벽면까지 건조한다. 내부 응력 불균일한 체적 변화와 용제 작용이 균열을 성장시킬 수 있다. 레진 물성 강도뿐 아니라 연성과 인성의 균형을 확인한다. 예방 배출 가능한 속이 빈 구조 설계와 기록 기반의 후처리 검증을 함께 수행한다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 6}, "9": {"manualId": 9, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "레진 3D 프린팅에서는 모델 형상과 출력 방향에 따라 모델 내부 또는 모델과 FEP 필름 사이에 공기와 레진이 자유롭게 드나들 수 없는 밀폐 공간이 만들어질 수 있다. 이 구조는 박리 과정에서 내부와 외부의 압력 차이를 형성해 출력물, 서포트와 표면 품질에 추가 하중을 발생시킨다."}, {"type": "paragraph", "text": "밀폐 공간의 영향은 눈에 보이는 형상만으로 판단하기 어렵다. 모델 단면적, 빌드 플레이트 상승 속도, 레진 점도, 레진 수면과의 위치 관계를 함께 검토해야 하며, 내부와 외부가 연결되도록 배출구 또는 통기구를 확보하면 압력 차이를 크게 줄일 수 있다."}, {"type": "table", "rows": [["핵심 판단 밀폐 공간이 형성되면 박리 하중과 대기압 하중이 증가할 수 있다. 눈에 띄지 않는 위치에 구멍을 배치해 레진과 공기가 자유롭게 순환하도록 만드는 것이 가장 직접적인 예방 방법이다."]]}, {"type": "heading", "level": 2, "text": "1. 밀폐형 구조가 형성되는 조건", "id": "section-2"}, {"type": "paragraph", "text": "밀폐형 구조는 닫힌 공동 자체만을 의미하지 않는다. 출력 중 어느 한 레이어에서 모델의 테두리가 FEP 필름과 함께 닫힌 경계를 만들고, 그 안쪽으로 레진이나 공기가 이동할 통로가 없다면 일시적인 밀폐 공간이 형성된다. 이때 출력 방향을 기준으로 다음 두 상황을 구분한다."}, {"type": "table", "rows": [["상황", "압력 상태", "주요 영향"], ["모델과 FEP 필름 사이에 밀폐 공간 형성", "박리 순간 내부 압력이 낮아지며 내·외부 압력 차이 발생", "박리 하중 증가, 표면 결함, 서포트 및 모델 변형"], ["밀폐 공간이 레진 수면보다 높아짐", "내부 압력이 대기압보다 낮은 상태로 유지", "레진 중량과 대기압 하중에 따른 탈락·서포트 파손"]]}, {"type": "heading", "level": 2, "text": "2. 모델과 FEP 필름 사이의 밀폐 공간", "id": "section-3"}, {"type": "heading", "level": 3, "text": "2.1 박리 전 상태", "id": "section-4"}, {"type": "paragraph", "text": "반구형 모델을 예로 들면, 출력이 진행되는 동안 공동 내부는 외부 공기와 분리될 수 있다. 모델이 FEP 필름에서 떨어지기 전에는 공동 안팎의 압력 차이를 무시할 수 있을 정도로 작게 볼 수 있다."}, {"type": "heading", "level": 3, "text": "2.2 박리 순간의 압력 변화", "id": "section-5"}, {"type": "paragraph", "text": "빌드 플레이트가 상승하면 모델은 위쪽으로 인장되고 FEP 필름은 모델에서 벗겨지기 시작한다. 레진의 체적 탄성률은 공기보다 훨씬 크고 밀폐 공간에는 공기가 거의 없이 액상 레진이 차 있으므로, 박리 순간 공동 바로 아래에 상대적으로 큰 저압 영역이 형성된다."}, {"type": "paragraph", "text": "저압 영역 주변의 레진과 공동 내부의 레진은 압력이 낮은 방향으로 힘을 받는다. 동시에 공동 내부 압력이 감소하면서 구조 안팎에 압력 차이가 생기고, 이 압력 차이가 출력물과 서포트에 추가 하중으로 작용한다."}, {"type": "table", "rows": [["영향 인자", "변화", "밀폐 구조에 미치는 영향"], ["밀폐 공간의 단면적", "단면적 증가", "압력 차이가 작용하는 면적이 커져 하중 증가"], ["빌드 플레이트 상승 속도", "상승 속도 증가", "레진이 공동으로 유입될 시간이 줄어 저압 형성 증가"], ["레진 점도", "점도 증가", "레진 유동 저항이 커져 압력 평형이 늦어짐"]]}, {"type": "image", "path": "assets/manuals/9_밀폐형 구조가 출력물에 미치는 영향/airtight-chamber-withoutwith-a-hole-01.gif", "alt": "밀폐형 구조가 출력물에 미치는 영향 시각 자료", "fileName": "airtight-chamber-withoutwith-a-hole-01.gif"}, {"type": "paragraph", "text": "그림 1. 밀폐 공간과 배출구가 있는 구조의 박리 과정 비교"}, {"type": "heading", "level": 2, "text": "3. 배출구가 압력 차이에 미치는 영향", "id": "section-6"}, {"type": "paragraph", "text": "공동에 구멍을 만들면 밀폐 경계가 해제된다. 모델이 상승하는 동안 구멍을 통해 레진 또는 공기가 공동 내부로 유입되어 박리 순간의 내·외부 압력 차이가 크게 감소한다. 결과적으로 출력물과 서포트가 받는 힘도 줄어든다."}, {"type": "paragraph", "text": "벽 두께가 0.5 mm로 동일한 반구형 모델을 비교하면, 배출구가 있는 모델은 표면이 비교적 온전하고 매끄럽게 형성된다. 배출구가 없는 모델에서는 표면에 작은 구멍, 패임과 같은 결함이 더 많이 나타날 수 있다."}, {"type": "image", "path": "assets/manuals/9_밀폐형 구조가 출력물에 미치는 영향/airtight-chamber-withoutwith-a-hole-02.png", "alt": "밀폐형 구조가 출력물에 미치는 영향 시각 자료", "fileName": "airtight-chamber-withoutwith-a-hole-02.png"}, {"type": "paragraph", "text": "그림 2. 벽 두께 0.5 mm 반구형 모델의 배출구 유무에 따른 표면 품질 비교"}, {"type": "table", "rows": [["비교 항목", "밀폐 공간", "배출구가 있는 구조"], ["내부 유동", "레진과 공기의 이동 통로 부족", "레진 또는 공기가 구멍을 통해 이동"], ["박리 시 압력 차이", "상대적으로 큼", "크게 감소"], ["출력물 작용 하중", "표면과 서포트에 추가 하중 발생", "추가 하중 감소"], ["표면 상태", "미세 구멍, 패임 등 결함 가능", "상대적으로 온전하고 매끄러움"]]}, {"type": "heading", "level": 2, "text": "4. 밀폐 공간이 레진 수면보다 높아진 경우", "id": "section-7"}, {"type": "paragraph", "text": "공동 부분이 레진 수면 위로 올라가더라도 내부로 공기가 들어갈 통로가 없으면 내부 압력은 대기압보다 낮은 상태로 유지된다. 이때 공동 안의 레진은 바로 흘러나오지 않고, 공기가 유입될 수 있는 높이에 도달할 때까지 모델과 함께 상승할 수 있다."}, {"type": "paragraph", "text": "레진 수면 위에 위치한 공동은 외부 대기압에 의한 하중도 받는다. 공동이 작고 벽 두께가 충분하면 출력 품질에 미치는 영향이 크지 않을 수 있지만, 공동이 크면 내부 레진의 중량이 빌드 플레이트의 인장 방향과 반대로 작용한다. 이 하중은 모델 탈락 또는 서포트 파손으로 이어질 수 있다."}, {"type": "table", "rows": [["주의 큰 밀폐 공간이 레진 수면 위로 이동하는 구조에서는 표면 결함뿐 아니라 모델 전체의 탈락과 서포트 파손까지 확인해야 한다. 공기가 들어갈 통로를 확보해 압력 차이를 낮춘다."]]}, {"type": "heading", "level": 2, "text": "5. 배출구 및 통기구 설계 기준", "id": "section-8"}, {"type": "paragraph", "text": "구멍의 목적은 단순히 내부 레진을 빼는 것에 그치지 않는다. 출력 중 레진과 공기가 공동 안팎으로 자유롭게 이동해 압력 평형을 만들 수 있어야 한다. 따라서 완성품 외관에 미치는 영향이 적은 위치를 선택하면서도 출력 방향에서 실제 유로가 연결되는지 확인한다."}, {"type": "table", "rows": [["설계 항목", "확인 기준", "피해야 할 상태"], ["위치", "완성품 외관에 잘 드러나지 않으며 밀폐 공간과 직접 연결", "내부 공동과 연결되지 않은 장식용 구멍"], ["출력 방향", "박리 과정에서 레진 또는 공기가 즉시 유입될 수 있음", "FEP 필름에 막혀 초기 레이어 동안 밀폐 유지"], ["유로", "공동 안팎으로 연속적인 이동 경로 확보", "막힌 포켓 또는 내부 단차로 흐름 차단"], ["후처리", "출력 후 레진과 세척액이 배출되고 건조 가능", "액체가 남아 세척·건조가 어려운 구조"]]}, {"type": "heading", "level": 3, "text": "5.1 슬라이싱 단계 점검 순서", "id": "section-9"}, {"type": "paragraph", "text": "출력 방향을 기준으로 레이어별 단면을 확인해 닫힌 경계가 처음 형성되는 위치를 찾는다."}, {"type": "paragraph", "text": "모델과 FEP 필름 사이에 레진과 공기의 이동 통로가 없는 구간을 확인한다."}, {"type": "paragraph", "text": "외관 영향이 적고 공동과 직접 연결되는 위치에 배출구 또는 통기구를 배치한다."}, {"type": "paragraph", "text": "구멍이 서포트, 플랫폼 또는 모델 벽에 의해 다시 막히지 않는지 확인한다."}, {"type": "paragraph", "text": "레진 수면 위로 이동하는 큰 공동은 내부 레진의 중량과 대기압 하중을 함께 검토한다."}, {"type": "heading", "level": 2, "text": "6. 증상별 원인 판정", "id": "section-10"}, {"type": "table", "rows": [["관찰 증상", "가능성 높은 원인", "우선 조치"], ["곡면의 작은 구멍과 패임", "박리 순간 밀폐 공간의 압력 차이", "공동 연결 구멍 추가 후 동일 조건 비교"], ["서포트 파손", "큰 밀폐 공간의 박리 하중 또는 내부 레진 중량", "출력 방향과 통기 경로 재검토"], ["모델이 플랫폼에서 탈락", "밀폐 공간의 하중이 접착력보다 큼", "공동 크기 축소, 구멍 배치와 바닥 조건 점검"], ["수면 위에서도 레진이 내부에 유지", "공기가 들어가지 못하는 저압 공동", "통기구를 확보해 대기압과 평형 형성"], ["배출구가 있어도 결함 지속", "구멍 위치 부적합 또는 유로 막힘", "레이어별 연결 상태와 실제 유동 경로 확인"]]}, {"type": "heading", "level": 2, "text": "7. 최종 점검 체크리스트", "id": "section-11"}, {"type": "paragraph", "text": "출력 방향에서 모델과 FEP 필름 사이에 닫힌 공동이 형성되지 않는가?"}, {"type": "paragraph", "text": "밀폐 공간과 외부를 연결하는 배출구 또는 통기구가 있는가?"}, {"type": "paragraph", "text": "구멍이 초기 레이어부터 실제로 레진 또는 공기를 통과시킬 수 있는가?"}, {"type": "paragraph", "text": "밀폐 공간의 단면적, 빌드 플레이트 상승 속도와 레진 점도를 함께 검토했는가?"}, {"type": "paragraph", "text": "레진 수면 위로 올라가는 공동 내부에 액상 레진이 갇히지 않는가?"}, {"type": "paragraph", "text": "대형 공동의 레진 중량이 모델 접착력과 서포트 강도를 초과하지 않는가?"}, {"type": "paragraph", "text": "배출구가 완성품의 외관과 기능을 해치지 않는 위치에 배치되었는가?"}, {"type": "paragraph", "text": "시험 출력에서 표면 패임, 미세 구멍, 서포트 변형과 탈락 여부를 확인했는가?"}, {"type": "heading", "level": 2, "text": "8. 핵심 요약", "id": "section-12"}, {"type": "table", "rows": [["구분", "핵심 내용"], ["밀폐 형성", "모델과 FEP 필름이 닫힌 경계를 만들고 레진·공기 통로가 없을 때 발생한다."], ["박리 하중", "밀폐 공간의 압력 저하로 내·외부 압력 차이가 생겨 추가 힘이 작용한다."], ["영향 인자", "공동 단면적, 빌드 플레이트 상승 속도와 레진 점도가 커질수록 영향이 증가한다."], ["수면 위 공동", "낮은 내부 압력과 갇힌 레진 중량이 탈락 및 서포트 파손을 유발할 수 있다."], ["예방", "눈에 띄지 않는 위치에 구멍을 배치해 레진과 공기가 자유롭게 순환하도록 한다."]]}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "airtight-chamber-withoutwith-a-hole-01.gif", "path": "assets/manuals/9_밀폐형 구조가 출력물에 미치는 영향/airtight-chamber-withoutwith-a-hole-01.gif", "kind": "gif", "alt": "밀폐형 구조가 출력물에 미치는 영향 시각 자료 9-1"}, {"fileName": "airtight-chamber-withoutwith-a-hole-02.png", "path": "assets/manuals/9_밀폐형 구조가 출력물에 미치는 영향/airtight-chamber-withoutwith-a-hole-02.png", "kind": "image", "alt": "밀폐형 구조가 출력물에 미치는 영향 시각 자료 9-2"}], "searchText": "0. 개요 레진 3D 프린팅에서는 모델 형상과 출력 방향에 따라 모델 내부 또는 모델과 FEP 필름 사이에 공기와 레진이 자유롭게 드나들 수 없는 밀폐 공간이 만들어질 수 있다. 이 구조는 박리 과정에서 내부와 외부의 압력 차이를 형성해 출력물, 서포트와 표면 품질에 추가 하중을 발생시킨다. 밀폐 공간의 영향은 눈에 보이는 형상만으로 판단하기 어렵다. 모델 단면적, 빌드 플레이트 상승 속도, 레진 점도, 레진 수면과의 위치 관계를 함께 검토해야 하며, 내부와 외부가 연결되도록 배출구 또는 통기구를 확보하면 압력 차이를 크게 줄일 수 있다. 핵심 판단 밀폐 공간이 형성되면 박리 하중과 대기압 하중이 증가할 수 있다. 눈에 띄지 않는 위치에 구멍을 배치해 레진과 공기가 자유롭게 순환하도록 만드는 것이 가장 직접적인 예방 방법이다. 1. 밀폐형 구조가 형성되는 조건 밀폐형 구조는 닫힌 공동 자체만을 의미하지 않는다. 출력 중 어느 한 레이어에서 모델의 테두리가 FEP 필름과 함께 닫힌 경계를 만들고, 그 안쪽으로 레진이나 공기가 이동할 통로가 없다면 일시적인 밀폐 공간이 형성된다. 이때 출력 방향을 기준으로 다음 두 상황을 구분한다. 상황 압력 상태 주요 영향 모델과 FEP 필름 사이에 밀폐 공간 형성 박리 순간 내부 압력이 낮아지며 내·외부 압력 차이 발생 박리 하중 증가, 표면 결함, 서포트 및 모델 변형 밀폐 공간이 레진 수면보다 높아짐 내부 압력이 대기압보다 낮은 상태로 유지 레진 중량과 대기압 하중에 따른 탈락·서포트 파손 2. 모델과 FEP 필름 사이의 밀폐 공간 2.1 박리 전 상태 반구형 모델을 예로 들면, 출력이 진행되는 동안 공동 내부는 외부 공기와 분리될 수 있다. 모델이 FEP 필름에서 떨어지기 전에는 공동 안팎의 압력 차이를 무시할 수 있을 정도로 작게 볼 수 있다. 2.2 박리 순간의 압력 변화 빌드 플레이트가 상승하면 모델은 위쪽으로 인장되고 FEP 필름은 모델에서 벗겨지기 시작한다. 레진의 체적 탄성률은 공기보다 훨씬 크고 밀폐 공간에는 공기가 거의 없이 액상 레진이 차 있으므로, 박리 순간 공동 바로 아래에 상대적으로 큰 저압 영역이 형성된다. 저압 영역 주변의 레진과 공동 내부의 레진은 압력이 낮은 방향으로 힘을 받는다. 동시에 공동 내부 압력이 감소하면서 구조 안팎에 압력 차이가 생기고, 이 압력 차이가 출력물과 서포트에 추가 하중으로 작용한다. 영향 인자 변화 밀폐 구조에 미치는 영향 밀폐 공간의 단면적 단면적 증가 압력 차이가 작용하는 면적이 커져 하중 증가 빌드 플레이트 상승 속도 상승 속도 증가 레진이 공동으로 유입될 시간이 줄어 저압 형성 증가 레진 점도 점도 증가 레진 유동 저항이 커져 압력 평형이 늦어짐 그림 1. 밀폐 공간과 배출구가 있는 구조의 박리 과정 비교 3. 배출구가 압력 차이에 미치는 영향 공동에 구멍을 만들면 밀폐 경계가 해제된다. 모델이 상승하는 동안 구멍을 통해 레진 또는 공기가 공동 내부로 유입되어 박리 순간의 내·외부 압력 차이가 크게 감소한다. 결과적으로 출력물과 서포트가 받는 힘도 줄어든다. 벽 두께가 0.5 mm로 동일한 반구형 모델을 비교하면, 배출구가 있는 모델은 표면이 비교적 온전하고 매끄럽게 형성된다. 배출구가 없는 모델에서는 표면에 작은 구멍, 패임과 같은 결함이 더 많이 나타날 수 있다. 그림 2. 벽 두께 0.5 mm 반구형 모델의 배출구 유무에 따른 표면 품질 비교 비교 항목 밀폐 공간 배출구가 있는 구조 내부 유동 레진과 공기의 이동 통로 부족 레진 또는 공기가 구멍을 통해 이동 박리 시 압력 차이 상대적으로 큼 크게 감소 출력물 작용 하중 표면과 서포트에 추가 하중 발생 추가 하중 감소 표면 상태 미세 구멍, 패임 등 결함 가능 상대적으로 온전하고 매끄러움 4. 밀폐 공간이 레진 수면보다 높아진 경우 공동 부분이 레진 수면 위로 올라가더라도 내부로 공기가 들어갈 통로가 없으면 내부 압력은 대기압보다 낮은 상태로 유지된다. 이때 공동 안의 레진은 바로 흘러나오지 않고, 공기가 유입될 수 있는 높이에 도달할 때까지 모델과 함께 상승할 수 있다. 레진 수면 위에 위치한 공동은 외부 대기압에 의한 하중도 받는다. 공동이 작고 벽 두께가 충분하면 출력 품질에 미치는 영향이 크지 않을 수 있지만, 공동이 크면 내부 레진의 중량이 빌드 플레이트의 인장 방향과 반대로 작용한다. 이 하중은 모델 탈락 또는 서포트 파손으로 이어질 수 있다. 주의 큰 밀폐 공간이 레진 수면 위로 이동하는 구조에서는 표면 결함뿐 아니라 모델 전체의 탈락과 서포트 파손까지 확인해야 한다. 공기가 들어갈 통로를 확보해 압력 차이를 낮춘다. 5. 배출구 및 통기구 설계 기준 구멍의 목적은 단순히 내부 레진을 빼는 것에 그치지 않는다. 출력 중 레진과 공기가 공동 안팎으로 자유롭게 이동해 압력 평형을 만들 수 있어야 한다. 따라서 완성품 외관에 미치는 영향이 적은 위치를 선택하면서도 출력 방향에서 실제 유로가 연결되는지 확인한다. 설계 항목 확인 기준 피해야 할 상태 위치 완성품 외관에 잘 드러나지 않으며 밀폐 공간과 직접 연결 내부 공동과 연결되지 않은 장식용 구멍 출력 방향 박리 과정에서 레진 또는 공기가 즉시 유입될 수 있음 FEP 필름에 막혀 초기 레이어 동안 밀폐 유지 유로 공동 안팎으로 연속적인 이동 경로 확보 막힌 포켓 또는 내부 단차로 흐름 차단 후처리 출력 후 레진과 세척액이 배출되고 건조 가능 액체가 남아 세척·건조가 어려운 구조 5.1 슬라이싱 단계 점검 순서 출력 방향을 기준으로 레이어별 단면을 확인해 닫힌 경계가 처음 형성되는 위치를 찾는다. 모델과 FEP 필름 사이에 레진과 공기의 이동 통로가 없는 구간을 확인한다. 외관 영향이 적고 공동과 직접 연결되는 위치에 배출구 또는 통기구를 배치한다. 구멍이 서포트, 플랫폼 또는 모델 벽에 의해 다시 막히지 않는지 확인한다. 레진 수면 위로 이동하는 큰 공동은 내부 레진의 중량과 대기압 하중을 함께 검토한다. 6. 증상별 원인 판정 관찰 증상 가능성 높은 원인 우선 조치 곡면의 작은 구멍과 패임 박리 순간 밀폐 공간의 압력 차이 공동 연결 구멍 추가 후 동일 조건 비교 서포트 파손 큰 밀폐 공간의 박리 하중 또는 내부 레진 중량 출력 방향과 통기 경로 재검토 모델이 플랫폼에서 탈락 밀폐 공간의 하중이 접착력보다 큼 공동 크기 축소, 구멍 배치와 바닥 조건 점검 수면 위에서도 레진이 내부에 유지 공기가 들어가지 못하는 저압 공동 통기구를 확보해 대기압과 평형 형성 배출구가 있어도 결함 지속 구멍 위치 부적합 또는 유로 막힘 레이어별 연결 상태와 실제 유동 경로 확인 7. 최종 점검 체크리스트 출력 방향에서 모델과 FEP 필름 사이에 닫힌 공동이 형성되지 않는가? 밀폐 공간과 외부를 연결하는 배출구 또는 통기구가 있는가? 구멍이 초기 레이어부터 실제로 레진 또는 공기를 통과시킬 수 있는가? 밀폐 공간의 단면적, 빌드 플레이트 상승 속도와 레진 점도를 함께 검토했는가? 레진 수면 위로 올라가는 공동 내부에 액상 레진이 갇히지 않는가? 대형 공동의 레진 중량이 모델 접착력과 서포트 강도를 초과하지 않는가? 배출구가 완성품의 외관과 기능을 해치지 않는 위치에 배치되었는가? 시험 출력에서 표면 패임, 미세 구멍, 서포트 변형과 탈락 여부를 확인했는가? 8. 핵심 요약 구분 핵심 내용 밀폐 형성 모델과 FEP 필름이 닫힌 경계를 만들고 레진·공기 통로가 없을 때 발생한다. 박리 하중 밀폐 공간의 압력 저하로 내·외부 압력 차이가 생겨 추가 힘이 작용한다. 영향 인자 공동 단면적, 빌드 플레이트 상승 속도와 레진 점도가 커질수록 영향이 증가한다. 수면 위 공동 낮은 내부 압력과 갇힌 레진 중량이 탈락 및 서포트 파손을 유발할 수 있다. 예방 눈에 띄지 않는 위치에 구멍을 배치해 레진과 공기가 자유롭게 순환하도록 한다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 4}, "10": {"manualId": 10, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "SLA/DLP/LCD 방식에서는 모델이 빌드 플레이트에 놓이는 각도에 따라 레이어 계단, 서포트 흔적, 바닥면 치수와 박리 하중이 달라진다. 평면 구조는 픽셀 폭과 레이어 두께의 관계로 표면 계단이 가장 균일해지는 각도를 계산할 수 있지만, 곡면이나 복잡한 모델에는 모든 상황에 공통으로 적용되는 하나의 최적 각도가 존재하지 않는다."}, {"type": "paragraph", "text": "각도는 표면 품질만 보고 결정하지 않는다. 출력 방향별 레이어 단면적, 출력 높이와 시간, 서포트가 닿는 면, 플랫폼에서의 제거 방법과 치수 정밀도를 함께 검토해야 한다."}, {"type": "table", "rows": [["핵심 판단 평면 구조의 이론적 최적 각도는 arctan(레이어 두께 ÷ 픽셀 폭)으로 계산한다. 비평면 모델은 특정 각도보다 최대 단면적을 지나치게 키우지 않는 것이 중요하다."]]}, {"type": "heading", "level": 2, "text": "1. 복셀과 평면 구조의 최적 각도", "id": "section-2"}, {"type": "paragraph", "text": "광경화 방식에서 가장 작은 출력 단위는 복셀(Voxel)이다. 복셀은 XY 평면의 한 픽셀 면적에 Z축 레이어 두께를 곱한 체적이며, 경사진 평면은 이 복셀들이 계단 형태로 쌓여 표현된다. 픽셀 폭과 레이어 두께의 비율에 맞게 모델을 기울이면 계단의 모서리가 직선에 가깝게 정렬되어 반복 줄무늬가 줄어든다."}, {"type": "paragraph", "text": "예를 들어 픽셀 폭이 0.05 mm이고 레이어 두께가 0.05 mm이면 계산값은 45°다. 동일한 픽셀 폭에서 레이어 두께가 0.03 mm이면 약 30.96°, 0.07 mm이면 약 54.46°가 된다."}, {"type": "image", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/print-angle-illustration.png", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료", "fileName": "print-angle-illustration.png"}, {"type": "paragraph", "text": "그림 1. 픽셀 폭 0.05 mm에서 레이어 두께에 따른 이론적 평면 배치 각도"}, {"type": "table", "rows": [["적용 주의 계산식은 평면의 복셀 계단을 균일하게 만드는 기준이다. 장비의 실제 픽셀 크기, 광학 번짐, 레진 특성, 노출 조건과 기계 정밀도에 따라 시험 출력으로 보정해야 한다."]]}, {"type": "heading", "level": 2, "text": "2. 40°·45°·50° 각도 비교", "id": "section-3"}, {"type": "paragraph", "text": "픽셀 폭과 레이어 두께가 모두 0.05 mm인 조건에서는 45°에서 복셀이 평면 방향을 따라 규칙적으로 정렬된다. 40°와 50°에서는 일정 간격으로 계단 폭이 달라져 표면에 불균일한 줄무늬가 나타날 수 있다."}, {"type": "image", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/place-model-at-40.png", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료", "fileName": "place-model-at-40.png"}, {"type": "image", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/place-model-at-45.png", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료", "fileName": "place-model-at-45.png"}, {"type": "image", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/place-model-at-50.png", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료", "fileName": "place-model-at-50.png"}, {"type": "paragraph", "text": "θ = 40°"}, {"type": "paragraph", "text": "θ = 45°"}, {"type": "paragraph", "text": "θ = 50°"}, {"type": "paragraph", "text": "그림 2. 배치 각도에 따른 평면 복셀 계단의 정렬 비교"}, {"type": "heading", "level": 3, "text": "2.1 실제 출력 결과", "id": "section-4"}, {"type": "paragraph", "text": "픽셀 폭 0.051 mm, 레이어 두께 0.05 mm 조건의 계산값은 약 44.43°다. 이 계산값에 가까운 45° 조건에서는 40°와 50° 조건보다 표면의 뚜렷한 줄무늬가 감소하는 경향을 확인할 수 있다."}, {"type": "image", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/print-result-01.jpg", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료", "fileName": "print-result-01.jpg"}, {"type": "image", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/print-result-02.jpg", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료", "fileName": "print-result-02.jpg"}, {"type": "image", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/print-result-03.jpg", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료", "fileName": "print-result-03.jpg"}, {"type": "paragraph", "text": "50° 출력 결과"}, {"type": "paragraph", "text": "그림 3. 동일 모델을 40°·45°·50°로 출력한 표면 품질 비교"}, {"type": "table", "rows": [["조건", "복셀 정렬", "예상 표면 특성"], ["계산값보다 작은 각도", "일부 계단 폭이 불균일", "주기적인 줄무늬와 계단이 나타날 수 있음"], ["계산값에 가까운 각도", "평면 방향으로 비교적 균일", "뚜렷한 줄무늬가 감소"], ["계산값보다 큰 각도", "반대 방향으로 계단 폭 불균일", "다른 간격의 줄무늬가 나타날 수 있음"]]}, {"type": "heading", "level": 2, "text": "3. 평면을 플랫폼에 직접 배치하는 방법", "id": "section-5"}, {"type": "paragraph", "text": "평면 구조는 요구 정밀도와 제거 위험을 고려해 빌드 플레이트에 직접 놓을 수도 있다. 이 방법은 바닥면 서포트가 필요 없고 플랫폼과 맞닿은 면이 매끄러워 별도의 서포트 흔적 후처리가 적다는 장점이 있다."}, {"type": "paragraph", "text": "다만 대부분의 장비는 Z축 영점을 수동으로 조정하므로 마이크로미터 수준의 오차를 완전히 제거하기 어렵다. Z축 영점이 낮으면 첫 레이어가 설정값보다 얇아지고, 높으면 첫 레이어가 두꺼워질 수 있다. 바닥 레이어는 일반 레이어보다 노출 시간이 길어 코끼리발(Elephant Foot) 또는 스커트 형상이 발생할 수 있으며, 치수 보정 기능을 사용할 경우에도 보정값 검증이 필요하다."}, {"type": "table", "rows": [["구분", "장점", "주의 사항"], ["플랫폼 직접 배치", "서포트 불필요, 접촉면이 매끄러움", "첫 레이어 치수 오차, 코끼리발, 제거 중 손상 위험"], ["경사 배치", "바닥 과노출과 직접 제거 위험 감소", "서포트 흔적, 후처리 증가, 출력 높이와 시간 증가"]]}, {"type": "heading", "level": 3, "text": "3.1 경사 배치와 서포트 흔적", "id": "section-6"}, {"type": "paragraph", "text": "평면 구조를 기울이면 첫 레이어 두께 오차와 코끼리발 문제를 피하기 쉬워진다. 그러나 기울기가 작으면 넓은 단면에 발생하는 박리력을 지탱하기 위해 특히 가장자리의 서포트 밀도를 높여야 한다. 서포트 제거 후에는 여드름처럼 돌출된 접점 흔적이 남을 수 있어 연마와 표면 복원이 필요하다."}, {"type": "table", "rows": [["판정 기준 정밀한 바닥 치수가 중요하면 경사 배치를 우선 검토하고, 서포트가 닿는 면의 외관이 더 중요하면 플랫폼 직접 배치와 치수 보정을 검토한다."]]}, {"type": "heading", "level": 3, "text": "3.2 피해야 할 수평 서포트 배치", "id": "section-7"}, {"type": "paragraph", "text": "평면 모델을 수평으로 유지한 채 아래에 다수의 서포트를 배치하면 넓은 단면적에 따른 박리 하중은 그대로 유지되면서, 서포트 흔적과 후처리 부담까지 추가된다. 플랫폼 직접 배치와 경사 배치의 단점이 동시에 나타날 수 있으므로 피한다."}, {"type": "image", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/add-supports-when-printing-the-model-horizontally.png", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료", "fileName": "add-supports-when-printing-the-model-horizontally.png"}, {"type": "paragraph", "text": "그림 4. 넓은 평면을 수평으로 유지한 채 서포트를 추가한 비권장 배치"}, {"type": "table", "rows": [["주의 수평 배치에 서포트만 추가하는 방식은 단면적을 줄이지 못한다. 모델 각도를 조정해 레이어별 최대 단면적을 낮추고, 필요한 영역에 서포트를 분산한다."]]}, {"type": "heading", "level": 2, "text": "4. 단면적과 상승 속도가 박리력에 미치는 영향", "id": "section-8"}, {"type": "paragraph", "text": "평면 구조가 아닌 모델은 특정 각도 계산식보다 레이어별 단면적이 핵심이다. FEP 필름과 모델 사이의 접촉 단면이 넓어질수록 박리력이 커지고, 서포트 파손·변형·탈락 가능성이 증가한다. 원형에 가까운 단면은 Stefan 부착력 식으로 박리력을 근사할 수 있다."}, {"type": "table", "rows": [["기호", "의미", "박리력과의 관계"], ["F", "박리력", "출력물과 필름을 분리하는 데 필요한 힘"], ["η", "액체의 점도 계수", "점도가 높을수록 박리력 증가"], ["R", "원형에 가까운 접촉면의 대표 반경", "4제곱에 비례"], ["h", "평행한 두 면 사이의 거리", "거리가 작을수록 박리력 증가"], ["dh/dt", "분리 또는 상승 속도", "상승 속도가 빠를수록 박리력 증가"]]}, {"type": "paragraph", "text": "식에서 접촉면의 대표 크기 R이 2배가 되면 R⁴ 항 때문에 박리력은 이론적으로 16배까지 증가할 수 있다. 박리력을 낮추려면 상승 속도를 줄이거나 모델 각도를 조정해 최대 단면적을 줄인다. 단, 각도를 크게 바꾸면 출력 높이와 총 출력 시간이 증가할 수 있다."}, {"type": "heading", "level": 2, "text": "5. 모델 유형별 각도 선정 기준", "id": "section-9"}, {"type": "table", "rows": [["모델 유형", "우선 판단", "권장 방향"], ["넓은 평면 구조", "픽셀 폭·레이어 두께와 바닥 치수 정밀도", "계산 각도 또는 플랫폼 직접 배치 비교"], ["외관이 중요한 평면", "서포트 접점 위치와 후처리 가능 여부", "중요 면을 서포트 반대쪽으로 배치"], ["곡면·유기 형상", "레이어별 최대 단면적과 표면 계단 방향", "단면적 변화가 완만한 각도 선택"], ["대형 솔리드 모델", "박리력, 중량과 서포트 강도", "단면적 축소와 상승 속도 조정 병행"], ["치수 정밀 부품", "첫 레이어 오차와 코끼리발 허용치", "시험 출력 후 치수 보정값 결정"]]}, {"type": "heading", "level": 3, "text": "5.1 실무 설정 순서", "id": "section-10"}, {"type": "paragraph", "text": "장비의 실제 XY 픽셀 폭과 사용할 레이어 두께를 확인한다."}, {"type": "paragraph", "text": "정밀도가 중요한 평면이 있는지 구분하고 이론적 각도를 계산한다."}, {"type": "paragraph", "text": "레이어 미리보기에서 최대 단면적과 단면적 변화가 급격한 구간을 확인한다."}, {"type": "paragraph", "text": "외관이 중요한 면을 서포트 접점과 플랫폼 직접 접촉에서 피한다."}, {"type": "paragraph", "text": "출력 높이, 예상 시간과 서포트 사용량을 비교해 최종 각도를 결정한다."}, {"type": "paragraph", "text": "동일 모델을 소형 시험 조건으로 출력해 줄무늬, 치수와 접점 흔적을 기록한다."}, {"type": "heading", "level": 2, "text": "6. 최종 점검 체크리스트", "id": "section-11"}, {"type": "paragraph", "text": "픽셀 폭과 레이어 두께를 기준으로 평면 구조의 계산 각도를 확인했는가?"}, {"type": "paragraph", "text": "40°·45°·50°와 같이 인접 각도를 비교할 필요가 있는가?"}, {"type": "paragraph", "text": "레이어 미리보기에서 최대 단면적이 지나치게 크지 않은가?"}, {"type": "paragraph", "text": "상승 속도와 레진 점도가 현재 단면적에 적합한가?"}, {"type": "paragraph", "text": "외관이 중요한 면에 서포트 접점이 집중되지 않는가?"}, {"type": "paragraph", "text": "플랫폼 직접 배치 시 첫 레이어 치수와 코끼리발을 관리할 수 있는가?"}, {"type": "paragraph", "text": "수평 모델 아래에 불필요한 서포트를 다수 배치하지 않았는가?"}, {"type": "paragraph", "text": "각도 증가에 따른 출력 높이와 시간 증가를 검토했는가?"}, {"type": "heading", "level": 2, "text": "7. 핵심 요약", "id": "section-12"}, {"type": "table", "rows": [["구분", "핵심 내용"], ["평면 최적 각도", "arctan(레이어 두께 ÷ 픽셀 폭)으로 이론적 기준을 계산한다."], ["45° 사례", "픽셀 폭과 레이어 두께가 같으면 복셀 계단이 45°에서 균일해진다."], ["직접 배치", "매끄러운 접촉면을 얻지만 첫 레이어 오차와 코끼리발을 관리해야 한다."], ["경사 배치", "바닥 문제를 줄이는 대신 서포트 흔적과 출력 시간이 증가할 수 있다."], ["비평면 모델", "하나의 최적 각도보다 최대 단면적과 상승 속도를 함께 관리한다."]]}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "add-supports-when-printing-the-model-horizontally.png", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/add-supports-when-printing-the-model-horizontally.png", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-1"}, {"fileName": "place-model-at-40.png", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/place-model-at-40.png", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-2"}, {"fileName": "place-model-at-45.png", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/place-model-at-45.png", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-3"}, {"fileName": "place-model-at-50.png", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/place-model-at-50.png", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-4"}, {"fileName": "print-angle-illustration.png", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/print-angle-illustration.png", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-5"}, {"fileName": "print-result-01.jpg", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/print-result-01.jpg", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-6"}, {"fileName": "print-result-02.jpg", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/print-result-02.jpg", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-7"}, {"fileName": "print-result-03.jpg", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/print-result-03.jpg", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-8"}], "searchText": "0. 개요 SLA/DLP/LCD 방식에서는 모델이 빌드 플레이트에 놓이는 각도에 따라 레이어 계단, 서포트 흔적, 바닥면 치수와 박리 하중이 달라진다. 평면 구조는 픽셀 폭과 레이어 두께의 관계로 표면 계단이 가장 균일해지는 각도를 계산할 수 있지만, 곡면이나 복잡한 모델에는 모든 상황에 공통으로 적용되는 하나의 최적 각도가 존재하지 않는다. 각도는 표면 품질만 보고 결정하지 않는다. 출력 방향별 레이어 단면적, 출력 높이와 시간, 서포트가 닿는 면, 플랫폼에서의 제거 방법과 치수 정밀도를 함께 검토해야 한다. 핵심 판단 평면 구조의 이론적 최적 각도는 arctan(레이어 두께 ÷ 픽셀 폭)으로 계산한다. 비평면 모델은 특정 각도보다 최대 단면적을 지나치게 키우지 않는 것이 중요하다. 1. 복셀과 평면 구조의 최적 각도 광경화 방식에서 가장 작은 출력 단위는 복셀(Voxel)이다. 복셀은 XY 평면의 한 픽셀 면적에 Z축 레이어 두께를 곱한 체적이며, 경사진 평면은 이 복셀들이 계단 형태로 쌓여 표현된다. 픽셀 폭과 레이어 두께의 비율에 맞게 모델을 기울이면 계단의 모서리가 직선에 가깝게 정렬되어 반복 줄무늬가 줄어든다. 예를 들어 픽셀 폭이 0.05 mm이고 레이어 두께가 0.05 mm이면 계산값은 45°다. 동일한 픽셀 폭에서 레이어 두께가 0.03 mm이면 약 30.96°, 0.07 mm이면 약 54.46°가 된다. 그림 1. 픽셀 폭 0.05 mm에서 레이어 두께에 따른 이론적 평면 배치 각도 적용 주의 계산식은 평면의 복셀 계단을 균일하게 만드는 기준이다. 장비의 실제 픽셀 크기, 광학 번짐, 레진 특성, 노출 조건과 기계 정밀도에 따라 시험 출력으로 보정해야 한다. 2. 40°·45°·50° 각도 비교 픽셀 폭과 레이어 두께가 모두 0.05 mm인 조건에서는 45°에서 복셀이 평면 방향을 따라 규칙적으로 정렬된다. 40°와 50°에서는 일정 간격으로 계단 폭이 달라져 표면에 불균일한 줄무늬가 나타날 수 있다. θ = 40° θ = 45° θ = 50° 그림 2. 배치 각도에 따른 평면 복셀 계단의 정렬 비교 2.1 실제 출력 결과 픽셀 폭 0.051 mm, 레이어 두께 0.05 mm 조건의 계산값은 약 44.43°다. 이 계산값에 가까운 45° 조건에서는 40°와 50° 조건보다 표면의 뚜렷한 줄무늬가 감소하는 경향을 확인할 수 있다. 50° 출력 결과 그림 3. 동일 모델을 40°·45°·50°로 출력한 표면 품질 비교 조건 복셀 정렬 예상 표면 특성 계산값보다 작은 각도 일부 계단 폭이 불균일 주기적인 줄무늬와 계단이 나타날 수 있음 계산값에 가까운 각도 평면 방향으로 비교적 균일 뚜렷한 줄무늬가 감소 계산값보다 큰 각도 반대 방향으로 계단 폭 불균일 다른 간격의 줄무늬가 나타날 수 있음 3. 평면을 플랫폼에 직접 배치하는 방법 평면 구조는 요구 정밀도와 제거 위험을 고려해 빌드 플레이트에 직접 놓을 수도 있다. 이 방법은 바닥면 서포트가 필요 없고 플랫폼과 맞닿은 면이 매끄러워 별도의 서포트 흔적 후처리가 적다는 장점이 있다. 다만 대부분의 장비는 Z축 영점을 수동으로 조정하므로 마이크로미터 수준의 오차를 완전히 제거하기 어렵다. Z축 영점이 낮으면 첫 레이어가 설정값보다 얇아지고, 높으면 첫 레이어가 두꺼워질 수 있다. 바닥 레이어는 일반 레이어보다 노출 시간이 길어 코끼리발(Elephant Foot) 또는 스커트 형상이 발생할 수 있으며, 치수 보정 기능을 사용할 경우에도 보정값 검증이 필요하다. 구분 장점 주의 사항 플랫폼 직접 배치 서포트 불필요, 접촉면이 매끄러움 첫 레이어 치수 오차, 코끼리발, 제거 중 손상 위험 경사 배치 바닥 과노출과 직접 제거 위험 감소 서포트 흔적, 후처리 증가, 출력 높이와 시간 증가 3.1 경사 배치와 서포트 흔적 평면 구조를 기울이면 첫 레이어 두께 오차와 코끼리발 문제를 피하기 쉬워진다. 그러나 기울기가 작으면 넓은 단면에 발생하는 박리력을 지탱하기 위해 특히 가장자리의 서포트 밀도를 높여야 한다. 서포트 제거 후에는 여드름처럼 돌출된 접점 흔적이 남을 수 있어 연마와 표면 복원이 필요하다. 판정 기준 정밀한 바닥 치수가 중요하면 경사 배치를 우선 검토하고, 서포트가 닿는 면의 외관이 더 중요하면 플랫폼 직접 배치와 치수 보정을 검토한다. 3.2 피해야 할 수평 서포트 배치 평면 모델을 수평으로 유지한 채 아래에 다수의 서포트를 배치하면 넓은 단면적에 따른 박리 하중은 그대로 유지되면서, 서포트 흔적과 후처리 부담까지 추가된다. 플랫폼 직접 배치와 경사 배치의 단점이 동시에 나타날 수 있으므로 피한다. 그림 4. 넓은 평면을 수평으로 유지한 채 서포트를 추가한 비권장 배치 주의 수평 배치에 서포트만 추가하는 방식은 단면적을 줄이지 못한다. 모델 각도를 조정해 레이어별 최대 단면적을 낮추고, 필요한 영역에 서포트를 분산한다. 4. 단면적과 상승 속도가 박리력에 미치는 영향 평면 구조가 아닌 모델은 특정 각도 계산식보다 레이어별 단면적이 핵심이다. FEP 필름과 모델 사이의 접촉 단면이 넓어질수록 박리력이 커지고, 서포트 파손·변형·탈락 가능성이 증가한다. 원형에 가까운 단면은 Stefan 부착력 식으로 박리력을 근사할 수 있다. 기호 의미 박리력과의 관계 F 박리력 출력물과 필름을 분리하는 데 필요한 힘 η 액체의 점도 계수 점도가 높을수록 박리력 증가 R 원형에 가까운 접촉면의 대표 반경 4제곱에 비례 h 평행한 두 면 사이의 거리 거리가 작을수록 박리력 증가 dh/dt 분리 또는 상승 속도 상승 속도가 빠를수록 박리력 증가 식에서 접촉면의 대표 크기 R이 2배가 되면 R⁴ 항 때문에 박리력은 이론적으로 16배까지 증가할 수 있다. 박리력을 낮추려면 상승 속도를 줄이거나 모델 각도를 조정해 최대 단면적을 줄인다. 단, 각도를 크게 바꾸면 출력 높이와 총 출력 시간이 증가할 수 있다. 5. 모델 유형별 각도 선정 기준 모델 유형 우선 판단 권장 방향 넓은 평면 구조 픽셀 폭·레이어 두께와 바닥 치수 정밀도 계산 각도 또는 플랫폼 직접 배치 비교 외관이 중요한 평면 서포트 접점 위치와 후처리 가능 여부 중요 면을 서포트 반대쪽으로 배치 곡면·유기 형상 레이어별 최대 단면적과 표면 계단 방향 단면적 변화가 완만한 각도 선택 대형 솔리드 모델 박리력, 중량과 서포트 강도 단면적 축소와 상승 속도 조정 병행 치수 정밀 부품 첫 레이어 오차와 코끼리발 허용치 시험 출력 후 치수 보정값 결정 5.1 실무 설정 순서 장비의 실제 XY 픽셀 폭과 사용할 레이어 두께를 확인한다. 정밀도가 중요한 평면이 있는지 구분하고 이론적 각도를 계산한다. 레이어 미리보기에서 최대 단면적과 단면적 변화가 급격한 구간을 확인한다. 외관이 중요한 면을 서포트 접점과 플랫폼 직접 접촉에서 피한다. 출력 높이, 예상 시간과 서포트 사용량을 비교해 최종 각도를 결정한다. 동일 모델을 소형 시험 조건으로 출력해 줄무늬, 치수와 접점 흔적을 기록한다. 6. 최종 점검 체크리스트 픽셀 폭과 레이어 두께를 기준으로 평면 구조의 계산 각도를 확인했는가? 40°·45°·50°와 같이 인접 각도를 비교할 필요가 있는가? 레이어 미리보기에서 최대 단면적이 지나치게 크지 않은가? 상승 속도와 레진 점도가 현재 단면적에 적합한가? 외관이 중요한 면에 서포트 접점이 집중되지 않는가? 플랫폼 직접 배치 시 첫 레이어 치수와 코끼리발을 관리할 수 있는가? 수평 모델 아래에 불필요한 서포트를 다수 배치하지 않았는가? 각도 증가에 따른 출력 높이와 시간 증가를 검토했는가? 7. 핵심 요약 구분 핵심 내용 평면 최적 각도 arctan(레이어 두께 ÷ 픽셀 폭)으로 이론적 기준을 계산한다. 45° 사례 픽셀 폭과 레이어 두께가 같으면 복셀 계단이 45°에서 균일해진다. 직접 배치 매끄러운 접촉면을 얻지만 첫 레이어 오차와 코끼리발을 관리해야 한다. 경사 배치 바닥 문제를 줄이는 대신 서포트 흔적과 출력 시간이 증가할 수 있다. 비평면 모델 하나의 최적 각도보다 최대 단면적과 상승 속도를 함께 관리한다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 4}, "11": {"manualId": 11, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "레진 3D 프린팅은 매끄러운 표면과 미세 형상을 구현하는 데 유리하지만, 필라멘트 계열 재료보다 단위 부피당 재료비가 높은 편이다. 표준 SLA 레진은 예시 기준으로 리터당 약 50 USD 수준에 이를 수 있으며, 덴탈·세라믹 등 기능성 레진은 이보다 더 높은 비용이 발생할 수 있다."}, {"type": "paragraph", "text": "재료비를 낮추기 위해서는 저가 레진을 선택하는 것만으로 충분하지 않다. 모델의 내부 체적, 크기, 구조, 출력 방향, 서포트와 래프트의 양을 함께 관리해야 한다. 특히 대형 모델의 출력 실패는 한 번에 많은 레진을 소모하므로, 절감의 우선순위는 단순한 부피 축소보다 출력 안정성 확보에 둔다."}, {"type": "table", "rows": [["절감 방법", "핵심 효과", "주요 주의사항"], ["속 비우기", "모델 내부의 불필요한 체적 감소", "벽 두께, 통기구와 배출구 확보"], ["크기 축소", "전체 체적을 직접 감소", "기능 치수와 최소 형상 확인"], ["구조 최적화", "필요 강도를 유지하면서 중량 감소", "얇은 벽과 응력 집중 방지"], ["서포트 정리", "서포트·래프트 사용량과 후처리 감소", "출력
