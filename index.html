xt": "식에서 접촉면의 대표 크기 R이 2배가 되면 R⁴ 항 때문에 박리력은 이론적으로 16배까지 증가할 수 있다. 박리력을 낮추려면 상승 속도를 줄이거나 모델 각도를 조정해 최대 단면적을 줄인다. 단, 각도를 크게 바꾸면 출력 높이와 총 출력 시간이 증가할 수 있다."}, {"type": "heading", "level": 2, "text": "5. 모델 유형별 각도 선정 기준", "id": "section-9"}, {"type": "table", "rows": [["모델 유형", "우선 판단", "권장 방향"], ["넓은 평면 구조", "픽셀 폭·레이어 두께와 바닥 치수 정밀도", "계산 각도 또는 플랫폼 직접 배치 비교"], ["외관이 중요한 평면", "서포트 접점 위치와 후처리 가능 여부", "중요 면을 서포트 반대쪽으로 배치"], ["곡면·유기 형상", "레이어별 최대 단면적과 표면 계단 방향", "단면적 변화가 완만한 각도 선택"], ["대형 솔리드 모델", "박리력, 중량과 서포트 강도", "단면적 축소와 상승 속도 조정 병행"], ["치수 정밀 부품", "첫 레이어 오차와 코끼리발 허용치", "시험 출력 후 치수 보정값 결정"]]}, {"type": "heading", "level": 3, "text": "5.1 실무 설정 순서", "id": "section-10"}, {"type": "paragraph", "text": "장비의 실제 XY 픽셀 폭과 사용할 레이어 두께를 확인한다."}, {"type": "paragraph", "text": "정밀도가 중요한 평면이 있는지 구분하고 이론적 각도를 계산한다."}, {"type": "paragraph", "text": "레이어 미리보기에서 최대 단면적과 단면적 변화가 급격한 구간을 확인한다."}, {"type": "paragraph", "text": "외관이 중요한 면을 서포트 접점과 플랫폼 직접 접촉에서 피한다."}, {"type": "paragraph", "text": "출력 높이, 예상 시간과 서포트 사용량을 비교해 최종 각도를 결정한다."}, {"type": "paragraph", "text": "동일 모델을 소형 시험 조건으로 출력해 줄무늬, 치수와 접점 흔적을 기록한다."}, {"type": "heading", "level": 2, "text": "6. 최종 점검 체크리스트", "id": "section-11"}, {"type": "paragraph", "text": "픽셀 폭과 레이어 두께를 기준으로 평면 구조의 계산 각도를 확인했는가?"}, {"type": "paragraph", "text": "40°·45°·50°와 같이 인접 각도를 비교할 필요가 있는가?"}, {"type": "paragraph", "text": "레이어 미리보기에서 최대 단면적이 지나치게 크지 않은가?"}, {"type": "paragraph", "text": "상승 속도와 레진 점도가 현재 단면적에 적합한가?"}, {"type": "paragraph", "text": "외관이 중요한 면에 서포트 접점이 집중되지 않는가?"}, {"type": "paragraph", "text": "플랫폼 직접 배치 시 첫 레이어 치수와 코끼리발을 관리할 수 있는가?"}, {"type": "paragraph", "text": "수평 모델 아래에 불필요한 서포트를 다수 배치하지 않았는가?"}, {"type": "paragraph", "text": "각도 증가에 따른 출력 높이와 시간 증가를 검토했는가?"}, {"type": "heading", "level": 2, "text": "7. 핵심 요약", "id": "section-12"}, {"type": "table", "rows": [["구분", "핵심 내용"], ["평면 최적 각도", "arctan(레이어 두께 ÷ 픽셀 폭)으로 이론적 기준을 계산한다."], ["45° 사례", "픽셀 폭과 레이어 두께가 같으면 복셀 계단이 45°에서 균일해진다."], ["직접 배치", "매끄러운 접촉면을 얻지만 첫 레이어 오차와 코끼리발을 관리해야 한다."], ["경사 배치", "바닥 문제를 줄이는 대신 서포트 흔적과 출력 시간이 증가할 수 있다."], ["비평면 모델", "하나의 최적 각도보다 최대 단면적과 상승 속도를 함께 관리한다."]]}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "add-supports-when-printing-the-model-horizontally.png", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/add-supports-when-printing-the-model-horizontally.png", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-1"}, {"fileName": "place-model-at-40.png", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/place-model-at-40.png", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-2"}, {"fileName": "place-model-at-45.png", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/place-model-at-45.png", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-3"}, {"fileName": "place-model-at-50.png", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/place-model-at-50.png", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-4"}, {"fileName": "print-angle-illustration.png", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/print-angle-illustration.png", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-5"}, {"fileName": "print-result-01.jpg", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/print-result-01.jpg", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-6"}, {"fileName": "print-result-02.jpg", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/print-result-02.jpg", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-7"}, {"fileName": "print-result-03.jpg", "path": "assets/manuals/10_모델 각도가 표면 품질에 미치는 영향/print-result-03.jpg", "kind": "image", "alt": "모델 각도가 표면 품질에 미치는 영향 시각 자료 10-8"}], "searchText": "0. 개요 SLA/DLP/LCD 방식에서는 모델이 빌드 플레이트에 놓이는 각도에 따라 레이어 계단, 서포트 흔적, 바닥면 치수와 박리 하중이 달라진다. 평면 구조는 픽셀 폭과 레이어 두께의 관계로 표면 계단이 가장 균일해지는 각도를 계산할 수 있지만, 곡면이나 복잡한 모델에는 모든 상황에 공통으로 적용되는 하나의 최적 각도가 존재하지 않는다. 각도는 표면 품질만 보고 결정하지 않는다. 출력 방향별 레이어 단면적, 출력 높이와 시간, 서포트가 닿는 면, 플랫폼에서의 제거 방법과 치수 정밀도를 함께 검토해야 한다. 핵심 판단 평면 구조의 이론적 최적 각도는 arctan(레이어 두께 ÷ 픽셀 폭)으로 계산한다. 비평면 모델은 특정 각도보다 최대 단면적을 지나치게 키우지 않는 것이 중요하다. 1. 복셀과 평면 구조의 최적 각도 광경화 방식에서 가장 작은 출력 단위는 복셀(Voxel)이다. 복셀은 XY 평면의 한 픽셀 면적에 Z축 레이어 두께를 곱한 체적이며, 경사진 평면은 이 복셀들이 계단 형태로 쌓여 표현된다. 픽셀 폭과 레이어 두께의 비율에 맞게 모델을 기울이면 계단의 모서리가 직선에 가깝게 정렬되어 반복 줄무늬가 줄어든다. 예를 들어 픽셀 폭이 0.05 mm이고 레이어 두께가 0.05 mm이면 계산값은 45°다. 동일한 픽셀 폭에서 레이어 두께가 0.03 mm이면 약 30.96°, 0.07 mm이면 약 54.46°가 된다. 그림 1. 픽셀 폭 0.05 mm에서 레이어 두께에 따른 이론적 평면 배치 각도 적용 주의 계산식은 평면의 복셀 계단을 균일하게 만드는 기준이다. 장비의 실제 픽셀 크기, 광학 번짐, 레진 특성, 노출 조건과 기계 정밀도에 따라 시험 출력으로 보정해야 한다. 2. 40°·45°·50° 각도 비교 픽셀 폭과 레이어 두께가 모두 0.05 mm인 조건에서는 45°에서 복셀이 평면 방향을 따라 규칙적으로 정렬된다. 40°와 50°에서는 일정 간격으로 계단 폭이 달라져 표면에 불균일한 줄무늬가 나타날 수 있다. θ = 50° 그림 2. 배치 각도에 따른 평면 복셀 계단의 정렬 비교 2.1 실제 출력 결과 픽셀 폭 0.051 mm, 레이어 두께 0.05 mm 조건의 계산값은 약 44.43°다. 이 계산값에 가까운 45° 조건에서는 40°와 50° 조건보다 표면의 뚜렷한 줄무늬가 감소하는 경향을 확인할 수 있다. 50° 출력 결과 그림 3. 동일 모델을 40°·45°·50°로 출력한 표면 품질 비교 조건 복셀 정렬 예상 표면 특성 계산값보다 작은 각도 일부 계단 폭이 불균일 주기적인 줄무늬와 계단이 나타날 수 있음 계산값에 가까운 각도 평면 방향으로 비교적 균일 뚜렷한 줄무늬가 감소 계산값보다 큰 각도 반대 방향으로 계단 폭 불균일 다른 간격의 줄무늬가 나타날 수 있음 3. 평면을 플랫폼에 직접 배치하는 방법 평면 구조는 요구 정밀도와 제거 위험을 고려해 빌드 플레이트에 직접 놓을 수도 있다. 이 방법은 바닥면 서포트가 필요 없고 플랫폼과 맞닿은 면이 매끄러워 별도의 서포트 흔적 후처리가 적다는 장점이 있다. 다만 대부분의 장비는 Z축 영점을 수동으로 조정하므로 마이크로미터 수준의 오차를 완전히 제거하기 어렵다. Z축 영점이 낮으면 첫 레이어가 설정값보다 얇아지고, 높으면 첫 레이어가 두꺼워질 수 있다. 바닥 레이어는 일반 레이어보다 노출 시간이 길어 코끼리발(Elephant Foot) 또는 스커트 형상이 발생할 수 있으며, 치수 보정 기능을 사용할 경우에도 보정값 검증이 필요하다. 구분 장점 주의 사항 플랫폼 직접 배치 서포트 불필요, 접촉면이 매끄러움 첫 레이어 치수 오차, 코끼리발, 제거 중 손상 위험 경사 배치 바닥 과노출과 직접 제거 위험 감소 서포트 흔적, 후처리 증가, 출력 높이와 시간 증가 3.1 경사 배치와 서포트 흔적 평면 구조를 기울이면 첫 레이어 두께 오차와 코끼리발 문제를 피하기 쉬워진다. 그러나 기울기가 작으면 넓은 단면에 발생하는 박리력을 지탱하기 위해 특히 가장자리의 서포트 밀도를 높여야 한다. 서포트 제거 후에는 여드름처럼 돌출된 접점 흔적이 남을 수 있어 연마와 표면 복원이 필요하다. 판정 기준 정밀한 바닥 치수가 중요하면 경사 배치를 우선 검토하고, 서포트가 닿는 면의 외관이 더 중요하면 플랫폼 직접 배치와 치수 보정을 검토한다. 3.2 피해야 할 수평 서포트 배치 평면 모델을 수평으로 유지한 채 아래에 다수의 서포트를 배치하면 넓은 단면적에 따른 박리 하중은 그대로 유지되면서, 서포트 흔적과 후처리 부담까지 추가된다. 플랫폼 직접 배치와 경사 배치의 단점이 동시에 나타날 수 있으므로 피한다. 그림 4. 넓은 평면을 수평으로 유지한 채 서포트를 추가한 비권장 배치 주의 수평 배치에 서포트만 추가하는 방식은 단면적을 줄이지 못한다. 모델 각도를 조정해 레이어별 최대 단면적을 낮추고, 필요한 영역에 서포트를 분산한다. 4. 단면적과 상승 속도가 박리력에 미치는 영향 평면 구조가 아닌 모델은 특정 각도 계산식보다 레이어별 단면적이 핵심이다. FEP 필름과 모델 사이의 접촉 단면이 넓어질수록 박리력이 커지고, 서포트 파손·변형·탈락 가능성이 증가한다. 원형에 가까운 단면은 Stefan 부착력 식으로 박리력을 근사할 수 있다. 기호 의미 박리력과의 관계 F 박리력 출력물과 필름을 분리하는 데 필요한 힘 η 액체의 점도 계수 점도가 높을수록 박리력 증가 R 원형에 가까운 접촉면의 대표 반경 4제곱에 비례 h 평행한 두 면 사이의 거리 거리가 작을수록 박리력 증가 dh/dt 분리 또는 상승 속도 상승 속도가 빠를수록 박리력 증가 식에서 접촉면의 대표 크기 R이 2배가 되면 R⁴ 항 때문에 박리력은 이론적으로 16배까지 증가할 수 있다. 박리력을 낮추려면 상승 속도를 줄이거나 모델 각도를 조정해 최대 단면적을 줄인다. 단, 각도를 크게 바꾸면 출력 높이와 총 출력 시간이 증가할 수 있다. 5. 모델 유형별 각도 선정 기준 모델 유형 우선 판단 권장 방향 넓은 평면 구조 픽셀 폭·레이어 두께와 바닥 치수 정밀도 계산 각도 또는 플랫폼 직접 배치 비교 외관이 중요한 평면 서포트 접점 위치와 후처리 가능 여부 중요 면을 서포트 반대쪽으로 배치 곡면·유기 형상 레이어별 최대 단면적과 표면 계단 방향 단면적 변화가 완만한 각도 선택 대형 솔리드 모델 박리력, 중량과 서포트 강도 단면적 축소와 상승 속도 조정 병행 치수 정밀 부품 첫 레이어 오차와 코끼리발 허용치 시험 출력 후 치수 보정값 결정 5.1 실무 설정 순서 장비의 실제 XY 픽셀 폭과 사용할 레이어 두께를 확인한다. 정밀도가 중요한 평면이 있는지 구분하고 이론적 각도를 계산한다. 레이어 미리보기에서 최대 단면적과 단면적 변화가 급격한 구간을 확인한다. 외관이 중요한 면을 서포트 접점과 플랫폼 직접 접촉에서 피한다. 출력 높이, 예상 시간과 서포트 사용량을 비교해 최종 각도를 결정한다. 동일 모델을 소형 시험 조건으로 출력해 줄무늬, 치수와 접점 흔적을 기록한다. 6. 최종 점검 체크리스트 픽셀 폭과 레이어 두께를 기준으로 평면 구조의 계산 각도를 확인했는가? 40°·45°·50°와 같이 인접 각도를 비교할 필요가 있는가? 레이어 미리보기에서 최대 단면적이 지나치게 크지 않은가? 상승 속도와 레진 점도가 현재 단면적에 적합한가? 외관이 중요한 면에 서포트 접점이 집중되지 않는가? 플랫폼 직접 배치 시 첫 레이어 치수와 코끼리발을 관리할 수 있는가? 수평 모델 아래에 불필요한 서포트를 다수 배치하지 않았는가? 각도 증가에 따른 출력 높이와 시간 증가를 검토했는가? 7. 핵심 요약 구분 핵심 내용 평면 최적 각도 arctan(레이어 두께 ÷ 픽셀 폭)으로 이론적 기준을 계산한다. 45° 사례 픽셀 폭과 레이어 두께가 같으면 복셀 계단이 45°에서 균일해진다. 직접 배치 매끄러운 접촉면을 얻지만 첫 레이어 오차와 코끼리발을 관리해야 한다. 경사 배치 바닥 문제를 줄이는 대신 서포트 흔적과 출력 시간이 증가할 수 있다. 비평면 모델 하나의 최적 각도보다 최대 단면적과 상승 속도를 함께 관리한다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 4}, "11": {"manualId": 11, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "레진 3D 프린팅은 매끄러운 표면과 미세 형상을 구현하는 데 유리하지만, 필라멘트 계열 재료보다 단위 부피당 재료비가 높은 편이다. 표준 SLA 레진은 예시 기준으로 리터당 약 50 USD 수준에 이를 수 있으며, 덴탈·세라믹 등 기능성 레진은 이보다 더 높은 비용이 발생할 수 있다."}, {"type": "paragraph", "text": "재료비를 낮추기 위해서는 저가 레진을 선택하는 것만으로 충분하지 않다. 모델의 내부 체적, 크기, 구조, 출력 방향, 서포트와 래프트의 양을 함께 관리해야 한다. 특히 대형 모델의 출력 실패는 한 번에 많은 레진을 소모하므로, 절감의 우선순위는 단순한 부피 축소보다 출력 안정성 확보에 둔다."}, {"type": "table", "rows": [["절감 방법", "핵심 효과", "주요 주의사항"], ["속 비우기", "모델 내부의 불필요한 체적 감소", "벽 두께, 통기구와 배출구 확보"], ["크기 축소", "전체 체적을 직접 감소", "기능 치수와 최소 형상 확인"], ["구조 최적화", "필요 강도를 유지하면서 중량 감소", "얇은 벽과 응력 집중 방지"], ["서포트 정리", "서포트·래프트 사용량과 후처리 감소", "출력 안정성을 먼저 검증"]]}, {"type": "table", "rows": [["핵심 원칙 가장 큰 레진 낭비는 출력 실패에서 발생한다. 절감 설정을 적용한 뒤에도 모델 강도, 플랫폼 접착력과 서포트 안정성이 유지되는지 반드시 확인한다."]]}, {"type": "heading", "level": 2, "text": "1. 레진 사용량을 결정하는 요소", "id": "section-2"}, {"type": "paragraph", "text": "레진 사용량은 슬라이싱 후 생성되는 전체 복셀의 체적으로 결정된다. 모델 자체의 체적뿐 아니라 서포트, 래프트, 내부 구조와 보강부도 모두 사용량에 포함된다. 따라서 단일 파라미터만 줄이기보다 다음 항목을 순서대로 검토하는 것이 효과적이다."}, {"type": "paragraph", "text": "기능상 필요하지 않은 내부 체적이 남아 있는지 확인한다."}, {"type": "paragraph", "text": "사용 목적에 비해 모델 크기가 과도하지 않은지 검토한다."}, {"type": "paragraph", "text": "얇은 벽과 보강 구조가 균형을 이루는지 확인한다."}, {"type": "paragraph", "text": "출력 방향을 조정해 서포트와 래프트가 과도하게 생성되지 않도록 한다."}, {"type": "paragraph", "text": "슬라이싱 결과에서 예상 레진 사용량을 확인하고 변경 전후 값을 비교한다."}, {"type": "heading", "level": 2, "text": "2. 속이 비워진 출력물 설계", "id": "section-3"}, {"type": "paragraph", "text": "대부분의 모델은 내부 전체를 단단하게 채울 필요가 없다. 속이 비워진 출력물(Hollow Model)로 설계하면 외형은 유지하면서 내부 레진 사용량을 크게 줄일 수 있다. 다만 벽을 지나치게 얇게 만들면 모델이 약해지고, 섬세한 구조에서는 출력 실패 가능성이 높아질 수 있으므로 용도에 맞는 벽 두께를 확보한다."}, {"type": "image", "path": "assets/manuals/11_레진 사용량 절감 방법/hollowed-model.png", "alt": "레진 사용량 절감 방법 시각 자료", "fileName": "hollowed-model.png"}, {"type": "paragraph", "text": "그림 1. 내부 체적을 제거한 속이 빈 출력물의 구성 예시"}, {"type": "heading", "level": 3, "text": "2.1 벽 두께와 강도", "id": "section-4"}, {"type": "paragraph", "text": "벽 두께를 줄이면 레진 사용량과 모델 중량이 감소하지만, 박리 하중과 후처리 과정의 외력에 견디는 능력도 함께 낮아진다. 넓은 평면, 길게 돌출된 형상과 체결부 주변은 국부 변형이 발생하기 쉬우므로 균일하게 얇게 만드는 대신 필요한 위치를 보강한다."}, {"type": "heading", "level": 3, "text": "2.2 통기구와 배출구", "id": "section-5"}, {"type": "paragraph", "text": "속이 빈 구조는 출력 중 밀폐 공간을 만들 수 있다. 내부 압력이 외부와 달라지면 모델 변형, 균열, 서포트 파손과 탈락이 발생할 수 있으므로 CHITUBOX에서 구멍을 추가해 내부와 외부의 압력을 평형화한다. 구멍은 출력 초기부터 레진과 공기가 실제로 이동할 수 있는 위치에 배치하고, 후처리 시 내부 레진과 세척액을 완전히 배출할 수 있어야 한다."}, {"type": "table", "rows": [["주의 속 비우기는 벽 두께와 배출 경로를 함께 설계할 때만 효과가 있다. 밀폐된 내부에 미경화 레진이 남으면 시간이 지난 뒤 균열이나 파손이 발생할 수 있다."]]}, {"type": "heading", "level": 2, "text": "3. 모델 크기 축소", "id": "section-6"}, {"type": "paragraph", "text": "모델 크기는 레진 소비량에 직접적인 영향을 준다. CHITUBOX의 크기 조정 기능에서 정확한 비율을 입력하거나 조절 핸들을 드래그해 모델을 축소할 수 있다. X·Y·Z 축을 동시에 비례 조정하거나 각 축을 개별적으로 변경할 수 있으므로, 기능과 조립 목적에 맞는 방식을 선택한다."}, {"type": "image", "path": "assets/manuals/11_레진 사용량 절감 방법/scale-down-the-model.gif", "alt": "레진 사용량 절감 방법 시각 자료", "fileName": "scale-down-the-model.gif"}, {"type": "paragraph", "text": "그림 2. CHITUBOX에서 모델 크기를 비례 축소하는 과정(움직이는 이미지)"}, {"type": "table", "rows": [["조정 방식", "적용 상황", "확인 항목"], ["전체 비례 축소", "장식용 모델, 크기 제약이 적은 시제품", "최소 두께와 미세 형상 재현성"], ["축별 개별 조정", "특정 방향 치수만 변경해야 하는 모델", "형상 왜곡과 조립 호환성"], ["수치 직접 입력", "목표 치수가 명확한 부품", "단위와 최종 외형 치수"]]}, {"type": "table", "rows": [["실무 확인 크기를 줄이면 벽 두께, 구멍, 문자, 체결부와 서포트 접촉부도 함께 작아진다. 축소 후에는 최소 출력 가능 치수와 후처리 내구성을 다시 검토한다."]]}, {"type": "heading", "level": 2, "text": "4. 모델 구조 최적화", "id": "section-7"}, {"type": "paragraph", "text": "대형 모델의 실패는 절반 병 이상의 레진을 한 번에 낭비할 수 있다. 재료 절감 목적의 구조 변경은 출력 성공률을 떨어뜨리지 않는 범위에서 수행한다. 3D 모델링 소프트웨어를 사용할 수 있다면 불필요한 체적을 줄이고, 하중이 집중되는 부분만 보강하는 방식이 효율적이다."}, {"type": "heading", "level": 3, "text": "4.1 얇은 벽과 응력 집중", "id": "section-8"}, {"type": "paragraph", "text": "벽이 얇아지면 중량과 소비량은 감소하지만 구조 강성도 낮아진다. 바텀업 방식에서는 모델이 빌드 플레이트에 거꾸로 매달린 상태로 중력과 반복적인 박리 하중을 받으므로, 강도가 부족하면 변형이나 파손으로 이어질 수 있다. 날카로운 모서리는 응력이 집중되어 균열 가능성을 높이므로 가능한 경우 필렛이나 완만한 전이 형상을 적용한다."}, {"type": "heading", "level": 3, "text": "4.2 미세 구멍과 공차 보정", "id": "section-9"}, {"type": "paragraph", "text": "직경이 0.5 mm보다 작은 미세 구멍은 노광 번짐과 레진 잔류의 영향을 받아 막히거나 치수가 작게 형성되기 쉽다. 필요한 경우 CHITUBOX의 공차 보정(Tolerance Compensation, TC) 기능을 활용하고 시험 출력으로 보정값을 검증한다."}, {"type": "heading", "level": 3, "text": "4.3 리브와 거셋을 이용한 국부 보강", "id": "section-10"}, {"type": "paragraph", "text": "전체 벽을 두껍게 만드는 대신 외력이 작용하거나 변형이 예상되는 위치에 리브와 거셋을 추가하면 레진 사용량 증가를 제한하면서 강도를 높일 수 있다. 보강부의 끝단은 급격한 두께 변화가 생기지 않도록 연결해 응력 집중을 줄인다."}, {"type": "image", "path": "assets/manuals/11_레진 사용량 절감 방법/ribs-and-gussets.png", "alt": "레진 사용량 절감 방법 시각 자료", "fileName": "ribs-and-gussets.png"}, {"type": "paragraph", "text": "그림 3. 리브와 거셋을 이용한 국부 보강 구조"}, {"type": "heading", "level": 2, "text": "5. 불필요한 서포트와 래프트 제거", "id": "section-11"}, {"type": "paragraph", "text": "동일한 모델도 배치 각도에 따라 자동 생성되는 서포트와 래프트의 양이 달라진다. 먼저 모델을 안정적으로 지지할 수 있는 방향을 선택한 뒤, 그 범위 안에서 서포트와 래프트가 적게 생성되는 각도를 찾는다. 일반적으로 수직에 가까운 배치는 서포트 수를 줄이는 데 유리할 수 있지만, 단면적 변화와 출력 높이도 함께 고려해야 한다."}, {"type": "image", "path": "assets/manuals/11_레진 사용량 절감 방법/more-auto-supports.png", "alt": "레진 사용량 절감 방법 시각 자료", "fileName": "more-auto-supports.png"}, {"type": "image", "path": "assets/manuals/11_레진 사용량 절감 방법/less-auto-supports.png", "alt": "레진 사용량 절감 방법 시각 자료", "fileName": "less-auto-supports.png"}, {"type": "paragraph", "text": "그림 4. 모델 배치 방향에 따른 자동 서포트 및 래프트 생성량 비교"}, {"type": "paragraph", "text": "자동 서포트를 생성한 뒤에는 중복되거나 역할이 겹치는 서포트를 개별적으로 검토해 삭제한다. 단, 핵심 지지점과 초기 아일랜드를 지지하는 서포트는 유지해야 한다. 구조적 안정성이 확보된 조건에서 서포트가 줄어들면 레진 소비뿐 아니라 접촉 자국과 후처리 작업량도 감소한다."}, {"type": "table", "rows": [["검토 항목", "절감 방향", "우선 확인"], ["모델 방향", "서포트와 래프트가 적은 각도 탐색", "단면적, 박리 하중과 출력 높이"], ["자동 서포트", "중복·과밀 서포트 제거", "아일랜드와 핵심 하중 지점"], ["래프트", "필요 면적과 두께만 유지", "플랫폼 접착력과 제거성"], ["표면 품질", "접촉점 수와 크기 최소화", "지지 강도와 접촉 자국의 균형"]]}, {"type": "heading", "level": 2, "text": "6. 슬라이싱 후 레진 사용량 확인", "id": "section-12"}, {"type": "paragraph", "text": "CHITUBOX는 슬라이싱으로 생성된 각 복셀의 체적을 합산해 레진 사용량을 계산한다. 각 복셀의 기본 체적은 픽셀 면적과 레이어 높이의 곱으로 표현할 수 있다."}, {"type": "table", "rows": [["계산 개념 예상 레진 체적 = Σ(각 레이어의 노광 픽셀 면적 × 레이어 높이)"]]}, {"type": "paragraph", "text": "이 계산은 단순하지만 일반적인 작업에서는 사용량을 비교하기에 충분한 정확도를 제공한다. 모델 구조나 방향을 변경할 때마다 슬라이싱을 다시 실행하고, 변경 전후 예상 체적을 기록하면 실제 절감 효과를 확인할 수 있다."}, {"type": "image", "path": "assets/manuals/11_레진 사용량 절감 방법/resin-consumption.png", "alt": "레진 사용량 절감 방법 시각 자료", "fileName": "resin-consumption.png"}, {"type": "paragraph", "text": "그림 5. 슬라이싱 결과에서 확인하는 예상 레진 사용량"}, {"type": "paragraph", "text": "온라인 레진 계산 도구를 사용할 수도 있으나 모델 파일을 외부 서비스에 업로드해야 하는 경우가 있다. 기밀 형상이나 고객 데이터가 포함된 모델은 서비스의 신뢰성과 정보보호 정책을 확인한 뒤 사용한다."}, {"type": "heading", "level": 2, "text": "7. 최종 점검 체크리스트", "id": "section-13"}, {"type": "paragraph", "text": "기능상 필요하지 않은 내부 체적을 제거했는가?"}, {"type": "paragraph", "text": "속이 빈 구조의 벽 두께가 출력과 사용 하중을 견딜 수 있는가?"}, {"type": "paragraph", "text": "통기구와 배출구가 내부 공동에 직접 연결되어 있는가?"}, {"type": "paragraph", "text": "모델 축소 후 최소 벽 두께, 구멍과 문자 크기를 다시 확인했는가?"}, {"type": "paragraph", "text": "날카로운 모서리와 급격한 두께 변화로 인한 응력 집중을 줄였는가?"}, {"type": "paragraph", "text": "필요한 위치만 리브와 거셋으로 보강했는가?"}, {"type": "paragraph", "text": "출력 방향별 서포트와 래프트 사용량을 비교했는가?"}, {"type": "paragraph", "text": "중복 서포트를 제거한 뒤에도 아일랜드와 핵심 하중 지점이 지지되는가?"}, {"type": "paragraph", "text": "슬라이싱 후 예상 레진 사용량을 변경 전 값과 비교했는가?"}, {"type": "paragraph", "text": "절감 설정으로 인해 출력 실패 위험이 증가하지 않았는가?"}, {"type": "heading", "level": 2, "text": "8. 핵심 요약", "id": "section-14"}, {"type": "table", "rows": [["구분", "핵심 내용"], ["속 비우기", "내부 체적을 줄이되 벽 두께와 압력 평형용 구멍을 함께 설계한다."], ["크기 조정", "전체 비례 또는 축별 조정을 사용하고 최소 출력 치수를 재검토한다."], ["구조 최적화", "전체 두께 증가보다 리브·거셋 등 국부 보강을 우선한다."], ["서포트 절감", "안정성이 확보된 범위에서 배치 방향과 중복 서포트를 최적화한다."], ["사용량 검증", "슬라이싱 결과의 예상 체적을 비교해 절감 효과를 수치로 확인한다."], ["최우선 기준", "재료 절감보다 출력 성공률과 완성품 기능을 우선한다."]]}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "hollowed-model.png", "path": "assets/manuals/11_레진 사용량 절감 방법/hollowed-model.png", "kind": "image", "alt": "레진 사용량 절감 방법 시각 자료 11-1"}, {"fileName": "less-auto-supports.png", "path": "assets/manuals/11_레진 사용량 절감 방법/less-auto-supports.png", "kind": "image", "alt": "레진 사용량 절감 방법 시각 자료 11-2"}, {"fileName": "more-auto-supports.png", "path": "assets/manuals/11_레진 사용량 절감 방법/more-auto-supports.png", "kind": "image", "alt": "레진 사용량 절감 방법 시각 자료 11-3"}, {"fileName": "resin-consumption.png", "path": "assets/manuals/11_레진 사용량 절감 방법/resin-consumption.png", "kind": "image", "alt": "레진 사용량 절감 방법 시각 자료 11-4"}, {"fileName": "ribs-and-gussets.png", "path": "assets/manuals/11_레진 사용량 절감 방법/ribs-and-gussets.png", "kind": "image", "alt": "레진 사용량 절감 방법 시각 자료 11-5"}, {"fileName": "scale-down-the-model.gif", "path": "assets/manuals/11_레진 사용량 절감 방법/scale-down-the-model.gif", "kind": "gif", "alt": "레진 사용량 절감 방법 시각 자료 11-6"}], "searchText": "0. 개요 레진 3D 프린팅은 매끄러운 표면과 미세 형상을 구현하는 데 유리하지만, 필라멘트 계열 재료보다 단위 부피당 재료비가 높은 편이다. 표준 SLA 레진은 예시 기준으로 리터당 약 50 USD 수준에 이를 수 있으며, 덴탈·세라믹 등 기능성 레진은 이보다 더 높은 비용이 발생할 수 있다. 재료비를 낮추기 위해서는 저가 레진을 선택하는 것만으로 충분하지 않다. 모델의 내부 체적, 크기, 구조, 출력 방향, 서포트와 래프트의 양을 함께 관리해야 한다. 특히 대형 모델의 출력 실패는 한 번에 많은 레진을 소모하므로, 절감의 우선순위는 단순한 부피 축소보다 출력 안정성 확보에 둔다. 절감 방법 핵심 효과 주요 주의사항 속 비우기 모델 내부의 불필요한 체적 감소 벽 두께, 통기구와 배출구 확보 크기 축소 전체 체적을 직접 감소 기능 치수와 최소 형상 확인 구조 최적화 필요 강도를 유지하면서 중량 감소 얇은 벽과 응력 집중 방지 서포트 정리 서포트·래프트 사용량과 후처리 감소 출력 안정성을 먼저 검증 핵심 원칙 가장 큰 레진 낭비는 출력 실패에서 발생한다. 절감 설정을 적용한 뒤에도 모델 강도, 플랫폼 접착력과 서포트 안정성이 유지되는지 반드시 확인한다. 1. 레진 사용량을 결정하는 요소 레진 사용량은 슬라이싱 후 생성되는 전체 복셀의 체적으로 결정된다. 모델 자체의 체적뿐 아니라 서포트, 래프트, 내부 구조와 보강부도 모두 사용량에 포함된다. 따라서 단일 파라미터만 줄이기보다 다음 항목을 순서대로 검토하는 것이 효과적이다. 기능상 필요하지 않은 내부 체적이 남아 있는지 확인한다. 사용 목적에 비해 모델 크기가 과도하지 않은지 검토한다. 얇은 벽과 보강 구조가 균형을 이루는지 확인한다. 출력 방향을 조정해 서포트와 래프트가 과도하게 생성되지 않도록 한다. 슬라이싱 결과에서 예상 레진 사용량을 확인하고 변경 전후 값을 비교한다. 2. 속이 비워진 출력물 설계 대부분의 모델은 내부 전체를 단단하게 채울 필요가 없다. 속이 비워진 출력물(Hollow Model)로 설계하면 외형은 유지하면서 내부 레진 사용량을 크게 줄일 수 있다. 다만 벽을 지나치게 얇게 만들면 모델이 약해지고, 섬세한 구조에서는 출력 실패 가능성이 높아질 수 있으므로 용도에 맞는 벽 두께를 확보한다. 그림 1. 내부 체적을 제거한 속이 빈 출력물의 구성 예시 2.1 벽 두께와 강도 벽 두께를 줄이면 레진 사용량과 모델 중량이 감소하지만, 박리 하중과 후처리 과정의 외력에 견디는 능력도 함께 낮아진다. 넓은 평면, 길게 돌출된 형상과 체결부 주변은 국부 변형이 발생하기 쉬우므로 균일하게 얇게 만드는 대신 필요한 위치를 보강한다. 2.2 통기구와 배출구 속이 빈 구조는 출력 중 밀폐 공간을 만들 수 있다. 내부 압력이 외부와 달라지면 모델 변형, 균열, 서포트 파손과 탈락이 발생할 수 있으므로 CHITUBOX에서 구멍을 추가해 내부와 외부의 압력을 평형화한다. 구멍은 출력 초기부터 레진과 공기가 실제로 이동할 수 있는 위치에 배치하고, 후처리 시 내부 레진과 세척액을 완전히 배출할 수 있어야 한다. 주의 속 비우기는 벽 두께와 배출 경로를 함께 설계할 때만 효과가 있다. 밀폐된 내부에 미경화 레진이 남으면 시간이 지난 뒤 균열이나 파손이 발생할 수 있다. 3. 모델 크기 축소 모델 크기는 레진 소비량에 직접적인 영향을 준다. CHITUBOX의 크기 조정 기능에서 정확한 비율을 입력하거나 조절 핸들을 드래그해 모델을 축소할 수 있다. X·Y·Z 축을 동시에 비례 조정하거나 각 축을 개별적으로 변경할 수 있으므로, 기능과 조립 목적에 맞는 방식을 선택한다. 그림 2. CHITUBOX에서 모델 크기를 비례 축소하는 과정(움직이는 이미지) 조정 방식 적용 상황 확인 항목 전체 비례 축소 장식용 모델, 크기 제약이 적은 시제품 최소 두께와 미세 형상 재현성 축별 개별 조정 특정 방향 치수만 변경해야 하는 모델 형상 왜곡과 조립 호환성 수치 직접 입력 목표 치수가 명확한 부품 단위와 최종 외형 치수 실무 확인 크기를 줄이면 벽 두께, 구멍, 문자, 체결부와 서포트 접촉부도 함께 작아진다. 축소 후에는 최소 출력 가능 치수와 후처리 내구성을 다시 검토한다. 4. 모델 구조 최적화 대형 모델의 실패는 절반 병 이상의 레진을 한 번에 낭비할 수 있다. 재료 절감 목적의 구조 변경은 출력 성공률을 떨어뜨리지 않는 범위에서 수행한다. 3D 모델링 소프트웨어를 사용할 수 있다면 불필요한 체적을 줄이고, 하중이 집중되는 부분만 보강하는 방식이 효율적이다. 4.1 얇은 벽과 응력 집중 벽이 얇아지면 중량과 소비량은 감소하지만 구조 강성도 낮아진다. 바텀업 방식에서는 모델이 빌드 플레이트에 거꾸로 매달린 상태로 중력과 반복적인 박리 하중을 받으므로, 강도가 부족하면 변형이나 파손으로 이어질 수 있다. 날카로운 모서리는 응력이 집중되어 균열 가능성을 높이므로 가능한 경우 필렛이나 완만한 전이 형상을 적용한다. 4.2 미세 구멍과 공차 보정 직경이 0.5 mm보다 작은 미세 구멍은 노광 번짐과 레진 잔류의 영향을 받아 막히거나 치수가 작게 형성되기 쉽다. 필요한 경우 CHITUBOX의 공차 보정(Tolerance Compensation, TC) 기능을 활용하고 시험 출력으로 보정값을 검증한다. 4.3 리브와 거셋을 이용한 국부 보강 전체 벽을 두껍게 만드는 대신 외력이 작용하거나 변형이 예상되는 위치에 리브와 거셋을 추가하면 레진 사용량 증가를 제한하면서 강도를 높일 수 있다. 보강부의 끝단은 급격한 두께 변화가 생기지 않도록 연결해 응력 집중을 줄인다. 그림 3. 리브와 거셋을 이용한 국부 보강 구조 5. 불필요한 서포트와 래프트 제거 동일한 모델도 배치 각도에 따라 자동 생성되는 서포트와 래프트의 양이 달라진다. 먼저 모델을 안정적으로 지지할 수 있는 방향을 선택한 뒤, 그 범위 안에서 서포트와 래프트가 적게 생성되는 각도를 찾는다. 일반적으로 수직에 가까운 배치는 서포트 수를 줄이는 데 유리할 수 있지만, 단면적 변화와 출력 높이도 함께 고려해야 한다. 그림 4. 모델 배치 방향에 따른 자동 서포트 및 래프트 생성량 비교 자동 서포트를 생성한 뒤에는 중복되거나 역할이 겹치는 서포트를 개별적으로 검토해 삭제한다. 단, 핵심 지지점과 초기 아일랜드를 지지하는 서포트는 유지해야 한다. 구조적 안정성이 확보된 조건에서 서포트가 줄어들면 레진 소비뿐 아니라 접촉 자국과 후처리 작업량도 감소한다. 검토 항목 절감 방향 우선 확인 모델 방향 서포트와 래프트가 적은 각도 탐색 단면적, 박리 하중과 출력 높이 자동 서포트 중복·과밀 서포트 제거 아일랜드와 핵심 하중 지점 래프트 필요 면적과 두께만 유지 플랫폼 접착력과 제거성 표면 품질 접촉점 수와 크기 최소화 지지 강도와 접촉 자국의 균형 6. 슬라이싱 후 레진 사용량 확인 CHITUBOX는 슬라이싱으로 생성된 각 복셀의 체적을 합산해 레진 사용량을 계산한다. 각 복셀의 기본 체적은 픽셀 면적과 레이어 높이의 곱으로 표현할 수 있다. 계산 개념 예상 레진 체적 = Σ(각 레이어의 노광 픽셀 면적 × 레이어 높이) 이 계산은 단순하지만 일반적인 작업에서는 사용량을 비교하기에 충분한 정확도를 제공한다. 모델 구조나 방향을 변경할 때마다 슬라이싱을 다시 실행하고, 변경 전후 예상 체적을 기록하면 실제 절감 효과를 확인할 수 있다. 그림 5. 슬라이싱 결과에서 확인하는 예상 레진 사용량 온라인 레진 계산 도구를 사용할 수도 있으나 모델 파일을 외부 서비스에 업로드해야 하는 경우가 있다. 기밀 형상이나 고객 데이터가 포함된 모델은 서비스의 신뢰성과 정보보호 정책을 확인한 뒤 사용한다. 7. 최종 점검 체크리스트 기능상 필요하지 않은 내부 체적을 제거했는가? 속이 빈 구조의 벽 두께가 출력과 사용 하중을 견딜 수 있는가? 통기구와 배출구가 내부 공동에 직접 연결되어 있는가? 모델 축소 후 최소 벽 두께, 구멍과 문자 크기를 다시 확인했는가? 날카로운 모서리와 급격한 두께 변화로 인한 응력 집중을 줄였는가? 필요한 위치만 리브와 거셋으로 보강했는가? 출력 방향별 서포트와 래프트 사용량을 비교했는가? 중복 서포트를 제거한 뒤에도 아일랜드와 핵심 하중 지점이 지지되는가? 슬라이싱 후 예상 레진 사용량을 변경 전 값과 비교했는가? 절감 설정으로 인해 출력 실패 위험이 증가하지 않았는가? 8. 핵심 요약 구분 핵심 내용 속 비우기 내부 체적을 줄이되 벽 두께와 압력 평형용 구멍을 함께 설계한다. 크기 조정 전체 비례 또는 축별 조정을 사용하고 최소 출력 치수를 재검토한다. 구조 최적화 전체 두께 증가보다 리브·거셋 등 국부 보강을 우선한다. 서포트 절감 안정성이 확보된 범위에서 배치 방향과 중복 서포트를 최적화한다. 사용량 검증 슬라이싱 결과의 예상 체적을 비교해 절감 효과를 수치로 확인한다. 최우선 기준 재료 절감보다 출력 성공률과 완성품 기능을 우선한다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 5}, "12": {"manualId": 12, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "레진 3D 프린팅 출력물의 강도는 재료만으로 결정되지 않는다. 내부 구조, 벽 두께, 하중을 받는 방향, 세척과 후경화 조건이 함께 작용한다. 동일한 레진과 동일한 출력 설정을 사용해도 설계와 배치가 다르면 파손 위치와 사용 수명이 크게 달라질 수 있다."}, {"type": "paragraph", "text": "강도 향상의 목표는 단순히 출력물을 두껍고 무겁게 만드는 것이 아니다. 실제 사용 중 발생하는 하중을 예측하고 필요한 위치에 재료를 배치하며, 층간 결합이 약한 방향을 피하고, 재료가 의도한 물성을 발휘하도록 후처리를 완료하는 것이 핵심이다."}, {"type": "table", "rows": [["관리 요소", "강도에 미치는 영향", "주요 확인사항"], ["내부 채움", "속이 빈 출력물 내부의 지지 경로를 형성", "밀도 증가에 따른 무게와 세척성"], ["벽 두께", "외피 강성과 충격 저항을 결정", "전체 크기와 하중 집중 위치"], ["레진 물성", "인장·굽힘·충격 특성의 기본 범위를 결정", "강도와 연신율의 균형"], ["배치 방향", "층간 결합 방향과 하중 방향을 결정", "Z축 분리 하중 최소화"], ["후처리", "미반응 수지를 경화시켜 최종 물성을 확보", "세척·건조·후경화 조건"]]}, {"type": "table", "rows": [["핵심 원칙 출력물은 가장 약한 방향과 가장 얇은 구간에서 파손된다. 재료 선택보다 먼저 하중 경로와 파손 가능 위치를 확인하고, 각 요소를 함께 조정한다."]]}, {"type": "heading", "level": 2, "text": "1. 출력물 강도를 결정하는 요소", "id": "section-2"}, {"type": "paragraph", "text": "실사용 부품은 인장, 압축, 굽힘, 비틀림, 충격과 같은 하중을 받는다. 따라서 강도를 높이기 전에는 부품이 어떤 방향으로 힘을 받고 어느 구간에서 응력이 집중되는지 먼저 확인해야 한다. 얇은 연결부, 급격한 단면 변화, 날카로운 모서리와 체결부 주변은 우선 검토 대상이다."}, {"type": "paragraph", "text": "하중이 반복되는 방향과 최대 하중이 발생하는 위치를 표시한다."}, {"type": "paragraph", "text": "파손 시 기능과 안전에 미치는 영향을 기준으로 중요 부위를 구분한다."}, {"type": "paragraph", "text": "벽 두께와 내부 채움이 하중 경로를 연속적으로 연결하는지 확인한다."}, {"type": "paragraph", "text": "층간 결합 방향이 주요 인장 하중과 직각이 되지 않도록 배치한다."}, {"type": "paragraph", "text": "세척과 후경화 후 치수 및 물성 변화까지 포함해 시험 출력으로 검증한다."}, {"type": "table", "rows": [["파손 형태", "주요 원인", "설계·공정 대응"], ["층간 분리", "Z축 방향 인장 하중과 불충분한 경화", "배치 방향 변경, 노광 및 후경화 검토"], ["얇은 부위 균열", "벽 두께 부족과 응력 집중", "두께 증가, 필렛 및 보강 구조 적용"], ["충격 파손", "취성 재료와 낮은 연신율", "고강도·고인성 재료 검토"], ["장기 변형", "하중 지속, 열과 환경 조건", "단면 보강 및 사용 환경 검증"]]}, {"type": "heading", "level": 2, "text": "2. 내부 채움 밀도", "id": "section-3"}, {"type": "paragraph", "text": "속이 빈 출력물은 외피만으로 하중을 견디기 어려운 경우 내부 채움 구조를 추가할 수 있다. CHITUBOX의 Hollow 기능에서 Grid 3D 방식을 선택하면 내부 채움 밀도를 0%부터 100%까지 설정할 수 있다. 밀도를 높이면 내부 지지 경로가 많아져 강성은 증가하지만 레진 사용량, 무게, 세척 난이도와 후경화 시간이 함께 증가한다."}, {"type": "image", "path": "assets/manuals/12_출력물 강도 향상 방법/15-infill-density.jpg", "alt": "출력물 강도 향상 방법 시각 자료", "fileName": "15-infill-density.jpg"}, {"type": "image", "path": "assets/manuals/12_출력물 강도 향상 방법/35-infill-density.jpg", "alt": "출력물 강도 향상 방법 시각 자료", "fileName": "35-infill-density.jpg"}, {"type": "paragraph", "text": "그림 2. 내부 채움 밀도 35% 예시"}, {"type": "paragraph", "text": "15%와 35% 예시를 비교하면 높은 밀도에서 내부 연결부가 더 촘촘하게 형성된다. 그러나 모든 부품에 높은 밀도가 필요한 것은 아니다. 하중이 외피를 따라 전달되는 단순 형상은 낮은 밀도에서도 충분할 수 있으며, 국부 하중이 큰 부품은 전체 밀도를 높이기보다 필요한 구간을 별도로 보강하는 편이 효율적이다."}, {"type": "table", "rows": [["주의 내부 채움 구조가 배출구를 막거나 세척액의 흐름을 방해하면 미경화 레진이 남을 수 있다. 채움 밀도와 함께 통기구, 배출구 및 후경화 경로를 반드시 확인한다."]]}, {"type": "heading", "level": 2, "text": "3. 벽 두께", "id": "section-4"}, {"type": "paragraph", "text": "벽 두께가 지나치게 얇으면 출력 중 변형되거나 후처리와 사용 과정에서 균열이 발생하기 쉽다. 레진 출력물의 최소 벽 두께는 전체 크기, 형상, 재료와 사용 하중에 따라 달라지며, 일반적인 검토 시작값으로 약 2 mm를 사용할 수 있다. 대형 부품이나 반복 하중을 받는 부품은 더 큰 두께 또는 국부 보강이 필요하다."}, {"type": "table", "rows": [["검토 부위", "위험 요인", "권장 검토 방향"], ["넓은 평면", "휘어짐과 장기 변형", "리브 추가 또는 곡면화"], ["길고 얇은 돌출부", "굽힘과 충격 파손", "단면 확대 또는 길이 축소"], ["체결부·구멍", "응력 집중과 균열 시작", "주변 두께 확대와 필렛 적용"], ["두께 전환부", "급격한 강성 변화", "완만한 전이 형상 적용"]]}, {"type": "table", "rows": [["실무 확인 벽 두께는 한 지점의 수치만 확인하지 않는다. 슬라이싱 단면을 이동하면서 가장 얇은 구간과 연결부가 연속적으로 유지되는지 확인한다."]]}, {"type": "heading", "level": 2, "text": "4. 레진 재료의 물성", "id": "section-5"}, {"type": "paragraph", "text": "광경화성 레진은 배합과 제조 방식에 따라 강도, 강성, 연신율과 충격 저항이 달라진다. 높은 인장 강도만 가진 재료는 단단하지만 충격에서 취성 파손이 발생할 수 있으므로, 실제 용도에 맞춰 강도와 연신율의 균형을 확인해야 한다."}, {"type": "paragraph", "text": "일부 고강도 레진은 ABS와 유사한 수준의 기계적 성능을 목표로 설계되며 자동차, 산업용 부품과 소비재 시제품에 활용된다. 다만 제품명만으로 판단하지 말고 제조사가 제공하는 인장 강도, 굽힘 강도, 탄성률, 연신율, 충격 강도와 권장 후경화 조건을 함께 비교한다."}, {"type": "image", "path": "assets/manuals/12_출력물 강도 향상 방법/high-strength-resin.gif", "alt": "출력물 강도 향상 방법 시각 자료", "fileName": "high-strength-resin.gif"}, {"type": "paragraph", "text": "그림 3. 고강도 레진 출력물의 충격 저항 예시 (움직이는 이미지)"}, {"type": "table", "rows": [["물성 항목", "의미", "선택 시 확인사항"], ["인장 강도", "잡아당기는 힘에 견디는 최대 응력", "주요 하중 방향의 파손 위험"], ["연신율", "파손 전까지 늘어날 수 있는 정도", "충격과 변형이 필요한 부품"], ["탄성률", "변형에 저항하는 강성", "정밀 형상과 처짐 제한"], ["충격 강도", "순간적인 충격 에너지를 견디는 능력", "낙하·충돌 가능성"]]}, {"type": "table", "rows": [["재료 선택 단단한 재료가 항상 더 튼튼한 것은 아니다. 충격이나 체결 변형이 있는 부품은 충분한 연신율과 인성을 가진 재료가 유리하다."]]}, {"type": "heading", "level": 2, "text": "5. 모델 배치 방향", "id": "section-6"}, {"type": "paragraph", "text": "레진 적층 출력물은 일반적으로 빌드 플랫폼과 평행한 XY 방향에서 강하고, 층이 쌓이는 Z 방향의 층간 분리에는 상대적으로 취약하다. 하중이 층을 수직으로 벌리는 방향으로 작용하면 작은 결함도 균열의 시작점이 될 수 있다."}, {"type": "paragraph", "text": "나뭇결이 겹쳐진 구조를 떠올리면 이해하기 쉽다. 결을 따라 미는 힘은 넓게 분산되지만 겹을 서로 떼어내는 힘은 층 사이를 분리한다. 따라서 주요 인장 하중이 가능한 한 층과 평행하게 작용하도록 모델을 회전하고, 체결부와 얇은 연결부가 Z축으로 길게 형성되지 않도록 배치한다."}, {"type": "image", "path": "assets/manuals/12_출력물 강도 향상 방법/different-tension-loads.png", "alt": "출력물 강도 향상 방법 시각 자료", "fileName": "different-tension-loads.png"}, {"type": "paragraph", "text": "그림 4. 층 방향에 따른 인장 하중과 출력물 강도의 차이"}, {"type": "table", "rows": [["배치 검토", "유리한 방향", "피해야 할 방향"], ["인장 하중", "하중이 적층면과 평행", "하중이 층을 수직으로 분리"], ["얇은 연결부", "길이 방향이 XY 평면에 가깝게 배치", "연결부 길이가 Z축과 일치"], ["체결 구멍", "구멍 주변 하중이 여러 층에 분산", "층 경계에 벌어지는 힘이 집중"], ["충격 부위", "충격이 넓은 적층면으로 전달", "층 모서리에 충격이 집중"]]}, {"type": "table", "rows": [["배치 기준 서포트 수를 줄이는 방향보다 실사용 하중에 유리한 방향을 우선한다. 표면 품질과 서포트 제거성은 강도 조건을 충족하는 범위 안에서 조정한다."]]}, {"type": "heading", "level": 2, "text": "6. 세척 및 후경화", "id": "section-7"}, {"type": "paragraph", "text": "출력 직후 부품은 형상이 만들어졌더라도 표면에 미경화 레진이 남아 있고 내부 반응이 완전히 끝나지 않아 끈적이거나 상대적으로 부드러울 수 있다. 세척, 완전 건조와 후경화를 통해 남은 반응을 진행해야 최종 강도와 안정성을 확보할 수 있다."}, {"type": "paragraph", "text": "부품 표면과 내부 배출 경로의 액상 레진을 충분히 세척한다."}, {"type": "paragraph", "text": "세척액이 남지 않도록 통풍이 되는 환경에서 완전히 건조한다."}, {"type": "paragraph", "text": "레진 제조사가 제시한 파장, 시간과 온도 조건으로 후경화한다."}, {"type": "paragraph", "text": "두꺼운 부품과 복잡한 형상은 여러 방향에서 균일하게 광원을 조사한다."}, {"type": "paragraph", "text": "후경화 후 표면 경도, 치수, 균열과 변형 여부를 확인한다."}, {"type": "paragraph", "text": "적절한 후경화는 탄성률, 강도와 치수 안정성을 높이고 표면을 단단하고 건조하게 만들어 연마와 도장 작업도 수월하게 한다. 반대로 과도한 후경화는 일부 재료의 취성을 높일 수 있으므로 임의로 시간을 늘리기보다 제조사 조건을 기준으로 시험한다."}, {"type": "table", "rows": [["안전 세척과 후경화 전에는 보호장갑과 보안경을 착용하고, 액상 레진과 오염된 세척액은 해당 물질의 안전자료와 사내 폐기 절차에 따라 취급한다."]]}, {"type": "heading", "level": 2, "text": "7. 최종 점검 체크리스트", "id": "section-8"}, {"type": "paragraph", "text": "실사용 중 발생하는 인장·굽힘·충격 하중의 방향을 확인했는가?"}, {"type": "paragraph", "text": "가장 얇은 벽과 연결부가 필요한 하중을 견딜 수 있는가?"}, {"type": "paragraph", "text": "내부 채움 구조가 하중 경로를 연결하면서 세척과 배출을 방해하지 않는가?"}, {"type": "paragraph", "text": "강도뿐 아니라 연신율과 충격 저항이 용도에 적합한 레진을 선택했는가?"}, {"type": "paragraph", "text": "주요 인장 하중이 층을 수직으로 벌리지 않도록 모델을 배치했는가?"}, {"type": "paragraph", "text": "서포트 제거 과정에서 기능 부위가 약해지지 않는가?"}, {"type": "paragraph", "text": "세척 후 액상 레진과 세척액이 내부에 남지 않았는가?"}, {"type": "paragraph", "text": "권장 조건으로 후경화한 뒤 표면과 내부가 균일하게 경화되었는가?"}, {"type": "paragraph", "text": "시험 출력물로 치수, 강도와 파손 위치를 검증했는가?"}, {"type": "paragraph", "text": "출력 조건과 후경화 조건을 작업 기록에 남겼는가?"}, {"type": "heading", "level": 2, "text": "8. 핵심 요약", "id": "section-9"}, {"type": "table", "rows": [["구분", "핵심 내용"], ["내부 채움", "필요한 하중 경로만 형성하고 무게·세척성과 균형을 맞춘다."], ["벽 두께", "약한 연결부와 응력 집중 부위를 중심으로 두께와 형상을 보강한다."], ["재료 물성", "강도, 연신율, 강성과 충격 저항을 실제 용도에 맞춰 선택한다."], ["배치 방향", "주요 인장 하중이 층간 결합을 벌리지 않도록 모델을 배치한다."], ["후처리", "완전한 세척·건조·후경화로 재료의 최종 물성을 확보한다."], ["검증", "시험 출력과 파손 관찰 결과를 다음 설계와 설정에 반영한다."]]}, {"type": "table", "rows": [["최우선 기준 재료를 많이 사용하는 것이 목표가 아니라, 필요한 위치와 방향에서 충분한 강도를 확보하면서 출력 성공률과 후처리성을 유지하는 것이 목표다."]]}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "15-infill-density.jpg", "path": "assets/manuals/12_출력물 강도 향상 방법/15-infill-density.jpg", "kind": "image", "alt": "출력물 강도 향상 방법 시각 자료 12-1"}, {"fileName": "35-infill-density.jpg", "path": "assets/manuals/12_출력물 강도 향상 방법/35-infill-density.jpg", "kind": "image", "alt": "출력물 강도 향상 방법 시각 자료 12-2"}, {"fileName": "different-tension-loads.png", "path": "assets/manuals/12_출력물 강도 향상 방법/different-tension-loads.png", "kind": "image", "alt": "출력물 강도 향상 방법 시각 자료 12-3"}, {"fileName": "high-strength-resin.gif", "path": "assets/manuals/12_출력물 강도 향상 방법/high-strength-resin.gif", "kind": "gif", "alt": "출력물 강도 향상 방법 시각 자료 12-4"}], "searchText": "0. 개요 레진 3D 프린팅 출력물의 강도는 재료만으로 결정되지 않는다. 내부 구조, 벽 두께, 하중을 받는 방향, 세척과 후경화 조건이 함께 작용한다. 동일한 레진과 동일한 출력 설정을 사용해도 설계와 배치가 다르면 파손 위치와 사용 수명이 크게 달라질 수 있다. 강도 향상의 목표는 단순히 출력물을 두껍고 무겁게 만드는 것이 아니다. 실제 사용 중 발생하는 하중을 예측하고 필요한 위치에 재료를 배치하며, 층간 결합이 약한 방향을 피하고, 재료가 의도한 물성을 발휘하도록 후처리를 완료하는 것이 핵심이다. 관리 요소 강도에 미치는 영향 주요 확인사항 내부 채움 속이 빈 출력물 내부의 지지 경로를 형성 밀도 증가에 따른 무게와 세척성 벽 두께 외피 강성과 충격 저항을 결정 전체 크기와 하중 집중 위치 레진 물성 인장·굽힘·충격 특성의 기본 범위를 결정 강도와 연신율의 균형 배치 방향 층간 결합 방향과 하중 방향을 결정 Z축 분리 하중 최소화 후처리 미반응 수지를 경화시켜 최종 물성을 확보 세척·건조·후경화 조건 핵심 원칙 출력물은 가장 약한 방향과 가장 얇은 구간에서 파손된다. 재료 선택보다 먼저 하중 경로와 파손 가능 위치를 확인하고, 각 요소를 함께 조정한다. 1. 출력물 강도를 결정하는 요소 실사용 부품은 인장, 압축, 굽힘, 비틀림, 충격과 같은 하중을 받는다. 따라서 강도를 높이기 전에는 부품이 어떤 방향으로 힘을 받고 어느 구간에서 응력이 집중되는지 먼저 확인해야 한다. 얇은 연결부, 급격한 단면 변화, 날카로운 모서리와 체결부 주변은 우선 검토 대상이다. 하중이 반복되는 방향과 최대 하중이 발생하는 위치를 표시한다. 파손 시 기능과 안전에 미치는 영향을 기준으로 중요 부위를 구분한다. 벽 두께와 내부 채움이 하중 경로를 연속적으로 연결하는지 확인한다. 층간 결합 방향이 주요 인장 하중과 직각이 되지 않도록 배치한다. 세척과 후경화 후 치수 및 물성 변화까지 포함해 시험 출력으로 검증한다. 파손 형태 주요 원인 설계·공정 대응 층간 분리 Z축 방향 인장 하중과 불충분한 경화 배치 방향 변경, 노광 및 후경화 검토 얇은 부위 균열 벽 두께 부족과 응력 집중 두께 증가, 필렛 및 보강 구조 적용 충격 파손 취성 재료와 낮은 연신율 고강도·고인성 재료 검토 장기 변형 하중 지속, 열과 환경 조건 단면 보강 및 사용 환경 검증 2. 내부 채움 밀도 속이 빈 출력물은 외피만으로 하중을 견디기 어려운 경우 내부 채움 구조를 추가할 수 있다. CHITUBOX의 Hollow 기능에서 Grid 3D 방식을 선택하면 내부 채움 밀도를 0%부터 100%까지 설정할 수 있다. 밀도를 높이면 내부 지지 경로가 많아져 강성은 증가하지만 레진 사용량, 무게, 세척 난이도와 후경화 시간이 함께 증가한다. 그림 2. 내부 채움 밀도 35% 예시 15%와 35% 예시를 비교하면 높은 밀도에서 내부 연결부가 더 촘촘하게 형성된다. 그러나 모든 부품에 높은 밀도가 필요한 것은 아니다. 하중이 외피를 따라 전달되는 단순 형상은 낮은 밀도에서도 충분할 수 있으며, 국부 하중이 큰 부품은 전체 밀도를 높이기보다 필요한 구간을 별도로 보강하는 편이 효율적이다. 주의 내부 채움 구조가 배출구를 막거나 세척액의 흐름을 방해하면 미경화 레진이 남을 수 있다. 채움 밀도와 함께 통기구, 배출구 및 후경화 경로를 반드시 확인한다. 3. 벽 두께 벽 두께가 지나치게 얇으면 출력 중 변형되거나 후처리와 사용 과정에서 균열이 발생하기 쉽다. 레진 출력물의 최소 벽 두께는 전체 크기, 형상, 재료와 사용 하중에 따라 달라지며, 일반적인 검토 시작값으로 약 2 mm를 사용할 수 있다. 대형 부품이나 반복 하중을 받는 부품은 더 큰 두께 또는 국부 보강이 필요하다. 검토 부위 위험 요인 권장 검토 방향 넓은 평면 휘어짐과 장기 변형 리브 추가 또는 곡면화 길고 얇은 돌출부 굽힘과 충격 파손 단면 확대 또는 길이 축소 체결부·구멍 응력 집중과 균열 시작 주변 두께 확대와 필렛 적용 두께 전환부 급격한 강성 변화 완만한 전이 형상 적용 실무 확인 벽 두께는 한 지점의 수치만 확인하지 않는다. 슬라이싱 단면을 이동하면서 가장 얇은 구간과 연결부가 연속적으로 유지되는지 확인한다. 4. 레진 재료의 물성 광경화성 레진은 배합과 제조 방식에 따라 강도, 강성, 연신율과 충격 저항이 달라진다. 높은 인장 강도만 가진 재료는 단단하지만 충격에서 취성 파손이 발생할 수 있으므로, 실제 용도에 맞춰 강도와 연신율의 균형을 확인해야 한다. 일부 고강도 레진은 ABS와 유사한 수준의 기계적 성능을 목표로 설계되며 자동차, 산업용 부품과 소비재 시제품에 활용된다. 다만 제품명만으로 판단하지 말고 제조사가 제공하는 인장 강도, 굽힘 강도, 탄성률, 연신율, 충격 강도와 권장 후경화 조건을 함께 비교한다. 그림 3. 고강도 레진 출력물의 충격 저항 예시 (움직이는 이미지) 물성 항목 의미 선택 시 확인사항 인장 강도 잡아당기는 힘에 견디는 최대 응력 주요 하중 방향의 파손 위험 연신율 파손 전까지 늘어날 수 있는 정도 충격과 변형이 필요한 부품 탄성률 변형에 저항하는 강성 정밀 형상과 처짐 제한 충격 강도 순간적인 충격 에너지를 견디는 능력 낙하·충돌 가능성 재료 선택 단단한 재료가 항상 더 튼튼한 것은 아니다. 충격이나 체결 변형이 있는 부품은 충분한 연신율과 인성을 가진 재료가 유리하다. 5. 모델 배치 방향 레진 적층 출력물은 일반적으로 빌드 플랫폼과 평행한 XY 방향에서 강하고, 층이 쌓이는 Z 방향의 층간 분리에는 상대적으로 취약하다. 하중이 층을 수직으로 벌리는 방향으로 작용하면 작은 결함도 균열의 시작점이 될 수 있다. 나뭇결이 겹쳐진 구조를 떠올리면 이해하기 쉽다. 결을 따라 미는 힘은 넓게 분산되지만 겹을 서로 떼어내는 힘은 층 사이를 분리한다. 따라서 주요 인장 하중이 가능한 한 층과 평행하게 작용하도록 모델을 회전하고, 체결부와 얇은 연결부가 Z축으로 길게 형성되지 않도록 배치한다. 그림 4. 층 방향에 따른 인장 하중과 출력물 강도의 차이 배치 검토 유리한 방향 피해야 할 방향 인장 하중 하중이 적층면과 평행 하중이 층을 수직으로 분리 얇은 연결부 길이 방향이 XY 평면에 가깝게 배치 연결부 길이가 Z축과 일치 체결 구멍 구멍 주변 하중이 여러 층에 분산 층 경계에 벌어지는 힘이 집중 충격 부위 충격이 넓은 적층면으로 전달 층 모서리에 충격이 집중 배치 기준 서포트 수를 줄이는 방향보다 실사용 하중에 유리한 방향을 우선한다. 표면 품질과 서포트 제거성은 강도 조건을 충족하는 범위 안에서 조정한다. 6. 세척 및 후경화 출력 직후 부품은 형상이 만들어졌더라도 표면에 미경화 레진이 남아 있고 내부 반응이 완전히 끝나지 않아 끈적이거나 상대적으로 부드러울 수 있다. 세척, 완전 건조와 후경화를 통해 남은 반응을 진행해야 최종 강도와 안정성을 확보할 수 있다. 부품 표면과 내부 배출 경로의 액상 레진을 충분히 세척한다. 세척액이 남지 않도록 통풍이 되는 환경에서 완전히 건조한다. 레진 제조사가 제시한 파장, 시간과 온도 조건으로 후경화한다. 두꺼운 부품과 복잡한 형상은 여러 방향에서 균일하게 광원을 조사한다. 후경화 후 표면 경도, 치수, 균열과 변형 여부를 확인한다. 적절한 후경화는 탄성률, 강도와 치수 안정성을 높이고 표면을 단단하고 건조하게 만들어 연마와 도장 작업도 수월하게 한다. 반대로 과도한 후경화는 일부 재료의 취성을 높일 수 있으므로 임의로 시간을 늘리기보다 제조사 조건을 기준으로 시험한다. 안전 세척과 후경화 전에는 보호장갑과 보안경을 착용하고, 액상 레진과 오염된 세척액은 해당 물질의 안전자료와 사내 폐기 절차에 따라 취급한다. 7. 최종 점검 체크리스트 실사용 중 발생하는 인장·굽힘·충격 하중의 방향을 확인했는가? 가장 얇은 벽과 연결부가 필요한 하중을 견딜 수 있는가? 내부 채움 구조가 하중 경로를 연결하면서 세척과 배출을 방해하지 않는가? 강도뿐 아니라 연신율과 충격 저항이 용도에 적합한 레진을 선택했는가? 주요 인장 하중이 층을 수직으로 벌리지 않도록 모델을 배치했는가? 서포트 제거 과정에서 기능 부위가 약해지지 않는가? 세척 후 액상 레진과 세척액이 내부에 남지 않았는가? 권장 조건으로 후경화한 뒤 표면과 내부가 균일하게 경화되었는가? 시험 출력물로 치수, 강도와 파손 위치를 검증했는가? 출력 조건과 후경화 조건을 작업 기록에 남겼는가? 8. 핵심 요약 구분 핵심 내용 내부 채움 필요한 하중 경로만 형성하고 무게·세척성과 균형을 맞춘다. 벽 두께 약한 연결부와 응력 집중 부위를 중심으로 두께와 형상을 보강한다. 재료 물성 강도, 연신율, 강성과 충격 저항을 실제 용도에 맞춰 선택한다. 배치 방향 주요 인장 하중이 층간 결합을 벌리지 않도록 모델을 배치한다. 후처리 완전한 세척·건조·후경화로 재료의 최종 물성을 확보한다. 검증 시험 출력과 파손 관찰 결과를 다음 설계와 설정에 반영한다. 최우선 기준 재료를 많이 사용하는 것이 목표가 아니라, 필요한 위치와 방향에서 충분한 강도를 확보하면서 출력 성공률과 후처리성을 유지하는 것이 목표다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 5}, "13": {"manualId": 13, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "SLA/DLP/LCD 방식의 출력 품질은 슬라이서 설정, 장비 내부 파라미터, 레진 특성, 모델 배치가 함께 결정한다. 표면의 계단 현상, 세부 형상 표현, 바닥층 부착력, 박리 안정성은 서로 연결되어 있으므로 한 가지 설정만 독립적으로 판단하기 어렵다."}, {"type": "paragraph", "text": "캐리마텍 장비 운용에서는 CHITUBOX에서 레이어 두께와 안티앨리어싱을 관리하고, 노광 시간과 조형판 속도는 장비 내부 오픈 파라미터에서 관리한다. 본 문서는 출력 품질 개선에 직접 연결되는 항목만 선별하여 설명한다."}, {"type": "table", "rows": [["항목", "설정 위치", "품질 영향"], ["레이어 두께", "CHITUBOX", "Z축 표면 계단, 세부 표현, 출력 시간"], ["기본 노광 시간", "장비 내부 오픈 파라미터", "일반층 경화도, 치수 안정성, 세부 형상"], ["초기 노광 시간·초기 노광 층", "장비 내부 오픈 파라미터", "조형판 부착력, 바닥층 안정성"], ["기본·초기 조형판 속도", "장비 내부 오픈 파라미터", "박리 부하, 서포트 손상, 출력 시간"], ["모델 배치 방향", "CHITUBOX 모델 배치", "단면 변화, 표면 라인, 서포트 흔적 위치"], ["안티앨리어싱", "CHITUBOX", "곡선·경사 경계의 픽셀 계단 완화"]]}, {"type": "table", "rows": [["설정 변경 원칙 품질 개선을 위해 여러 값을 동시에 바꾸면 원인 판단이 어려워진다. 레진, 레이어 두께, 노광, 속도 중 한 항목씩 변경하고 결과를 사진과 조건표로 함께 기록한다."]]}, {"type": "heading", "level": 2, "text": "1. 출력 품질 설정 위치", "id": "section-2"}, {"type": "paragraph", "text": "CHITUBOX에서는 모델을 슬라이싱하기 전에 레이어 두께, 모델 배치 방향, 안티앨리어싱을 확인한다. 이 항목들은 슬라이스 이미지와 적층 구조 자체에 영향을 주기 때문에 출력 전 단계에서 결정해야 한다."}, {"type": "paragraph", "text": "장비 내부 오픈 파라미터에서는 레진별 노광 시간과 조형판 이동 속도를 관리한다. 같은 슬라이스 파일이라도 레진 종류, 온도, 장비 상태에 따라 필요한 노광과 박리 조건이 달라질 수 있다."}, {"type": "image", "path": "assets/manuals/13_출력 품질 향상 설정/equipment-key-quality-parameters.png", "alt": "출력 품질 향상 설정 시각 자료", "fileName": "equipment-key-quality-parameters.png"}, {"type": "paragraph", "text": "그림 1. 장비 내부 오픈 파라미터에서 관리하는 출력 품질 관련 주요 항목"}, {"type": "table", "rows": [["품질 항목", "운용 기준", "확인 포인트"], ["레이어 두께", "CHITUBOX에서 설정", "표면 품질과 출력 시간의 균형을 결정한다."], ["노광 시간", "장비 내부 오픈 파라미터에서 설정", "과소·과다 경화 징후를 시험편으로 확인한다."], ["조형판 속도", "장비 내부 오픈 파라미터에서 설정", "박리 충격과 출력 시간을 함께 본다."], ["모델 배치", "CHITUBOX에서 방향과 서포트를 조정", "큰 단면이 갑자기 생기는 배치를 피한다."], ["안티앨리어싱", "CHITUBOX에서 설정", "곡면은 부드럽게, 날카로운 모서리는 무뎌지지 않게 조정한다."]]}, {"type": "heading", "level": 2, "text": "2. 레이어 두께", "id": "section-3"}, {"type": "paragraph", "text": "레이어 두께는 한 층이 Z축 방향으로 가지는 높이이다. 같은 높이의 모델이라도 레이어가 얇아지면 더 많은 층을 쌓아야 하므로 출력 시간은 길어지고, 각 층의 높이 차가 줄어 표면은 더 부드럽게 표현된다."}, {"type": "paragraph", "text": "일반적인 SLA/DLP/LCD 출력에서는 25µm(0.025mm)부터 100µm(0.1mm) 범위를 많이 사용한다. 별도 기준이 없을 때에는 50µm(0.05mm)를 기준점으로 삼고, 목표 품질과 출력 시간에 맞춰 조정한다."}, {"type": "image", "path": "assets/manuals/13_출력 품질 향상 설정/hemisphere-with-different-layer-heights.png", "alt": "출력 품질 향상 설정 시각 자료", "fileName": "hemisphere-with-different-layer-heights.png"}, {"type": "paragraph", "text": "그림 2. 레이어 두께 변화에 따른 곡면 표면 차이"}, {"type": "image", "path": "assets/manuals/13_출력 품질 향상 설정/layer-height-crop.png", "alt": "출력 품질 향상 설정 시각 자료", "fileName": "layer-height-crop.png"}, {"type": "paragraph", "text": "그림 3. CHITUBOX의 레이어 두께 설정 위치"}, {"type": "table", "rows": [["조건", "장점", "주의점"], ["얇은 레이어", "곡면과 경사면이 부드럽고 Z축 세부 표현에 유리하다.", "레이어 수가 늘어 출력 시간이 길어지고 조건 검증이 필요하다."], ["기준 레이어", "품질과 속도의 균형을 잡기 쉽다.", "레진과 모델 형상별 기준 조건을 기록해 두어야 한다."], ["두꺼운 레이어", "출력 시간이 줄어들 수 있다.", "계단 현상이 커지고, 노광 부족 시 층간 결합이 약해질 수 있다."]]}, {"type": "heading", "level": 2, "text": "3. 기본 노광 시간", "id": "section-4"}, {"type": "paragraph", "text": "기본 노광 시간은 일반층 한 층을 경화시키는 시간이다. 캐리마텍 장비 운용에서는 이 값을 CHITUBOX가 아니라 장비 내부 오픈 파라미터의 레진 파라미터 설정에서 조정한다."}, {"type": "paragraph", "text": "노광이 부족하면 표면이 무르고 세부 형상이 무너지며, 서포트가 충분히 버티지 못해 출력 중 분리될 수 있다. 반대로 노광이 과하면 구멍과 홈이 작아지고 모서리가 둔해지며, 치수와 표면 질감이 목표보다 뭉개질 수 있다."}, {"type": "image", "path": "assets/manuals/13_출력 품질 향상 설정/equipment-exposure-times-crop.png", "alt": "출력 품질 향상 설정 시각 자료", "fileName": "equipment-exposure-times-crop.png"}, {"type": "paragraph", "text": "그림 4. 장비 내부 오픈 파라미터의 기본·초기 노광 시간 설정 위치"}, {"type": "table", "rows": [["관찰 결과", "가능 원인", "조정 방향"], ["일반층이 약하고 쉽게 찢어짐", "기본 노광 시간 부족", "동일 레이어 두께에서 기본 노광 시간을 소폭 증가시킨다."], ["구멍·문자·얇은 틈이 작아짐", "기본 노광 시간 과다", "세부 형상 확인 후 기본 노광 시간을 단계적으로 낮춘다."], ["서포트 접촉부가 반복적으로 끊어짐", "경화 부족 또는 박리 부하 과다", "노광 시간과 조형판 속도를 함께 점검한다."]]}, {"type": "table", "rows": [["검증 방법 기본 노광 시간은 레진, 레이어 두께, 온도 조건이 바뀌면 다시 확인한다. 시험편에서는 얇은 벽, 작은 구멍, 문자, 서포트 접촉부가 동시에 안정적으로 형성되는지 확인한다."]]}, {"type": "heading", "level": 2, "text": "4. 초기 노광 시간과 초기 노광 층", "id": "section-5"}, {"type": "paragraph", "text": "초기 노광 시간은 조형판에 가까운 바닥층을 더 강하게 경화시키는 시간이고, 초기 노광 층은 그 조건을 적용할 층 수이다. 이 두 항목은 출력물의 첫 부착 안정성과 직접 연결된다."}, {"type": "paragraph", "text": "초기 노광이 부족하면 출력 초반에 바닥층이 조형판에서 떨어질 수 있다. 반대로 과도하면 바닥부가 두껍게 퍼지고, 출력 후 제거가 어려워지며, 바닥면 치수 오차가 커질 수 있다."}, {"type": "table", "rows": [["항목", "역할", "과도할 때 발생 가능한 문제"], ["초기 노광 시간", "바닥층을 충분히 경화시켜 조형판 부착력을 확보한다.", "바닥부 퍼짐, 제거 난이도 증가, 표면 과경화"], ["초기 노광 층", "초기 노광 조건을 적용할 층 수를 결정한다.", "불필요하게 두꺼운 바닥 영역, 후처리 부담 증가"]]}, {"type": "paragraph", "text": "바닥층이 조형판에 붙지 않으면 초기 노광 시간과 조형판 상태를 먼저 확인한다."}, {"type": "paragraph", "text": "바닥부가 지나치게 퍼지면 초기 노광 시간과 초기 노광 층을 과하게 설정하지 않았는지 확인한다."}, {"type": "paragraph", "text": "바닥층 조건은 레진 점도와 조형판 표면 상태의 영향을 받으므로 레진 변경 시 별도 기록을 남긴다."}, {"type": "heading", "level": 2, "text": "5. 기본·초기 조형판 속도", "id": "section-6"}, {"type": "paragraph", "text": "조형판 속도는 한 층을 경화한 뒤 출력물을 필름에서 분리하는 과정의 충격을 좌우한다. 기본 조형판 속도는 일반층에, 초기 조형판 속도는 바닥층 구간에 적용되는 속도 항목으로 관리한다."}, {"type": "paragraph", "text": "속도가 너무 빠르면 필름과 출력물 사이의 박리 부하가 커져 서포트가 끊어지거나 모델 표면에 라인이 생길 수 있다. 속도가 너무 느리면 안정성은 좋아질 수 있으나 전체 출력 시간이 길어진다."}, {"type": "table", "rows": [["상황", "점검 항목", "판단 기준"], ["큰 단면 또는 넓은 바닥면 출력", "기본·초기 조형판 속도", "박리 충격을 낮추는 방향으로 검토한다."], ["서포트 파손 또는 모델 분리", "속도, 노광, 서포트 강도", "노광 부족인지, 박리 부하 과다인지 함께 확인한다."], ["출력 시간이 과도하게 길어짐", "속도와 레이어 수", "품질 저하 없이 안정적으로 올릴 수 있는 범위를 찾는다."]]}, {"type": "table", "rows": [["단위 확인 CHITUBOX 자료에서 흔히 쓰는 리프트 속도 단위와 장비 화면의 조형판 속도 단위가 다를 수 있다. 캐리마텍 장비 화면에서는 mm/s 단위 표시를 기준으로 확인한다."]]}, {"type": "heading", "level": 2, "text": "6. 모델 배치 방향", "id": "section-7"}, {"type": "paragraph", "text": "모델 방향은 슬라이스 단면이 어떻게 증가하고 감소하는지를 결정한다. 작은 단면에서 큰 단면으로 갑자기 바뀌면 층별 경화 수축과 박리 부하가 급격히 변해 표면 라인, 변형, 서포트 부담이 커질 수 있다."}, {"type": "paragraph", "text": "품질이 중요한 면은 서포트 흔적과 층 경계가 덜 보이는 방향으로 배치하고, 넓은 평면이 필름과 평행하게 크게 형성되는 상황은 가능한 줄인다. 모델 방향을 바꾸면 서포트 위치와 노광 안정성도 함께 다시 확인해야 한다."}, {"type": "image", "path": "assets/manuals/13_출력 품질 향상 설정/different-orientations.png", "alt": "출력 품질 향상 설정 시각 자료", "fileName": "different-orientations.png"}, {"type": "paragraph", "text": "그림 5. 모델 배치 방향에 따른 출력 품질 차이"}, {"type": "table", "rows": [["배치 관점", "권장 판단", "이유"], ["큰 단면 변화", "급격한 면적 증가를 줄인다.", "수축과 박리 부하 변화가 표면 라인으로 나타날 수 있다."], ["중요 외관면", "서포트 접촉과 층 경계가 덜 보이는 방향을 선택한다.", "후처리 부담과 외관 결함을 줄인다."], ["서포트 안정성", "배치 변경 후 서포트 위치를 다시 점검한다.", "방향이 바뀌면 하중과 배수 방향도 달라진다."]]}, {"type": "heading", "level": 2, "text": "7. 안티앨리어싱", "id": "section-8"}, {"type": "paragraph", "text": "안티앨리어싱은 슬라이스 이미지의 곡선이나 경사 경계에서 픽셀 계단이 도드라지는 현상을 완화하는 기능이다. LCD 계열 출력은 픽셀 기반으로 레이어 이미지를 만들기 때문에, 대각선 모서리와 곡면 경계에서 계단 현상이 보일 수 있다."}, {"type": "paragraph", "text": "적절한 안티앨리어싱은 표면을 부드럽게 만들지만, 지나치게 강하면 작은 문자, 얇은 모서리, 날카로운 형상이 둔해질 수 있다. 외관 품질이 중요한 곡면 모델과 정밀 모서리가 중요한 기능성 모델은 서로 다른 기준으로 확인한다."}, {"type": "image", "path": "assets/manuals/13_출력 품질 향상 설정/disableenable-antialiasing.png", "alt": "출력 품질 향상 설정 시각 자료", "fileName": "disableenable-antialiasing.png"}, {"type": "paragraph", "text": "그림 6. 안티앨리어싱 적용 전후의 경계 표현 차이"}, {"type": "table", "rows": [["설정 경향", "효과", "주의점"], ["낮은 적용", "날카로운 경계와 미세 형상 보존에 유리하다.", "곡면과 대각선에서 픽셀 계단이 보일 수 있다."], ["적정 적용", "곡면 표면과 경계가 부드러워진다.", "시험편으로 세부 형상 손실 여부를 확인한다."], ["과도한 적용", "표면은 부드러워 보일 수 있다.", "문자, 홈, 모서리의 선명도가 떨어질 수 있다."]]}, {"type": "heading", "level": 2, "text": "8. 설정 조정 체크리스트", "id": "section-9"}, {"type": "paragraph", "text": "출력 품질이 기대보다 낮을 때에는 결과 증상에 따라 관련 설정을 좁혀 확인한다."}, {"type": "table", "rows": [["증상", "우선 확인 항목", "조정 방향"], ["곡면의 층 경계가 뚜렷함", "레이어 두께, 안티앨리어싱", "레이어를 얇게 하거나 안티앨리어싱을 적정 적용한다."], ["세부 형상이 뭉개짐", "기본 노광 시간, 안티앨리어싱", "과노광 또는 과도한 경계 보정을 낮춘다."], ["조형판에서 떨어짐", "초기 노광 시간, 초기 노광 층, 조형판 상태", "초기 부착 조건과 조형판 표면 상태를 확인한다."], ["서포트가 끊어짐", "기본 노광 시간, 조형판 속도, 서포트 강도", "경화 부족과 박리 부하를 함께 점검한다."], ["표면 라인이 반복됨", "모델 배치, 조형판 속도, 단면 변화", "급격한 단면 변화와 박리 충격을 줄인다."]]}, {"type": "paragraph", "text": "레이어 두께를 바꾸면 기본 노광 시간도 다시 검증한다."}, {"type": "paragraph", "text": "노광 시간을 바꿀 때에는 치수 변화와 표면 질감을 동시에 확인한다."}, {"type": "paragraph", "text": "속도 조정은 출력 시간과 안정성 사이의 균형으로 판단한다."}, {"type": "paragraph", "text": "모델 배치 변경 후에는 서포트와 중요 외관면 위치를 다시 확인한다."}, {"type": "paragraph", "text": "최종 조건은 레진명, 레이어 두께, 노광 시간, 초기 노광 조건, 조형판 속도, 안티앨리어싱 값과 함께 기록한다."}, {"type": "heading", "level": 2, "text": "9. 핵심 요약", "id": "section-10"}, {"type": "table", "rows": [["구분", "핵심 내용"], ["레이어 두께", "얇을수록 표면은 부드러워지지만 출력 시간과 조건 민감도가 증가한다."], ["기본 노광 시간", "일반층 경화 품질을 좌우하며 부족하면 약하고, 과하면 세부가 뭉개진다."], ["초기 노광 조건", "조형판 부착 안정성을 확보하되 바닥부 과경화를 피한다."], ["조형판 속도", "박리 충격과 출력 시간을 동시에 결정하므로 모델 단면과 서포트 강도를 함께 본다."], ["모델 배치 방향", "단면 변화와 서포트 흔적을 줄이는 방향으로 배치한다."], ["안티앨리어싱", "곡면 경계는 부드럽게 만들지만, 과도하면 미세 형상이 무뎌질 수 있다."]]}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "_manual14_cover.png", "path": "assets/manuals/13_출력 품질 향상 설정/_manual14_cover.png", "kind": "image", "alt": "출력 품질 향상 설정 시각 자료 13-1"}, {"fileName": "blur-level-2.png", "path": "assets/manuals/13_출력 품질 향상 설정/blur-level-2.png", "kind": "image", "alt": "출력 품질 향상 설정 시각 자료 13-2"}, {"fileName": "blur-level-8.png", "path": "assets/manuals/13_출력 품질 향상 설정/blur-level-8.png", "kind": "image", "alt": "출력 품질 향상 설정 시각 자료 13-3"}, {"fileName": "different-orientations.png", "path": "assets/manuals/13_출력 품질 향상 설정/different-orientations.png", "kind": "image", "alt": "출력 품질 향상 설정 시각 자료 13-4"}, {"fileName": "disableenable-antialiasing.png", "path": "assets/manuals/13_출력 품질 향상 설정/disableenable-antialiasing.png", "kind": "image", "alt": "출력 품질 향상 설정 시각 자료 13-5"}, {"fileName": "equipment-exposure-times-crop.png", "path": "assets/manuals/13_출력 품질 향상 설정/equipment-exposure-times-crop.png", "kind": "image", "alt": "출력 품질 향상 설정 시각 자료 13-6"}, {"fileName": "equipment-key-quality-parameters.png", "path": "assets/manuals/13_출력 품질 향상 설정/equipment-key-quality-parameters.png", "kind": "image", "alt": "출력 품질 향상 설정 시각 자료 13-7"}, {"fileName": "equipment-parameter-exposure-times.png", "path": "assets/manuals/13_출력 품질 향상 설정/equipment-parameter-exposure-times.png", "kind": "image", "alt": "출력 품질 향상 설정 시각 자료 13-8"}, {"fileName": "equipment-parameter-initial-speed-extra.png", "path": "assets/manuals/13_출력 품질 향상 설정/equipment-parameter-initial-speed-extra.png", "kind": "image", "alt": "출력 품질 향상 설정 시각 자료 13-9"}, {"fileName": "equipment-parameter-layers-and-basic-speed.png", "path": "assets/manuals/13_출력 품질 향상 설정/equipment-parameter-layers-and-basic-speed.png", "kind": "image", "alt": "출력 품질 향상 설정 시각 자료 13-10"}, {"fileName": "exposure-time.png", "path": "assets/manuals/13_출력 품질 향상 설정/exposure-time.png", "kind": "image", "alt": "출력 품질 향상 설정 시각 자료 13-11"}, {"fileName": "hemisphere-with-different-layer-heights.png", "path": "assets/manuals/13_출력 품질 향상 설정/hemisphere-with-different-layer-heights.png", "kind": "image", "alt": "출력 품질 향상 설정 시각 자료 13-12"}, {"fileName": "layer-height-crop.png", "path": "assets/manuals/13_출력 품질 향상 설정/layer-height-crop.png", "kind": "image", "alt": "출력 품질 향상 설정 시각 자료 13-13"}, {"fileName": "layer-height.png", "path": "assets/manuals/13_출력 품질 향상 설정/layer-height.png", "kind": "image", "alt": "출력 품질 향상 설정 시각 자료 13-14"}], "searchText": "0. 개요 SLA/DLP/LCD 방식의 출력 품질은 슬라이서 설정, 장비 내부 파라미터, 레진 특성, 모델 배치가 함께 결정한다. 표면의 계단 현상, 세부 형상 표현, 바닥층 부착력, 박리 안정성은 서로 연결되어 있으므로 한 가지 설정만 독립적으로 판단하기 어렵다. 캐리마텍 장비 운용에서는 CHITUBOX에서 레이어 두께와 안티앨리어싱을 관리하고, 노광 시간과 조형판 속도는 장비 내부 오픈 파라미터에서 관리한다. 본 문서는 출력 품질 개선에 직접 연결되는 항목만 선별하여 설명한다. 항목 설정 위치 품질 영향 레이어 두께 CHITUBOX Z축 표면 계단, 세부 표현, 출력 시간 기본 노광 시간 장비 내부 오픈 파라미터 일반층 경화도, 치수 안정성, 세부 형상 초기 노광 시간·초기 노광 층 장비 내부 오픈 파라미터 조형판 부착력, 바닥층 안정성 기본·초기 조형판 속도 장비 내부 오픈 파라미터 박리 부하, 서포트 손상, 출력 시간 모델 배치 방향 CHITUBOX 모델 배치 단면 변화, 표면 라인, 서포트 흔적 위치 안티앨리어싱 CHITUBOX 곡선·경사 경계의 픽셀 계단 완화 설정 변경 원칙 품질 개선을 위해 여러 값을 동시에 바꾸면 원인 판단이 어려워진다. 레진, 레이어 두께, 노광, 속도 중 한 항목씩 변경하고 결과를 사진과 조건표로 함께 기록한다. 1. 출력 품질 설정 위치 CHITUBOX에서는 모델을 슬라이싱하기 전에 레이어 두께, 모델 배치 방향, 안티앨리어싱을 확인한다. 이 항목들은 슬라이스 이미지와 적층 구조 자체에 영향을 주기 때문에 출력 전 단계에서 결정해야 한다. 장비 내부 오픈 파라미터에서는 레진별 노광 시간과 조형판 이동 속도를 관리한다. 같은 슬라이스 파일이라도 레진 종류, 온도, 장비 상태에 따라 필요한 노광과 박리 조건이 달라질 수 있다. 그림 1. 장비 내부 오픈 파라미터에서 관리하는 출력 품질 관련 주요 항목 품질 항목 운용 기준 확인 포인트 레이어 두께 CHITUBOX에서 설정 표면 품질과 출력 시간의 균형을 결정한다. 노광 시간 장비 내부 오픈 파라미터에서 설정 과소·과다 경화 징후를 시험편으로 확인한다. 조형판 속도 장비 내부 오픈 파라미터에서 설정 박리 충격과 출력 시간을 함께 본다. 모델 배치 CHITUBOX에서 방향과 서포트를 조정 큰 단면이 갑자기 생기는 배치를 피한다. 안티앨리어싱 CHITUBOX에서 설정 곡면은 부드럽게, 날카로운 모서리는 무뎌지지 않게 조정한다. 2. 레이어 두께 레이어 두께는 한 층이 Z축 방향으로 가지는 높이이다. 같은 높이의 모델이라도 레이어가 얇아지면 더 많은 층을 쌓아야 하므로 출력 시간은 길어지고, 각 층의 높이 차가 줄어 표면은 더 부드럽게 표현된다. 일반적인 SLA/DLP/LCD 출력에서는 25µm(0.025mm)부터 100µm(0.1mm) 범위를 많이 사용한다. 별도 기준이 없을 때에는 50µm(0.05mm)를 기준점으로 삼고, 목표 품질과 출력 시간에 맞춰 조정한다. 그림 2. 레이어 두께 변화에 따른 곡면 표면 차이 그림 3. CHITUBOX의 레이어 두께 설정 위치 조건 장점 주의점 얇은 레이어 곡면과 경사면이 부드럽고 Z축 세부 표현에 유리하다. 레이어 수가 늘어 출력 시간이 길어지고 조건 검증이 필요하다. 기준 레이어 품질과 속도의 균형을 잡기 쉽다. 레진과 모델 형상별 기준 조건을 기록해 두어야 한다. 두꺼운 레이어 출력 시간이 줄어들 수 있다. 계단 현상이 커지고, 노광 부족 시 층간 결합이 약해질 수 있다. 3. 기본 노광 시간 기본 노광 시간은 일반층 한 층을 경화시키는 시간이다. 캐리마텍 장비 운용에서는 이 값을 CHITUBOX가 아니라 장비 내부 오픈 파라미터의 레진 파라미터 설정에서 조정한다. 노광이 부족하면 표면이 무르고 세부 형상이 무너지며, 서포트가 충분히 버티지 못해 출력 중 분리될 수 있다. 반대로 노광이 과하면 구멍과 홈이 작아지고 모서리가 둔해지며, 치수와 표면 질감이 목표보다 뭉개질 수 있다. 그림 4. 장비 내부 오픈 파라미터의 기본·초기 노광 시간 설정 위치 관찰 결과 가능 원인 조정 방향 일반층이 약하고 쉽게 찢어짐 기본 노광 시간 부족 동일 레이어 두께에서 기본 노광 시간을 소폭 증가시킨다. 구멍·문자·얇은 틈이 작아짐 기본 노광 시간 과다 세부 형상 확인 후 기본 노광 시간을 단계적으로 낮춘다. 서포트 접촉부가 반복적으로 끊어짐 경화 부족 또는 박리 부하 과다 노광 시간과 조형판 속도를 함께 점검한다. 검증 방법 기본 노광 시간은 레진, 레이어 두께, 온도 조건이 바뀌면 다시 확인한다. 시험편에서는 얇은 벽, 작은 구멍, 문자, 서포트 접촉부가 동시에 안정적으로 형성되는지 확인한다. 4. 초기 노광 시간과 초기 노광 층 초기 노광 시간은 조형판에 가까운 바닥층을 더 강하게 경화시키는 시간이고, 초기 노광 층은 그 조건을 적용할 층 수이다. 이 두 항목은 출력물의 첫 부착 안정성과 직접 연결된다. 초기 노광이 부족하면 출력 초반에 바닥층이 조형판에서 떨어질 수 있다. 반대로 과도하면 바닥부가 두껍게 퍼지고, 출력 후 제거가 어려워지며, 바닥면 치수 오차가 커질 수 있다. 항목 역할 과도할 때 발생 가능한 문제 초기 노광 시간 바닥층을 충분히 경화시켜 조형판 부착력을 확보한다. 바닥부 퍼짐, 제거 난이도 증가, 표면 과경화 초기 노광 층 초기 노광 조건을 적용할 층 수를 결정한다. 불필요하게 두꺼운 바닥 영역, 후처리 부담 증가 바닥층이 조형판에 붙지 않으면 초기 노광 시간과 조형판 상태를 먼저 확인한다. 바닥부가 지나치게 퍼지면 초기 노광 시간과 초기 노광 층을 과하게 설정하지 않았는지 확인한다. 바닥층 조건은 레진 점도와 조형판 표면 상태의 영향을 받으므로 레진 변경 시 별도 기록을 남긴다. 5. 기본·초기 조형판 속도 조형판 속도는 한 층을 경화한 뒤 출력물을 필름에서 분리하는 과정의 충격을 좌우한다. 기본 조형판 속도는 일반층에, 초기 조형판 속도는 바닥층 구간에 적용되는 속도 항목으로 관리한다. 속도가 너무 빠르면 필름과 출력물 사이의 박리 부하가 커져 서포트가 끊어지거나 모델 표면에 라인이 생길 수 있다. 속도가 너무 느리면 안정성은 좋아질 수 있으나 전체 출력 시간이 길어진다. 상황 점검 항목 판단 기준 큰 단면 또는 넓은 바닥면 출력 기본·초기 조형판 속도 박리 충격을 낮추는 방향으로 검토한다. 서포트 파손 또는 모델 분리 속도, 노광, 서포트 강도 노광 부족인지, 박리 부하 과다인지 함께 확인한다. 출력 시간이 과도하게 길어짐 속도와 레이어 수 품질 저하 없이 안정적으로 올릴 수 있는 범위를 찾는다. 단위 확인 CHITUBOX 자료에서 흔히 쓰는 리프트 속도 단위와 장비 화면의 조형판 속도 단위가 다를 수 있다. 캐리마텍 장비 화면에서는 mm/s 단위 표시를 기준으로 확인한다. 6. 모델 배치 방향 모델 방향은 슬라이스 단면이 어떻게 증가하고 감소하는지를 결정한다. 작은 단면에서 큰 단면으로 갑자기 바뀌면 층별 경화 수축과 박리 부하가 급격히 변해 표면 라인, 변형, 서포트 부담이 커질 수 있다. 품질이 중요한 면은 서포트 흔적과 층 경계가 덜 보이는 방향으로 배치하고, 넓은 평면이 필름과 평행하게 크게 형성되는 상황은 가능한 줄인다. 모델 방향을 바꾸면 서포트 위치와 노광 안정성도 함께 다시 확인해야 한다. 그림 5. 모델 배치 방향에 따른 출력 품질 차이 배치 관점 권장 판단 이유 큰 단면 변화 급격한 면적 증가를 줄인다. 수축과 박리 부하 변화가 표면 라인으로 나타날 수 있다. 중요 외관면 서포트 접촉과 층 경계가 덜 보이는 방향을 선택한다. 후처리 부담과 외관 결함을 줄인다. 서포트 안정성 배치 변경 후 서포트 위치를 다시 점검한다. 방향이 바뀌면 하중과 배수 방향도 달라진다. 7. 안티앨리어싱 안티앨리어싱은 슬라이스 이미지의 곡선이나 경사 경계에서 픽셀 계단이 도드라지는 현상을 완화하는 기능이다. LCD 계열 출력은 픽셀 기반으로 레이어 이미지를 만들기 때문에, 대각선 모서리와 곡면 경계에서 계단 현상이 보일 수 있다. 적절한 안티앨리어싱은 표면을 부드럽게 만들지만, 지나치게 강하면 작은 문자, 얇은 모서리, 날카로운 형상이 둔해질 수 있다. 외관 품질이 중요한 곡면 모델과 정밀 모서리가 중요한 기능성 모델은 서로 다른 기준으로 확인한다. 그림 6. 안티앨리어싱 적용 전후의 경계 표현 차이 설정 경향 효과 주의점 낮은 적용 날카로운 경계와 미세 형상 보존에 유리하다. 곡면과 대각선에서 픽셀 계단이 보일 수 있다. 적정 적용 곡면 표면과 경계가 부드러워진다. 시험편으로 세부 형상 손실 여부를 확인한다. 과도한 적용 표면은 부드러워 보일 수 있다. 문자, 홈, 모서리의 선명도가 떨어질 수 있다. 8. 설정 조정 체크리스트 출력 품질이 기대보다 낮을 때에는 결과 증상에 따라 관련 설정을 좁혀 확인한다. 증상 우선 확인 항목 조정 방향 곡면의 층 경계가 뚜렷함 레이어 두께, 안티앨리어싱 레이어를 얇게 하거나 안티앨리어싱을 적정 적용한다. 세부 형상이 뭉개짐 기본 노광 시간, 안티앨리어싱 과노광 또는 과도한 경계 보정을 낮춘다. 조형판에서 떨어짐 초기 노광 시간, 초기 노광 층, 조형판 상태 초기 부착 조건과 조형판 표면 상태를 확인한다. 서포트가 끊어짐 기본 노광 시간, 조형판 속도, 서포트 강도 경화 부족과 박리 부하를 함께 점검한다. 표면 라인이 반복됨 모델 배치, 조형판 속도, 단면 변화 급격한 단면 변화와 박리 충격을 줄인다. 레이어 두께를 바꾸면 기본 노광 시간도 다시 검증한다. 노광 시간을 바꿀 때에는 치수 변화와 표면 질감을 동시에 확인한다. 속도 조정은 출력 시간과 안정성 사이의 균형으로 판단한다. 모델 배치 변경 후에는 서포트와 중요 외관면 위치를 다시 확인한다. 최종 조건은 레진명, 레이어 두께, 노광 시간, 초기 노광 조건, 조형판 속도, 안티앨리어싱 값과 함께 기록한다. 9. 핵심 요약 구분 핵심 내용 레이어 두께 얇을수록 표면은 부드러워지지만 출력 시간과 조건 민감도가 증가한다. 기본 노광 시간 일반층 경화 품질을 좌우하며 부족하면 약하고, 과하면 세부가 뭉개진다. 초기 노광 조건 조형판 부착 안정성을 확보하되 바닥부 과경화를 피한다. 조형판 속도 박리 충격과 출력 시간을 동시에 결정하므로 모델 단면과 서포트 강도를 함께 본다. 모델 배치 방향 단면 변화와 서포트 흔적을 줄이는 방향으로 배치한다. 안티앨리어싱 곡면 경계는 부드럽게 만들지만, 과도하면 미세 형상이 무뎌질 수 있다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 5}, "14": {"manualId": 14, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "광경화성 레진은 SLA/DLP/LCD 방식 출력에서 형상을 만드는 핵심 재료이다. 레진은 자외선에 반응해 경화되는 특성을 갖기 때문에 보관, 사용 후 관리, 후경화 조건이 출력 품질과 작업 안전을 동시에 좌우한다."}, {"type": "paragraph", "text": "레진은 빛, 온도, 오염물, 장시간 노출에 민감하다. 따라서 사용 전에는 보관 상태를 확인하고, 출력 후에는 남은 레진과 출력물을 각각 올바르게 관리해야 한다."}, {"type": "table", "rows": [["관리 영역", "핵심 목적", "주요 확인 사항"], ["보관", "레진의 반응성·점도·청결 상태 유지", "밀봉, 직사광선 차단, 권장 온도, 용기 상부 공기층"], ["사용 후 레진", "새 레진 오염 방지", "사용 레진과 미사용 레진 분리, 필터링, 별도 용기 보관"], ["후경화", "출력물의 최종 물성 확보", "표면 끈적임 제거, 강도·안정성 향상, 과경화 방지"], ["폐기", "작업자 안전과 환경 관리", "음식물과 분리 보관, 폐레진 임의 폐기 금지"]]}, {"type": "table", "rows": [["관리 기준 레진은 제조사별 권장 보관 온도와 후경화 조건이 다르다. 본 문서의 기준은 공통 관리 원칙이며, 실제 작업에서는 사용하는 레진의 기술자료와 사내 조건표를 함께 확인한다."]]}, {"type": "heading", "level": 2, "text": "1. 광경화성 레진의 특성과 관리 목적", "id": "section-2"}, {"type": "paragraph", "text": "광경화성 레진은 폴리머 모노머와 프리폴리머, 그리고 특정 파장의 자외선에 반응하는 광개시제를 포함한다. 250~300nm 범위의 UV가 조사되면 중합 반응이 시작되어 경화가 진행된다."}, {"type": "paragraph", "text": "이 특성은 출력에는 필수적이지만 보관 중에는 위험 요소가 된다. 레진이 빛에 노출되면 용기 내부에서도 부분 경화, 젤화, 점도 변화가 발생할 수 있으므로 빛 차단과 밀봉이 기본 관리 조건이다."}, {"type": "image", "path": "assets/manuals/14_광경화성 레진의 보관 및 경화 방법/resin.jpg", "alt": "광경화성 레진의 보관 및 경화 방법 시각 자료", "fileName": "resin.jpg"}, {"type": "paragraph", "text": "그림 1. SLA/DLP/LCD 출력에 사용하는 광경화성 레진"}, {"type": "heading", "level": 2, "text": "2. UV 경화 레진 보관 방법", "id": "section-3"}, {"type": "paragraph", "text": "광경화성 레진은 직사광선을 피하고 밀봉 가능한 용기에 보관한다. 용기는 빛 투과가 낮고 내용물이 새지 않으며, 사용 중 외부 먼지나 경화 잔여물이 들어가지 않도록 관리해야 한다."}, {"type": "paragraph", "text": "레진은 일정한 유동성과 점도를 유지해야 좋은 출력 결과를 얻을 수 있다. 일반적으로 600 cP·s 수준의 점도 조건이 요구되는 경우가 많으며, 점도는 온도에 따라 달라진다. 레진별 권장 보관 온도 범위를 벗어나면 레벨링과 충전성이 나빠질 수 있다."}, {"type": "paragraph", "text": "용기를 레진으로 완전히 채우지 않고 상부에 일정한 공기층을 남기는 것도 중요하다. 용기 상부 공간은 레진의 젤화와 압력 변화에 대응할 수 있는 여유를 제공한다."}, {"type": "paragraph", "text": "보관 용기는 사용 후 즉시 닫고 직사광선과 강한 실내 UV 노출을 피한다."}, {"type": "paragraph", "text": "레진 보관 위치는 음식물, 음료, 개인 물품과 분리한다."}, {"type": "paragraph", "text": "레진별 제조사 권장 온도 범위를 기록하고, 장시간 보관 시 온도 변화를 함께 점검한다."}, {"type": "paragraph", "text": "용기에는 레진명, 개봉일, 필터링 여부, 사용 이력을 표시한다."}, {"type": "heading", "level": 2, "text": "3. 사용 레진과 미사용 레진 분리 관리", "id": "section-4"}, {"type": "paragraph", "text": "출력 과정에서 레진 탱크에 머문 레진은 미경화 상태로 보이더라도 경화 잔여물, 작은 파편, 먼지, 장시간 노출에 따른 열화 성분을 포함할 수 있다. 이 레진을 새 레진 병에 다시 넣으면 전체 레진 품질을 오염시킬 수 있다."}, {"type": "paragraph", "text": "따라서 사용 후 남은 레진은 필터로 걸러 별도 용기에 보관하고, 새 레진과 섞지 않는 것을 기본으로 한다. 특히 탱크에 오래 머문 레진은 색상, 냄새, 점도, 침전물 여부를 확인한 뒤 재사용 가능성을 판단한다."}, {"type": "table", "rows": [["구분", "관리 방법", "주의점"], ["미사용 레진", "원래 병에 보관하고 개봉 시간을 최소화한다.", "빛과 오염물 유입을 차단한다."], ["사용 후 남은 레진", "필터링 후 별도 병에 보관한다.", "원래 새 레진 병으로 되돌려 붓지 않는다."], ["장시간 탱크 잔류 레진", "색상, 냄새, 침전, 점도 변화를 확인한다.", "열화가 의심되면 재사용하지 않는다."], ["폐레진", "사내 폐기 절차에 따라 모아 처리한다.", "배수구나 일반 쓰레기로 임의 폐기하지 않는다."]]}, {"type": "table", "rows": [["안전 관리 광경화성 레진은 냄새가 강하고 독성을 가질 수 있다. 보관과 취급 시 장갑, 환기, 전용 용기, 폐기 절차를 함께 지키며 음식물과 같은 공간에 보관하지 않는다."]]}, {"type": "heading", "level": 2, "text": "4. 후경화가 필요한 이유", "id": "section-5"}, {"type": "paragraph", "text": "출력 직후의 부품은 최종 형상은 갖추었더라도 표면이 끈적이거나 상대적으로 부드러울 수 있다. 이는 내부 반응과 표면 경화가 완전히 끝나지 않았기 때문이며, 후경화는 남은 반응을 완료해 최종 물성을 확보하는 단계이다."}, {"type": "paragraph", "text": "적절한 UV 후경화를 거치면 탄성률, 강도, 안정성이 향상되고 표면이 더 단단하고 건조해진다. 후처리 과정에서는 샌딩과 도장 작업도 더 안정적으로 수행할 수 있다."}, {"type": "table", "rows": [["후경화 효과", "설명", "실무 확인"], ["표면 안정화", "끈적임이 줄고 표면이 건조해진다.", "세척 후에도 표면이 미끄럽거나 끈적이는지 확인한다."], ["기계적 물성 향상", "강도와 탄성률이 안정화된다.", "얇은 부위, 체결부, 서포트 제거부의 파손 여부를 확인한다."], ["후처리성 개선", "샌딩과 도장 품질이 좋아진다.", "표면이 지나치게 무르거나 도료가 밀리지 않는지 확인한다."]]}, {"type": "heading", "level": 2, "text": "5. 과경화 시 발생하는 문제", "id": "section-6"}, {"type": "paragraph", "text": "UV 노출은 경화를 진행시키지만 과도한 UV 조사는 재료 열화를 일으킬 수 있다. 대부분의 유기 재료는 강한 UV 노출을 오래 받으면 손상될 수 있으며, 레진 출력물도 예외가 아니다."}, {"type": "paragraph", "text": "과경화가 심하면 출력물이 취성화되어 쉽게 깨지거나 충격에 약해질 수 있다. 일반적인 야외 노출만으로 바로 눈에 띄는 열화가 발생하는 경우는 많지 않지만, 고강도 UV 챔버에서 밤새 경화하는 수준의 과도한 조건은 재료 손상을 유발할 수 있다."}, {"type": "table", "rows": [["판단 기준 후경화는 부족해도 문제이고 과해도 문제이다. 표면 끈적임이 사라지고 필요한 강도가 확보되는 지점까지만 경화하며, 얇은 형상이나 탄성이 필요한 부품은 과경화 취성을 특히 주의한다."]]}, {"type": "heading", "level": 2, "text": "6. 수중 경화의 특징", "id": "section-7"}, {"type": "paragraph", "text": "수중 경화는 물이 담긴 투명 용기 안에 출력물을 넣고 UV를 조사하는 방식이다. 물은 열을 분산시키고 빛을 산란시켜 출력물 표면 전체에 비교적 고르게 경화가 진행되도록 돕는다."}, {"type": "paragraph", "text": "수중 경화에서는 과도하게 긴 노출 시간이 필요하지 않은 경우가 많다. 단, 경화 후 출력물을 꺼내 완전히 건조해야 하며 내부 홈, 구멍, 복잡한 구조에는 물이 남지 않도록 확인한다."}, {"type": "image", "path": "assets/manuals/14_광경화성 레진의 보관 및 경화 방법/cure-underwater.png", "alt": "광경화성 레진의 보관 및 경화 방법 시각 자료", "fileName": "cure-underwater.png"}, {"type": "paragraph", "text": "그림 2. 투명 용기를 활용한 수중 후경화 예시"}, {"type": "table", "rows": [["구분", "장점", "확인 사항"], ["열 분산", "경화 중 발생하는 열을 물이 완화한다.", "물 온도가 과도하게 올라가지 않는지 확인한다."], ["산란 효과", "빛이 확산되어 표면 경화 균일성에 도움이 된다.", "그림자가 생기는 형상은 방향을 바꿔 확인한다."], ["건조 필요", "경화 후 추가 건조만 수행하면 된다.", "내부 공간과 홈에 물이 남지 않게 한다."]]}, {"type": "heading", "level": 2, "text": "7. 햇빛을 이용한 후경화 조건", "id": "section-8"}, {"type": "paragraph", "text": "전용 UV 챔버가 없을 때에는 투명 용기에 물을 채우고 출력물을 담근 뒤 직사광선 아래에 두는 방법을 사용할 수 있다. 이 방식은 전용 UV 램프보다 경화 시간이 훨씬 길어질 수 있다."}, {"type": "paragraph", "text": "햇빛 경화 후에도 출력물이 덜 경화되었거나 표면이 끈적이면 같은 조건에서 시간을 더 확보한다. 다만 햇빛은 날씨, 시간대, 계절, 창문 투과 여부에 따라 UV 강도가 크게 달라지므로 정밀한 조건 관리가 필요한 부품에는 전용 UV 장비를 우선 검토한다."}, {"type": "image", "path": "assets/manuals/14_광경화성 레진의 보관 및 경화 방법/cure-with-sunlight.jpg", "alt": "광경화성 레진의 보관 및 경화 방법 시각 자료", "fileName": "cure-with-sunlight.jpg"}, {"type": "paragraph", "text": "그림 3. 햇빛을 이용한 후경화 예시"}, {"type": "heading", "level": 2, "text": "8. 보관·경화 체크리스트", "id": "section-9"}, {"type": "table", "rows": [["단계", "확인 항목", "완료 기준"], ["보관 전", "병 마개 밀봉, 라벨, 직사광선 차단", "레진명과 개봉일이 식별되고 빛 노출이 없다."], ["사용 후", "탱크 잔류 레진 필터링", "경화 파편과 이물질을 제거하고 별도 병에 보관한다."], ["후경화 전", "세척·건조 상태 확인", "표면 세척액이 남지 않고 출력물이 안정적으로 배치된다."], ["후경화 중", "노출 시간과 방향 관리", "표면 전체가 균일하게 경화되도록 필요 시 방향을 바꾼다."], ["후경화 후", "끈적임, 취성, 변형 확인", "표면이 건조하고 과도한 취성이나 변형이 없다."], ["폐기", "폐레진과 오염 소모품 분리", "사내 폐기 절차에 따라 모아 처리한다."]]}, {"type": "paragraph", "text": "새 레진과 사용 후 레진은 서로 다른 용기에 관리한다."}, {"type": "paragraph", "text": "후경화 조건은 레진명, 출력물 두께, 경화 방식, 시간과 함께 기록한다."}, {"type": "paragraph", "text": "강한 냄새, 침전물, 젤화, 색상 변화가 있으면 사용 전 품질 이상 여부를 점검한다."}, {"type": "paragraph", "text": "수중 또는 햇빛 경화 후에는 출력물 내부에 물이 남지 않도록 충분히 건조한다."}, {"type": "heading", "level": 2, "text": "9. 핵심 요약", "id": "section-10"}, {"type": "table", "rows": [["구분", "핵심 내용"], ["레진 보관", "밀봉, 직사광선 차단, 제조사 권장 온도 관리가 기본이다."], ["점도 관리", "온도 변화는 유동성과 레벨링에 영향을 주므로 보관 환경을 기록한다."], ["분리 관리", "사용 후 남은 레진은 필터링 후 별도 용기에 보관하고 새 병에 되돌리지 않는다."], ["후경화", "출력 직후 남은 반응을 완료해 표면 안정성과 기계적 물성을 확보한다."], ["과경화", "과도한 UV 노출은 취성 증가와 재료 열화를 유발할 수 있다."], ["수중·햇빛 경화", "수중 경화는 열 분산과 산란 효과가 있고, 햇빛 경화는 시간이 더 길어질 수 있다."], ["안전·폐기", "레진은 음식물과 분리 보관하고 폐레진은 절차에 따라 처리한다."]]}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "cure-underwater.png", "path": "assets/manuals/14_광경화성 레진의 보관 및 경화 방법/cure-underwater.png", "kind": "image", "alt": "광경화성 레진의 보관 및 경화 방법 시각 자료 14-1"}, {"fileName": "cure-with-sunlight.jpg", "path": "assets/manuals/14_광경화성 레진의 보관 및 경화 방법/cure-with-sunlight.jpg", "kind": "image", "alt": "광경화성 레진의 보관 및 경화 방법 시각 자료 14-2"}, {"fileName": "resin.jpg", "path": "assets/manuals/14_광경화성 레진의 보관 및 경화 방법/resin.jpg", "kind": "image", "alt": "광경화성 레진의 보관 및 경화 방법 시각 자료 14-3"}], "searchText": "0. 개요 광경화성 레진은 SLA/DLP/LCD 방식 출력에서 형상을 만드는 핵심 재료이다. 레진은 자외선에 반응해 경화되는 특성을 갖기 때문에 보관, 사용 후 관리, 후경화 조건이 출력 품질과 작업 안전을 동시에 좌우한다. 레진은 빛, 온도, 오염물, 장시간 노출에 민감하다. 따라서 사용 전에는 보관 상태를 확인하고, 출력 후에는 남은 레진과 출력물을 각각 올바르게 관리해야 한다. 관리 영역 핵심 목적 주요 확인 사항 보관 레진의 반응성·점도·청결 상태 유지 밀봉, 직사광선 차단, 권장 온도, 용기 상부 공기층 사용 후 레진 새 레진 오염 방지 사용 레진과 미사용 레진 분리, 필터링, 별도 용기 보관 후경화 출력물의 최종 물성 확보 표면 끈적임 제거, 강도·안정성 향상, 과경화 방지 폐기 작업자 안전과 환경 관리 음식물과 분리 보관, 폐레진 임의 폐기 금지 관리 기준 레진은 제조사별 권장 보관 온도와 후경화 조건이 다르다. 본 문서의 기준은 공통 관리 원칙이며, 실제 작업에서는 사용하는 레진의 기술자료와 사내 조건표를 함께 확인한다. 1. 광경화성 레진의 특성과 관리 목적 광경화성 레진은 폴리머 모노머와 프리폴리머, 그리고 특정 파장의 자외선에 반응하는 광개시제를 포함한다. 250~300nm 범위의 UV가 조사되면 중합 반응이 시작되어 경화가 진행된다. 이 특성은 출력에는 필수적이지만 보관 중에는 위험 요소가 된다. 레진이 빛에 노출되면 용기 내부에서도 부분 경화, 젤화, 점도 변화가 발생할 수 있으므로 빛 차단과 밀봉이 기본 관리 조건이다. 그림 1. SLA/DLP/LCD 출력에 사용하는 광경화성 레진 2. UV 경화 레진 보관 방법 광경화성 레진은 직사광선을 피하고 밀봉 가능한 용기에 보관한다. 용기는 빛 투과가 낮고 내용물이 새지 않으며, 사용 중 외부 먼지나 경화 잔여물이 들어가지 않도록 관리해야 한다. 레진은 일정한 유동성과 점도를 유지해야 좋은 출력 결과를 얻을 수 있다. 일반적으로 600 cP·s 수준의 점도 조건이 요구되는 경우가 많으며, 점도는 온도에 따라 달라진다. 레진별 권장 보관 온도 범위를 벗어나면 레벨링과 충전성이 나빠질 수 있다. 용기를 레진으로 완전히 채우지 않고 상부에 일정한 공기층을 남기는 것도 중요하다. 용기 상부 공간은 레진의 젤화와 압력 변화에 대응할 수 있는 여유를 제공한다. 보관 용기는 사용 후 즉시 닫고 직사광선과 강한 실내 UV 노출을 피한다. 레진 보관 위치는 음식물, 음료, 개인 물품과 분리한다. 레진별 제조사 권장 온도 범위를 기록하고, 장시간 보관 시 온도 변화를 함께 점검한다. 용기에는 레진명, 개봉일, 필터링 여부, 사용 이력을 표시한다. 3. 사용 레진과 미사용 레진 분리 관리 출력 과정에서 레진 탱크에 머문 레진은 미경화 상태로 보이더라도 경화 잔여물, 작은 파편, 먼지, 장시간 노출에 따른 열화 성분을 포함할 수 있다. 이 레진을 새 레진 병에 다시 넣으면 전체 레진 품질을 오염시킬 수 있다. 따라서 사용 후 남은 레진은 필터로 걸러 별도 용기에 보관하고, 새 레진과 섞지 않는 것을 기본으로 한다. 특히 탱크에 오래 머문 레진은 색상, 냄새, 점도, 침전물 여부를 확인한 뒤 재사용 가능성을 판단한다. 구분 관리 방법 주의점 미사용 레진 원래 병에 보관하고 개봉 시간을 최소화한다. 빛과 오염물 유입을 차단한다. 사용 후 남은 레진 필터링 후 별도 병에 보관한다. 원래 새 레진 병으로 되돌려 붓지 않는다. 장시간 탱크 잔류 레진 색상, 냄새, 침전, 점도 변화를 확인한다. 열화가 의심되면 재사용하지 않는다. 폐레진 사내 폐기 절차에 따라 모아 처리한다. 배수구나 일반 쓰레기로 임의 폐기하지 않는다. 안전 관리 광경화성 레진은 냄새가 강하고 독성을 가질 수 있다. 보관과 취급 시 장갑, 환기, 전용 용기, 폐기 절차를 함께 지키며 음식물과 같은 공간에 보관하지 않는다. 4. 후경화가 필요한 이유 출력 직후의 부품은 최종 형상은 갖추었더라도 표면이 끈적이거나 상대적으로 부드러울 수 있다. 이는 내부 반응과 표면 경화가 완전히 끝나지 않았기 때문이며, 후경화는 남은 반응을 완료해 최종 물성을 확보하는 단계이다. 적절한 UV 후경화를 거치면 탄성률, 강도, 안정성이 향상되고 표면이 더 단단하고 건조해진다. 후처리 과정에서는 샌딩과 도장 작업도 더 안정적으로 수행할 수 있다. 후경화 효과 설명 실무 확인 표면 안정화 끈적임이 줄고 표면이 건조해진다. 세척 후에도 표면이 미끄럽거나 끈적이는지 확인한다. 기계적 물성 향상 강도와 탄성률이 안정화된다. 얇은 부위, 체결부, 서포트 제거부의 파손 여부를 확인한다. 후처리성 개선 샌딩과 도장 품질이 좋아진다. 표면이 지나치게 무르거나 도료가 밀리지 않는지 확인한다. 5. 과경화 시 발생하는 문제 UV 노출은 경화를 진행시키지만 과도한 UV 조사는 재료 열화를 일으킬 수 있다. 대부분의 유기 재료는 강한 UV 노출을 오래 받으면 손상될 수 있으며, 레진 출력물도 예외가 아니다. 과경화가 심하면 출력물이 취성화되어 쉽게 깨지거나 충격에 약해질 수 있다. 일반적인 야외 노출만으로 바로 눈에 띄는 열화가 발생하는 경우는 많지 않지만, 고강도 UV 챔버에서 밤새 경화하는 수준의 과도한 조건은 재료 손상을 유발할 수 있다. 판단 기준 후경화는 부족해도 문제이고 과해도 문제이다. 표면 끈적임이 사라지고 필요한 강도가 확보되는 지점까지만 경화하며, 얇은 형상이나 탄성이 필요한 부품은 과경화 취성을 특히 주의한다. 6. 수중 경화의 특징 수중 경화는 물이 담긴 투명 용기 안에 출력물을 넣고 UV를 조사하는 방식이다. 물은 열을 분산시키고 빛을 산란시켜 출력물 표면 전체에 비교적 고르게 경화가 진행되도록 돕는다. 수중 경화에서는 과도하게 긴 노출 시간이 필요하지 않은 경우가 많다. 단, 경화 후 출력물을 꺼내 완전히 건조해야 하며 내부 홈, 구멍, 복잡한 구조에는 물이 남지 않도록 확인한다. 그림 2. 투명 용기를 활용한 수중 후경화 예시 구분 장점 확인 사항 열 분산 경화 중 발생하는 열을 물이 완화한다. 물 온도가 과도하게 올라가지 않는지 확인한다. 산란 효과 빛이 확산되어 표면 경화 균일성에 도움이 된다. 그림자가 생기는 형상은 방향을 바꿔 확인한다. 건조 필요 경화 후 추가 건조만 수행하면 된다. 내부 공간과 홈에 물이 남지 않게 한다. 7. 햇빛을 이용한 후경화 조건 전용 UV 챔버가 없을 때에는 투명 용기에 물을 채우고 출력물을 담근 뒤 직사광선 아래에 두는 방법을 사용할 수 있다. 이 방식은 전용 UV 램프보다 경화 시간이 훨씬 길어질 수 있다. 햇빛 경화 후에도 출력물이 덜 경화되었거나 표면이 끈적이면 같은 조건에서 시간을 더 확보한다. 다만 햇빛은 날씨, 시간대, 계절, 창문 투과 여부에 따라 UV 강도가 크게 달라지므로 정밀한 조건 관리가 필요한 부품에는 전용 UV 장비를 우선 검토한다. 그림 3. 햇빛을 이용한 후경화 예시 8. 보관·경화 체크리스트 단계 확인 항목 완료 기준 보관 전 병 마개 밀봉, 라벨, 직사광선 차단 레진명과 개봉일이 식별되고 빛 노출이 없다. 사용 후 탱크 잔류 레진 필터링 경화 파편과 이물질을 제거하고 별도 병에 보관한다. 후경화 전 세척·건조 상태 확인 표면 세척액이 남지 않고 출력물이 안정적으로 배치된다. 후경화 중 노출 시간과 방향 관리 표면 전체가 균일하게 경화되도록 필요 시 방향을 바꾼다. 후경화 후 끈적임, 취성, 변형 확인 표면이 건조하고 과도한 취성이나 변형이 없다. 폐기 폐레진과 오염 소모품 분리 사내 폐기 절차에 따라 모아 처리한다. 새 레진과 사용 후 레진은 서로 다른 용기에 관리한다. 후경화 조건은 레진명, 출력물 두께, 경화 방식, 시간과 함께 기록한다. 강한 냄새, 침전물, 젤화, 색상 변화가 있으면 사용 전 품질 이상 여부를 점검한다. 수중 또는 햇빛 경화 후에는 출력물 내부에 물이 남지 않도록 충분히 건조한다. 9. 핵심 요약 구분 핵심 내용 레진 보관 밀봉, 직사광선 차단, 제조사 권장 온도 관리가 기본이다. 점도 관리 온도 변화는 유동성과 레벨링에 영향을 주므로 보관 환경을 기록한다. 분리 관리 사용 후 남은 레진은 필터링 후 별도 용기에 보관하고 새 병에 되돌리지 않는다. 후경화 출력 직후 남은 반응을 완료해 표면 안정성과 기계적 물성을 확보한다. 과경화 과도한 UV 노출은 취성 증가와 재료 열화를 유발할 수 있다. 수중·햇빛 경화 수중 경화는 열 분산과 산란 효과가 있고, 햇빛 경화는 시간이 더 길어질 수 있다. 안전·폐기 레진은 음식물과 분리 보관하고 폐레진은 절차에 따라 처리한다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 5}, "15": {"manualId": 15, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "광경화성 3D 프린팅 레진은 출력 조건뿐 아니라 재료 자체의 기계적 특성에 따라 최종 출력물의 사용성이 크게 달라진다. 응력과 변형률은 출력물이 외력을 받을 때 어느 정도 버티고, 어느 지점에서 영구 변형되며, 어떤 방식으로 파단되는지를 설명하는 기본 지표이다."}, {"type": "paragraph", "text": "레진을 선택할 때는 강도만 확인해서는 충분하지 않다. 동일한 강도를 가진 재료라도 연신율, 항복 거동, 취성 파단 여부, 충격 흡수 능력이 다르면 실제 적용 가능 범위가 달라진다. 특히 기능성 시제품, 체결 구조, 힌지, 반복 하중을 받는 부품은 응력-변형률 곡선의 형태를 함께 해석해야 한다."}, {"type": "heading", "level": 2, "text": "1. 응력-변형률 곡선의 기본 개념", "id": "section-2"}, {"type": "paragraph", "text": "인장 시험에서 얻는 응력-변형률 곡선은 일반적으로 공칭 응력과 공칭 변형률을 기준으로 작성된다. 공칭 응력과 공칭 변형률은 변형되기 전의 초기 단면적과 초기 길이를 사용해 계산한다. 반면 진응력과 진변형률은 하중에 의해 변형이 진행된 이후의 순간 단면적과 순간 길이를 사용한다."}, {"type": "paragraph", "text": "응력이 비례한계보다 낮은 구간에서는 응력 σ가 변형률 ε에 비례한다. 이 관계는 Hooke의 법칙으로 표현되며, 비례상수 E는 탄성계수 또는 Young's Modulus라고 부른다. 탄성계수는 법선 응력과 법선 변형률의 비율을 나타내며, 단위는 응력과 동일하다. 전단계수 역시 전단 응력과 전단 변형률의 비율을 나타내는 유사한 개념이다."}, {"type": "table", "rows": [["Hooke의 법칙", "σ = Eε"], ["탄성계수", "E = σ / ε"], ["전단계수", "G = τ / γ"]]}, {"type": "paragraph", "text": "고분자 재료는 기본적으로 점탄성 거동을 보인다. 하중을 제거할 때 투입된 일의 일부가 내부 마찰 효과로 소모되어 열에너지로 전환되기 때문에, 금속 재료처럼 완전한 탄성 거동만 보이지 않는다. 그래도 재료의 탄성, 소성, 항복, 파단을 이해하기 위해서는 금속 재료의 응력-변형률 곡선을 기준 모델로 보는 것이 유용하다."}, {"type": "paragraph", "text": "응력-변형률 곡선의 가로축은 변형률, 세로축은 재료에 가해진 응력을 나타낸다. 곡선의 형태는 재료가 외력을 받을 때 발생하는 취성, 소성, 항복, 파단 과정을 시각적으로 보여준다. 하중-변형 곡선과 형태는 비슷하지만, 좌표가 하중과 변위가 아니라 응력과 변형률이라는 점이 다르다."}, {"type": "image", "path": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성/01_stress_strain_curve.png", "alt": "3D 프린팅 레진의 응력 및 변형 특성 시각 자료", "fileName": "01_stress_strain_curve.png"}, {"type": "paragraph", "text": "응력-변형률 곡선은 탄성, 항복, 변형 경화, 넥킹 및 파단 영역을 구분하는 기준이 된다."}, {"type": "heading", "level": 2, "text": "2. 응력 특성의 주요 단계", "id": "section-3"}, {"type": "table", "rows": [["단계", "구간", "핵심 의미"], ["1", "탄성 단계", "응력 제거 시 변형이 사라지는 구간이다. 비례 구간에서는 σ = Eε 관계가 성립한다."], ["2", "항복 및 초기 소성 변형", "응력과 변형률의 선형 관계가 깨지고 영구 변형이 남기 시작한다."], ["3", "변형 경화", "소성 변형이 증가할수록 추가 변형에 더 큰 응력이 필요해진다."], ["4", "국부 변형 및 파단", "최대 인장강도 이후 넥킹이 발생하고, 응력이 파단강도에 도달하면 시편이 끊어진다."]]}, {"type": "heading", "level": 3, "text": "2.1 탄성 단계", "id": "section-4"}, {"type": "paragraph", "text": "응력이 σpl보다 낮을 때는 응력과 변형률이 비례하며, 하중을 제거하면 변형이 사라진다. 이 구간의 재료는 탄성 변형 상태에 있다. σel은 재료의 탄성한계를 의미하며, 순수한 탄성 변형을 유지할 수 있는 최대 응력이다."}, {"type": "paragraph", "text": "탄성 단계 안에서도 oa 구간은 특별히 선형 관계가 명확한 영역이다. 이 영역을 비례 단계 또는 선형 탄성 단계라고 하며, Hooke의 법칙을 따른다. 강재의 경우 대표적인 탄성계수 값은 약 E = 200 GPa로 설명된다."}, {"type": "table", "rows": [["탄성 구간 해석 기준 작동 응력 F/A가 σel보다 낮을 때 응력과 변형률은 탄성 거동을 유지한다. σpl < σ < σel 구간에서는 완전한 선형 비례 관계는 약해지지만, 하중 제거 후 변형이 회복되는 탄성 특성은 유지된다. 공학적으로 σpl과 σel의 차이가 크지 않은 경우가 많아 두 값을 엄격하게 구분하지 않는 경우도 있다."]]}, {"type": "heading", "level": 3, "text": "2.2 항복 및 초기 소성 변형", "id": "section-5"}, {"type": "paragraph", "text": "응력이 σpl을 넘어 일정 값에 도달하면 응력과 변형률의 선형 관계가 깨진다. 이때 변형률은 크게 증가하지만 응력은 일시적으로 감소하거나 작은 요동을 보이며, 곡선에는 수평에 가까운 톱니 형태의 구간이 나타날 수 있다."}, {"type": "paragraph", "text": "이 구간에서 하중을 제거하면 변형이 완전히 회복되지 않고 일부 잔류 변형이 남는다. 즉, 재료가 소성 변형 단계로 들어간 것이다. σy는 항복강도 또는 항복점으로 부르며, 소성 재료의 설계와 평가에서 중요한 기준이다."}, {"type": "paragraph", "text": "명확한 항복점이 나타나지 않는 금속 또는 고분자 재료에서는 0.2% 잔류 변형을 발생시키는 응력을 항복 기준으로 정의하기도 한다. 이 방법은 오프셋 항복점 또는 proof stress 기준으로 활용된다."}, {"type": "heading", "level": 3, "text": "2.3 변형 경화", "id": "section-6"}, {"type": "paragraph", "text": "항복 이후 시편에는 뚜렷하고 비교적 균일한 소성 변형이 발생한다. 이때 변형률을 더 증가시키려면 더 높은 응력이 필요하다. 소성 변형이 커질수록 재료의 변형 저항이 증가하는 현상을 가공 경화 또는 변형 경화라고 한다."}, {"type": "paragraph", "text": "응력이 σu에 도달하면 균일 변형 단계가 끝난다. σu는 극한강도 또는 인장강도로, 재료가 인장 파단 전에 견딜 수 있는 최대 공칭 응력을 의미한다. 이 값은 균일한 소성 변형에 대한 재료의 최대 저항성을 나타낸다."}, {"type": "heading", "level": 3, "text": "2.4 국부 변형 및 파단", "id": "section-7"}, {"type": "paragraph", "text": "σu 이후에는 시편의 변형이 더 이상 균일하지 않게 진행되며 특정 부위가 가늘어지는 넥킹이 발생한다. 공칭 응력은 감소하고, 최종적으로 응력이 σf에 도달하면 시편이 파단된다. σf는 조건부 파단강도로, 재료가 파단 직전까지 보이는 변형 저항을 나타낸다."}, {"type": "heading", "level": 2, "text": "3. 공칭 응력·변형률과 진응력·진변형률", "id": "section-8"}, {"type": "paragraph", "text": "응력-변형률 곡선의 값은 보통 시편의 초기 치수를 기준으로 계산된다. 그러나 실제 인장 과정에서는 단면적과 길이가 계속 변한다. 따라서 실제 응력 상태를 더 정확히 보려면 순간 하중 P를 순간 단면적 A로 나눈 진응력 개념이 필요하다."}, {"type": "table", "rows": [["진응력", "σ = P / A"], ["순간 변형률 증가", "Δε = ΔL / L"]]}, {"type": "image", "path": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성/02_true_stress_strain_curve.png", "alt": "3D 프린팅 레진의 응력 및 변형 특성 시각 자료", "fileName": "02_true_stress_strain_curve.png"}, {"type": "paragraph", "text": "진응력-진변형률 곡선은 최대 하중 이후에도 실제 목 부분의 응력이 계속 증가하는 현상을 보여준다."}, {"type": "paragraph", "text": "진응력-진변형률 곡선은 최대 하중에 도달한 뒤 감소하지 않고 파단 전까지 계속 상승하는 형태를 보인다. 이는 금속 재료가 소성 변형 중에도 지속적으로 변형 경화를 일으키며, 넥킹이 발생한 이후에도 목 부분의 실제 응력은 증가하기 때문이다."}, {"type": "paragraph", "text": "탄성 변형 구간에서는 변형량이 작기 때문에 공칭 응력-변형률과 진응력-진변형률의 차이가 거의 없다. 그러나 소성 변형 구간, 특히 넥킹 이후에는 초기 단면적으로 계산한 공칭 응력만으로 실제 응력 상태를 해석하기 어렵다."}, {"type": "table", "rows": [["체적 일정 가정", "AL = A0L0"], ["진응력 변환", "σT = P/A = PL/(A0L0) = P(L0 + ΔL)/(A0L0) = σ(1 + ε)"], ["진변형률 변환", "εT = ∫(L0→L) dL/L = ln(L/L0) = ln(1 + ε)"]]}, {"type": "image", "path": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성/05_engineering_vs_true_curve.png", "alt": "3D 프린팅 레진의 응력 및 변형 특성 시각 자료", "fileName": "05_engineering_vs_true_curve.png"}, {"type": "paragraph", "text": "공칭 곡선과 진응력 곡선은 소성 변형 이후 해석 결과가 달라진다."}, {"type": "heading", "level": 2, "text": "4. 재료별 응력-변형률 곡선 유형", "id": "section-9"}, {"type": "paragraph", "text": "모든 재료가 탄성, 항복, 변형 경화, 국부 변형의 네 단계를 동일하게 보이는 것은 아니다. 재료의 내부 구조와 파단 특성에 따라 응력-변형률 곡선은 취성형, 이상적인 연성형, 연성형, 반연성형 등으로 나타난다."}, {"type": "image", "path": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성/03_material_curve_types.png", "alt": "3D 프린팅 레진의 응력 및 변형 특성 시각 자료", "fileName": "03_material_curve_types.png"}, {"type": "paragraph", "text": "재료별 응력-변형률 곡선은 항복 여부, 소성 변형량, 파단 방식의 차이를 보여준다."}, {"type": "table", "rows": [["곡선 유형", "특징", "설계상 의미"], ["취성 재료", "탄성 구간 이후 큰 소성 변형 없이 급격히 파단된다.", "충격, 체결, 반복 변형 부품에는 파단 위험을 별도로 검토해야 한다."], ["이상적 연성 재료", "항복 이후 거의 일정한 응력에서 큰 변형이 진행된다.", "큰 변형을 허용하지만 형상 유지성과 치수 안정성 확인이 필요하다."], ["연성 재료", "항복 이후 소성 변형과 변형 경화가 함께 나타난다.", "하중 흡수와 변형 허용성이 필요한 부품에 적합하다."], ["반연성 재료", "선형 탄성 후 제한적인 소성 변형과 경화 거동이 나타난다.", "취성과 연성의 중간 특성을 갖는 재료로 용도별 검증이 필요하다."]]}, {"type": "heading", "level": 2, "text": "5. 주요 용어 정리", "id": "section-10"}, {"type": "heading", "level": 3, "text": "5.1 항복강도", "id": "section-11"}, {"type": "paragraph", "text": "항복강도는 재료가 소성 변형을 보이기 시작하는 응력이다. 재료에 따라 응력-변형률 곡선의 형태가 다르기 때문에, 실제 시험에서는 항복이 시작되는 지점을 명확히 특정하기 어려운 경우가 있다. 이때는 0.2% 오프셋과 같은 실무 기준을 적용해 항복점을 정의한다."}, {"type": "image", "path": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성/04_offset_yield_proof_stress.png", "alt": "3D 프린팅 레진의 응력 및 변형 특성 시각 자료", "fileName": "04_offset_yield_proof_stress.png"}, {"type": "paragraph", "text": "항복점이 명확하지 않은 재료는 0.2% 오프셋 기준으로 proof stress를 정의할 수 있다."}, {"type": "heading", "level": 3, "text": "5.2 탄성한계와 비례한계", "id": "section-12"}, {"type": "paragraph", "text": "탄성한계는 소성 변형이 검출되기 시작하는 최소 응력이다. 비례한계는 응력-변형률 곡선이 선형 관계에서 벗어나기 시작하는 응력이다. 많은 금속 재료에서는 탄성한계와 비례한계가 거의 비슷하지만, 고분자 재료나 복합적인 거동을 보이는 재료에서는 두 지점의 차이를 주의해서 볼 필요가 있다."}, {"type": "heading", "level": 3, "text": "5.3 진응력과 진변형률", "id": "section-13"}, {"type": "paragraph", "text": "공칭 응력 σ와 공칭 변형률 ε은 변형 전 초기 단면적 A0와 초기 길이 L0를 기준으로 계산한다. 하지만 하중이 증가하면서 실제 단면적과 길이는 계속 변하며, 인장강도를 넘어 넥킹이 발생하면 단면적이 급격히 감소한다. 이 상태에서 초기 단면적만 사용하면 실제 응력 상태를 과소평가할 수 있다."}, {"type": "paragraph", "text": "진응력 σT와 진변형률 εT는 하중이 작용한 뒤의 실제 단면적과 실제 길이를 기준으로 계산한다. 따라서 큰 소성 변형이나 넥킹을 포함하는 해석에서는 진응력-진변형률 개념이 더 적합하다."}, {"type": "heading", "level": 3, "text": "5.4 연성과 취성", "id": "section-14"}, {"type": "paragraph", "text": "재료는 기계적 성질에 따라 크게 연성 재료와 취성 재료로 구분할 수 있다. 강과 알루미늄은 대표적인 연성 재료이며, 유리, 세라믹, 콘크리트, 주철은 일반적으로 취성 재료로 분류된다."}, {"type": "paragraph", "text": "인장 시험에서 연성 재료는 파단 전에 큰 소성 변형을 보인다. 반면 취성 재료는 인장 하중을 받을 때 항복 단계가 거의 없거나 매우 작으며, 응력이 탄성한계를 빠르게 넘어선 뒤 파단된다."}, {"type": "image", "path": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성/06_ductility_brittleness_material_curves.png", "alt": "3D 프린팅 레진의 응력 및 변형 특성 시각 자료", "fileName": "06_ductility_brittleness_material_curves.png"}, {"type": "paragraph", "text": "연성 재료와 취성 재료는 파단 전 소성 변형량과 에너지 흡수 능력이 다르다."}, {"type": "heading", "level": 2, "text": "6. 표준 레진과 터프 레진 비교", "id": "section-15"}, {"type": "paragraph", "text": "3D 프린팅 재료, 특히 기능성 레진과 시제품용 레진을 선택할 때는 재료 특성과 적정 노광 조건을 함께 이해해야 한다. 응력-변형률 곡선은 외력이 작용할 때 재료가 취성, 소성, 항복, 파단 중 어떤 거동을 보이는지 판단하는 기준이 된다."}, {"type": "paragraph", "text": "실무에서는 높은 응력이나 큰 변형을 견디면서도 취성 파단이 발생하지 않는 출력물이 필요한 경우가 많다. 이 성질을 인성이라고 하며, 인성은 재료가 소성 변형과 파단 과정에서 에너지를 흡수하는 능력으로 설명된다."}, {"type": "paragraph", "text": "인성은 응력-변형률 곡선 아래 면적으로도 이해할 수 있다. 강도는 높지만 연신율이 낮은 재료는 곡선 아래 면적이 작아 충격이나 굽힘에서 취성적으로 파단될 수 있다. 반대로 터프 레진은 강도와 연신율의 균형을 통해 더 큰 면적을 형성하며, 충격 저항과 변형 허용성이 우수하다."}, {"type": "image", "path": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성/07_standard_vs_tough_resin_curve.png", "alt": "3D 프린팅 레진의 응력 및 변형 특성 시각 자료", "fileName": "07_standard_vs_tough_resin_curve.png"}, {"type": "paragraph", "text": "터프 레진은 표준 레진보다 더 큰 변형률 영역을 가지며, 파단 전 에너지 흡수 능력이 높다."}, {"type": "table", "rows": [["구분", "표준 레진", "터프 레진"], ["곡선 경향", "상대적으로 높은 응력에 빠르게 도달하지만 변형 허용 범위가 작다.", "응력 수준은 낮을 수 있으나 더 넓은 변형률 구간을 유지한다."], ["파단 특성", "강하고 단단하지만 취성 파단 위험이 커질 수 있다.", "큰 변형과 충격을 흡수해 급격한 파단 가능성을 낮춘다."], ["적합 용도", "외관 확인, 고정밀 시제품, 하중이 크지 않은 구조물에 적합하다.", "스냅핏, 움직이는 힌지, 충격을 받는 시제품, 반복 변형 부품에 적합하다."], ["검토 포인트", "강도와 치수 안정성 중심으로 평가한다.", "강도, 연신율, 인성, 반복 변형 내구성을 함께 확인한다."]]}, {"type": "heading", "level": 2, "text": "7. 실무 적용 포인트", "id": "section-16"}, {"type": "paragraph", "text": "레진 선택 시 최대 강도만 보지 말고 항복 거동, 연신율, 곡선 아래 면적을 함께 확인한다."}, {"type": "paragraph", "text": "충격 또는 반복 변형이 예상되는 부품은 터프 레진 또는 연성 계열 재료를 우선 검토한다."}, {"type": "paragraph", "text": "정밀 외관과 치수 안정성이 우선인 부품은 표준 레진 또는 고강성 레진이 유리할 수 있다."}, {"type": "paragraph", "text": "노광 시간이 부족하면 강도와 표면 경화가 불안정해지고, 과도한 노광이나 후경화는 취성을 높일 수 있다."}, {"type": "paragraph", "text": "스냅핏, 힌지, 체결부처럼 변형이 기능의 일부인 구조는 항복 이후 거동과 파단 전 변형률을 반드시 검토한다."}, {"type": "paragraph", "text": "시험 데이터의 응력 단위, 변형률 단위, 시험 조건, 후경화 조건이 동일한지 확인한 뒤 재료를 비교한다."}, {"type": "heading", "level": 2, "text": "8. 핵심 요약", "id": "section-17"}, {"type": "table", "rows": [["구분", "핵심 내용"], ["응력-변형률 곡선", "재료의 탄성, 소성, 항복, 변형 경화, 파단 거동을 한 번에 보여주는 기본 곡선이다."], ["공칭값과 진값", "공칭 응력은 초기 치수를 기준으로 하고, 진응력은 변형 중 실제 치수를 기준으로 한다."], ["항복강도", "재료가 영구 변형을 보이기 시작하는 응력이며, 명확하지 않을 때는 0.2% 오프셋 기준을 쓴다."], ["연성/취성", "연성 재료는 파단 전 큰 소성 변형을 보이고, 취성 재료는 작은 변형 뒤 급격히 파단된다."], ["인성", "응력-변형률 곡선 아래 면적으로 이해할 수 있으며, 충격과 변형 에너지 흡수 능력을 의미한다."], ["터프 레진", "충격 저항, 큰 변형 허용, 스냅핏 및 힌지 구조에 적합한 레진 선택지이다."]]}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "01_stress_strain_curve.png", "path": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성/01_stress_strain_curve.png", "kind": "image", "alt": "3D 프린팅 레진의 응력 및 변형 특성 시각 자료 15-1"}, {"fileName": "02_true_stress_strain_curve.png", "path": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성/02_true_stress_strain_curve.png", "kind": "image", "alt": "3D 프린팅 레진의 응력 및 변형 특성 시각 자료 15-2"}, {"fileName": "03_material_curve_types.png", "path": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성/03_material_curve_types.png", "kind": "image", "alt": "3D 프린팅 레진의 응력 및 변형 특성 시각 자료 15-3"}, {"fileName": "04_offset_yield_proof_stress.png", "path": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성/04_offset_yield_proof_stress.png", "kind": "image", "alt": "3D 프린팅 레진의 응력 및 변형 특성 시각 자료 15-4"}, {"fileName": "05_engineering_vs_true_curve.png", "path": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성/05_engineering_vs_true_curve.png", "kind": "image", "alt": "3D 프린팅 레진의 응력 및 변형 특성 시각 자료 15-5"}, {"fileName": "06_ductility_brittleness_material_curves.png", "path": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성/06_ductility_brittleness_material_curves.png", "kind": "image", "alt": "3D 프린팅 레진의 응력 및 변형 특성 시각 자료 15-6"}, {"fileName": "07_standard_vs_tough_resin_curve.png", "path": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성/07_standard_vs_tough_resin_curve.png", "kind": "image", "alt": "3D 프린팅 레진의 응력 및 변형 특성 시각 자료 15-7"}], "searchText": "0. 개요 광경화성 3D 프린팅 레진은 출력 조건뿐 아니라 재료 자체의 기계적 특성에 따라 최종 출력물의 사용성이 크게 달라진다. 응력과 변형률은 출력물이 외력을 받을 때 어느 정도 버티고, 어느 지점에서 영구 변형되며, 어떤 방식으로 파단되는지를 설명하는 기본 지표이다. 레진을 선택할 때는 강도만 확인해서는 충분하지 않다. 동일한 강도를 가진 재료라도 연신율, 항복 거동, 취성 파단 여부, 충격 흡수 능력이 다르면 실제 적용 가능 범위가 달라진다. 특히 기능성 시제품, 체결 구조, 힌지, 반복 하중을 받는 부품은 응력-변형률 곡선의 형태를 함께 해석해야 한다. 1. 응력-변형률 곡선의 기본 개념 인장 시험에서 얻는 응력-변형률 곡선은 일반적으로 공칭 응력과 공칭 변형률을 기준으로 작성된다. 공칭 응력과 공칭 변형률은 변형되기 전의 초기 단면적과 초기 길이를 사용해 계산한다. 반면 진응력과 진변형률은 하중에 의해 변형이 진행된 이후의 순간 단면적과 순간 길이를 사용한다. 응력이 비례한계보다 낮은 구간에서는 응력 σ가 변형률 ε에 비례한다. 이 관계는 Hooke의 법칙으로 표현되며, 비례상수 E는 탄성계수 또는 Young's Modulus라고 부른다. 탄성계수는 법선 응력과 법선 변형률의 비율을 나타내며, 단위는 응력과 동일하다. 전단계수 역시 전단 응력과 전단 변형률의 비율을 나타내는 유사한 개념이다. Hooke의 법칙 σ = Eε 탄성계수 E = σ / ε 전단계수 G = τ / γ 고분자 재료는 기본적으로 점탄성 거동을 보인다. 하중을 제거할 때 투입된 일의 일부가 내부 마찰 효과로 소모되어 열에너지로 전환되기 때문에, 금속 재료처럼 완전한 탄성 거동만 보이지 않는다. 그래도 재료의 탄성, 소성, 항복, 파단을 이해하기 위해서는 금속 재료의 응력-변형률 곡선을 기준 모델로 보는 것이 유용하다. 응력-변형률 곡선의 가로축은 변형률, 세로축은 재료에 가해진 응력을 나타낸다. 곡선의 형태는 재료가 외력을 받을 때 발생하는 취성, 소성, 항복, 파단 과정을 시각적으로 보여준다. 하중-변형 곡선과 형태는 비슷하지만, 좌표가 하중과 변위가 아니라 응력과 변형률이라는 점이 다르다. 응력-변형률 곡선은 탄성, 항복, 변형 경화, 넥킹 및 파단 영역을 구분하는 기준이 된다. 2. 응력 특성의 주요 단계 단계 구간 핵심 의미 1 탄성 단계 응력 제거 시 변형이 사라지는 구간이다. 비례 구간에서는 σ = Eε 관계가 성립한다. 2 항복 및 초기 소성 변형 응력과 변형률의 선형 관계가 깨지고 영구 변형이 남기 시작한다. 3 변형 경화 소성 변형이 증가할수록 추가 변형에 더 큰 응력이 필요해진다. 4 국부 변형 및 파단 최대 인장강도 이후 넥킹이 발생하고, 응력이 파단강도에 도달하면 시편이 끊어진다. 2.1 탄성 단계 응력이 σpl보다 낮을 때는 응력과 변형률이 비례하며, 하중을 제거하면 변형이 사라진다. 이 구간의 재료는 탄성 변형 상태에 있다. σel은 재료의 탄성한계를 의미하며, 순수한 탄성 변형을 유지할 수 있는 최대 응력이다. 탄성 단계 안에서도 oa 구간은 특별히 선형 관계가 명확한 영역이다. 이 영역을 비례 단계 또는 선형 탄성 단계라고 하며, Hooke의 법칙을 따른다. 강재의 경우 대표적인 탄성계수 값은 약 E = 200 GPa로 설명된다. 탄성 구간 해석 기준 작동 응력 F/A가 σel보다 낮을 때 응력과 변형률은 탄성 거동을 유지한다. σpl < σ < σel 구간에서는 완전한 선형 비례 관계는 약해지지만, 하중 제거 후 변형이 회복되는 탄성 특성은 유지된다. 공학적으로 σpl과 σel의 차이가 크지 않은 경우가 많아 두 값을 엄격하게 구분하지 않는 경우도 있다. 2.2 항복 및 초기 소성 변형 응력이 σpl을 넘어 일정 값에 도달하면 응력과 변형률의 선형 관계가 깨진다. 이때 변형률은 크게 증가하지만 응력은 일시적으로 감소하거나 작은 요동을 보이며, 곡선에는 수평에 가까운 톱니 형태의 구간이 나타날 수 있다. 이 구간에서 하중을 제거하면 변형이 완전히 회복되지 않고 일부 잔류 변형이 남는다. 즉, 재료가 소성 변형 단계로 들어간 것이다. σy는 항복강도 또는 항복점으로 부르며, 소성 재료의 설계와 평가에서 중요한 기준이다. 명확한 항복점이 나타나지 않는 금속 또는 고분자 재료에서는 0.2% 잔류 변형을 발생시키는 응력을 항복 기준으로 정의하기도 한다. 이 방법은 오프셋 항복점 또는 proof stress 기준으로 활용된다. 2.3 변형 경화 항복 이후 시편에는 뚜렷하고 비교적 균일한 소성 변형이 발생한다. 이때 변형률을 더 증가시키려면 더 높은 응력이 필요하다. 소성 변형이 커질수록 재료의 변형 저항이 증가하는 현상을 가공 경화 또는 변형 경화라고 한다. 응력이 σu에 도달하면 균일 변형 단계가 끝난다. σu는 극한강도 또는 인장강도로, 재료가 인장 파단 전에 견딜 수 있는 최대 공칭 응력을 의미한다. 이 값은 균일한 소성 변형에 대한 재료의 최대 저항성을 나타낸다. 2.4 국부 변형 및 파단 σu 이후에는 시편의 변형이 더 이상 균일하지 않게 진행되며 특정 부위가 가늘어지는 넥킹이 발생한다. 공칭 응력은 감소하고, 최종적으로 응력이 σf에 도달하면 시편이 파단된다. σf는 조건부 파단강도로, 재료가 파단 직전까지 보이는 변형 저항을 나타낸다. 3. 공칭 응력·변형률과 진응력·진변형률 응력-변형률 곡선의 값은 보통 시편의 초기 치수를 기준으로 계산된다. 그러나 실제 인장 과정에서는 단면적과 길이가 계속 변한다. 따라서 실제 응력 상태를 더 정확히 보려면 순간 하중 P를 순간 단면적 A로 나눈 진응력 개념이 필요하다. 진응력 σ = P / A 순간 변형률 증가 Δε = ΔL / L 진응력-진변형률 곡선은 최대 하중 이후에도 실제 목 부분의 응력이 계속 증가하는 현상을 보여준다. 진응력-진변형률 곡선은 최대 하중에 도달한 뒤 감소하지 않고 파단 전까지 계속 상승하는 형태를 보인다. 이는 금속 재료가 소성 변형 중에도 지속적으로 변형 경화를 일으키며, 넥킹이 발생한 이후에도 목 부분의 실제 응력은 증가하기 때문이다. 탄성 변형 구간에서는 변형량이 작기 때문에 공칭 응력-변형률과 진응력-진변형률의 차이가 거의 없다. 그러나 소성 변형 구간, 특히 넥킹 이후에는 초기 단면적으로 계산한 공칭 응력만으로 실제 응력 상태를 해석하기 어렵다. 체적 일정 가정 AL = A0L0 진응력 변환 σT = P/A = PL/(A0L0) = P(L0 + ΔL)/(A0L0) = σ(1 + ε) 진변형률 변환 εT = ∫(L0→L) dL/L = ln(L/L0) = ln(1 + ε) 공칭 곡선과 진응력 곡선은 소성 변형 이후 해석 결과가 달라진다. 4. 재료별 응력-변형률 곡선 유형 모든 재료가 탄성, 항복, 변형 경화, 국부 변형의 네 단계를 동일하게 보이는 것은 아니다. 재료의 내부 구조와 파단 특성에 따라 응력-변형률 곡선은 취성형, 이상적인 연성형, 연성형, 반연성형 등으로 나타난다. 재료별 응력-변형률 곡선은 항복 여부, 소성 변형량, 파단 방식의 차이를 보여준다. 곡선 유형 특징 설계상 의미 취성 재료 탄성 구간 이후 큰 소성 변형 없이 급격히 파단된다. 충격, 체결, 반복 변형 부품에는 파단 위험을 별도로 검토해야 한다. 이상적 연성 재료 항복 이후 거의 일정한 응력에서 큰 변형이 진행된다. 큰 변형을 허용하지만 형상 유지성과 치수 안정성 확인이 필요하다. 연성 재료 항복 이후 소성 변형과 변형 경화가 함께 나타난다. 하중 흡수와 변형 허용성이 필요한 부품에 적합하다. 반연성 재료 선형 탄성 후 제한적인 소성 변형과 경화 거동이 나타난다. 취성과 연성의 중간 특성을 갖는 재료로 용도별 검증이 필요하다. 5. 주요 용어 정리 5.1 항복강도 항복강도는 재료가 소성 변형을 보이기 시작하는 응력이다. 재료에 따라 응력-변형률 곡선의 형태가 다르기 때문에, 실제 시험에서는 항복이 시작되는 지점을 명확히 특정하기 어려운 경우가 있다. 이때는 0.2% 오프셋과 같은 실무 기준을 적용해 항복점을 정의한다. 항복점이 명확하지 않은 재료는 0.2% 오프셋 기준으로 proof stress를 정의할 수 있다. 5.2 탄성한계와 비례한계 탄성한계는 소성 변형이 검출되기 시작하는 최소 응력이다. 비례한계는 응력-변형률 곡선이 선형 관계에서 벗어나기 시작하는 응력이다. 많은 금속 재료에서는 탄성한계와 비례한계가 거의 비슷하지만, 고분자 재료나 복합적인 거동을 보이는 재료에서는 두 지점의 차이를 주의해서 볼 필요가 있다. 5.3 진응력과 진변형률 공칭 응력 σ와 공칭 변형률 ε은 변형 전 초기 단면적 A0와 초기 길이 L0를 기준으로 계산한다. 하지만 하중이 증가하면서 실제 단면적과 길이는 계속 변하며, 인장강도를 넘어 넥킹이 발생하면 단면적이 급격히 감소한다. 이 상태에서 초기 단면적만 사용하면 실제 응력 상태를 과소평가할 수 있다. 진응력 σT와 진변형률 εT는 하중이 작용한 뒤의 실제 단면적과 실제 길이를 기준으로 계산한다. 따라서 큰 소성 변형이나 넥킹을 포함하는 해석에서는 진응력-진변형률 개념이 더 적합하다. 5.4 연성과 취성 재료는 기계적 성질에 따라 크게 연성 재료와 취성 재료로 구분할 수 있다. 강과 알루미늄은 대표적인 연성 재료이며, 유리, 세라믹, 콘크리트, 주철은 일반적으로 취성 재료로 분류된다. 인장 시험에서 연성 재료는 파단 전에 큰 소성 변형을 보인다. 반면 취성 재료는 인장 하중을 받을 때 항복 단계가 거의 없거나 매우 작으며, 응력이 탄성한계를 빠르게 넘어선 뒤 파단된다. 연성 재료와 취성 재료는 파단 전 소성 변형량과 에너지 흡수 능력이 다르다. 6. 표준 레진과 터프 레진 비교 3D 프린팅 재료, 특히 기능성 레진과 시제품용 레진을 선택할 때는 재료 특성과 적정 노광 조건을 함께 이해해야 한다. 응력-변형률 곡선은 외력이 작용할 때 재료가 취성, 소성, 항복, 파단 중 어떤 거동을 보이는지 판단하는 기준이 된다. 실무에서는 높은 응력이나 큰 변형을 견디면서도 취성 파단이 발생하지 않는 출력물이 필요한 경우가 많다. 이 성질을 인성이라고 하며, 인성은 재료가 소성 변형과 파단 과정에서 에너지를 흡수하는 능력으로 설명된다. 인성은 응력-변형률 곡선 아래 면적으로도 이해할 수 있다. 강도는 높지만 연신율이 낮은 재료는 곡선 아래 면적이 작아 충격이나 굽힘에서 취성적으로 파단될 수 있다. 반대로 터프 레진은 강도와 연신율의 균형을 통해 더 큰 면적을 형성하며, 충격 저항과 변형 허용성이 우수하다. 터프 레진은 표준 레진보다 더 큰 변형률 영역을 가지며, 파단 전 에너지 흡수 능력이 높다. 구분 표준 레진 터프 레진 곡선 경향 상대적으로 높은 응력에 빠르게 도달하지만 변형 허용 범위가 작다. 응력 수준은 낮을 수 있으나 더 넓은 변형률 구간을 유지한다. 파단 특성 강하고 단단하지만 취성 파단 위험이 커질 수 있다. 큰 변형과 충격을 흡수해 급격한 파단 가능성을 낮춘다. 적합 용도 외관 확인, 고정밀 시제품, 하중이 크지 않은 구조물에 적합하다. 스냅핏, 움직이는 힌지, 충격을 받는 시제품, 반복 변형 부품에 적합하다. 검토 포인트 강도와 치수 안정성 중심으로 평가한다. 강도, 연신율, 인성, 반복 변형 내구성을 함께 확인한다. 7. 실무 적용 포인트 레진 선택 시 최대 강도만 보지 말고 항복 거동, 연신율, 곡선 아래 면적을 함께 확인한다. 충격 또는 반복 변형이 예상되는 부품은 터프 레진 또는 연성 계열 재료를 우선 검토한다. 정밀 외관과 치수 안정성이 우선인 부품은 표준 레진 또는 고강성 레진이 유리할 수 있다. 노광 시간이 부족하면 강도와 표면 경화가 불안정해지고, 과도한 노광이나 후경화는 취성을 높일 수 있다. 스냅핏, 힌지, 체결부처럼 변형이 기능의 일부인 구조는 항복 이후 거동과 파단 전 변형률을 반드시 검토한다. 시험 데이터의 응력 단위, 변형률 단위, 시험 조건, 후경화 조건이 동일한지 확인한 뒤 재료를 비교한다. 8. 핵심 요약 구분 핵심 내용 응력-변형률 곡선 재료의 탄성, 소성, 항복, 변형 경화, 파단 거동을 한 번에 보여주는 기본 곡선이다. 공칭값과 진값 공칭 응력은 초기 치수를 기준으로 하고, 진응력은 변형 중 실제 치수를 기준으로 한다. 항복강도 재료가 영구 변형을 보이기 시작하는 응력이며, 명확하지 않을 때는 0.2% 오프셋 기준을 쓴다. 연성/취성 연성 재료는 파단 전 큰 소성 변형을 보이고, 취성 재료는 작은 변형 뒤 급격히 파단된다. 인성 응력-변형률 곡선 아래 면적으로 이해할 수 있으며, 충격과 변형 에너지 흡수 능력을 의미한다. 터
