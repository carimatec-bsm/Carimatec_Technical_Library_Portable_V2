          <div class="stat"><strong>${manuals.length}</strong><span>전체 문서</span></div>
          <div class="stat"><strong>${categories.length}</strong><span>대분류</span></div>
          <div class="stat"><strong>${lastUpdated}</strong><span>최종 수정일</span></div>
        </section>
        <section>
          <div class="section-head"><div><span class="eyebrow">Categories</span><h2>대분류</h2></div><button class="text-button" data-route="manuals">전체 보기 →</button></div>
          <div class="categories">${categories.map((category) => `<article class="category" data-category="${html(category.slug)}" style="--accent:${html(category.accent)}"><small>${countByCategory(category.name)}개 문서</small><h3>${html(category.name)}</h3><p>${html(category.description)}</p></article>`).join("")}</div>
        </section>
        <section>
          <div class="section-head"><div><span class="eyebrow">Featured</span><h2>추천 문서</h2></div></div>
          <div class="cards">${featured.map(card).join("")}</div>
        </section>
        <section>
          <div class="section-head"><div><span class="eyebrow">Recent</span><h2>최근 추가 문서</h2></div></div>
          <div class="recent-list">${recent.map((manual) => `<button class="recent-row" data-manual="${html(manual.slug)}"><span>No. ${pad(manual.id)}</span><strong>${html(manual.title)}</strong><small>${html(manual.category)}</small><span>→</span></button>`).join("")}</div>
        </section>`;
      }

      function home() {
        const recent = [...manuals].sort((a, b) => b.id - a.id).slice(0, 5);
        const featured = manuals.filter((manual) => manual.featured).slice(0, 4);
        return `<section class="hero" aria-label="CARIMATEC Academy 표지">
          <div class="hero-brand">
            <img src="assets/brand/carimatec-logo-black.png" alt="carimatec">
            <span>Academy</span>
          </div>
          <div class="hero-copy">
            <span class="eyebrow">CARIMATEC Academy</span>
            <h1><span>광중합 3D 프린팅</span><span>기술 아카데미</span></h1>
            <p>광중합 기반 3D 프린팅의 원리부터 장비 운용, 출력 품질, 소재 활용까지 캐리마텍의 기술 노하우를 체계적으로 학습할 수 있는 통합 기술 플랫폼입니다.</p>
            <div class="hero-actions">
              <button class="primary" data-route="manuals">문서 목록 보기 →</button>
              <button class="secondary" data-category="${html(categories[0].slug)}">대분류로 탐색</button>
            </div>
            <label class="hero-search" aria-label="문서 제목, 키워드, 본문 검색">
              <strong>검색</strong>
              <input id="home-search" type="search" placeholder="문서 제목, 키워드, 본문 검색">
              <span aria-hidden="true">⌕</span>
            </label>
            <div id="home-quick-results" class="quick-results hero-results" hidden></div>
          </div>
          <div class="hero-panel">
            <span class="eyebrow">Technical Library</span>
            <h2><span>Photopolymer</span><span>3D Printing</span></h2>
            <p>Manual Collection</p>
            <div class="hero-metrics" aria-label="라이브러리 요약">
              <div><i>01</i><strong>${manuals.length}</strong><span>Manuals</span></div>
              <div><i>02</i><strong>${categories.length}</strong><span>Topics</span></div>
              <div class="metric-date"><i>Updated</i><strong>${lastUpdated}</strong><span>최종 수정일</span></div>
            </div>
            <div class="hero-tags" aria-label="주요 주제">
              <span>출력 품질</span><span>서포트</span><span>파라미터</span><span>레진 관리</span><span>내구성</span><span>문제 해결</span>
            </div>
          </div>
        </section>
        <section class="stats" aria-label="라이브러리 현황">
          <div class="stat"><strong>${manuals.length}</strong><span>전체 문서</span></div>
          <div class="stat"><strong>${categories.length}</strong><span>대분류</span></div>
          <div class="stat"><strong>${lastUpdated}</strong><span>최종 수정일</span></div>
        </section>
        <section>
          <div class="section-head"><div><span class="eyebrow">Categories</span><h2>대분류</h2></div><button class="text-button" data-route="manuals">전체 보기 →</button></div>
          <div class="categories">${categories.map((category) => `<article class="category" data-category="${html(category.slug)}" style="--accent:${html(category.accent)}"><small>${countByCategory(category.name)}개 문서</small><h3>${html(category.name)}</h3><p>${html(category.description)}</p></article>`).join("")}</div>
        </section>
        <section>
          <div class="section-head"><div><span class="eyebrow">Featured</span><h2>추천 문서</h2></div></div>
          <div class="cards">${featured.map(card).join("")}</div>
        </section>
        <section>
          <div class="section-head"><div><span class="eyebrow">Recent</span><h2>최근 추가 문서</h2></div></div>
          <div class="recent-list">${recent.map((manual) => `<button class="recent-row" data-manual="${html(manual.slug)}"><span>No. ${pad(manual.id)}</span><strong>${html(manual.title)}</strong><small>${html(manual.category)}</small><span>→</span></button>`).join("")}</div>
        </section>`;
      }

      function manualsPage(categoryName = "all") {
        const results = searchManuals(listState.query, categoryName).sort((a, b) => a.id - b.id);
        return `<section class="page-header"><span class="eyebrow">Manuals</span><h1>전체 기술 매뉴얼</h1><p>관리 번호 1~17번 기준으로 정리한 캐리마텍 기술 문서 목록입니다.</p></section>
        <section class="filter">
          <label class="search"><span>검색</span><input id="list-search" value="${html(listState.query)}" placeholder="문서 제목, 키워드, 본문 검색"></label>
          <div class="tabs">
            <button data-filter="all" class="${categoryName === "all" ? "active" : ""}">전체</button>
            ${categories.map((category) => `<button data-filter="${html(category.name)}" class="${categoryName === category.name ? "active" : ""}">${html(category.name)}</button>`).join("")}
          </div>
          <strong>${results.length} / ${manuals.length}</strong>
        </section>
        <section class="cards">${results.map(card).join("")}</section>`;
      }

      function categoryPage(slug) {
        const category = byCategorySlug(slug);
        if (!category) return manualsPage();
        listState.category = category.name;
        const items = manuals.filter((manual) => manual.category === category.name);
        return `<section class="page-header" style="border-top:5px solid ${html(category.accent)}">
          <button class="back" data-route="manuals">← 전체 매뉴얼</button>
          <span class="eyebrow">Category</span><h1>${html(category.name)}</h1><p>${html(category.description)}</p><strong>${items.length}개 문서</strong>
        </section>
        <section class="category-switcher" aria-label="대분류 선택">
          <div class="section-head"><div><span class="eyebrow">Browse</span><h2>다른 대분류 보기</h2></div></div>
          <div class="category-switcher-grid">
            ${categories.map((item) => `<article class="category-switch ${item.slug === category.slug ? "active" : ""}" data-category="${html(item.slug)}" style="--accent:${html(item.accent)}"><span>${countByCategory(item.name)}개</span><strong>${html(item.name)}</strong></article>`).join("")}
          </div>
        </section>
        <section class="cards" style="margin-top:22px;">${items.map(card).join("")}</section>`;
      }

      function blockToHtml(block, manualTitle) {
        if (block.type === "heading") return `<h${block.level} id="${html(block.id)}">${html(block.text)}</h${block.level}>`;
        if (block.type === "paragraph") return `<p>${html(block.text)}</p>`;
        if (block.type === "formula") return `<p class="formula">${html(block.text)}</p>`;
        if (block.type === "callout") return `<aside class="callout ${block.tone === "warning" ? "warning" : ""}">${html(block.text)}</aside>`;
        if (block.type === "reference") return `<p class="reference">${html(block.text)}</p>`;
        if (block.type === "image") return `<figure><img src="${html(block.path)}" alt="${html(block.alt || manualTitle + " 시각 자료")}"><figcaption>${html(block.fileName)}</figcaption></figure>`;
        if (block.type === "slide") {
          const label = block.label || "슬라이드";
          const image = block.imagePath
            ? `<figure class="slide-image"><img src="${html(block.imagePath)}" alt="${html(block.imageAlt || manualTitle + " " + label + " " + block.slideNumber)}"></figure>`
            : `<div class="slide-fallback"><strong>${html(label)} ${html(block.slideNumber)}</strong><span>${html(block.title || "")}</span></div>`;
          const gifs = block.gifs?.length
            ? `<div class="slide-gifs">${block.gifs.map((gif) => `<figure><img src="${html(gif.path)}" alt="${html(gif.alt || manualTitle + " GIF")}"><figcaption>${html(gif.fileName)}</figcaption></figure>`).join("")}</div>`
            : "";
          return `<section class="slide-block">${image}${gifs}</section>`;
        }
        if (block.type === "table") return `<div class="table-wrap"><table><tbody>${block.rows.map((row, rowIndex) => `<tr>${row.map((cell) => rowIndex === 0 ? `<th>${html(cell)}</th>` : `<td>${html(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
        return "";
      }

      function tocHtml(blocks) {
        const slideEntries = [];
        const headings = [];
        let currentHeading = null;

        for (const block of blocks) {
          if (block.type === "heading") {
            currentHeading = block;
            headings.push(block);
            continue;
          }
          if (block.type !== "slide" || !block.imagePath) continue;
          const label = `${block.label || "슬라이드"} ${block.slideNumber}`;
          slideEntries.push({
            id: currentHeading?.id || `slide-${block.slideNumber}`,
            label,
            imagePath: block.imagePath,
            imageAlt: block.imageAlt || label
          });
        }

        if (slideEntries.length) {
          return `<aside class="toc"><h2>목차</h2><div class="toc-thumbnails">${slideEntries.map((entry) => `<a class="toc-thumbnail" data-scroll="${html(entry.id)}"><img src="${html(entry.imagePath)}" alt="${html(entry.imageAlt)}"><span>${html(entry.label)}</span></a>`).join("")}</div></aside>`;
        }

        return `<aside class="toc"><h2>목차</h2>${headings.map((heading) => `<a class="l${heading.level}" data-scroll="${html(heading.id)}">${html(heading.text)}</a>`).join("")}</aside>`;
      }

      function detailPage(slug) {
        const manual = bySlug(slug);
        if (!manual) return manualsPage();
        const manualContent = content(manual.id);
        const related = manuals.filter((candidate) => candidate.category === manual.category && candidate.id !== manual.id).slice(0, 3);
        const download = manual.downloadPath
          ? `<a class="download-link" href="${html(manual.downloadPath)}" download="${html(manual.downloadFileName || "")}" data-download>PDF 다운로드</a>`
          : "";
        return `<section class="detail-head">
          <div class="detail-title">
            <button class="back" data-route="manuals">← 전체 매뉴얼</button>
            <div class="manual-no">No. ${pad(manual.id)}</div>
            <h1>${html(manual.title)}</h1>
            <p>${html(manual.summary)}</p>
            <p><span class="pill">${html(manual.category)}</span> · ${html(manual.author)} · ${html(manual.version)} · ${html(manual.displayDate)}</p>
            ${download}
          </div>
          <img class="detail-cover" src="${html(manual.coverImage)}" alt="${html(manual.title)} 표지">
        </section>
        <div class="detail-layout">
          ${tocHtml(manualContent.blocks)}
          <div><article class="content">${manualContent.blocks.map((block) => blockToHtml(block, manual.title)).join("")}</article></div>
        </div>
        ${related.length ? `<section><div class="section-head"><div><span class="eyebrow">Related</span><h2>같은 대분류 문서</h2></div></div><div class="cards">${related.map(card).join("")}</div></section>` : ""}`;
      }

      function render() {
        const current = route();
        document.querySelectorAll(".nav button").forEach((button) => {
          const active = button.dataset.route === current || (button.dataset.route === "manuals" && current.startsWith("manual"));
          button.classList.toggle("active", active);
        });
        if (current === "home") app.innerHTML = home();
        else if (current === "manuals") app.innerHTML = manualsPage(listState.category);
        else if (current.startsWith("category:")) app.innerHTML = categoryPage(current.split(":")[1]);
        else if (current.startsWith("manual:")) app.innerHTML = detailPage(current.split(":")[1]);
        else app.innerHTML = home();
        window.scrollTo(0, 0);
      }

      document.addEventListener("click", (event) => {
        if (event.target.closest("[data-download]")) return;
        const routeButton = event.target.closest("[data-route]");
        if (routeButton) setRoute(routeButton.dataset.route);
        const manual = event.target.closest("[data-manual]");
        if (manual) setRoute("manual:" + manual.dataset.manual);
        const category = event.target.closest("[data-category]");
        if (category) setRoute("category:" + category.dataset.category);
        const scroll = event.target.closest("[data-scroll]");
        if (scroll) document.getElementById(scroll.dataset.scroll)?.scrollIntoView();
      });

      document.addEventListener("input", (event) => {
        if (event.target.id === "home-search") renderHomeQuickResults(event.target.value);
        if (event.target.id === "list-search") {
          listState.query = event.target.value;
          app.innerHTML = manualsPage(listState.category);
          const input = document.getElementById("list-search");
          input.focus();
          input.selectionStart = input.selectionEnd = input.value.length;
        }
      });

      document.addEventListener("click", (event) => {
        const filter = event.target.closest("[data-filter]");
        if (!filter) return;
        listState.category = filter.dataset.filter;
        app.innerHTML = manualsPage(listState.category);
      });

      window.addEventListener("hashchange", render);
      if (!location.hash) location.hash = "home";
      render();
    })();
  </script>
</body>
</html>
