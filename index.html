프 레진 충격 저항, 큰 변형 허용, 스냅핏 및 힌지 구조에 적합한 레진 선택지이다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 7}, "16": {"manualId": 16, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "레진 3D 프린터의 출력 속도는 단순히 장비가 빠르게 움직이는지만으로 결정되지 않는다. 출력 방식, 장비 구조, 광원 출력, 레이어 두께, 레진의 경화 특성, 모델 형상과 배치 방향이 함께 작용해 전체 출력 시간이 정해진다."}, {"type": "table", "rows": [["핵심 관점 | 속도를 높이면 생산성은 좋아질 수 있지만, 박리 안정성·노광 안정성·표면 품질·치수 안정성이 함께 확보되어야 한다."]]}, {"type": "heading", "level": 2, "text": "1. 출력 속도에 영향을 주는 주요 요인", "id": "section-2"}, {"type": "table", "rows": [["요인", "속도에 미치는 영향", "검토 포인트"], ["출력 방식", "SLA는 경로를 따라 경화하고, DLP/LCD는 레이어 면을 한 번에 경화하므로 방식별 시간 차이가 발생한다.", "방식별 장점과 정밀도 요구 수준을 함께 판단한다."], ["장비 구조", "레이어 이동, 박리, 리코팅 과정이 빠를수록 다음 레이어로 넘어가는 시간이 줄어든다.", "장비 최대 속도와 안정적인 분리 조건을 넘지 않는다."], ["광원 출력", "광원이 강하면 필요한 노광 시간을 줄일 수 있지만 과노광 위험도 커진다.", "레진, 레이어 두께, 세부 형상에 맞춰 조정한다."], ["레이어 두께", "얇은 레이어는 총 레이어 수가 늘어나 출력 시간이 길어진다.", "품질과 시간의 균형을 기준으로 선택한다."], ["레진 특성", "조성에 따라 경화 속도와 요구 노광 시간이 달라진다.", "사용 레진의 권장 조건과 실제 출력 결과를 함께 확인한다."], ["모델 형상", "높이, 단면적, 속이 빈 구조, 배치 방향에 따라 총 레이어 수와 박리 부담이 달라진다.", "배치 방향과 서포트 안정성을 함께 설계한다."]]}, {"type": "heading", "level": 2, "text": "2. 출력 방식: SLA, DLP, LCD의 속도 차이", "id": "section-3"}, {"type": "paragraph", "text": "SLA 방식은 레이저가 지정된 경로를 따라 점 또는 선 단위로 레진을 경화한다. 동일한 면적을 만들기 위해 레이저 이동 경로가 필요하므로, 복잡하거나 넓은 단면에서는 시간이 길어질 수 있다."}, {"type": "paragraph", "text": "DLP와 LCD 방식은 한 레이어의 단면을 면 단위로 노광한다. 같은 높이의 모델이라면 레이어 수가 동일할 때, 각 레이어를 한 번에 처리할 수 있어 일반적으로 빠른 출력에 유리하다."}, {"type": "image", "path": "assets/manuals/16_레진 3D 프린터의 출력 속도에 영향을 미치는 요인/sla.png", "alt": "레진 3D 프린터의 출력 속도에 영향을 미치는 요인 시각 자료", "fileName": "sla.png"}, {"type": "image", "path": "assets/manuals/16_레진 3D 프린터의 출력 속도에 영향을 미치는 요인/dlp.png", "alt": "레진 3D 프린터의 출력 속도에 영향을 미치는 요인 시각 자료", "fileName": "dlp.png"}, {"type": "image", "path": "assets/manuals/16_레진 3D 프린터의 출력 속도에 영향을 미치는 요인/lcd.png", "alt": "레진 3D 프린터의 출력 속도에 영향을 미치는 요인 시각 자료", "fileName": "lcd.png"}, {"type": "paragraph", "text": "LCD LCD 마스크를 통해 한 레이어 면을 동시에 노광"}, {"type": "paragraph", "text": "SLA: 레이저 경로 제어를 통해 정밀한 표현에 유리하지만 출력 시간이 길어질 수 있다."}, {"type": "paragraph", "text": "DLP/LCD: 레이어 면을 동시에 경화하므로 생산성 측면에서 유리하다."}, {"type": "paragraph", "text": "속도만 기준으로 방식 우열을 판단하지 말고, 요구 정밀도와 표면 품질까지 함께 비교한다."}, {"type": "heading", "level": 2, "text": "3. 장비 구조와 레이어 이동 시간", "id": "section-4"}, {"type": "paragraph", "text": "레진 3D 프린터는 장비별로 허용 가능한 최대 이동 속도와 안정적인 동작 범위가 정해져 있다. 설정값을 높이더라도 장비 구조와 제어 범위를 넘어서는 속도는 실제 출력에 반영되지 않거나 출력 실패 위험을 높인다."}, {"type": "paragraph", "text": "하부 조사 방식에서는 한 레이어가 경화된 뒤 FEP 필름 또는 탱크 바닥에서 출력물을 분리하는 과정이 필요하다. 이 박리 과정이 안정적으로 끝나야 다음 레이어를 만들 수 있으므로, 리프트 속도와 대기 시간은 출력 속도와 성공률을 동시에 좌우한다."}, {"type": "table", "rows": [["장비 파라미터 | 레이어 이동 관련 파라미터는 단축 대상으로만 보지 말고, 분리 안정성과 레진 재유입 시간을 확보하는 값으로 관리한다."]]}, {"type": "heading", "level": 2, "text": "4. 광원 출력과 노광 시간", "id": "section-5"}, {"type": "paragraph", "text": "레진 출력은 광원으로 액상 레진을 경화하는 공정이다. 광원 출력이 높으면 같은 경화량을 얻기 위한 노광 시간을 줄일 수 있어 출력 속도 향상에 도움이 된다."}, {"type": "paragraph", "text": "다만 노광 시간을 과도하게 줄이면 층간 접착이 부족해질 수 있고, 반대로 광원 출력이나 노광 시간이 과하면 형상이 두꺼워지거나 세부 표현이 무너질 수 있다. 따라서 광원 출력과 노광 시간은 레진의 감도, 색상, 레이어 두께, 모델 형상에 맞춰 함께 조정한다."}, {"type": "heading", "level": 2, "text": "5. 레이어 두께와 총 출력 시간", "id": "section-6"}, {"type": "paragraph", "text": "전체 출력 시간은 모델 높이를 몇 개의 레이어로 나누는지에 크게 영향을 받는다. 예를 들어 같은 높이의 모델이라도 레이어 두께를 얇게 설정하면 필요한 레이어 수가 증가해 출력 시간이 길어진다."}, {"type": "table", "rows": [["레이어 두께", "출력 시간", "품질 경향"], ["얇게 설정", "레이어 수 증가로 시간이 길어짐", "층 자국이 줄고 세부 표현에 유리"], ["두껍게 설정", "레이어 수 감소로 시간이 짧아짐", "표면 단차가 커지고 세부 표현이 거칠어질 수 있음"]]}, {"type": "paragraph", "text": "치수 정확도나 표면 품질이 중요한 부품은 얇은 레이어를 우선 검토하고, 대형 형상이나 빠른 확인용 출력은 허용 가능한 범위에서 두꺼운 레이어를 사용할 수 있다."}, {"type": "heading", "level": 2, "text": "6. 레진 재료 조성과 경화 특성", "id": "section-7"}, {"type": "paragraph", "text": "레진은 단량체, 올리고머, 광개시제, 첨가제 등의 조합으로 구성된다. 이 조합에 따라 점도, 색상, 광 반응성, 경화 깊이, 기계적 물성이 달라지며 필요한 노광 시간도 달라진다."}, {"type": "image", "path": "assets/manuals/16_레진 3D 프린터의 출력 속도에 영향을 미치는 요인/material-combination.gif", "alt": "레진 3D 프린터의 출력 속도에 영향을 미치는 요인 시각 자료", "fileName": "material-combination.gif"}, {"type": "paragraph", "text": "레진 조성에 따라 경화 반응과 요구 노광 조건이 달라진다."}, {"type": "paragraph", "text": "광 반응성이 빠른 레진은 짧은 노광 시간으로도 경화가 가능할 수 있다."}, {"type": "paragraph", "text": "불투명하거나 색상이 진한 레진은 빛 투과가 제한되어 더 긴 노광 시간이 필요할 수 있다."}, {"type": "paragraph", "text": "강도, 탄성, 내열성 등 기능성 물성을 얻기 위한 첨가제는 경화 조건에도 영향을 준다."}, {"type": "heading", "level": 2, "text": "7. 모델 형상과 배치 방향", "id": "section-8"}, {"type": "paragraph", "text": "모델의 높이와 단면적은 출력 시간에 직접적인 영향을 준다. 같은 모델이라도 세워서 배치하면 총 레이어 수가 늘어날 수 있고, 눕혀서 배치하면 높이가 낮아져 출력 시간이 줄어들 수 있다."}, {"type": "paragraph", "text": "속이 비워진 출력물(Hollow Model)은 내부가 채워진 출력물보다 사용 레진량과 단면 부담을 줄일 수 있다. 다만 배출구, 내부 세척, 후경화 조건이 함께 설계되지 않으면 내부 잔류 레진과 응력 문제가 발생할 수 있다."}, {"type": "image", "path": "assets/manuals/16_레진 3D 프린터의 출력 속도에 영향을 미치는 요인/different-orientations.png", "alt": "레진 3D 프린터의 출력 속도에 영향을 미치는 요인 시각 자료", "fileName": "different-orientations.png"}, {"type": "paragraph", "text": "배치 방향에 따라 전체 높이와 레이어 수가 달라진다."}, {"type": "table", "rows": [["배치 판단 | 빠른 출력을 위해 무조건 눕히는 방식이 항상 정답은 아니다. 서포트 위치, 표면 품질, 박리 단면적, 후처리 흔적까지 함께 고려한다."]]}, {"type": "heading", "level": 2, "text": "8. 출력 속도 조정 시 주의 사항", "id": "section-9"}, {"type": "paragraph", "text": "속도 설정을 변경할 때는 한 번에 여러 값을 크게 바꾸지 말고, 결과를 확인할 수 있는 범위에서 단계적으로 조정한다."}, {"type": "paragraph", "text": "레이어 두께를 키우면 시간은 줄어들 수 있지만 표면 단차와 세부 표현 저하가 발생할 수 있다."}, {"type": "paragraph", "text": "리프트 속도를 높이면 시간이 줄어들 수 있으나, 박리 실패와 출력물 흔들림이 커질 수 있다."}, {"type": "paragraph", "text": "노광 시간을 줄이면 생산성은 올라갈 수 있지만, 층간 접착 부족과 형상 불안정이 발생할 수 있다."}, {"type": "paragraph", "text": "장비, 레진, 모델 형상, 배치 방향이 바뀌면 기존 속도 조건도 다시 검증한다."}, {"type": "heading", "level": 2, "text": "9. 핵심 요약", "id": "section-10"}, {"type": "table", "rows": [["구분", "핵심 내용"], ["출력 방식", "DLP/LCD는 면 단위 노광으로 빠른 출력에 유리하고, SLA는 경로 제어 기반의 정밀 표현에 유리하다."], ["장비 구조", "레이어 이동, 박리, 레진 재유입 시간이 전체 출력 시간을 결정한다."], ["광원/노광", "광원 출력과 노광 시간은 속도와 경화 안정성을 함께 결정한다."], ["레이어 두께", "얇은 레이어는 품질에 유리하지만 레이어 수가 늘어나 시간이 길어진다."], ["재료", "레진 조성에 따라 경화 속도와 권장 노광 조건이 달라진다."], ["모델/배치", "모델 높이, 단면적, 속이 빈 구조, 배치 방향이 출력 시간과 성공률에 영향을 준다."]]}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "different-orientations.png", "path": "assets/manuals/16_레진 3D 프린터의 출력 속도에 영향을 미치는 요인/different-orientations.png", "kind": "image", "alt": "레진 3D 프린터의 출력 속도에 영향을 미치는 요인 시각 자료 16-1"}, {"fileName": "dlp.png", "path": "assets/manuals/16_레진 3D 프린터의 출력 속도에 영향을 미치는 요인/dlp.png", "kind": "image", "alt": "레진 3D 프린터의 출력 속도에 영향을 미치는 요인 시각 자료 16-2"}, {"fileName": "lcd.png", "path": "assets/manuals/16_레진 3D 프린터의 출력 속도에 영향을 미치는 요인/lcd.png", "kind": "image", "alt": "레진 3D 프린터의 출력 속도에 영향을 미치는 요인 시각 자료 16-3"}, {"fileName": "material-combination.gif", "path": "assets/manuals/16_레진 3D 프린터의 출력 속도에 영향을 미치는 요인/material-combination.gif", "kind": "gif", "alt": "레진 3D 프린터의 출력 속도에 영향을 미치는 요인 시각 자료 16-4"}, {"fileName": "sla.png", "path": "assets/manuals/16_레진 3D 프린터의 출력 속도에 영향을 미치는 요인/sla.png", "kind": "image", "alt": "레진 3D 프린터의 출력 속도에 영향을 미치는 요인 시각 자료 16-5"}], "searchText": "0. 개요 레진 3D 프린터의 출력 속도는 단순히 장비가 빠르게 움직이는지만으로 결정되지 않는다. 출력 방식, 장비 구조, 광원 출력, 레이어 두께, 레진의 경화 특성, 모델 형상과 배치 방향이 함께 작용해 전체 출력 시간이 정해진다. 핵심 관점 | 속도를 높이면 생산성은 좋아질 수 있지만, 박리 안정성·노광 안정성·표면 품질·치수 안정성이 함께 확보되어야 한다. 1. 출력 속도에 영향을 주는 주요 요인 요인 속도에 미치는 영향 검토 포인트 출력 방식 SLA는 경로를 따라 경화하고, DLP/LCD는 레이어 면을 한 번에 경화하므로 방식별 시간 차이가 발생한다. 방식별 장점과 정밀도 요구 수준을 함께 판단한다. 장비 구조 레이어 이동, 박리, 리코팅 과정이 빠를수록 다음 레이어로 넘어가는 시간이 줄어든다. 장비 최대 속도와 안정적인 분리 조건을 넘지 않는다. 광원 출력 광원이 강하면 필요한 노광 시간을 줄일 수 있지만 과노광 위험도 커진다. 레진, 레이어 두께, 세부 형상에 맞춰 조정한다. 레이어 두께 얇은 레이어는 총 레이어 수가 늘어나 출력 시간이 길어진다. 품질과 시간의 균형을 기준으로 선택한다. 레진 특성 조성에 따라 경화 속도와 요구 노광 시간이 달라진다. 사용 레진의 권장 조건과 실제 출력 결과를 함께 확인한다. 모델 형상 높이, 단면적, 속이 빈 구조, 배치 방향에 따라 총 레이어 수와 박리 부담이 달라진다. 배치 방향과 서포트 안정성을 함께 설계한다. 2. 출력 방식: SLA, DLP, LCD의 속도 차이 SLA 방식은 레이저가 지정된 경로를 따라 점 또는 선 단위로 레진을 경화한다. 동일한 면적을 만들기 위해 레이저 이동 경로가 필요하므로, 복잡하거나 넓은 단면에서는 시간이 길어질 수 있다. DLP와 LCD 방식은 한 레이어의 단면을 면 단위로 노광한다. 같은 높이의 모델이라면 레이어 수가 동일할 때, 각 레이어를 한 번에 처리할 수 있어 일반적으로 빠른 출력에 유리하다. LCD LCD 마스크를 통해 한 레이어 면을 동시에 노광 SLA: 레이저 경로 제어를 통해 정밀한 표현에 유리하지만 출력 시간이 길어질 수 있다. DLP/LCD: 레이어 면을 동시에 경화하므로 생산성 측면에서 유리하다. 속도만 기준으로 방식 우열을 판단하지 말고, 요구 정밀도와 표면 품질까지 함께 비교한다. 3. 장비 구조와 레이어 이동 시간 레진 3D 프린터는 장비별로 허용 가능한 최대 이동 속도와 안정적인 동작 범위가 정해져 있다. 설정값을 높이더라도 장비 구조와 제어 범위를 넘어서는 속도는 실제 출력에 반영되지 않거나 출력 실패 위험을 높인다. 하부 조사 방식에서는 한 레이어가 경화된 뒤 FEP 필름 또는 탱크 바닥에서 출력물을 분리하는 과정이 필요하다. 이 박리 과정이 안정적으로 끝나야 다음 레이어를 만들 수 있으므로, 리프트 속도와 대기 시간은 출력 속도와 성공률을 동시에 좌우한다. 장비 파라미터 | 레이어 이동 관련 파라미터는 단축 대상으로만 보지 말고, 분리 안정성과 레진 재유입 시간을 확보하는 값으로 관리한다. 4. 광원 출력과 노광 시간 레진 출력은 광원으로 액상 레진을 경화하는 공정이다. 광원 출력이 높으면 같은 경화량을 얻기 위한 노광 시간을 줄일 수 있어 출력 속도 향상에 도움이 된다. 다만 노광 시간을 과도하게 줄이면 층간 접착이 부족해질 수 있고, 반대로 광원 출력이나 노광 시간이 과하면 형상이 두꺼워지거나 세부 표현이 무너질 수 있다. 따라서 광원 출력과 노광 시간은 레진의 감도, 색상, 레이어 두께, 모델 형상에 맞춰 함께 조정한다. 5. 레이어 두께와 총 출력 시간 전체 출력 시간은 모델 높이를 몇 개의 레이어로 나누는지에 크게 영향을 받는다. 예를 들어 같은 높이의 모델이라도 레이어 두께를 얇게 설정하면 필요한 레이어 수가 증가해 출력 시간이 길어진다. 레이어 두께 출력 시간 품질 경향 얇게 설정 레이어 수 증가로 시간이 길어짐 층 자국이 줄고 세부 표현에 유리 두껍게 설정 레이어 수 감소로 시간이 짧아짐 표면 단차가 커지고 세부 표현이 거칠어질 수 있음 치수 정확도나 표면 품질이 중요한 부품은 얇은 레이어를 우선 검토하고, 대형 형상이나 빠른 확인용 출력은 허용 가능한 범위에서 두꺼운 레이어를 사용할 수 있다. 6. 레진 재료 조성과 경화 특성 레진은 단량체, 올리고머, 광개시제, 첨가제 등의 조합으로 구성된다. 이 조합에 따라 점도, 색상, 광 반응성, 경화 깊이, 기계적 물성이 달라지며 필요한 노광 시간도 달라진다. 레진 조성에 따라 경화 반응과 요구 노광 조건이 달라진다. 광 반응성이 빠른 레진은 짧은 노광 시간으로도 경화가 가능할 수 있다. 불투명하거나 색상이 진한 레진은 빛 투과가 제한되어 더 긴 노광 시간이 필요할 수 있다. 강도, 탄성, 내열성 등 기능성 물성을 얻기 위한 첨가제는 경화 조건에도 영향을 준다. 7. 모델 형상과 배치 방향 모델의 높이와 단면적은 출력 시간에 직접적인 영향을 준다. 같은 모델이라도 세워서 배치하면 총 레이어 수가 늘어날 수 있고, 눕혀서 배치하면 높이가 낮아져 출력 시간이 줄어들 수 있다. 속이 비워진 출력물(Hollow Model)은 내부가 채워진 출력물보다 사용 레진량과 단면 부담을 줄일 수 있다. 다만 배출구, 내부 세척, 후경화 조건이 함께 설계되지 않으면 내부 잔류 레진과 응력 문제가 발생할 수 있다. 배치 방향에 따라 전체 높이와 레이어 수가 달라진다. 배치 판단 | 빠른 출력을 위해 무조건 눕히는 방식이 항상 정답은 아니다. 서포트 위치, 표면 품질, 박리 단면적, 후처리 흔적까지 함께 고려한다. 8. 출력 속도 조정 시 주의 사항 속도 설정을 변경할 때는 한 번에 여러 값을 크게 바꾸지 말고, 결과를 확인할 수 있는 범위에서 단계적으로 조정한다. 레이어 두께를 키우면 시간은 줄어들 수 있지만 표면 단차와 세부 표현 저하가 발생할 수 있다. 리프트 속도를 높이면 시간이 줄어들 수 있으나, 박리 실패와 출력물 흔들림이 커질 수 있다. 노광 시간을 줄이면 생산성은 올라갈 수 있지만, 층간 접착 부족과 형상 불안정이 발생할 수 있다. 장비, 레진, 모델 형상, 배치 방향이 바뀌면 기존 속도 조건도 다시 검증한다. 9. 핵심 요약 구분 핵심 내용 출력 방식 DLP/LCD는 면 단위 노광으로 빠른 출력에 유리하고, SLA는 경로 제어 기반의 정밀 표현에 유리하다. 장비 구조 레이어 이동, 박리, 레진 재유입 시간이 전체 출력 시간을 결정한다. 광원/노광 광원 출력과 노광 시간은 속도와 경화 안정성을 함께 결정한다. 레이어 두께 얇은 레이어는 품질에 유리하지만 레이어 수가 늘어나 시간이 길어진다. 재료 레진 조성에 따라 경화 속도와 권장 노광 조건이 달라진다. 모델/배치 모델 높이, 단면적, 속이 빈 구조, 배치 방향이 출력 시간과 성공률에 영향을 준다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 4}, "17": {"manualId": 17, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "MSLA(LCD/DLP) 방식의 출력 정확도는 XY 방향의 픽셀 피치, Z 방향의 레이어 두께, 그리고 각 픽셀에 전달되는 광량의 조합으로 결정된다. 픽셀은 화면에서 가장 작은 노광 단위이고, 레이어 두께는 한 층의 높이를 정하므로 두 값이 합쳐져 최소 출력 단위인 복셀(voxel)을 구성한다."}, {"type": "table", "rows": [["핵심 관점 | 광원 강도는 단순히 밝고 어두운 문제가 아니라, 가장자리 픽셀의 경화 범위를 조절해 실제 출력 치수와 표면 품질을 바꾸는 변수이다."]]}, {"type": "heading", "level": 2, "text": "1. 복셀과 출력 정확도", "id": "section-2"}, {"type": "paragraph", "text": "복셀은 3D 출력에서 부피를 가진 최소 표현 단위이다. XY 방향은 LCD 또는 DLP 이미지의 픽셀 크기와 연결되고, Z 방향은 레이어 두께와 연결된다. 따라서 픽셀 피치가 작고 레이어가 얇을수록 이론적인 표현 단위는 작아진다."}, {"type": "paragraph", "text": "다만 실제 출력에서는 광원 확산, 레진 반응성, 노광 시간, 산란, 안티앨리어싱 설정이 함께 작용한다. 화면 해상도만으로 최종 치수가 결정된다고 보면 작은 구멍, 얇은 벽, 모서리 품질을 안정적으로 관리하기 어렵다."}, {"type": "heading", "level": 2, "text": "2. MSLA(LCD/DLP) 이미지 형성 원리", "id": "section-3"}, {"type": "heading", "level": 2, "text": "50 µm 격자를 예로 들면, LCD 화면은 XY 방향으로 50 × 50 µm 픽셀 단위로 나뉘어 있다고 볼 수 있다. 흰색 픽셀은 빛을 통과시켜 액상 레진을 경화시키고, 검은색 픽셀은 빛을 차단해 해당 위치의 레진이 경화되지 않도록 한다.", "id": "section-4"}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/50-50µm-pixels.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "50-50µm-pixels.png"}, {"type": "paragraph", "text": "그림 1. 50 × 50 µm 픽셀 격자 예시"}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/whiteblack-pixels.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "whiteblack-pixels.png"}, {"type": "paragraph", "text": "그림 2. 흰색 픽셀과 검은색 픽셀의 노광 차이"}, {"type": "paragraph", "text": "이 방식은 구조가 명확하지만, 흑백만 사용할 경우 픽셀 격자보다 더 세밀한 중간 위치를 직접 표현하기 어렵다. 즉 화면상에서 1픽셀 단위로 켜고 끄는 제어만 가능하면 형상 간격도 픽셀 피치의 배수로 제한된다."}, {"type": "heading", "level": 2, "text": "3. 흑백 픽셀 방식의 간격 한계", "id": "section-5"}, {"type": "paragraph", "text": "네 개의 50 × 50 × 50 µm 복셀로 구성된 작은 형상을 배치한다고 가정하면, 두 형상 사이의 간격은 50 µm, 100 µm, 200 µm처럼 픽셀 피치의 배수로 쉽게 표현된다."}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/50µm-spacing.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "50µm-spacing.png"}, {"type": "paragraph", "text": "50 µm 간격"}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/100µm-spacing.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "100µm-spacing.png"}, {"type": "paragraph", "text": "100 µm 간격"}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/200µm-spacing.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "200µm-spacing.png"}, {"type": "paragraph", "text": "200 µm 간격"}, {"type": "paragraph", "text": "반대로 175 µm처럼 픽셀 피치의 정수 배수가 아닌 간격은 흑백 픽셀만으로 정확히 만들기 어렵다. 어느 픽셀을 켜면 과노광되고, 끄면 부족노광되는 중간 영역이 생기기 때문이다."}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/175µm-spacing.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "175µm-spacing.png"}, {"type": "paragraph", "text": "그림 3. 픽셀 피치의 배수가 아닌 간격 표현의 한계"}, {"type": "heading", "level": 2, "text": "4. 회색조와 부분 노광", "id": "section-6"}, {"type": "paragraph", "text": "회색 픽셀은 흰색과 검은색 사이의 중간 광량을 제공한다. 여기서 중요한 점은 회색이 픽셀의 절반만 켜진다는 뜻이 아니라, 같은 픽셀 면적 안에서 레진에 전달되는 총 광량이 줄어든다는 뜻이다."}, {"type": "paragraph", "text": "회색조 노광 시험에서는 어두운 회색에서 흰색까지 픽셀 밝기를 단계적으로 바꾸어 경화 반응을 확인한다. 일정 밝기 이하에서는 경화 반응이 거의 나타나지 않고, 임계 밝기를 넘으면 이전 층 위에 작은 반구형 경화 영역이 형성되기 시작한다."}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/pixels-gray-value.jpg", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "pixels-gray-value.jpg"}, {"type": "paragraph", "text": "그림 4. 픽셀 회색조 단계"}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/research-results.gif", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "research-results.gif"}, {"type": "paragraph", "text": "그림 5. 회색조 변화에 따른 경화 영역 성장"}, {"type": "heading", "level": 2, "text": "5. 광원 강도에 따른 복셀 크기 제어", "id": "section-7"}, {"type": "paragraph", "text": "광량이 증가하면 경화 영역은 먼저 옆 방향으로 빠르게 넓어지고, 이후 높이 방향으로도 점차 성장한다. 이 현상 때문에 픽셀의 밝기를 조절하면 흑백 격자의 한계를 일부 넘어서는 가장자리 보정이 가능하다."}, {"type": "paragraph", "text": "실제 출력에서는 회색 픽셀로 만들어진 작은 경화 영역이 인접한 흰색 픽셀의 경화 영역과 합쳐진다. 이때 가장자리의 유효 경화 폭이 달라지므로, 픽셀 하나보다 작은 수준의 치수 보정 효과를 얻을 수 있다."}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/gray-pixel.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "gray-pixel.png"}, {"type": "paragraph", "text": "회색 픽셀 배치"}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/hemivoxel.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "hemivoxel.png"}, {"type": "paragraph", "text": "인접 복셀과 합쳐진 부분 복셀"}, {"type": "heading", "level": 2, "text": "6. 출력 결과 해석", "id": "section-8"}, {"type": "paragraph", "text": "검증용 형상은 10 × 10 최소 복셀로 구성된 5개의 정사각형을 일정 간격으로 배치하여 광량 변화가 실제 치수에 미치는 영향을 확인한다. 각 정사각형의 상단 픽셀은 왼쪽에서 오른쪽으로 갈수록 흰색에서 검은색으로 낮아지고, 하단 픽셀은 반대로 검은색에서 흰색으로 높아지는 구조이다."}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/experiment-demonstration-illustration.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "experiment-demonstration-illustration.png"}, {"type": "paragraph", "text": "그림 6. 회색조 노광 검증용 형상 구성"}, {"type": "paragraph", "text": "출력 결과에서는 광량 단계에 따라 결손 또는 보정되는 거리가 약 0 µm, 12.5 µm, 25 µm, 37.5 µm, 50 µm 수준으로 달라진다. 이는 광원 강도 제어가 최소 픽셀 단위보다 세밀한 치수 조정에 활용될 수 있음을 보여준다."}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/print-results.jpg", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "print-results.jpg"}, {"type": "paragraph", "text": "그림 7. 광량 단계에 따른 실제 출력 결과"}, {"type": "heading", "level": 2, "text": "7. 안티앨리어싱 설정 항목", "id": "section-9"}, {"type": "paragraph", "text": "안티앨리어싱은 픽셀 가장자리에 회색조를 적용해 계단 현상을 줄이고, 모서리와 곡면의 유효 경화 범위를 조절하는 기능이다. 장비 프로파일과 저장 포맷에 따라 표시되는 항목은 달라질 수 있으나, 핵심적으로는 다음 세 값을 이해하면 된다."}, {"type": "table", "rows": [["항목", "역할", "조정 시 확인할 점"], ["Anti-aliasing Level", "가장자리 픽셀에 적용되는 회색조 단계 또는 보정 강도를 조절한다.", "값이 높으면 계단이 완화되지만, 작은 문자나 얇은 홈이 흐려질 수 있다."], ["Gray Level", "회색 픽셀의 광량 수준을 정해 가장자리 경화 폭에 영향을 준다.", "너무 높으면 치수가 커지고 틈이 메워질 수 있으며, 너무 낮으면 가장자리 보정 효과가 약하다."], ["Image Blur", "인접 픽셀 사이의 밝기 변화를 부드럽게 만들어 표면 거칠기를 낮춘다.", "과도하면 날카로운 모서리와 미세 디테일이 둔해질 수 있다."]]}, {"type": "heading", "level": 2, "text": "8. 현장 적용 기준", "id": "section-10"}, {"type": "paragraph", "text": "광원 강도와 안티앨리어싱은 표면 품질과 치수 정확도를 동시에 건드리는 설정이다. 한 번에 여러 값을 바꾸기보다, 레이어 두께와 기본 노광 조건이 안정된 상태에서 가장자리 보정 값을 단계적으로 조정해야 결과 해석이 명확해진다."}, {"type": "paragraph", "text": "계단 현상이나 픽셀 입자가 눈에 띄면 안티앨리어싱 단계와 블러 값을 소폭 높여 비교한다."}, {"type": "paragraph", "text": "구멍이 작아지거나 얇은 간격이 메워지면 Gray Level, Image Blur 또는 기본 노광 조건을 낮추는 방향으로 확인한다."}, {"type": "paragraph", "text": "레진 종류, 색상, 온도, 장비 광학 상태가 달라지면 동일 설정에서도 결과가 변할 수 있으므로 시험편으로 기록을 남긴다."}, {"type": "paragraph", "text": "실제 생산물에서는 외곽 치수뿐 아니라 홀, 슬롯, 문자, 얇은 벽처럼 민감한 형상을 함께 확인한다."}, {"type": "heading", "level": 2, "text": "9. 핵심 요약", "id": "section-11"}, {"type": "table", "rows": [["구분", "핵심 내용"], ["복셀", "출력 정확도의 최소 표현 단위는 픽셀 피치와 레이어 두께의 조합으로 결정된다."], ["흑백 한계", "픽셀을 완전히 켜거나 끄는 방식만 사용하면 간격과 가장자리는 픽셀 피치의 배수에 묶인다."], ["회색조", "중간 광량을 적용하면 가장자리의 유효 경화 폭을 조절할 수 있다."], ["안티앨리어싱", "회색조와 블러를 이용해 계단 현상을 줄이고 치수 보정을 수행한다."], ["검증", "작은 간격, 구멍, 얇은 벽, 문자 형상을 포함한 시험편으로 장비와 레진별 기준값을 잡는다."]]}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "100µm-spacing.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/100µm-spacing.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-1"}, {"fileName": "175µm-spacing.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/175µm-spacing.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-2"}, {"fileName": "200µm-spacing.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/200µm-spacing.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-3"}, {"fileName": "50-50µm-pixels.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/50-50µm-pixels.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-4"}, {"fileName": "50µm-spacing.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/50µm-spacing.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-5"}, {"fileName": "experiment-demonstration-illustration.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/experiment-demonstration-illustration.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-6"}, {"fileName": "gray-pixel.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/gray-pixel.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-7"}, {"fileName": "hemivoxel.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/hemivoxel.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-8"}, {"fileName": "pixels-gray-value.jpg", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/pixels-gray-value.jpg", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-9"}, {"fileName": "print-results.jpg", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/print-results.jpg", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-10"}, {"fileName": "research-results.gif", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/research-results.gif", "kind": "gif", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-11"}, {"fileName": "whiteblack-pixels.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/whiteblack-pixels.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-12"}], "searchText": "0. 개요 MSLA(LCD/DLP) 방식의 출력 정확도는 XY 방향의 픽셀 피치, Z 방향의 레이어 두께, 그리고 각 픽셀에 전달되는 광량의 조합으로 결정된다. 픽셀은 화면에서 가장 작은 노광 단위이고, 레이어 두께는 한 층의 높이를 정하므로 두 값이 합쳐져 최소 출력 단위인 복셀(voxel)을 구성한다. 핵심 관점 | 광원 강도는 단순히 밝고 어두운 문제가 아니라, 가장자리 픽셀의 경화 범위를 조절해 실제 출력 치수와 표면 품질을 바꾸는 변수이다. 1. 복셀과 출력 정확도 복셀은 3D 출력에서 부피를 가진 최소 표현 단위이다. XY 방향은 LCD 또는 DLP 이미지의 픽셀 크기와 연결되고, Z 방향은 레이어 두께와 연결된다. 따라서 픽셀 피치가 작고 레이어가 얇을수록 이론적인 표현 단위는 작아진다. 다만 실제 출력에서는 광원 확산, 레진 반응성, 노광 시간, 산란, 안티앨리어싱 설정이 함께 작용한다. 화면 해상도만으로 최종 치수가 결정된다고 보면 작은 구멍, 얇은 벽, 모서리 품질을 안정적으로 관리하기 어렵다. 2. MSLA(LCD/DLP) 이미지 형성 원리 50 µm 격자를 예로 들면, LCD 화면은 XY 방향으로 50 × 50 µm 픽셀 단위로 나뉘어 있다고 볼 수 있다. 흰색 픽셀은 빛을 통과시켜 액상 레진을 경화시키고, 검은색 픽셀은 빛을 차단해 해당 위치의 레진이 경화되지 않도록 한다. 그림 1. 50 × 50 µm 픽셀 격자 예시 그림 2. 흰색 픽셀과 검은색 픽셀의 노광 차이 이 방식은 구조가 명확하지만, 흑백만 사용할 경우 픽셀 격자보다 더 세밀한 중간 위치를 직접 표현하기 어렵다. 즉 화면상에서 1픽셀 단위로 켜고 끄는 제어만 가능하면 형상 간격도 픽셀 피치의 배수로 제한된다. 3. 흑백 픽셀 방식의 간격 한계 네 개의 50 × 50 × 50 µm 복셀로 구성된 작은 형상을 배치한다고 가정하면, 두 형상 사이의 간격은 50 µm, 100 µm, 200 µm처럼 픽셀 피치의 배수로 쉽게 표현된다. 50 µm 간격 100 µm 간격 200 µm 간격 반대로 175 µm처럼 픽셀 피치의 정수 배수가 아닌 간격은 흑백 픽셀만으로 정확히 만들기 어렵다. 어느 픽셀을 켜면 과노광되고, 끄면 부족노광되는 중간 영역이 생기기 때문이다. 그림 3. 픽셀 피치의 배수가 아닌 간격 표현의 한계 4. 회색조와 부분 노광 회색 픽셀은 흰색과 검은색 사이의 중간 광량을 제공한다. 여기서 중요한 점은 회색이 픽셀의 절반만 켜진다는 뜻이 아니라, 같은 픽셀 면적 안에서 레진에 전달되는 총 광량이 줄어든다는 뜻이다. 회색조 노광 시험에서는 어두운 회색에서 흰색까지 픽셀 밝기를 단계적으로 바꾸어 경화 반응을 확인한다. 일정 밝기 이하에서는 경화 반응이 거의 나타나지 않고, 임계 밝기를 넘으면 이전 층 위에 작은 반구형 경화 영역이 형성되기 시작한다. 그림 4. 픽셀 회색조 단계 그림 5. 회색조 변화에 따른 경화 영역 성장 5. 광원 강도에 따른 복셀 크기 제어 광량이 증가하면 경화 영역은 먼저 옆 방향으로 빠르게 넓어지고, 이후 높이 방향으로도 점차 성장한다. 이 현상 때문에 픽셀의 밝기를 조절하면 흑백 격자의 한계를 일부 넘어서는 가장자리 보정이 가능하다. 실제 출력에서는 회색 픽셀로 만들어진 작은 경화 영역이 인접한 흰색 픽셀의 경화 영역과 합쳐진다. 이때 가장자리의 유효 경화 폭이 달라지므로, 픽셀 하나보다 작은 수준의 치수 보정 효과를 얻을 수 있다. 회색 픽셀 배치 인접 복셀과 합쳐진 부분 복셀 6. 출력 결과 해석 검증용 형상은 10 × 10 최소 복셀로 구성된 5개의 정사각형을 일정 간격으로 배치하여 광량 변화가 실제 치수에 미치는 영향을 확인한다. 각 정사각형의 상단 픽셀은 왼쪽에서 오른쪽으로 갈수록 흰색에서 검은색으로 낮아지고, 하단 픽셀은 반대로 검은색에서 흰색으로 높아지는 구조이다. 그림 6. 회색조 노광 검증용 형상 구성 출력 결과에서는 광량 단계에 따라 결손 또는 보정되는 거리가 약 0 µm, 12.5 µm, 25 µm, 37.5 µm, 50 µm 수준으로 달라진다. 이는 광원 강도 제어가 최소 픽셀 단위보다 세밀한 치수 조정에 활용될 수 있음을 보여준다. 그림 7. 광량 단계에 따른 실제 출력 결과 7. 안티앨리어싱 설정 항목 안티앨리어싱은 픽셀 가장자리에 회색조를 적용해 계단 현상을 줄이고, 모서리와 곡면의 유효 경화 범위를 조절하는 기능이다. 장비 프로파일과 저장 포맷에 따라 표시되는 항목은 달라질 수 있으나, 핵심적으로는 다음 세 값을 이해하면 된다. 항목 역할 조정 시 확인할 점 Anti-aliasing Level 가장자리 픽셀에 적용되는 회색조 단계 또는 보정 강도를 조절한다. 값이 높으면 계단이 완화되지만, 작은 문자나 얇은 홈이 흐려질 수 있다. Gray Level 회색 픽셀의 광량 수준을 정해 가장자리 경화 폭에 영향을 준다. 너무 높으면 치수가 커지고 틈이 메워질 수 있으며, 너무 낮으면 가장자리 보정 효과가 약하다. Image Blur 인접 픽셀 사이의 밝기 변화를 부드럽게 만들어 표면 거칠기를 낮춘다. 과도하면 날카로운 모서리와 미세 디테일이 둔해질 수 있다. 8. 현장 적용 기준 광원 강도와 안티앨리어싱은 표면 품질과 치수 정확도를 동시에 건드리는 설정이다. 한 번에 여러 값을 바꾸기보다, 레이어 두께와 기본 노광 조건이 안정된 상태에서 가장자리 보정 값을 단계적으로 조정해야 결과 해석이 명확해진다. 계단 현상이나 픽셀 입자가 눈에 띄면 안티앨리어싱 단계와 블러 값을 소폭 높여 비교한다. 구멍이 작아지거나 얇은 간격이 메워지면 Gray Level, Image Blur 또는 기본 노광 조건을 낮추는 방향으로 확인한다. 레진 종류, 색상, 온도, 장비 광학 상태가 달라지면 동일 설정에서도 결과가 변할 수 있으므로 시험편으로 기록을 남긴다. 실제 생산물에서는 외곽 치수뿐 아니라 홀, 슬롯, 문자, 얇은 벽처럼 민감한 형상을 함께 확인한다. 9. 핵심 요약 구분 핵심 내용 복셀 출력 정확도의 최소 표현 단위는 픽셀 피치와 레이어 두께의 조합으로 결정된다. 흑백 한계 픽셀을 완전히 켜거나 끄는 방식만 사용하면 간격과 가장자리는 픽셀 피치의 배수에 묶인다. 회색조 중간 광량을 적용하면 가장자리의 유효 경화 폭을 조절할 수 있다. 안티앨리어싱 회색조와 블러를 이용해 계단 현상을 줄이고 치수 보정을 수행한다. 검증 작은 간격, 구멍, 얇은 벽, 문자 형상을 포함한 시험편으로 장비와 레진별 기준값을 잡는다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 3}, "18": {"manualId": 18, "blocks": [{"type": "heading", "level": 2, "text": "페이지 1", "id": "page-1"}, {"type": "slide", "slideNumber": 1, "label": "페이지", "title": "페이지 1", "text": "", "gifs": [], "imagePath": "assets/manuals/18_manual-18/page_001.png", "imageAlt": "IML-16K_사용자 매뉴얼(Kr) 페이지 1"}, {"type": "heading", "level": 2, "text": "페이지 2", "id": "page-2"}, {"type": "slide", "slideNumber": 2, "label": "페이지", "title": "페이지 2", "text": "", "gifs": [], "imagePath": "assets/manuals/18_manual-18/page_002.png", "imageAlt": "IML-16K_사용자 매뉴얼(Kr) 페이지 2"}, {"type": "heading", "level": 2, "text": "페이지 3", "id": "page-3"}, {"type": "slide", "slideNumber": 3, "label": "페이지", "title": "페이지 3", "text": "", "gifs": [], "imagePath": "assets/manuals/18_manual-18/page_003.png", "imageAlt": "IML-16K_사용자 매뉴얼(Kr) 페이지 3"}, {"type": "heading", "level": 2, "text": "페이지 4", "id": "page-4"}, {"type": "s m 두께의 게이지(100µm)를 사용하여 점검합니다. 게이지가 조형판의 네 모서리 모두에 끼워지지 않는다면, 정상적으로 보정(캘리브레이션)된 것으로 판단할 수 있습니다. 12 프린터 관리 영점 설정 영점 세팅을 시작하기 전에, 짧은 고정 볼트 4개를 먼저 풀고, 이어서 긴 고정 볼트 4개도 세팅을 진행할 수 있을 정도로 충분히 풀어 주십시오. 6 5 4 페이지 30 www.carimatec.com 28 IML-16K 사용자 매뉴얼 TEL.: 02)3663-8877 E-mail: sales@carima.co.kr부록 - B B. FEP 필름 교체 VAT 내부에 남아 있는 레진을 모두 제거한 뒤, IPA(이소프로필 알코올)를 사용하여 VAT를 세척하십시오. 양쪽 VAT 홀더를 들어 올린 후 VAT를 분리하십시오. 이후 VAT 하부에서 VAT를 고정하고 있는 모든 볼트를 풀어 주십시오. 모든 볼트를 풀면, 그림과 같이 VAT는 3개 부품(트레이, 트레이 커버, FEP Film) 으로 분리됩니다. 2 기존 시트는 폐기하고, 그림과 같이 트레이 하단(아래쪽)에 새 시트를 올려 놓으십시오. (시트가 정확히 중앙에 위치할 필요는 없으나, VAT 전체를 완전히 덮도록 배치해야 합니다.) 3 트레이 커버를 시트 위에 올린 뒤, 볼트를 대각선 순서로 한 개씩 번갈아 가며 조여 주십시오.4 모든 볼트를 완전히 조여 고정한 후, 칼을 사용하여 남은 시트를 잘라내십시오.5 페이지 31 www.carimatec.com 29 IML-16K 사용자 매뉴얼 TEL.: 02)3663-8877 E-mail: sales@carima.co.kr 부록- C C. USB 업데이트 1 2 업데이트에 사용할 USB를 준비한 후, USB를 장비에 삽입하여 업데이트를 진행하십시오. 프린터 설정 업데이트 USB 업데이트 장비가 재부팅되며 업데이트가 완료됩니다. * 업데이트 파일을 USB 드라이브의 최상위(루트) 폴더에 저장하십시오. 그렇지 않으면 프린터의 업데이트가 진행되지 않습니다. 페이지 32 www.carimatec.com 30 IML-16K 사용자 매뉴얼 TEL.: 02)3663-8877 E-mail: sales@carima.co.kr 부록- D 프린터 설치 시 다음 사항을 유의하십시오. 설치 시 주의사항 프린터에는 발열 부품이 포함되어 있으므로, 안전한 장소에 설치해야 합니다. 화기 또는 열원 주변은 피하고, 물기가 있거나 습도가 높은 환경, 환기가 충분하지 않은 장소에는 설치하지 마십시오. 프린터는 견고하고 수평이 유지되는 평탄한 바닥에 설치하십시오. 설치 후 작동 중 장비가 흔들리거나 이동하지 않도록 설치 상태를 확인하고, 필요 시 미끄럼 방지 패드(고무 패드) 등을 사용하여 안정적으로 고정하십시오. 프린터는 안정적이고 신뢰할 수 있는 전원에 연결하십시오. 전원 케이블은 통풍이 잘 되는 환경에서 정리하여 배치하고, 걸려 넘어질 위험이 없도록 하십시오. 또한 전원 코드가 꺾이거나 구부러지지 않도록 하고, 눌리거나 압착되지 않도록 주의하십시오. 정전이 잦은 지역에서는 설치 시 UPS(무정전 전원장치) 사용을 권장합니다. 우측 60cm 좌측 60cm후면 60cm 상부 60cm 페이지 33 www.carimatec.com 31 IML-16K 사용자 매뉴얼 TEL.: 02)3663-8877 E-mail: sales@carima.co.kr 캐리마텍 프린터 사용 중 자주 묻는 질문FAQ 프린터 전원을 끈 후, 후면 스위치를 내려 전원을 차단하십시오. 최소 1~3분 정도 기다린 뒤 다시 전원을 켜십시오. 문제가 해결되지 않으면 캐리마텍에 문의하십시오. 프린터가 작동하지 않습니다.Q. A. 캐리마텍은 VAT에 레진을 약 1/3~2/3 수준으로 채우는 것을 권장합니다. 출력하려면 레진이 얼마나 필요하나요?Q. A. 엔진 광원이 정상적으로 점등(노광)되는지 확인하십시오. 광원이 점등되지 않으면 캐리마텍에 문의하십시오. 프린터가 출력되지 않습니다.Q. A. 레진의 보증기간은 수령일로부터 6개월입니다. 레진은 모든 광원(빛) 으로부터 멀리하여 보관하십시오. 레진은 얼마나 보관할 수 있나요?Q. A. 출력을 즉시 중지한 후 조형판을 분리하십시오. 조형판에서 출력된 부품을 제거한 뒤, VAT 청소 기능(VAT Cleaning)을 사용하여 VAT 내부에 남아 있는 잔여물(찌꺼기)을 제거하십시오. 이후 출력을 다시 시작하십시오. 출력 중 출력물이 떨어지면 어떻게 해야 하나요?Q. A. 장기간 사용하지 않는 프린터의 VAT는 레진을 비운 뒤, 알코올(IPA)로 세척하십시오. 프린터의 전원 플러그를 분리하고, 비·바람·직사광선을 피할 수 있는 그늘진 장소에 보관하십시오. 프린터를 사용하지 않을 때는 어떻게 관리하나요?Q. A. CRV 파일은 캐리마 슬라이서 V2의 기본 파일 형식입니다. 서포트와 모델이 서로 분리된 상태로 인식되어 저장되므로, 서포트 작업을 완료해 저장한 후에도 필요 시 언제든지 수정할 수 있습니다. 반면 STL 파일은 서포트가 모델과 하나로 합쳐진 상태(일체형)로 저장되기 때문에, 저장 이후에는 서포트를 수정할 수 없습니다. “crv” 파일과 “stl” 파일의 차이점은 무엇인가요?Q. A. 부록- E 페이지 34 IML - 16K 사용자 매뉴얼 V0. 1 l 2026. 01. 21 ⓒ All Copyright is Reserved by CARIMATEC 제품&기타 문의 오전 9:00 – 오후 6:00 (월-금) T el.: 02)3663-8877 l E-mail: sales@carima.co.kr 07532, 서울시 강서구 양천로 551-17, 한화비즈메트로1차 1301~1303호 www.carimatec.com 캐리마텍 16K 고해상도 LCD 3D 프린터", "readingMinutes": 16}, "19": {"manualId": 19, "blocks": [{"type": "heading", "level": 2, "text": "페이지 1", "id": "page-1"}, {"type": "slide", "slideNumber": 1, "label": "페이지", "title": "페이지 1", "text": "", "gifs": [], "imagePath": "assets/manuals/19_IMD-C_사용자 매뉴얼(Kr)/page_001.png", "imageAlt": "IMD-C_사용자 매뉴얼(Kr) 페이지 1"}, {"type": "heading", "level": 2, "text": "페이지 2", "id": "page-2"}, {"type": "slide", "slideNumber": 2, "label": "페이지", "title": "페이지 2", "text": "", "gifs": [], "imagePath": "assets/manuals/19_IMD-C_사용자 매뉴얼(Kr)/page_002.png", "imageAlt": "IMD-C_사용자 매뉴얼(Kr) 페이지 2"}, {"type": "heading", "level": 2, "text": "페이지 3", "id": "page-3"}, {"type": "slide", "slideNumber": 3, "label": "페이지", "title": "페이지 3", "text": "", "gifs": [], "imagePath": "assets/manuals/19_IMD-C_사용자 매뉴얼(Kr)/page_003.png", "imageAlt": "IMD-C_사용자 매뉴얼(Kr) 페이지 3"}, {"type": "heading", "level": 2, "text": "페이지 4", "id": "page-4"}, {"type": "slide", "slideNumber": 4, "label": "페이지", "title": "페이지 4", "text": "", "gifs": [], "imagePath": "assets/manuals/19_IMD-C_사용자 매뉴얼(Kr)/page_004.png", "imageAlt": "IMD-C_사용자 매뉴얼(Kr) 페이지 4"}, {"type": "heading", "level": 2, "text": "페이지 5", "id": "page-5"}, {"type": "slide", "sli 는지 확인하고, 노광시 간 셋팅을 다시 하면, 출력이 될 수 있습니다. 이후에도 출력이 되지 않으면 (주)캐리마로 문의해 주시기 바랍니다. 레진을 개봉한 후, 최대 6개월까지가 보증기간입니다. 레진은 빛에 닿으면 경화가 될 수 있으므로 최대한 빛이 닿지 않는 곳에 보관하시기 바랍니다. 엔진이 켜지지 않아요. 레진은 얼만큼 넣으면 될까요? 출력이 아무것도 나오지 않아요. 레진의 사용수명은 어떻게 되나요? Q. Q. Q. Q. A. A. A. A. 유지 보수 먼저 작업을 중지 및 엔진을 끄고, 레진 탱크를 빼내어 찌꺼기를 걸러준 후 재출력합니다. 이때 조형판에 묻은 레진이 엔진으로 떨어지지 않도 록 주의하시기 바랍니다. 장비의 해상도가 맞지 않으면 출력이 되지 않기 때 문에 슬라이싱 작업 전 캐리마 슬라이서 소프트웨어 의 config에서 장비의 해상도와 빌드 사이즈를 반드 시 확인하여 주세요. 사용하지 않는 장비는 우선 레진 탱크 안의 레진을 비워주고 레진 탱크는 알코올로 가볍게 세척하여 보관합니다. 장비는 전원 코드를 뽑아 외부환경(비, 바람, 햇빛)에 노출되지 않는 곳에서 보관하도록 합니다. crv 파일은 (주)캐리마 슬라이서의 기본 확장자 파일이며 서포터 작업까지 완료하고 저장하였을 때 언제든 수정 가능하도 록 서포터와 모델이 따로 인식되어 저장됩니다. stl 파일의 경우는 저장하였을 때 서포터가 모델과 같은 하나의 덩어리로 묶여 수정이 불가합니다. 레진 탱크 안에 레진이 있는 경우 찌꺼기 유무를 확인하고, 남은 레진을 깔때기와 거름망으로 걸러 깨끗한 레진만 따로 보관합니다. 레진 탱크 안쪽에 묻은 레진은 휴지와 알코올을 사용하여 가볍게 닦습니다. 이때 레진과 알코올이 레진 탱크 틈 사이로 들어가지 않도록 유의해야 합니다. * 찌꺼기 제거를 위해 ‘조형면 청소’ 기능을 사용하셔도 됩니다. 출력 중, 출력물이 떨어지면 어떻게 하나요? 슬라이싱 파일을 넣었는데 해상도가 다르다고 나와요. 장비를 사용하지 않을 때, 어떻게 관리하나요? crv와 stl 파일의 차이가 무엇인가요? 레진 탱크는 어떻게 세척하나요? Q. Q. Q. Q. Q. A. A. A. A. A. 페이지 22 www.carima.co.kr 20 DM4K USER MANUAL 02-3663-8877 sales@carima.co.kr DM4K Manual V1.0 l 2023. 3. 16 ⓒ All copyright is reserved by Carima 제품 및 기타 문의 9:00 – 18:00 UTC+09:00 (Mon - Fri) Tel. 02-3663-8877 l Fax. 02-3283-4466 l sales@carima.co.kr 서울특별시 강서구 양천로 551-17 한화비즈메트로 1차 1301호 www.carima.com", "readingMinutes": 13}, "21": {"manualId": 21, "blocks": [{"type": "heading", "level": 2, "text": "페이지 1", "id": "page-1"}, {"type": "slide", "slideNumber": 1, "label": "페이지", "title": "페이지 1", "text": "", "gifs": [], "imagePath": "assets/manuals/21_CL300Pro_사용자 매뉴얼(KR)/page_001.png", "imageAlt": "CL300Pro_사용자 매뉴얼(Kr) 페이지 1"}, {"type": "heading", "level": 2, "text": "페이지 2", "id": "page-2"}, {"type": "slide", "slideNumber": 2, "label": "페이지", "title": "페이지 2", "text": "", "gifs": [], "imagePath": "assets/manuals/21_CL300Pro_사용자 매뉴얼(KR)/page_002.png", "imageAlt": "CL300Pro_사용자 매뉴얼(Kr) 페이지 2"}, {"type": "heading", "level": 2, "text": . www.carima.co.kr CL300Pro EASY USE 페이지 2 본 사용자 매뉴얼은 CL300Pro의 원활한 작동을 위한 명확한 지침서로, 사용자가 쉽고 편리한 기능을 활용할 수 있도록 도와드립니다. 01목차 www.carima.co.kr 소개 제원 제품 개요 주의사항 01 목차 02 03 04 준비 및 경화 02 05 06 07 08 후처리 과정 LCD 패널 사용법 LED 파워 조절 모드 시작/일시정지 기능 온도 표시 sales@carima.co.kr02)3663-8877CL300Pro 사용자 매뉴얼 페이지 3 CL300Pro 소개 02소개 제원(Specification) CL300Pro는 Ø150 × 110mm 크기의 출력물을 한 번에 경화할 수 있는 고성능 컴팩트 경화기입니다. 300W UV LED 광원 쿨링: 공냉식 (Air Cooling) 히팅: 열풍식 (Hot Air Heating) 온도 조절 전기 사양 110 or 240V 60Hz 5A 제품 크기(mm) [W x D x H] 283 x 283 x 337 제품 무게 10 kg / 22 lbs 터치 스크린 제어 방식 경화 크기(mm) Ø150 x 110mm CL300Pro 사용자 매뉴얼 www.carima.co.kr 제품 외관도(Product Appearance) sales@carima.co.kr02)3663-8877 페이지 4 제품 외관 및 구성(Product Appearance & Components) 03소개 www.carima.co.kr 전면(Front) LCD 터치 스크린 도어 손잡이 01 후면(Rear/Back)02 냉각 팬 (x 2개) 파워 어댑터 커넥터 측면(Side)04상부(Top)03 전원 ON/OFF 버튼 sales@carima.co.kr02)3663-8877CL300Pro 사용자 매뉴얼 개폐(Closed) 개방(Opened) 개폐(Closed) 개방(Opened) 32 cm (후면 측면 높이) 28.3 cm (폭) 33.7 cm (전면 측면 높이) 28.3 cm (깊이) 페이지 5 본 내용은 사용자의 안전과 재산상의 손해를 예방하기 위한 것입니다. 사용 전 반드시 안전 주의 사항을 숙지하여 인체에 심각한 부상이나 프린터 손상이 발생하지 않도록 하십시오. 출력물 경화 시 특유의 냄새가 발생할 수 있으므로, 경화기는 환기가 잘되는 장소에 설치하십시오. 경화기 근처에서 휘발성 물질을 사용하면 화재 또는 폭발 위험이 있으므로 사용하지 마십시오. 경화기가 원활히 작동하도록 후면을 벽에서 30cm 이상 떨어뜨려 사용하십시오. 경화기에 물, 기타 액체, 금속 조각 등 전도성 이물질이 유입되면 기계적 고장을 유발하여 장비에 심각한 손상을 줄 수 있습니다. 또한 감전 위험이 있으므로 젖은 손으로 조작하지 말고, 액체나 이물질이 유입된 경우에는 반드시 제거 및 건조 후 사용하십시오. *제공된 니트릴 장갑 대신 라텍스 고무장갑을 사용하셔도 됩니다. 경화기가 작동 중일 때는 후면에 위치한 전원 스위치를 내리지 마십시오. 강제 종료는 경화기의 수명을 단축시키고 기계적 고장을 유발할 수 있습니다. 04 A/S 및 제품 보증 관련 문의는 ㈜캐리마로 연락하시어 상담을 받으시기 바랍니다. 전화: (02) 3663-8877 소개 www.carima.co.kr 주의 사항 전원 케이블이 거친 바닥에 끌리거나 밟혀 손상될 경우, 스파크나 전기적 오작동이 발생할 수 있습니다. 또한 전선이나 콘센트에 과도한 전류가 흐르면 과열로 인해 화재 위험이 있으니 주의하십시오. sales@carima.co.kr02)3663-8877 *경화가 종료된 후에는 냉각 시스템이 자동으로 가동되므로, 강제로 전원을 끄지 마십시오. CL300Pro 사용자 매뉴얼 작동 후에는 화상 위험이 있으므로 출력물을 제거할 때 반드시 보호 장갑을 착용하십시오. LCD 디스플레이의 표시 온도가 35 °C 이하일 때만 장비를 작동하십시오. 1회 동작 시 10분 이상 작동하지 마십시오. 심각한 고장의 원인이 될 수 있습니다. 페이지 6 05준비 및 경화 www.carima.co.kr CL300Pro로 경화하기 전, 먼저 출력물 상태를 확인하십시오. 준비 및 경화 후처리 과정 (Post-Processing) 캐리마 무독성 레진(CMYK/W) 사용 시에는 알코올 대신 캐리마의 친환경 세정제(RD-229)와 물로 세척할 수 있습니다. 경화 전, 출력물에 레진이 남아 있는 경우 반드시 세척하십시오. 남아 있는 레진은 알코올(IPA, 95% 이상)로 세척할 수 있으며, 분무기 등을 사용하면 더욱 손쉽게 세척할 수 있습니다. 알코올 농도가 높을수록 세척 효과가 향상됩니다. 출력물의 세밀한 부위는 모가 얇은 솔이나 칫솔 등을 사용하여 남아 있는 레진을 제거하십시오. 세척하기 01 * 알코올(IPA) 사용 시에는 반드시 보호 장비를 착용하십시오. * 세척통에 담글 경우, 최대 1시간을 초과하지 않도록 주의하십시오. 알코올 세척 후에는 알코올이 완전히 증발하도록 자연 건조하거나 공기 압축기를 이용해 건조하십시오. 건조하기 02 *공기 압축기 성능에 따라 출력물이 파손될 수 있으므로 주의하십시오. *공기 압축기(Air Compressor)는 캐리마에서 판매하지 않습니다. 연마 및 제거하기 04 출력물의 서포터 절단 부위에 자국이 남아 있다면, 사포(Sandpaper)로 연마하여 표면을 매끄럽게 만들 수 있습니다. 세척과 건조가 완료되면 출력물의 서포터를 손으로 제거하십시오. 서포터를 제거하지 않은 상태에서 경화한 경우, 니퍼를 사용하여 서포터를 제거할 수 있습니다. 서포터 제거하기 03 캐릭터 “또따” 출처: 서울교통공사 장시간 경화 시 출력물에 영향을 줄 수 있으므로 주의하십시오. *경화기와 사용 레진에 따라 경화 시간이 달라질 수 있으므로, 사전에 확인하십시오. 경화 작업 시에는 경화 시간을 한 번에 늘리는 것보다 짧은 시간으로 여러 번 작업하는 것이 출력물 변형을 줄일 수 있습니다. *UV 경화기 사용 시에는 UV를 직접 보지 말고, 차단 기능이 있는 선글라스나 고글을 착용하십시오. *경화 종료 후에는 냉각 시스템이 자동으로 가동되므로, 강제로 전원을 끄지 마십시오. 경화하기 05 sales@carima.co.kr02)3663-8877CL300Pro 사용자 매뉴얼 페이지 7 www.carima.co.kr 06 LCD 패널 사용법 전원 코드를 연결한 후, 경화기 후면에 있는 전원 스위치(ON/OFF)를 켭니다. 이후 LCD 패널 화면이 켜지며, LCD 패널을 통해 경화하는데 필요한 대부분의 설정을 구성할 수 있습니다. 버튼 설명 시간 설정 준비 및 경화 sales@carima.co.kr02-3663-8877CL300Pro 사용자 매뉴얼 시간 실시간 온도 UV 에너지 레벨 연속 모드 시간 설정 버튼을 누르면 숫자 키패드가 표시됩니다. · 시간은 1분 단위로 조정할 수 있습니다. · 경화 시간은 10분을 초과하여 설정하지 마십시오. 펄스 모드 모드 1 모드 2 + 강하게 - 약하게 시작 일시 중지 정지 KR/EN (언어 변경) 1 3 2 5 7 9 11 13 4 6 8 10 12 4가지의 경화 모드: · 연속 모드: UV LED가 설정된 시간 동안 계속 켜져 있는 모드 · 펄스 모드: UV LED가 일정 간격으로 깜박이며 켜졌다 꺼지는 모드 · 모드 1: UV 출력 90%, 작동 시간 10분 · 모드 2: UV 출력 90%, 작동 시간 2분 ① ② ① ⑤ ② ③ ⑨ ⑧ ⑫ ④ ⑥ ⑦ ⑩ ⑪ ⑬ 페이지 8 07 www.carima.co.krsales@carima.co.kr02)3663-8877 + 강하게 ·\"+\" 버튼을 누를 때마다 값이 10씩 증가합니다. 최대 설정 값은 100입니다. – 약하게 ·\"–\" 버튼을 누를 때마다 값이 10씩 감소합니다. 최소 설정 값은 10입니다. LED 파워 조절 모드 01 준비 및 경화 CL300Pro 사용자 매뉴얼 *LED 파워 고광량 사용 시 주의 사항: 특정 재료(예: Dental C&B)를 제외하고, LED 출력을 50% 이상으로 사용하지 마십시오. · 과도한 LED 출력은 경화물의 변색이나 오염을 초래할 수 있습니다. 페이지 9 08 www.carima.co.krsales@cari 니다. 또한, 과도한 전류로 인한 과열은 화재의 위험이 있으므로 단일 콘센트에 여러 장비를 연결하지 않도록 주의하여 주십시오. 측면에 위치한 비상 전원 차단 스위치는 긴급 상황 발생시에만 사용하십시오. 정상적인 종료 시에는 LCD 패널의 전원 종료 절차를 완료한 후, 디지털 광원 엔진의 냉각 과정이 완전히 종료 된 것을 확인하고 주 전원을 차단해 주십시오. 프린터 사용 전 반드시 보호도구(보호마스크, 보호안경, 보호장갑 등)를 착용하십시오. 또한, 감전 위험이 있으므로 젖은 손으로 프린터를 조작하지 마십시오. 프린터 내부에 물, 액체, 금속 조각 등 이물질이 유입되면 기계적 고장 및 장비 손상이 발생할 수 있으니 주의하십시오. 장비 작동 중에는 화재의 위험이 있으므로, 프린터 주변에서 라이터, 성냥 등 모든 종류의 화기(불) 사용을 절대 금지하여 주십시오. 장비 작동 중에는 광경화성 레진 및 동작부에 의한 끼임, 충돌 등의 위험이 존재합니다. 안전사고 예방을 위해, 장비는 비인가자 접근 통제 구역에 설치하고, 승인된 작업자 외 접근을 금지하여 주십시오. 승인 없이 프린터를 임의 분해하거나 개조할 경우, 제품 보증(무상 혜택)이 적용되지 않습니다. 또한, 이로 인해 발생하는 모든 손실 및 사고에 대해 제조사는 책임지지 않습니다. A/S 및 제품 보증 문의는 02)3663-8877 또는 당사 홈페이지 상담 채팅 서비스를 이용해 주십시오. 본 내용은 사용자의 안전과 재산상의 손해 등을 예방하기 위한 내용입니다. 장비 사용 전 반드시 주의 사항을 숙지하여 부상 및 장비 손상을 예방 하십시오. 경고 : 본 매뉴얼에 명시된 지침을 따르지 않아 발생한 모든 손상 및 사고에 대해 제조사는 책임지지 않습니다. 1. DM400 소개 1.1 안전 수칙 및 주의 사항 페이지 4 4 사용자 매뉴얼1. DM400 소개 1.2 설치 환경 세정액 탱크의 설치 위치는 실제 사용 환경에 따라 조절할 수 있습니다. 페이지 5 5 사용자 매뉴얼 DM400은 고해상도 엔진을 사용하여 넓은 면적에서도 정밀하고 완벽한 출력이 가능합니다. 1. DM400 소개 1.3 DM400 및 자동화 장치 제원 빌드 사이즈(mm) [ 가로 x 세로 x 높이] 픽셀사이즈(X/Y) 420 x 380 x 200 100 ㎛ 제품 사이즈(mm) [ 가로 x 세로 x 높이] 레이어 두께 1210 x 1000 x 1970 30, 50, 100 ㎛ 제품 무게 사용 환경 1,005 kg ( 장비 750kg, 레진 탱크) 온도 : 25 ℃ ± 3℃ / 습도 : 60% 미만 해상도 제어 방식 385 / 405 nm UV LED 터치식 임베디드 화면 및 키보드 DLP 엔진 광원 전기 사양 Dual 4K AC 220V 60Hz 10A 1.3 세척기 & 수거기 제원 01 02 03 세척기(Curing & Washing Device) 세척액 탱크(Wash Tank) 수거기(Collector) 제품 사이즈 •외부 사이즈(740 * 640 * 1100) 세척부 크기 내부 공간 (580 * 750 * 950) 제품 무게 DM400 제어 경화 방식 및 광원 UV-LED (395 nm) 세척 방식 회전식 필터 및 세척액 관리방법 30회 출력 후 필터 및 세척액 교체 전기사양 AC 220V, 60 Hz, 10A 제품 사이즈 400 * 400 * 250 세척통 용량 25L (x 4EA) 제품 사이즈 •외부 사이즈(780 * 740 * 1700) 제어 방식 DM400 제어, 풋 스위치 자동화 기능 자동 적재 적재 용량 수거통 (x 10EA) 전기사양 AC 220V, 60 Hz, 5A 페이지 6 6 사용자 매뉴얼 01 1.4 DM400 및 자동화장치 명칭 02 03 전면(Front) 후면(Rear) 내부 구조(Internal Structure) 1. DM400 소개 ① 듀얼 4K DLP 광학 엔진 ② Z축 액츄에이터 ③ 조형 블레이드 ④ 토출 블레이드 ⑤ 온도 컨트롤러 ① 냉각 팬 ② 전장부 ① 조작부 ② 상부 도어 ③ 하부도어 ①② ③ ① ② ④③ ⑤ 페이지 7 7 사용자 매뉴얼 1.4 DM400 및 자동화장 5. 연결 버튼 및 Indicator: 장치 연결 상태를 확인할 수 있습니다. 〮컨트롤 보드, PostProcess, 레벨 센서, 온도 컨트롤러, 엔진을 개별로 연결 할 수 있습니다. 단, 연결 된 컴포넌트를 연결해제 할 수 없습니다. 2. 준비 및 출력 2.3 프로그램 UI설명: 상단 바 페이지 14 14 사용자 매뉴얼 2. 프린트 버튼: 슬라이스 파일을 선택할 수 있는 화면으로 전환합니다. 여기서 프린트 작업을 시작할 수 있습니다. 14 1. PostProcess: 후공정SW를 실행하면 후공정 SW로 화면이 전환합니다. - 아래에 표시된 ① PostProcess 버튼을 눌러 프로그램을 실행하십시오. - 전환된 화면에서 ② Printer 버튼을 누르면 프린터 SW 화면으로 전환됩니다. 2. PostProcess 상태는 3가지 중 하나입니다. - 연결 안됨(Red): PostProcess 프로그램과의 통신이 연결되어 있지 않은 상태 - 이송 거부(Yellow Blink): PostProcess 프로그램과의 통신이 연결되어 있지만, 세척기가 출력물을 받을 준비가 되어 있지 않은 상태 - 이송 허용(Green Blink): PostProcess 프로그램과의 통신이 연결되어 있음, 세척기가 출력물을 받을 준비가 되어 있는 상태 2. 준비 및 출력 2.4 프로그램 UI설명: 하단 바 ① ② 페이지 15 15 사용자 매뉴얼 4. 설정 버튼: 장비 설정 파일에 접근할 수 있는 페이지입니다. 3. 제어 버튼: 프린트 외 장비 개별 동작을 수행할 수 있습니다. - 프린트/컬렉트 블레이드: 앞으로 이동, 뒤로 이동 - 조형판: Top/Origin/Bottom으로 이동, 키패드를 이용한 특정 거리만큼 이동 - 유틸리티 기능: 출력물 분리, 히팅, 레진 붓기, 레진 섞기 2. 준비 및 출력 2.4 프로그램 UI설명: 하단 바 페이지 16 16 사용자 매뉴얼 2. “다중선택” 버튼을 누르면 여러 개의 슬라이스 항목을 일괄적으로 선택할 수 있습니다. 1. 슬라이스 파일 리스트에서 슬라이스 항목을 하나씩 선택하면 해당 슬라이스 파일의 정보를 우측 패널에서 볼 수 있습니다. 2. 준비 및 출력2. 준비 및 출력 2.5 프린팅 작업 페이지 17 17 사용자 매뉴얼 3. “프린팅 리스트에 추가” 버튼을 누르면 슬라이스 파일 리스트에서 선택한 슬라이스 항목을 프린팅 리스트에 추가합니다 (최대 20개). 4. 프린팅 리스트에서 슬라이스 항목을 선택하고 “리스트에서 제외” 버튼을 누르면 프린트 항목에서 제외됩니다. “리스트 비우기” 버튼을 누를 경우 모든 슬라이스 항목이 프린팅 리스트에서 제외됩니다. 2. 준비 및 출력2. 준비 및 출력 2.5 프린팅 작업 페이지 18 18 사용자 매뉴얼 5. “내부 저장소” 버튼을 누르면 “외부 저장소”로 라벨이 바뀌면서 USB에 연결된 드라이브의 파일을 볼 수 있습니다. “외부 저장소“ 버튼을 누르면 다시 “내부 저장소”로 전환됩니다. (파일 삭제는 내부 저장소에서만 가능하며, 복사는 외부 저장소에서만 가능합니다) 6. “리스트 확장” 버튼을 누르면 프린팅 리스트의가 확장되고, “리스트 축소” 버튼을 누르면 프린팅 리스트의 길이가 원래대로 돌아옵니다. 프린팅 리스트 항목이 많을 경우 유용합니다. 우측 상하 화살표를 이용해서 프린트 순서를 변경할 수 있습니다. 2. 준비 및 출력2. 준비 및 출력 2.5 프린팅 작업 페이지 19 19 사용자 매뉴얼 7. 프린팅 리스트의 목록을 확인하고 우측 하단의 프린트 시작 버튼을 누르면 “이대로 프린트를 진행하시겠습니까?”라는 다이얼로그 창을 보실 수 있습니다. 확인 후 이상이 없으면 “예” 버튼을 눌러 프린트를 진행하십시오. 8. 프린트를 시작하게 되면 다음과 같은 화면을 볼 수 있습니다. 좌측에서는 슬라이스 항목의 프리뷰, 현재 적층 중인 슬라이스 이미지를 볼 수 있으며, 우측에서는 프린트 진행 상황을 볼 수 있습니다. 만약 프린트 중에 프린팅 리스트를 수정하고 싶으면 우측 하단의 “슬라이스 파일 리스트 보기” 버튼을 누르십시오. 2. 준비 및 출력2. 준비 및 출력 2.5 프린팅 작업 페이지 20 20 사용자 매뉴얼 9. 프린트 작업을 하는 도중에 “프린팅 리스트”에서 다음 작업을 추가하거나 순서를 변경할 수 있습니다. - ①: “리스트 비우기” 버튼을 누르면 현재 프린팅 중인 항목 외에 나머지 항목이 모두 지위짐 - ②: “프린팅 리스트에 추가” 버튼을 눌러 2개의 슬라이스 항목을 새로 추가함 - ③: 3번째 항목을 선택하고 “▲” 버튼을 누르면 2번째 항목으로 순서가 변경됨 ① ② ③ 2. 준비 및 출력2. 준비 및 출력 2.5 프린팅 작업 페이지 21 21 사용자 매뉴얼 10. “일시정지” 버튼을 누르면 프린트 작업 시퀀스가 잠시 멈추며 “재개” 버튼을 프린트 작업이 다시 진행됩니다. 11. “중단” 버튼을 누르면 이어서 프린트를 할 수 없고 출력물을 버려야 한다는 경고문을 보여줍니다. 정말로 프린트를 중단하실 거라면 “예”를 누르십시오. 프린트 중단 후에는 우측 하단 버튼이 활성화됩니다. 2. 준비 및 출력2. 준비 및 출력 2.5 프린팅 작업 페이지 22 22 사용자 매뉴얼 11. PostProcess 연결 시 자동 Removal 기능 PostProcess 가 연결되어 있을 경우, “프린트 후 자동 Removal ” 버튼이 자동 활성화됨. PostProcess가 연결되어 있지 않으면 비활성화됨. ① 활성화된 경우 • 프린트 완료 후, 조형판이 바닥으로 내려가 출력물 분리 작업을 수행함. • 분리 완료 후, 조형판이 최상단으로 이동함. • “이송 허용” 상태가 되면 Collect Blade 가 출력물을 밀어내어 수거함. ② 비활성화된 경우 다음 출력물이 남아 있는 경우 • 사용자에게 자동 분리 또는 수동 분리 여부를 묻는 메시지가 표시됨. • 자동 분리를 선택하면 조형판이 바닥으로 내려갔다가 올라옴. • 수동 분리를 선택하면 조형판이 바로 최상단으로 이동함. • 이후, 출력물 수거 완료 후 다음 출력을 진행할지 여부를 묻는 메시지가 표시됨. - “예” 선택 시, 출력 계속 진행됨. - “아니요” 선택 시, 프린트 중단됨. 마지막 출력물인 경우 • 프린트 완료 후 즉시 중단 상태로 전환됨. • 출력물은 레진 내에 담긴 채로 대기 상태로 유지됨. 2. 준비 및 출력2. 준비 및 출력 2.5 프린팅 작업 페이지 23 23 사용자 매뉴얼 1. 블레이드 제어 • Print / Collect 버튼을 누르면 조형판이 위로 올라감. • PgDn 버튼을 누르면 조형판이 블레이드를 전/후 방향으로 이동시킴. 2. 조형판 이동 • 조형판을 Top / Origin / Bottom 위치로 이동시킬 수 있음. • 현재 위치(x.xx) 버튼을 클릭하면, 미리 설정한 이동 간격에 따라 조형판이 이동함. • 키패드의 PgUp / PgDn 키를 이용해 조형판을 상하로 직접 이동시킬 수 있음. 3. 유틸리티 출력물 분리 • 프린트 완료 후 사용 가능함. • 단일 출력물인 경우, 출력물이 레진에 잠긴 상태로 프린트가 종료됨. • 이때 해당 버튼을 눌러 출력물을 분리한 뒤 조형판을 위로 올림. 히팅 버튼 • 온도 컨트롤러가 연결되어 있을 경우 자동으로 On 상태가 됨. • 필요 시 이 화면에서 수동으로 On/Off 제어 가능함. 레진 붓기 (Resin Fill) • 기능 활성 시 애니메이션 효과가 표시됨. • 프린팅 레벨과 현재 레벨이 거의 일치하면 남은 레진량 및 최대 레진량이 표시됨. • 남은 레진이 최대 레진량을 초과하지 않도록 주의하며 추가 투입해야 함. 레진 섞기 (Resin Mix) • 레진 투입 직후 출력 품질 향상을 위해 사용함. • 섞는 시간을 설정한 후 버튼을 누르면 자동으로 교반이 시작됨. • 작업 중 다시 버튼을 누르면 설정 시간이 남아 있어도 즉시 중단됨. 2. 준비 및 출력2. 준비 및 출력 2.6 프린팅 외 제어 1 2 3 페이지 24 24 사용자 매뉴얼 1. 블레이드 제어 〮프린트 블레이드 또는 컬렉트 블레이드 이동 버튼을 누르면 위와 같이 팝업 창에 로딩 이미지가 표시됩니다. 〮이동 동작이 끝나면 팝업 창이 없어집니다. 24 2. 조형판 이동 〮“Top/Origin/Bottom 으로 이동” 버튼을 누르면 위와 같은 팝업 창이 나오며 중도에 멈추고 싶으면 “확인” 버튼을 누르시고, 만약 목적지까지 끝까지 가는 것을 원할 경우 팝업 창이 자동으로 사라질 때까지 기다리면 됩니다. 〮참고로 유틸리티 메뉴의 “출력물 분리” 버튼 역시 동일한 팝업 창이 표시됩니다. 2. 준비 및 출력2. 준비 및 출력 2.6 프린팅 외 제어 페이지 25 25 사용자 매뉴얼 3-1. 레진 붓기 〮레진 보충 작업을 수행할 때 이 기능을 사용하십시오. 〮먼저 “레진 붓기 시작” 버튼을 누르면 “레진 붓기 끝” 버튼으로 바뀌며 옆에 애니메이션 표시됩니다. 이때 현재 레벨을 프린팅 레벨에 맞추기 위해 수위가 자동으로 조절 됩니다. 프린팅 레벨과 현재 레벨과의 격차가 0.1mm 내로 근접할 때 표시되는 남은 레진 값이 정확한 값입니다. 〮따라서, 최대 레진에 접근하기 시작하면 조심스럽게 레진을 추가 투입하십시오. 최대 레진의 양을 벗어나면 프린팅 시작이 불가능합니다. 〮레진 투입을 마친 후에는 “레진 붓기 끝” 버튼을 누르시면 애니메이션 효과가 사라지고 다시 “레진 붓기 시작” 버튼으로 바뀝니다. 3-2. 레진 섞기 〮“레진 섞기 시작” 버튼을 누르기 전에 섞는 시간을 설정하셔야 합니다. 〮“+1시간”, “+10 분” 버튼을 눌러서 섞는 시간을 쉽게 설정할 수 있으며, 시/분/초 값이 나와 있는 요소를 클릭한 후 키패드의 PgUp/PgDn 버튼을 눌러 직접 시간을 증가/감소시킬 수도 있습니다. 〮“초기화” 버튼을 누르면 섞는 시간이 “0:0:0”으로 바뀝니다. 〮조형판 위치 값은 조형판 이동의 최상단 위치, 최하단 위치를 의미합니다. 〮섞는 시간 설정 후에 “레진 섞기 시작” 버튼을 누르면 “레진 섞기 끝” 버튼으로 바뀌며 애니메이션 효과가 표시됩니다. 〮“레진 섞기 끝” 버튼을 누르면 조형판이 Origin으로 올 때까지 “레진 섞기 멈추는 중”이라고 표시되고, 동작을 완료하게 되면 다시 “레진 섞기 시작”으로 바뀝니다. 2. 준비 및 출력2. 준비 및 출력 2.6 프린팅 외 제어 페이지 26 26 사용자 매뉴얼 연결 팝업 창 비 활 성 화 시 활 성 화 시 ※ 실행 방법 〮 DM400 S/W의 PostProcess 버튼을 클릭하여 실행 〮 바탕화면에 있는 PostProcess 프로그램을 실행 ※ Auto Connect 비활성화 시 〮 즉시 메인 화면 실행 ※ Auto Connect 활성화 시 〮 장치 연결 먼저 진행 후 메인 화면 실행 PostProcess 3. 후공정 시스템 3.1 프로그램 실행 페이지 27 27 사용자 매뉴얼 1. Post Process: 레시피 선택 후 오류 점검 및 실행 기능이 있는 탭으로 메인 사이클 실행 시 필요한 기능이 들어가 있는 탭. 2. Dashboard: 메인 사이클이 실행 될 때 자동으로 넘어가는 탭으로 경과 시간, 반복 횟수, 예상 완료 시간, 현재 실행되고 있는 동작 정보 등 동작 중 필요한 정보가 총체적으로 들어있는 탭. 3. System: Connect(연결 관리), Stage(수동 모터 조작), Wash(수동 펌프 조작), Cure and Dry(수동 Fan, UV 조작), Liquid Manager(세척액 통합 관리), Transfer (출력물 토출, 투입 등 수동 조작) 으로 구성된 전체적인 관리 탭. 실행 시 처음 열리는 페이지 MainPCB – 메인 PCB의 연결 여부가 표시됨. (연결 시 Connected으로 변경됨) Collector – 수거장치의 연결 여부가 표시됨. (연결 시 Connected으로 변경됨) Client – DM400의 연결 여부가 표시됨. (연결 시 Connected로 변경됨) UV – UV 빛의 세기를 표시함. 강도에 따라 High, Medium, Low로 변경됨. Heat – Heat Fan의 전원 여부. Heat Fan이 켜지면 On으로 변경됨. Vent – Vent Fan의 전원 여부. Vent Fan이 켜지면 On으로 변경됨. Blow – Blow Fan의 전원 여부. Blow Fan이 켜지면 On으로 변경됨. Stage – Stage의 현재 위치를 표시함. 위치에 따라 Top, Middle, Bottom, Pin Blade – Blade의 현재 위치를 표시함. 위치에 따라 Rear, Front, Move(움직이는 도중) Bath – 현재 Bath에 있는 세척액이 몇 번 통에서 왔는지 표시함. #1,#2,#3,#4,--,Err Pump – 현재 Pump의 상태를 표시함. Stop, Wash, #1#2#3#4 Fill Up, Drain Liquid – 세척액의 상태를 표시함. 보라색 = 사용 가능, 회색 = 사용 불가능 Level – 각 세척액 통의 수위를 나타냄. H, M, L 3단계로 구성됨. Cycle – 해당 세척액을 몇 번 사용했는지 표시. Limit – 해당 세척액을 몇 번까지 사용할지 설정한 값이 표시. Printer 버튼 – DM400 프로그램이 실행 중일 경우 DM400 창으로 화면 이동, 실행 중이 아닐 경우 DM400 프로그램 실행. 3. 후공정 시스템 3.2 프로그램 UI설명: 좌측 상시 그룹 페이지 28 28 사용자 매뉴얼 1. 개발 제어 기능 〮 Connect : 각 컴포넌트를 연결할 수 있는 버튼들로 구성됨. 〮 Stage : Bath 내부의 Stage, 토출용 Blade 수동 조작 기능 버튼들로 구성됨. 〮 Wash : 세척액 공급/배수 및 세척 펌프 가동 수동 조작이 가능한 버튼 및 타이머로 구성됨. 〮 Cure and Dry : UV경화 및 Fan 수동 제어 버튼 및 타이머로 구성됨. 〮 Liquid Manager : 세척액 통합 관리 및 수명기록 관리, 오류 관리 등의 종합 기능으로 구성됨. 〮 Transfer : 출력물 투입, 토출 등의 수동조작 기능으로 구성됨. (개발용, 일반사용 접근 불가) 2. 프로그램 종료 〮 Exit to Windows : 살짝 오른쪽으로 Swipe 한 상태에서 기다리면 애니메이션 효과후에 종료 ※ 중요 확인 사항 〮 연결 된 컴포넌트를 임의로 Disconnect 할 수 없음 〮 자세한 설명은 27 페이지에 별도 첨부 3. 후공정 시스템 3.3 프로그램 UI설명: System 페이지 29 29 사용자 매뉴얼 ※ 각 컴포넌트 연결 기능 ■ Main Control Board: 메인 PCB와 연결하는 버튼임. • 버튼을 터치하면 Loading 화면이 표시됨, 후공정 장치의 Z축이 Zero Position 으로 이동함. • 동시에 좌측 상시 표시 그룹의 정보가 자동으로 업데이트됨. • 연결 완료 시 버튼 상태가 Connected 로 변경되고, 하단 Status Message 에 PCB Connection Success가 표시됨. • 연결 실패 시 Status Message 에 NoPort_PCB Connection Fail 또는 PCB Connection Fail이 표시됨. • 오류 코드에 대한 자세한 내용은 본 문서 마지막 페이지의 “Status Message 오류 모음” 참조. ■ Collector Board: 수거기 PCB와 연결하는 버튼임. • 연결 완료 시 버튼 상태가 Connected 로 변경되고, 하단 Status Message 에 CollectorPCB Connection Success가 표시됨. • 연결 실패 시 Status Message 에 NoPort_PCB Connection Fail 또는 CollectorPCB Connection Fail이 표시됨. • 오류 코드에 대한 자세한 내용은 본 문서 마지막 페이지의 “Status Message 오류 모음” 참조. ■ Printer Access (Server): 후공정 S/W 의 외부 연결 서버를 여는 기능임. • 주로 DM400 과의 통신 연결 시 사용됨. • DM400 없이 단독 사용 시에는 필요하지 않으나, 연결 후 사용할 경우 반드시 서버를 Open해야 함. • 서버 Open 성공 시 버튼 상태가 Server Open 으로 변경되고, 하단 Status Message 에 Post Process Server Open이 표시됨. • 이후 DM400 측에서 Connect 를 수행하면 양방향 통신이 활성화되며, 좌측 상시 표시 그룹의 Client 탭이 Connected 로 변경됨. • 연결 실패 시 Windows 시스템 오류가 발생할 수 있음. • 이 경우 반드시 ㈜캐리마텍 기술지원팀에 문의 요망. ■ Auto Connect (ON / OFF): 자동 연결 기능을 활성화 또는 비활성화함. • 자동 연결 활성화 시, 버튼 텍스트가 Auto Connect : ON으로 변경되고, 버튼 주변이 보라색으로 표시됨. • 자동 연결 비활성화 시, 버튼 텍스트가 Auto Connect : OFF로 변경되며, 버튼 주변의 보라색 표시가 해제됨. 3. 후공정 시스템 3.3 프로그램 UI설명: System 페이지 30 30 사용자 매뉴얼 ※ Collect Blade • Move to Rear – 블레이드를 후방 위치로 이동시킴. 이동 완료 시 좌측 상시 표시 그룹의 Blade 탭이 Rear로 변경됨. • Move to Front – 블레이드를 전방 위치로 이동시킴. 이동 완료 시 좌측 상시 표시 그룹의 Blade 탭이 Front로 변경됨. ※ Collect Blade – 실패 시 공통 • 실패 시 하단의 Status Message가 Main PCB Disconnected 또는 Stage Position Error로 변경됨. • Main PCB Disconnect – Main PCB와의 연결 확인 필요. • Stage Position Error – Stage 위치를 Top으로 변경 후 시도 필요. ※ Stage • Zero: Maintenance – Bath 내부의 Stage를 최상단으로 이동시키며 좌측 상시 표시 그룹의 Stage 탭에 - - 표시함. 이동 완료 시 해당 버튼 주위가 보라색으로 변함. 유지보수 등에 필요한 위치. • Top: To Collector - Bath 내부의 Stage를 완료 된 출력물을 토출하는 위치로 이동시키며 상시 표시 그룹의 Stage 탭에 Top 표시함. 이동 완료 시 해당 버튼 주위가 보라색으로 변함. Blade 제어 시 Stage 위치는 반드시 Top이어야 함. • Middle: From Client – Bath 내부의 Stage를 후공정장치로 출력물이 투입 되는 위치로 이동시키며 상시 표시 그룹의 Stage 탭에 Middle 표시함. 이동 완료 시 해당 버튼 주위가 보라색으로 변함. 프린터와 통신 대기 시 Stage 위치는 반드시 Middle이어야 함. • Bottom: Process – Bath 내부의 Stage를 세척/건조/경화 등이 수행 되는 위치로 이동시키며 상시 표시 그룹의 Stage 탭에 Bottom 표시함. 이동 완료 시 해당 버튼 주위가 보라색으로 변함. • Bottom: Pins – Bath 내부의 Stage를 핀이 있는 위치로 이동시키는 기능이지만 현 버전에서는 핀이 없어 사용하지 않음. • 클릭 시 Bottom 위치보다 약 2.5cm 아래로 내려가며, 이동 완료 시 해당 버튼 주위가 보라색으로 변함. • Up/Down Interval (sec) : 상하 인터벌 운동의 간격 을 변경함. 더블클릭 후 키패드를 조작하여 변경함. • Up/Down Move : 상하 인터벌 운동을 활성/비활성화 함. 활성화 시 Bottom : Process 위치와 Bottom : • Pins 위치를 움직이며 Up/Down Interval (sec) 간격으로 인터벌 운동을 실행함. 3. 후공정 시스템 3.3 프로그램 UI설명: System 페이지 31 31 사용자 매뉴얼 ※ Wash 〮 Pump On / Off : Bath - 내부의 액체 대류를 이용한 세척의 개시 및 종료 (세척 펌프 가동 버튼) 성공 시 오른쪽의 Timer 동작 시작, 내부 세척액 순환 펌프 동작 시작, 하단 Status Message가 Wash Start로 변경, 좌측 상시 표시 그룹의 Pump 탭이 Wash로 변경됨. 실패 시 Main PCB Disconnected, Bath is Empty, Wrong Stage Position, Check Liquid Error 등의 오류가 하단 Status Message에 표시되며, 오류 정보는 해당 문서의 마지막 페이지 Status Message 오류 모음 참조. 〮 Timer - 세척작업의 타이머, Pump On 시 자동 작동함. 각 화살표 버튼으로 시간을 조절할 수 있음. ※ Liquid 〮 Fill Up : Select에서 선택 된 Container의 세척액을 Bath에 투입함. 시작 시 로딩 화면이 표시되며 Select에서 선택 된 Container의 세척액이 떨어질 때 까지 Bath에 공급함. 공급 중 좌측 상시 표시 그룹의 Pump 탭이 #n(선택된 Container의 숫자)Fill Up으로 변경, 공급 완료 시 Bath 탭이 #n으로 변경. 실패 시 Liquid #n is not Available, Main PCB Disconnected, Bath is not Empty 등의 오류 메시지가 하단 Status Message에 표시되며, 오류 정보는 해당 문서의 마지막 페이지 Status Message 오류 모음 참조. 3. 후공정 시스템 3.3 프로그램 UI설명: System ※ Stage – 실패 시 〮 하단의 Status Message가 Blade Position Error 또는 Main PCB Disconnected로 변경됨. 〮 오류 정보는 해당 문서의 마지막 페이지 Status Message 오류 모음 참조. 페이지 32 32 사용자 매뉴얼 〮 Drain : Bath에서 Select에서 선택 된 Container로 세척액을 회수함. 시작 시 로딩 화면이 표시되며 Bath에 있는 세척액이 Select 에서 선택 된 Container로 모두 이동할 때 까지 회수 진행함. 회수 중 좌측 상시 표시 그룹의 Pump 탭이 #n(선택된 Container의 숫자)Drain으로 변경, 회수 완료 시 Bath 탭이 #n으로 변경. 실패 시 Liquid #n is not Available, Main PCB Disconnected, Bath is not Empty 등의 오류 메시지가 하단 Status Message에 표시되며, 오류 정보는 해당 문서의 마지막 페이지 Status Message 오류 모음 참조. Fill Up 및 Drain 을 임의로 중단할 경우, Liquid Manager에서 세척액의 위치정보에 대한 수정이 요구 됨. 1. UV Cure 〮 각각 High / Medium / Low 로 구동 됨. 옆면에 부착된 UV LED의 밝기가 선택한 강도에 따라 변화하며, 작동 시 자동으로 타이머가 같이 동작. 각 버튼은 동작 시 버튼 주변이 보라색으로 변함, 선택한 강도가 좌측 상시 표시 그룹의 UV 탭에 표시됨, 하단의 Status Message가 UV Cure Start로 변함. 2. Heat Dry 〮 단일 강도로 히팅 팬이 구동 되며, 작동 시 자동으로 타이머가 같이 동작함. 동일한 타이머를 UV Cure와 공유, 좌측 상시 표시 그룹의 Heat 탭이 On으로 변경, 버튼 주위 색이 보라색으로 변경, 하단의 Status가 HeatFan Start로 변함. 3. Air Vent 〮 세척 Bath 외부로의 환기조작. Vent Fan이 구동되며 타이머와 무관함. 작동 시 좌측 상시 표시 그룹의 Vent 탭이 On으로 변경, 버튼 주위 색이 보라색으로 변경. 4. 오류 〮 작동 실패 및 오류 발생 시 하단 Status Message가 Main PCB Disconnected로 변경됨. 〮 오류 정보는 해당 문서의 마지막 페이지 Status Message 오류 모음 참조. 3. 후공정 시스템 3.3 프로그램 UI설명: System 페이지 33 33 사용자 매뉴얼 ※ Liquid ■ Fill Up Select에서 선택된 Container 의 세척액을 Bath에 투입함. 시작 시 Loading 화면이 표시됨. 선택된 Container의 세척액이 모두 소진될 때까지 Bath로 공급함. 공급 중 좌측 상시 표시 그룹의 Pump 탭이 “#n Fill Up”으로 변경되며, 공급 완료 시 Bath 탭이 “#n”으로 변경됨. 실패 시 하단 Status Message 에 Liquid #n is not Available, Main PCB Disconnected, Bath is not Empty 등의 오류 메시지가 표시됨. 오류 정보는 본 문서 마지막 페이지의 Status Message 오류 모음 참조. ■ Drain Select에서 선택된 Container 로 Bath 내 세척액을 회수함. 시작 시 Loading 화면이 표시됨. Bath에 있는 세척액이 모두 이동할 때까지 회수 진행됨. 회수 중 좌측 상시 표시 그룹의 Pump 탭이 “#n Drain”으로 변경되며, 회수 완료 시 Bath 탭이 “#n”으로 변경됨. 실패 시 하단 Status Message 에 Liquid #n is not Available, Main PCB Disconnected, Bath is not Empty 등의 오류 메시지가 표시됨. 오류 정보는 본 문서 마지막 페이지의 Status Message 오류 모음 참조. ■ 주의 Fill Up 및 Drain 기능을 임의로 중단할 경우, Liquid Manager 에서 세척액 위치 정보의 수동 수정이 필요함. 3. 후공정 시스템 3.3 프로그램 UI설명: System 페이지 34 34 사용자 매뉴얼 1. Liquid Durability 〮 #1~#4의 세척액은 Bath에 들어갈 때마다 카운트가 올라감. 〮 상기 카운트를 분자/분모로 나눠서 관리. 〮 최대 수치는 임의로 조절이 가능함. 〮 Reset 버튼 클릭 시 현재 올라간 카운트를 0으로 초기화 함. 2. Liquid Availability 〮 Bath Liquid : 현재 Bath 에 투입 된 액체를 표기함. 〮 Error Check : 에러 발생시 이곳의 Error Exist를 해제하여 오류 상태를 해소해야 정상 작동함. 〮 오류 해소 방법은 해당 문서의 23페이지 작동 중 오류 복구 요령을 참조. 3. Manual Pump 〮 펌프를 사용자 임의로 조작할 수 있는 기능으로 오류 등 조건에 영향을 받지 않고 펌프를 강제 조작함. 조작 실패 시 하단 Status Message가 Main PCB Disconnected로 표시됨. 오류 정보는 해당 문서의 마지막 페이지 Status Message 오류 모음 참조. 〮 몇 번 Container에 세척액을 넣거나 뺄지 결정 후 Select에서 선택, Fill Up(공급), Drain(회수) 버튼 클릭하여 구동함. 〮 Wash Pump : 세척 펌프를 구동함. 〮 Stop All : 모든 펌프 조작을 멈춤. 3. 후공정 시스템 3.3 프로그램 UI설명: System 페이지 35 35 사용자 매뉴얼 1. Recipe List 〮 C:\\PostProcess_Carima\\Recipes에 저장된 레시피를 모두 불러와 리스트에 보여줌. 터치로 선택 가능. 2. Recipe Manager 〮 레시피 편집 및 실행 페이지로 이동하는 버튼 3. Data Property 〮 1회당 완료 예상 시간 / 반복 횟수 〮 레시피 실행 전 오류 점검 후 오류를 보여줌 4. Double Tap To Start 〮 더블클릭/탭 하여 프로세스 시작 3. 후공정 시스템 3.4 프로그램 UI설명: Post Process 페이지 36 36 사용자 매뉴얼 1. Action List 〮 전체 레시피의 진행 순서가 표시되며, 현재 진행중인 부분은 파란색 으로 선택되어 보여짐. 2. Data Property 〮 1회당 완료 예상 시간 / 반복 횟수 등이 표시됨. 3. Pause, Abort 〮 진행중인 과정을 일시정지, 완전 정지 〮 Abort의 경우 살짝 오른쪽으로 Swipe 한 상태에서 기다리면 애니메이션 효과 후 완전 정지 4. Status Message 〮 오류로 작동 정지 또는 버튼 정지시 메시지를 표시함 〮 Process Pause – Pause 버튼으로 작동 일시 정지 〮 Process Aborted – Abort 버튼으로 강제 정지 〮 Process Aborted by Pump Error – 펌프 오류로 인한 정지 5. Wait Parts Skip 〮 후공정장치가 DM400의 응답을 기다리는 Wait Parts 과정을 뛰어 넘고 작동함 (더블탭) 주의 : 프로세스 실행 중 Printer 버튼 제외한 좌측 상시 그룹 조작 불가 3. 후공정 시스템 3.5 프로그램 UI설명: Dashboard 페이지 37 37 사용자 매뉴얼 ※ Auto Connect 기능 사용 시 1, 2 과정은 건너뛰고 진행함 ① 메인 화면인 System 탭에서 Connect 버튼으로 Connect 창 진입 ② 표시된 버튼을 터치하여 Main PCB, Collector Board에 연결 DM400과 통신할 수 있는 서버 Open ④ 원하는 Recipe 선택 후 Double Tap To Start 버튼 더블 탭 하여 동작 실행 ③ Post Process 탭 터치하여 Recipe List 진입 ⑥ 실행 성공 시 Dashboard 탭으로 자동 이동되며 레시피 내용을 순차적으로 실행함. ⑤ 레시피 실행 실패 시 Status Message 부분에 에러 메시지 발생 3. 후공정 시스템 3.6 세척 실행 페이지 38 38 사용자 매뉴얼 1. 자동 연결에 실패했거나, 수동 연결에서 버튼을 눌러도 활성화되지 않는다면 물리적 통신 신호가 되지 않는 상황입니다. • PC 본체에 연결된 USB-시리얼 케이블 접속 여부를 확인하십시오. • 비상 버튼이 눌려서 장비가 Off 되어 있을 수 있으므로 비상 버튼을 원래 상태로 돌려 놓으십시오. • 그 외, 원인을 명확하게 알 수 없다면 담당 엔지니어에게 문의 바랍니다. Problem1. 통신 연결 실패 시 Problem2. 블레이드가 걸린 채로 멈추었을 때 1. 프린트 블레이드가 중간에 멈추었습니다. • 주된 원인은 기존 적층된 출력물을 제거하지 않은 채로 프린트를 시작할 경우 경화된 레진에 의해 발생합니다. 만약 조형판에 레진 잔여물이 보인다면 헤라 칼 등으로 제거한 후에 다시 처음부터 프린트 작업을 수행하십시오. • 그 외에 이물질이 벨트에 끼거나 조형판 수평이 틀어져서 프린트 블레이드가 멈출 수 있습니다. 문제 해결을 위해 담당 엔지니어에게 요청하십시오. 2. 컬렉트 블레이드가 중간에 멈추었습니다. • 주된 원인은 출력물이 많아서 부하로 인해 블레이드를 끝까지 밀지 못하는 경우가 있으며, 그 외에도 간혹 출력물이 조형판에서 제대로 떨어지지 않아서 블레이드가 밀지 못하는 경우도 있습니다. • 이 경우, 사용자가 출력물을 직접 조형판으로부터 세척기로 옮긴 후에 프린터 화면의 “재개” 버튼을 누르면 컬렉트 블레이드가 제대로 움직이게 되고 다음 출력물이 있다면 정상적으로 작업을 재개할 수 있습니다. (Post Process 소프트웨어에서 수동으로 세척하는 방법은 해당 매뉴얼을 참조하십시오) • 그 외, 원인을 명확하게 알 수 없다면 문제 해결을 위해 담당 엔지니어에게 요청하십시오. 4. 문제 해결(Troubleshooting) 4.1 프린팅 장치 페이지 39 39 사용자 매뉴얼 Problem3. 프린트 개시 후, 바로 프린트 중단되었을 때 1. 레진이 부족한 경우, 레진이 부족하다는 경고 창이 나오며 즉시 프린트 중단 상태가 됩니다. • 하단바의 제어 버튼을 누르십니다. • “레진 붓기 시작” 버튼을 누르고 프린팅 레벨 값과 현재 레벨 값이 거의 일치할 때까지 기다리십시오. • 남은 레진 값이 최대 레진을 초과하지 않도록 조금씩 레진을 투입하십시오. • 레진 투입 완료 후 “레진 붓기 끝” 버튼을 누르고 나서 다시 프린트를 시작하시면 됩니다. • 균일한 레진 온도 조건을 위해 레진 섞기 절차를 거치시기를 권장합니다. 4. 문제 해결(Troubleshooting) 4.1 프린팅 장치 페이지 40 40 사용자 매뉴얼 사진에 표시된 위치에 발생하는 에러 메시지 관련 치명적인 오류 정리 숫자 뒤에 !가 있는 것 – 치명적 오류 (실행 불가) 숫자 뒤에 ?가 있는 것 – 경고 (실행에는 문제 없음) • MainPCB Connect Error: 메인 PCB에 연결이 되지 않았을 때 발생. • Server Closed: 후공정장치 서버가 열려 있지 않을 경우 발생. • No Client Connect: 후공정장치 서버는 열려 있지만 클라이언트(DM400)이 아직 연결되지 않았을 경우 발생. • Collector Connect Error: Collector PCB 연결이 되지 않았을 경우 발생. • Stage Position Error: 현재 스테이지 위치가 명령이 요구하는 위치와 맞지 않을 경우 발생. • Bath Liquid is already #N: Fill Up 명령으로 같은 통의 세척액을 다시 넣으려 하거나 이미 세척액이 차있는 상태에서 다른 세척액으로 Fill Up을 시도할 경우 발생 • Liquid Available Error #N: Fill Up 하려는 세척액 통의 Available 상태가 0(이미 사용중)이고 Bath에 세척액이 들어있지 않은 경우 발생. • Wrong Drain Path: Drain 명령에서 지정한 세척액 통의 번호와 실제 Bath에 있는 세척액이 나온 세척액 통의 번호가 다를 경우 발생. • Liquid is Already full: Drain 명령으로 세척액을 배출하는데 해당 세척액 통의 Available 상태가 1(사용 중이 아님)일 경우 발생. • Bath is Empty: 세척 동작을 실행할 때 Bath가 비어 있을 경우 발생. • Blade Position Error: 블레이드 위치가 후방 대기 위치가 아니거나 스테이지가 Top이 아닌데, Blade 전진을 시도하는 경우 발생. 4. 문제 해결(Troubleshooting) 4.2 후공정 장치_작동 전 페이지 41 41 사용자 매뉴얼 Bath Liquid is already #N, Liquid is Already full 의 경우 Liquid Manager 에서 해소 필요. 1. 부분을 None으로 체크 2. 부분의 체크를 해제 3. 세척액이 실제로 Bath에 차있는 경우 Drain 조작으로 원래 세척액이 있던 세척액 통으로 이동시켜야 함. 4. Liquid Available Error #N의 경우 부분이 체크 된 경우 체크 해제, 체크 해제 되어 있는 경우 체크 후 해제 조치 필요. 부분의 #3, #4를 보면 회색으로 표시된 부분을 다시 보라색으로 돌아오게 되면 조치 완료. Stage Position Error, Bath is Empty, Blade Position Error, Wrong Drain Path 오류 • 이 경우 대부분 레시피가 잘못되었을 확률이 높기 때문에 개발사에 레시피 요청 필요. • 새 레시피 반영 후 대부분 해소되며 해소되지 않을 경우 개발사 문의 필요. 4. 문제 해결(Troubleshooting) 4.2 후공정 장치_작동 전 1. MainPCB Connect , Server Closed, Collector Connect Error • Connect 페이지를 다시 점검 2. 연결이 되지 않은 경우 • 재 연결 후 Post Process 탭 클릭 ->좌측 하단 Select Recipe 버튼 클릭 ->레시피 재 선택 후 Recipe Manager 버튼 클릭 ->실행 순으로 복구 절차 필요. 3. MainPCB Connect, Collector Connect Error • 연결이 되어 있음에도 오류가 발생하는 경우가 있는데 이 경우 USB 연결 불량일 확률이 굉장히 높으므로 USB 재 연결 또는 교체 작업 필요. 4. No Client Connect • DM400매뉴얼을 참조하여 후공정장치에 연결 필요. 페이지 42 42 사용자 매뉴얼 의 None을 체크, 가 체크 되어 있을 경우 체크를 해제, 체크 되지 않았을 경우 임의로 체크 후 해제 Bath 에 세척액이 들어있을 경우 Manual Pump 조작으로 빼낸 후 다시 레시피 실행 위 과정으로 복구 되지 않는 오류의 경우 ㈜캐리마텍에 문의 필요. 작동 중 발생하는 대부분의 오류는 아래 과정을 진행 시 복구 가능 물리적으로 이상한 위치에 Stage 또는 Blade가 있을 경우 메인 메뉴인 System 탭에서 Stage 버튼 클릭으로 위 사진과 같은 화면 진입 Stage 위치 조절 - 표시된 버튼으로 해결 Blade 위치 조절 - 표시된 버튼으로 해결 ※ Move To Rear – 블레이드가 DM400 방향(뒤쪽)으로 이동 ※ Move To Front – 블레이드가 수거기 방향(앞쪽)으로 이동 4. 문제 해결(Troubleshooting) 4.3 후공정 장치_작동 중 페이지 43 43 사용자 매뉴얼 오류 코드 / 메시지 설명 NoPort_PCB_Connection Fail 메인 PCB와의 연결 실패임. USB 케이블 점검 후 재 연결 필요함. PCB Connection Fail 전체 전원 재가동 후 재시도 필요함. 재가동 후에도 동일 문제 발생 시 제조사에 문의 요망임. NoPort_Connection Fail Collector PCB와의 연결 실패임. USB 케이블 점검 후 재 연결 필요함. CollectorPCB Connection Fail Collector(수거기) 전원 재가동 후 재시도 필요함. 재가동 후에도 동일 문제 발생 시 제조사 문의 요망임. Main PCB disconnect / Main PCB Disconnected 메인 PCB와의 실시간 연결이 끊어짐. USB 케이블 상태 확인 후, 전체 전원 재가동 및 재 연결 필요함. Stage Position Error Stage가 요구 위치에 있지 않음. 블레이드 동작 시 Top, 펌프 동작 시 Bottom 위치에 있어야 함. Blade Position Error 블레이드가 후방 센서 위치에 있지 않음. Stage 탭에서 블레이드를 Rear 위치로 이동시켜야 함. Bath is Empty 세척액이 존재함에도 프로그램 강제 종료 등으로 인해 초기화 상태로 인식됨. 작동 전 오류 대처 (36) 페이지를 참조하여 해결 가능함. Wrong Stage Position Wash / Pump 명령 시 Stage가 Bottom 위치에 있지 않음. Stage 탭에서 Bottom 위치로 이동 필요함. Check Liquid Error 센서 또는 펌프 오류 발생함. 작동 전 오류 대처 (36) 페이지를 참조하여 해결 가능함. Liquid #n is not Available Container #n이 비어 있거나, 세척액이 있음에도 센서 인식 오류로 감지되지 않 음. 작동 전 오류 대처 (36) 페이지를 참조하여 해결 가능함. Pump Error : Reboot is Required 작동 중 예기치 않은 문제 발생으로 종료됨. 전원 재가동 후 작동 전 오류 대처 (36) 페이지를 참조하여 해결 가능함. Check Error List 레시피 사전 검사 중 치명적 오류 발생함. 작동 전 오류 대처 페이지를 참조하여 조치 필요함. 4. 문제 해결(Troubleshooting) 4.4 후공정 장치 Status Message 오류 모음 페이지 44 DM400 사용자 매뉴얼 V2.1 I 2025. 11. 10 ⓒ All copyright is reserved by CARIMATEC Co., Ltd. 제품 및 기타 문의 Tel. 02)3663-8877 I Fax. 02)3283-4466 I Mail. sales@carima.co.kr 서울특별시 강서구 양천로 551-17, 한화비즈메트로 1차 1201호", "readingMinutes": 26}, "23": {"manualId": 23, "blocks": [{"type": "heading", "level": 2, "text": "페이지 1", "id": "page-1"}, {"type": "slide", "slideNumber": 1, "label": "페이지", "title": "페이지 1", "text": "", "gifs": [], "imagePath": "assets/manuals/23_ZENESIS_USER MANUAL(En)/page_001.png", "imageAlt": "ZENESIS_USER MANUAL(En) 페이지 1"}, {"type": "heading", "level": 2, "text": "페이지 2", "id": "page-2"}, {"type": "slide", "slideNumber": 2, "label": "페이지", "title": "페이지 2", "text": "", "gifs": [], "imagePath": "assets/manuals/23_ZENE manuals/23_ZENESIS_USER MANUAL(En)/page_028.png", "kind": "image", "alt": "ZENESIS_USER MANUAL(En) 시각 자료 23-28"}, {"fileName": "page_029.png", "path": "assets/manuals/23_ZENESIS_USER MANUAL(En)/page_029.png", "kind": "image", "alt": "ZENESIS_USER MANUAL(En) 시각 자료 23-29"}], "searchText": "페이지 1 USER MANUAL ZENESIS CARIMATEC RESEARCH-SPECIALIZED 3D PRINTER Carimatec’s ZENESIS is a desktop 3D printer engineered to maximize LAB space efficiency. Featuring the world’s first vacuum adsorption-based ‘On-Slide Glass’ system, it allows for direct printing onto slide glasses, enabling immediate microscopic observation and analysis. ZENESIS is optimized for a wide range of advanced research fields, including bio-applications, ceramics, and dental materials. Experience the smartest research environment with ZENESIS—streamlining complex workflows to add depth to your research. www.carimatec.com Max 50℃ Perfect temperature control (Depending on the resin)HEATED BED HIGH PRECISION 50(25, 100, 150)μm Pixel Size(X/Y): 50 μm Layer Thickness HIGH RESOLUTION 385 FHD UV LED Engine(1920x1080) Light Source nm REPRODUCIBILITY Light uniformity (Printing speed increased by minimizing light loss) 99% ZENESIS 페이지 2 ZENESIS USER MANUAL www.carimatec.com+82-2-3663-8877 sales@carima.com CONTENTS This manual provides instructions on how to use the \"ZENESIS.\" Understand how to use \"ZENESIS\" through the manual and experience \"ZENESIS\" easily and conveniently. 03 Finishing Prints Demounting & Post-processing 21-23 04 Maintenance Maintaining the Printer & Other Accessories 24-25 02 Preparation and Setup Printing Preparation Using the LCD Panel 07-08 09-20 01 Introduction Specification Product Overview Safety Warnings Process Overview Consumables 01 02 03 04 05-06 05 FAQ Frequently Asked Questions 26 페이지 3 ZENESIS USER MANUAL www.carimatec.com 01 +82-2-3663-8877 sales@carima.comINTRODUCTION SPECIFICATION ZENESIS Specification ZENESIS is optimized for printing highly precise models. This ultra-precise DLP printer is suitable for Bio 3D printing, and R&D purpose. Power DC 24V 5A with Adapter Product Size (mm) [W x D x H] 391 x 405 x 589 Precision 50 μm Layer Thickness 25, 50, 100, 150 μm Control Type Embedded touch screen Using Environment 18-26 (℃) / 64-79 (℉) 20% - 50% (humidity) Material EZ-preBioink pack Wide Material Compatibility. (Any 3rd Party resins are available) Build Volume(mm) [W x D x H] ·Build Plate: 96 x 54 x 140 ·Slide Glass: 75 x 25 Light Source 385 nm UV LED Resolution FHD 1920 x 1080 Weight 18.5 kg 페이지 4 ZENESIS USER MANUAL www.carimatec.com 02 +82-2-3663-8877 sales@carima.com INTRODUCTION PRODUCT OVERVIEW 01 03 02 04 Front Internal Structure Back Size Port Platform ON / OFF Button Power Adapter Connector Ethernet Connector Build Plate Fixing Pin Build Plate Handle Slide Glass Attachment Build Plate Module Resin Vat * Build plate, vat, FEP film, etc. are consumable parts. To purchase additional accessories, please contact CARIMATEC. 75 cm 40 cm 59 cm 180 cm Build Plate Fixing Base FEP Film Actuator Vat Retention Knob (located on both sides) Print Room CoverUSB Port LCD Touch Screen LED Power Button Product Information Label Printer Cooler 6 87 Vacuum Control Valve Suction Pump 8 6 7 페이지 5 ZENESIS USER MANUAL www.carimatec.com 03 +82-2-3663-8877 sales@carima.comINTRODUCTION SAFETY WARNINGS This information is intended to protect your safety and prevent property damage. Please be aware of the precautions before using, to prevent serious injuries and printer damage. When printing, put the printer in a well-ventilated place because resin may smell. Do not use volatile objects near the printer as they may cause fire or explosion. There are potential risks to the printer in terms of chemical composition and voltage. To prevent injury on children and pets, please install the printer in a safe place. The warranty benefits of the printer will be forfeited if disassembled or modified artificially. CARIMATEC will not be held liable for the loss caused by this. For inquiries regarding “After Sale Service” and product warranty, please contact CARIMATEC. Setting up a printer in a place with a lot of moisture or temperature changes can cause deformation and malfunction of the product. When moving the printer, be sure to completely shut down the printer, and then remove the vat and build plate so that the resin in the vat does not overflow or leak. If the printer power cable and USB cable are damaged due to being pulled or stepped on the rough surface, please note that sparking or voltage malfunction may occur. In addition, there is a risk of fire due to overheating when the power is turned off. Do not turn the power switch off, located on the back of the printer, when the printer is on. A forced shut down shortens the life of the printer engine and can cause mechanical failure. Use the ‘Power Off’ or the ‘Auto Shut Down’ button to turn the printer off. If metal fragments and other types of liquid leaks into the printer, it may cause mechanical malfunction. Also, operating the printer with wet hands may cause electric shock. Use protective equipment while using the printer. * Latex rubber gloves can also be used in place of the nitrile gloves provided. 페이지 6 ZENESIS USER MANUAL www.carimatec.com 04 +82-2-3663-8877 sales@carima.com PROCESS OVERVIEW For output, the following procedure is required. Install (CARIMA SLICER) Setting Preparing Printing Check Post- processing Convert File Load Data Control Setting Setup Device Setpup Material Set Pump Set Vat Set build plate module stl Slicing File Parameter setting Engine setting Check the PC specifications (graphics card, etc.) to install. Check the CARIMA Slicer manual (separate provision). INTRODUCTION * * 페이지 7 ZENESIS USER MANUAL www.carimatec.com 05 +82-2-3663-8877 sales@carima.comINTRODUCTION ZENESIS exclusive consumables ZENESIS is compatible with all of Carimatec’s general and functional resin. The products below are consumables exclusively for ZENESIS. * We can only gaurantee the print's outcome when CARIMATEC product is used. B i o i n k Code EZ-AAN-3ml Model EZ-preBioink Pack Caution Usage Guidelines & Safety Precautions Please read this manual carefully before opening the vial. This product requires specific handling techniques to ensure proper reconstitution, cell viability, and successful photocrosslinking. Please use immediately after opening the vacuum packaging. 1. Critical Reconstitution Instructions Optically Transparent Media Only: When reconstituting the lyophilized powder, use clear, phenol red-free culture media or buffer solutions (e.g., PBS). WARNING - NO Phenol Red: Do NOT use media containing Phenol Red or other colored pH indicators. Reason: Colored dyes interfere with the absorption spectrum of the photoinitiator and photo-absorber. This competition for light energy effectively blocks UV/visible light, resulting in incomplete photocrosslinking and structural failure. 2. Cell Mixing & Formulation (Acellular Product) Pre-Bioink Preparation: This product is supplied as a sterile, acellular chemical mixture. It serves as a “Pre-bioink” upon dissolution. Cell Addition: Once the powder is fully dissolved and homogenous, mix your specific cell pellet or suspension into the solution to create the final cell-laden bioink. Temperature Control: If the solution is too viscous or gelled, warm it gently in a 37°C water bath until it becomes a clear liquid before mixing with cells. 3. Handling & Stability Photosensitivity: This product contains a photoinitiator. Both the dry powder and the reconstituted solution are sensitive to light. Minimize exposure to ambient light (especially blue or UV wavelengths) to prevent premature crosslinking (gelation) inside the tube. Hygroscopic Nature: The lyophilized powder readily absorbs moisture from the air. Keep the vial tightly sealed when not in use. Exposure to humidity may cause the powder to clump and degrade. 4. Safety & Aseptic Technique Aseptic Handling: To prevent contamination, perform all reconstitution and cell mixing steps within a Laminar Flow Hood or Biosafety Cabinet using sterile solvents and equipment. Personal Protective Equipment (PPE): Unpolymerized methacrylate and chemical reagents may cause irritation. Always wear a lab coat, safety goggles, and nitrile gloves during handling. 페이지 8 ZENESIS USER MANUAL www.carimatec.com 06 +82-2-3663-8877 sales@carima.com INTRODUCTION Slide Glass Code AJA Model PSG (Photocrosslinkable Slide Glass) Caution Safety Precautions Please read the following safety instructions carefully before using the microscope slides. Failure to follow these guidelines may result in personal injury or damage to the equipment. 1. General Handling & Physical Safety Handle with Care: Slides are made of glass and are extremely fragile. Do not drop, bend, or apply excessive pressure to the slide, as this may cause breakage. Sharp Edges: Even with ground or polished edges, slides can cause lacerations. Always handle slides by their edges to prevent injury and avoid leaving fingerprints on the viewing surface. Inspect Before Use: Visually inspect each slide for chips, cracks, or sharp shards before use. Do not use cracked or chipped slides, as they are prone to shattering under pressure. Microscope Operation: When focusing the microscope, use the coarse adjustment knob to lower the objective lens cautiously. Ensure the lens does not strike the slide, as this can break the glass and damage the microscope lens. 2. Biological and Chemical Safety Personal Protective Equipment (PPE): Always wear appropriate PPE, such as protective gloves and safety goggles, when preparing slides with biological samples or chemical reagents. Contamination Risk: Treat all slides containing biological specimens (e.g., blood, tissue, bacteria) as potentially infectious. Handle them according to your laboratory’s biosafety level guidelines. Please use immediately after opening the vacuum packaging. This product has been sterilized at high temperature and high pressure. We cannot guarantee against contamination after opening. Chemical Hazards: If using staining solutions or solvents (e.g., xylene, alcohol), ensure the work area is well- ventilated. Avoid skin contact and inhalation of vapors. 3. Disposal Instructions Sharps Disposal: Never dispose of glass slides in regular trash bins. Used slides, broken or intact, must be disposed of in a designated punctured-resistant sharps container. Biohazard Disposal: Slides containing biological samples must be disposed of in biohazard waste containers in accordance with local environmental regulations and laboratory procedures. 4. Emergency Procedures In Case of Breakage: If a slide breaks, do not pick up shards with bare hands. Use forceps, tweezers, or a brush and dustpan to collect the glass fragments. First Aid: In the event of a cut or puncture, immediately wash the wound with soap and water, cover it with a sterile bandage, and seek medical attention if necessary. Bubble Control: Mix gently to avoid introducing air bubbles. Do not vortex vigorously, as bubbles can disrupt the printing process and construct integrity. 5. Disclaimer For Research Use Only (RUO): This product is intended for laboratory research purposes only. It is not approved for diagnostic or therapeutic use in humans or animals. 페이지 9 ZENESIS USER MANUAL www.carimatec.com 07 +82-2-3663-8877 sales@carima.com PREPARATION AND SETUP Preparation and Setup PRINTING PREPARATION To start printing, you must first prepare the materials. Materials include suction pump, resin vat, bioink/resin, and build plate module. With the pump running, open the valve. Attach a slide glass to the attachment. Make sure the glass is attached tightly and the pressure gauge on the pump rises. Fasten the plate to the build plate fixing base and to the module with the fixing fin. Scratching the FEP film using sharp scrapers can tear the film and due to leakage of bioink/ resin, the optical glass can get contaminate
