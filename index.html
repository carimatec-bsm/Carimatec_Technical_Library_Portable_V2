<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CARIMATEC Academy Technical Library</title>
  <style>
    :root {
      --brand: #6f2da8;
      --brand-strong: #3f1d5a;
      --brand-soft: #ede4f2;
      --ink: #111827;
      --muted: #667085;
      --line: #d9dee8;
      --surface: #fff;
      --bg: #f6f7f9;
      --teal: #0f766e;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", "Segoe UI", system-ui, sans-serif;
      color: #1f2937;
      background: var(--bg);
    }
    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }
    img { display: block; max-width: 100%; }
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(16px);
    }
    .inner { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
    .header .inner { min-height: 72px; display: flex; align-items: center; justify-content: space-between; gap: 18px; }
    .brand { display: flex; align-items: center; gap: 14px; font-weight: 800; color: var(--brand-strong); }
    .brand img { width: 150px; }
    .brand span { padding-left: 14px; border-left: 1px solid var(--line); }
    .nav { display: flex; gap: 8px; }
    .nav button {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      padding: 0 13px;
      background: transparent;
      color: #475467;
      cursor: pointer;
      font-weight: 760;
    }
    .nav button.active, .nav button:hover { background: var(--brand-soft); color: var(--brand-strong); }
    .page { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 32px 0 56px; }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(320px, 430px);
      gap: clamp(28px, 5vw, 58px);
      align-items: center;
      min-height: 520px;
      padding: clamp(30px, 5vw, 58px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(130deg, rgba(248,245,251,.96), rgba(239,248,246,.72) 58%, rgba(255,248,236,.56)), #fff;
      box-shadow: 0 14px 34px rgba(31,41,55,.08);
    }
    .hero-copy { display: flex; flex-direction: column; justify-content: center; gap: 20px; min-width: 0; max-width: 760px; }
    .eyebrow { color: var(--brand); font-size: .78rem; font-weight: 850; text-transform: uppercase; }
    h1, h2, h3, p { margin-top: 0; }
    .hero h1, .page-header h1, .detail-title h1 {
      margin-bottom: 0;
      color: var(--ink);
      font-size: clamp(2.35rem, 5.6vw, 5.25rem);
      line-height: 1.05;
      word-break: keep-all;
    }
    .hero p, .page-header p, .detail-title p { color: #475467; font-size: 1.08rem; word-break: keep-all; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .hero-actions button { min-height: 44px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 0 14px; border-radius: 8px; cursor: pointer; font-weight: 780; }
    .hero-actions .primary { border: 1px solid var(--brand-strong); background: var(--brand-strong); color: #fff; }
    .hero-actions .secondary { border: 1px solid var(--line); background: #fff; color: #344054; }
    .search { width: min(100%, 760px); min-height: 52px; display: flex; gap: 10px; align-items: center; padding: 0 14px; border: 1px solid #cfd6e2; border-radius: 8px; background: #fff; }
    .search span { flex: 0 0 auto; color: var(--brand-strong); font-weight: 800; white-space: nowrap; }
    .search input { width: 100%; border: 0; outline: 0; }
    .academy-visual { display: flex; align-items: center; justify-content: center; min-width: 0; }
    .academy-cover { position: relative; isolation: isolate; width: min(100%,410px); min-height: 520px; display: flex; flex-direction: column; justify-content: space-between; gap: 24px; overflow: hidden; padding: 28px; border: 1px solid rgba(111,45,168,.24); border-radius: 8px; background: linear-gradient(148deg, #fff 0 43%, transparent 43.2%), linear-gradient(150deg, #f8fafc 0 54%, #6f2da8 54.2% 100%); box-shadow: 0 28px 54px rgba(63,29,90,.2); }
    .academy-cover::before { content: ""; position: absolute; inset: auto -18% -15% 28%; z-index: -1; height: 54%; background: linear-gradient(135deg, rgba(15,118,110,.55), rgba(111,45,168,.3)), linear-gradient(45deg, rgba(255,255,255,.18), rgba(255,255,255,0)); transform: skewY(-27deg); }
    .cover-logo-row { display: flex; align-items: center; justify-content: space-between; gap: 18px; }
    .cover-logo-row img { width: 138px; height: auto; }
    .cover-logo-row span, .cover-title-block span { color: var(--brand); font-size: .78rem; font-weight: 850; text-transform: uppercase; }
    .cover-title-block { display: grid; gap: 8px; }
    .cover-title-block h2 { max-width: 280px; margin: 0; color: var(--ink); font-size: clamp(2rem,4vw,3rem); line-height: 1.04; }
    .cover-title-block p { margin: 0; color: #475467; font-size: .95rem; }
    .cover-metrics { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 8px; }
    .cover-metrics div { min-height: 86px; display: grid; align-content: center; gap: 4px; padding: 10px; border: 1px solid rgba(255,255,255,.34); border-radius: 8px; background: rgba(63,29,90,.74); color: #fff; backdrop-filter: blur(10px); }
    .cover-metrics strong { font-size: 1.1rem; line-height: 1; }
    .cover-metrics span { font-size: .74rem; }
    .cover-index { display: flex; flex-wrap: wrap; gap: 7px; max-width: 270px; }
    .cover-index span { min-height: 26px; display: inline-flex; align-items: center; padding: 0 9px; border: 1px solid rgba(255,255,255,.28); border-radius: 8px; background: rgba(255,255,255,.18); color: #fff; font-size: .75rem; font-weight: 720; }
    .cover-cube { position: absolute; right: 22px; bottom: 24px; width: 132px; height: 132px; transform: rotate(-30deg) skew(18deg,18deg); opacity: .72; }
    .cover-cube span { position: absolute; display: block; border: 1px solid rgba(255,255,255,.22); background: linear-gradient(145deg, rgba(255,255,255,.24), rgba(46,23,77,.12)); }
    .cover-cube span:nth-child(1) { width: 100%; height: 100%; }
    .cover-cube span:nth-child(2) { width: 42%; height: 100%; right: -42%; transform-origin: left; transform: skewY(-34deg); }
    .cover-cube span:nth-child(3) { width: 100%; height: 42%; top: -42%; transform-origin: bottom; transform: skewX(-34deg); }
    .stats, .categories, .cards { display: grid; gap: 14px; }
    .stats { grid-template-columns: repeat(3, minmax(0,1fr)); margin: 28px 0; }
    .stat, .category, .card, .page-header, .filter, .detail-head, .content, .toc, .related-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }
    .stat { padding: 18px; }
    .stat strong { display: block; color: var(--ink); font-size: 1.5rem; }
    .stat span { color: var(--muted); }
    .section-head { display: flex; justify-content: space-between; align-items: end; margin: 32px 0 16px; }
    .section-head h2 { margin-bottom: 0; font-size: 1.5rem; color: var(--ink); }
    .categories { grid-template-columns: repeat(5, minmax(0,1fr)); }
    .category { min-height: 184px; padding: 18px; border-top: 5px solid var(--accent); cursor: pointer; }
    .category small { color: var(--accent); font-weight: 850; }
    .category h3 { color: var(--ink); word-break: keep-all; }
    .category p { color: var(--muted); font-size: .92rem; word-break: keep-all; }
    .cards { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .card { display: grid; grid-template-columns: 140px minmax(0,1fr); overflow: hidden; min-height: 230px; cursor: pointer; }
    .card img { width: 100%; height: 100%; object-fit: contain; background: #fff; }
    .card-body { padding: 16px; display: flex; flex-direction: column; gap: 11px; min-width: 0; }
    .pill { display: inline-flex; min-height: 28px; align-items: center; padding: 0 9px; border-radius: 8px; background: #eef2f6; color: #475467; font-size: .78rem; font-weight: 760; }
    .manual-no { color: var(--brand); font-size: .8rem; font-weight: 850; }
    .card h3 { margin: 0; color: var(--ink); font-size: 1.05rem; line-height: 1.35; word-break: keep-all; }
    .card p { color: var(--muted); font-size: .9rem; word-break: keep-all; }
    .facts { margin-top: auto; color: var(--muted); font-size: .86rem; }
    .page-header, .filter, .detail-head, .content { padding: 24px; }
    .filter { display: grid; gap: 14px; margin: 22px 0; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; }
    .tabs button { min-height: 38px; border: 1px solid var(--line); border-radius: 8px; padding: 0 12px; background: #fff; cursor: pointer; font-weight: 720; color: #475467; }
    .tabs button.active { border-color: var(--brand); background: var(--brand-soft); color: var(--brand-strong); }
    .detail-head { display: grid; grid-template-columns: minmax(0,1fr) minmax(260px,360px); gap: 28px; align-items: center; box-shadow: 0 14px 34px rgba(31,41,55,.08); }
    .detail-cover { width: 100%; aspect-ratio: 1 / 1.35; object-fit: contain; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .detail-layout { display: grid; grid-template-columns: 260px minmax(0,1fr); gap: 24px; margin-top: 24px; align-items: start; }
    .toc { position: sticky; top: 96px; padding: 16px; max-height: calc(100vh - 120px); overflow: auto; }
    .toc h2 { font-size: 1rem; }
    .toc a { display: block; margin: 8px 0; color: #475467; font-size: .86rem; line-height: 1.35; cursor: pointer; }
    .toc .l3 { padding-left: 12px; }
    .toc .l4 { padding-left: 24px; }
    .content h2, .content h3, .content h4 { color: var(--brand-strong); scroll-margin-top: 96px; word-break: keep-all; }
    .content h2 { margin: 32px 0 14px; padding-bottom: 10px; border-bottom: 2px solid var(--brand-soft); font-size: 1.55rem; }
    .content h2:first-child { margin-top: 0; }
    .content h3 { margin: 24px 0 12px; }
    .content p { color: #344054; line-height: 1.78; word-break: keep-all; overflow-wrap: anywhere; }
    .formula { padding: 12px 14px; border-left: 4px solid var(--teal); border-radius: 0 8px 8px 0; background: #eef8f6; color: #134e4a; font-family: "Cambria Math", serif; }
    .callout { margin: 18px 0; padding: 14px 16px; border: 1px solid #d3dbe8; border-radius: 8px; background: #eef7ff; line-height: 1.7; }
    .callout.warning { background: #fff7ed; border-color: #fed7aa; }
    .table-wrap { overflow-x: auto; margin: 18px 0; border: 1px solid var(--line); border-radius: 8px; }
    table { width: 100%; min-width: 620px; border-collapse: collapse; }
    th, td { padding: 11px 12px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; font-size: .92rem; line-height: 1.55; }
    th { background: var(--brand-soft); color: var(--brand-strong); }
    figure { margin: 20px 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fff; }
    figure img { width: 100%; }
    figcaption { padding: 10px 12px; border-top: 1px solid var(--line); color: var(--muted); font-size: .82rem; word-break: break-word; }
    .reference { margin-top: 24px; color: #6f6f6f !important; font-size: .86rem !important; }
    .back, .open { color: var(--brand-strong); font-weight: 800; cursor: pointer; }
    footer { border-top: 1px solid var(--line); background: #fff; color: var(--muted); }
    footer .inner { min-height: 78px; display: flex; align-items: center; justify-content: space-between; gap: 18px; }
    @media (max-width: 1100px) {
      .hero, .detail-head, .detail-layout { grid-template-columns: 1fr; }
      .toc { position: static; }
      .categories { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .cards { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 760px) {
      .inner, .page { width: min(100% - 20px, 1180px); }
      .header .inner { flex-direction: column; align-items: stretch; padding: 12px 0; }
      .brand span { display: none; }
      .nav { display: grid; grid-template-columns: repeat(2, 1fr); }
      .hero, .page-header, .filter, .detail-head, .content { padding: 18px; }
      .academy-cover { width: min(100%,520px); min-height: 420px; }
      .stats, .categories, .cards { grid-template-columns: 1fr; }
      .card { grid-template-columns: 110px minmax(0,1fr); min-height: 188px; }
      .card p { display: none; }
    }
    @media (max-width: 460px) {
      .hero-actions { display: grid; }
      .academy-cover { min-height: 390px; padding: 20px; }
      .cover-metrics { grid-template-columns: 1fr; }
      .cover-cube { width: 92px; height: 92px; }
      .card { grid-template-columns: 1fr; }
      .card img { aspect-ratio: 1 / 1.05; }
    }
  </style>
</head>
<body>

    <div class="inner">
      <button class="brand" data-route="home" style="border:0;background:transparent;cursor:pointer;">
        <img src="assets/brand/carimatec-logo-black.png" alt="CARIMATEC">
        <span>Academy Technical Library</span>
      </button>
      <nav class="nav">
        <button data-route="home">홈</button>
        <button data-route="manuals">매뉴얼</button>
      </nav>
    </div>
  </header>
  <main id="app" class="page"></main>
  <footer>
    <div class="inner">
      <p>CARIMATEC Academy Technical Library</p>
      <p>17개 기술 매뉴얼 · sales@carima.co.kr</p>
    </div>

15, "title": "3D 프린팅 레진의 응력 및 변형 특성", "category": "레진 및 재료 관리", "displayDate": "26-06-16", "version": "V1.0", "author": "백상민 주임", "organization": "(주)캐리마텍", "slug": "manual-15", "summary": "응력-변형률 곡선, 항복, 연성/취성, 레진 물성 비교에 필요한 기본 개념을 정리합니다.", "keywords": ["응력", "변형", "응력-변형률", "항복", "연성", "취성"], "coverImage": "assets/covers/15_표지_3D 프린팅 레진의 응력 및 변형 특성.png", "mediaFolder": "assets/manuals/15_3D 프린팅 레진의 응력 및 변형 특성", "featured": false}, {"id": 16, "title": "레진 3D 프린터의 출력 속도에 영향을 미치는 요인", "category": "출력 설정 및 파라미터", "displayDate": "26-06-17", "version": "V1.0", "author": "백상민 주임", "organization": "(주)캐리마텍", "slug": "manual-16", "summary": "SLA, DLP, LCD 방식과 모델 방향, 재료 조합, 장비 조건이 출력 속도에 미치는 영향을 비교합니다.", "keywords": ["출력 속도", "SLA", "DLP", "LCD", "모델 방향", "재료"], "coverImage": "assets/covers/16_표지_레진 3D 프린터의 출력 속도에 영향을 미치는 요인.png", "mediaFolder": "assets/manuals/16_레진 3D 프린터의 출력 속도에 영향을 미치는 요인", "featured": false}, {"id": 17, "title": "광원 강도가 출력 정확도에 미치는 영향 검증", "category": "출력 품질 및 실패 분석", "displayDate": "26-06-17", "version": "V1.0", "author": "백상민 주임", "organization": "(주)캐리마텍", "slug": "manual-17", "summary": "광원 강도와 픽셀 회색값, 간격 조건이 출력 정확도에 미치는 영향을 실험 관점에서 정리합니다.", "keywords": ["광원 강도", "픽셀", "회색값", "출력 정확도", "실험 검증"], "coverImage": "assets/covers/17_표지_광원 강도가 출력 정확도에 미치는 영향 검증.png", "mediaFolder": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증", "featured": true}], "contents": {"1": {"manualId": 1, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "온도 변화는 재료의 팽창과 수축을 유발하지만, 변형이 자유롭게 일어날 수 있다면 반드시 응력이 발생하는 것은 아니다. 이 문서는 열변형이 구속될 때 발생하는 열응력의 기본 개념과 열탄성 관계식을 설명하고, 광경화성 레진을 사용하는 SLA/DLP/LCD 3D 프린팅 과정에서 열응력이 형성되는 원인과 그 영향을 줄이는 방법을 정리한다."}, {"type": "heading", "level": 2, "text": "1. 열응력의 기본 개념", "id": "section-2"}, {"type": "paragraph", "text": "열응력(thermal stress)은 온도 변화로 인해 발생한 물체의 열변형이 구속될 때 생기는 응력이다. 온도 변화 자체만으로 물체 내부에 반드시 응력이 발생하는 것은 아니다. 온도 변화에 따른 팽창 또는 수축이 제한될 때 비로소 응력이 형성된다."}, {"type": "paragraph", "text": "즉, 외력이 직접 작용하지 않더라도 온도 변화로 발생한 열변형이 구속되면 응력이 생길 수 있으며, 이를 열응력 또는 온도응력이라고 한다. 일반적으로 재료는 온도가 변하면 열팽창과 열수축의 원리에 따라 변형된다. 이 변형 과정이 제한될 경우 열응력이 발생한다."}, {"type": "heading", "level": 3, "text": "1.1 균일 가열되는 금속 막대의 열변형", "id": "section-3"}, {"type": "paragraph", "text": "초기 온도 t₀에서 지름이 d이고 길이가 l인 금속 막대를 생각한다. 이 막대를 온도 t₁까지 균일하게 가열하면 막대는 다음과 같이 팽창한다."}, {"type": "formula", "text": "길이 변화: Δl = α(t₁ − t₀)l"}, {"type": "formula", "text": "길이 방향 변형률: εₗ = Δl / l = α(t₁ − t₀)"}, {"type": "formula", "text": "지름 변화: Δd = α(t₁ − t₀)d"}, {"type": "formula", "text": "지름 방향 변형률: εd = Δd / d = α(t₁ − t₀)"}, {"type": "paragraph", "text": "따라서 막대의 온도가 t₀에서 t₁으로 증가할 때 발생하는 변형률은 다음과 같이 나타낼 수 있다."}, {"type": "formula", "text": "ε = α(t₁ − t₀) = αΔt"}, {"type": "paragraph", "text": "여기서 α는 특정 재료의 열팽창계수이다. α는 재료와 온도에 따라 달라지며, 온도 조건이 일정하면 상수로 취급할 수 있다."}, {"type": "paragraph", "text": "등방성 정육면체를 균일하게 가열하거나 냉각하면 길이, 너비, 높이의 세 방향에서 동일한 정도의 자유 팽창 또는 수축이 발생한다. 이때 전단변형은 발생하지 않고 종방향 변형만 나타난다."}, {"type": "heading", "level": 3, "text": "1.2 구속 조건과 열응력의 발생", "id": "section-4"}, {"type": "paragraph", "text": "금속 막대가 구속되지 않은 상태에서 자유롭게 팽창하면 열응력은 발생하지 않는다. 그러나 막대를 두 개의 강체 벽 사이에 두고 양 끝을 고정한 뒤 온도를 t₁까지 높이면, 강체 벽이 팽창을 방해하므로 막대 내부에 압축 열응력이 발생한다. 외력이 작용하지 않더라도 열변형이 외부 조건에 의해 구속되면 물체 내부에 응력이 형성되는 것이다."}, {"type": "paragraph", "text": "같은 물체 내부에서도 온도가 균일하게 분포하지 않으면 외부 구속이 없어도 열응력이 발생할 수 있다. 위치마다 온도가 다르면 각 부분이 서로 다른 정도로 팽창하거나 수축하려 하지만, 인접한 부분의 영향을 받아 자유로운 변형이 제한되기 때문이다."}, {"type": "paragraph", "text": "또한 서로 다른 재료로 만든 여러 부품이 결합된 구성품은 동일한 가열 또는 냉각 조건에서도 각 부품의 열팽창계수나 팽창 방식이 다를 수 있다. 이 차이로 인해 부품들이 서로의 변형을 구속하면서 각각 다른 열응력이 발생한다."}, {"type": "paragraph", "text": "정리하면, 물체의 온도가 변할 때 물체와 다른 물체 사이 또는 물체 내부의 각 부분 사이에서 상호 구속이 발생하여 자유롭게 팽창하거나 수축하지 못할 때 생기는 응력이 열응력이다. 열응력은 외력이 아니라 온도 변화와 구속을 근본 원인으로 하며, 구속 형태는 다음 세 가지로 구분할 수 있다."}, {"type": "paragraph", "text": "외부 변형 구속: 물체가 외부 조건의 영향을 받아 자유롭게 팽창하거나 수축할 수 없는 상태이다. 양 끝이 고정된 부재가 대표적인 예이다."}, {"type": "paragraph", "text": "내부 변형 구속: 물체 내부의 온도 분포가 균일하지 않은 상태이다. 물체의 내부와 외부 또는 위쪽과 아래쪽 사이에 온도 차이가 존재하면 일부 영역이 휘어질 수 있다."}, {"type": "paragraph", "text": "상호 변형 구속: 열팽창계수가 서로 다른 부품들이 결합되어 각 부품의 팽창과 수축이 서로 영향을 주는 상태이다."}, {"type": "paragraph", "text": "열응력은 물체 내부와 표면에 불균일한 응력 분포를 만들며, 이로 인해 변형 또는 손상이 발생할 수 있다. 열응력의 크기와 방향은 재료, 물체의 형상과 크기, 온도 변화의 정도와 속도, 냉각 또는 가열 방식 등의 요인에 따라 달라진다."}, {"type": "heading", "level": 2, "text": "2. 열탄성의 기본 방정식", "id": "section-5"}, {"type": "paragraph", "text": "좌표축과 평행한 모서리를 가지며 각 변의 길이가 dx, dy, dz인 미소 평행육면체를 생각한다. 다음 그림은 미소 요소와 각 면에 작용하는 응력 성분을 나타낸다."}, {"type": "image", "path": "assets/manuals/1_열응력 개요/basic-equations-of-thermal-elasticity.png", "alt": "열응력 개요 시각 자료", "fileName": "basic-equations-of-thermal-elasticity.png"}, {"type": "paragraph", "text": "미소 요소의 표면에 작용하는 응력 성분은 다음과 같이 나타낼 수 있다."}, {"type": "formula", "text": "σxx, σyy, σzz, τxy, τxz, τyx, τyz, τzx, τzy"}, {"type": "paragraph", "text": "전단응력 상반정리에 따르면 대응하는 전단응력 성분은 서로 같다."}, {"type": "formula", "text": "τxy = τyx, τyz = τzy, τxz = τzx"}, {"type": "paragraph", "text": "외력으로 발생하는 응력과 변형률은 재료역학 및 탄성학의 원리를 사용해 계산한다. 온도 변화로 발생하는 열응력과 열변형률은 열탄성역학의 원리를 사용해 계산하며, 외력에 의한 성분과 온도 변화에 의한 성분을 중첩하여 전체 거동을 평가한다."}, {"type": "callout", "tone": "note", "text": "표기 참고 응력 성분과 전단응력 관계는 일반적인 3차원 응력 텐서 및 전단응력 상반정리 표기에 맞추어 정리하였다."}, {"type": "heading", "level": 2, "text": "3. SLA 3D 프린팅의 열응력", "id": "section-6"}, {"type": "paragraph", "text": "산업 기술이 빠르게 발전하면서 불균일한 온도 또는 서로 다른 열팽창계수로 인해 발생하는 열응력과 변형은 여러 공학 분야의 주요 문제로 다루어지고 있다. 대표적인 사례는 다음과 같다."}, {"type": "paragraph", "text": "보일러 및 화학 기계가 작동할 때의 고온으로 발생하는 열응력"}, {"type": "paragraph", "text": "가공 및 공정에서 고온 상태와 냉각 과정의 전환으로 발생하는 열응력"}, {"type": "paragraph", "text": "대규모 수리 시설 및 토목 구조물에서 기온 또는 일사로 발생하는 온도 변형과 열응력"}, {"type": "paragraph", "text": "정밀 기기에 영향을 주는 온도 변형"}, {"type": "paragraph", "text": "자동차와 항공기의 고온 환경에서 발생하는 열응력"}, {"type": "paragraph", "text": "위성이 태양광 영역과 그늘 영역을 통과할 때 온도 변화로 발생하는 열유도 진동"}, {"type": "paragraph", "text": "장치의 발열과 재료 특성의 불일치로 발생하는 열응력"}, {"type": "heading", "level": 3, "text": "3.1 광경화 과정에서 열응력이 발생하는 원리", "id": "section-7"}, {"type": "paragraph", "text": "광경화 3D 프린팅에서는 액체 상태의 광경화성 레진이 자외선에 의해 활성화되고, 가교 반응을 통해 고체로 경화된다. 그러나 자외선에 의해 유도되는 화학 반응에는 에너지 방출이 동반되므로 재료의 국부 영역 온도가 상승할 수 있다."}, {"type": "paragraph", "text": "경화 과정에서 발생한 온도 변화가 불균일하게 분포하면 출력물 내부에 변형 구속이 생긴다. 이때 재료가 수축하거나 팽창하면서 열응력이 발생한다. 열응력이 형성되는 과정은 다음과 같다."}, {"type": "paragraph", "text": "광경화성 레진이 자외선에 의해 활성화되면서 경화가 시작된다."}, {"type": "paragraph", "text": "경화 영역 내부의 화학 반응에서 열이 발생하여 국부 영역의 온도가 상승한다."}, {"type": "paragraph", "text": "고온 영역의 재료가 수축하기 시작하는 동안 주변의 저온 영역은 상대적으로 안정된 상태를 유지한다."}, {"type": "paragraph", "text": "서로 다른 온도 영역 사이의 수축 또는 팽창 차이로 인해 응력이 집중된다."}, {"type": "heading", "level": 2, "text": "4. 열응력 영향 저감", "id": "section-8"}, {"type": "paragraph", "text": "열응력은 출력물의 변형, 균열 및 손상과 같은 문제를 유발할 수 있다. 일상생활과 산업 시스템에서도 열변형과 열응력은 부정적인 영향을 줄 수 있으며, 원리적으로 다음과 같은 대응 방법을 적용할 수 있다."}, {"type": "paragraph", "text": "제거해야 하는 대상이 변형인지 응력인지 먼저 분석한다. 예를 들어 토목 구조물의 온도 이음은 구속을 완화하여 열응력을 줄이지만, 다른 조건에서는 구속과 구조 강성을 높여 열변형을 줄일 수 있다."}, {"type": "paragraph", "text": "단열 및 보온과 같은 방법으로 온도 하중을 낮추는 동시에, 온도 분포의 불균일성을 최소화한다."}, {"type": "paragraph", "text": "서로 인접한 재료의 열팽창계수 차이가 지나치게 커지지 않도록 서로 다른 재료의 열팽창계수를 적절히 조합한다."}, {"type": "image", "path": "assets/manuals/1_열응력 개요/coefficient-of-thermal-expansion-of-materials.png", "alt": "열응력 개요 시각 자료", "fileName": "coefficient-of-thermal-expansion-of-materials.png"}, {"type": "heading", "level": 3, "text": "4.1 광경화 3D 프린팅의 열응력 저감 방법", "id": "section-9"}, {"type": "paragraph", "text": "광경화 3D 프린팅에서 열응력의 영향을 줄이기 위해 다음 방법을 적용할 수 있다."}, {"type": "paragraph", "text": "출력 과정의 온도를 제어하여 온도 변화 범위를 최소화하고 열응력을 완화한다."}, {"type": "paragraph", "text": "저수축 레진 또는 나일론과 같이 경화 후 수축이 작거나 강성이 높은 재료를 사용하여 열변형을 줄인다."}, {"type": "paragraph", "text": "모델 구조를 기준으로 설계를 최적화하여 응력이 집중되는 영역을 줄인다."}, {"type": "paragraph", "text": "서포트 구조물을 추가하여 응력을 분산한다."}, {"type": "heading", "level": 2, "text": "5. 실무 참고 사항", "id": "section-10"}, {"type": "paragraph", "text": "SLA뿐 아니라 DLP 및 LCD 방식도 광경화성 레진의 중합 반응을 이용하므로, 경화 중 국부 발열과 온도 차이에 따른 내부 구속이라는 동일한 관점에서 열응력을 검토할 수 있다. 실제 출력 조건에서는 레진의 수축 특성, 출력물의 단면 변화, 형상 전환부, 서포트 배치 및 주변 온도 안정성을 함께 확인해야 한다."}, {"type": "paragraph", "text": "출력 실패 분석 시 단순 치수 오차뿐 아니라 휨, 균열, 층간 손상 및 서포트 주변의 응력 집중 여부를 함께 관찰한다."}, {"type": "paragraph", "text": "두꺼운 단면과 얇은 단면이 급격히 연결되는 형상은 수축 차이와 응력 집중이 나타날 수 있으므로 모델 방향과 서포트 분산을 검토한다."}, {"type": "paragraph", "text": "레진 또는 장비 조건을 변경할 때는 한 번에 여러 변수를 바꾸기보다 온도, 노출, 형상 및 서포트 조건을 구분하여 결과를 비교한다."}, {"type": "callout", "tone": "warning", "text": "주의 열응력의 실제 크기와 방향은 재료, 형상, 크기, 온도 변화 속도 및 가열·냉각 방식에 따라 달라진다. 따라서 특정 출력물의 문제를 판단할 때는 레진 데이터와 장비 조건을 함께 검토해야 한다."}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "basic-equations-of-thermal-elasticity.png", "path": "assets/manuals/1_열응력 개요/basic-equations-of-thermal-elasticity.png", "kind": "image", "alt": "열응력 개요 시각 자료 1-1"}, {"fileName": "coefficient-of-thermal-expansion-of-materials.png", "path": "assets/manuals/1_열응력 개요/coefficient-of-thermal-expansion-of-materials.png", "kind": "image", "alt": "열응력 개요 시각 자료 1-2"}], "searchText": "0. 개요 온도 변화는 재료의 팽창과 수축을 유발하지만, 변형이 자유롭게 일어날 수 있다면 반드시 응력이 발생하는 것은 아니다. 이 문서는 열변형이 구속될 때 발생하는 열응력의 기본 개념과 열탄성 관계식을 설명하고, 광경화성 레진을 사용하는 SLA/DLP/LCD 3D 프린팅 과정에서 열응력이 형성되는 원인과 그 영향을 줄이는 방법을 정리한다. 1. 열응력의 기본 개념 열응력(thermal stress)은 온도 변화로 인해 발생한 물체의 열변형이 구속될 때 생기는 응력이다. 온도 변화 자체만으로 물체 내부에 반드시 응력이 발생하는 것은 아니다. 온도 변화에 따른 팽창 또는 수축이 제한될 때 비로소 응력이 형성된다. 즉, 외력이 직접 작용하지 않더라도 온도 변화로 발생한 열변형이 구속되면 응력이 생길 수 있으며, 이를 열응력 또는 온도응력이라고 한다. 일반적으로 재료는 온도가 변하면 열팽창과 열수축의 원리에 따라 변형된다. 이 변형 과정이 제한될 경우 열응력이 발생한다. 1.1 균일 가열되는 금속 막대의 열변형 초기 온도 t₀에서 지름이 d이고 길이가 l인 금속 막대를 생각한다. 이 막대를 온도 t₁까지 균일하게 가열하면 막대는 다음과 같이 팽창한다. 길이 변화: Δl = α(t₁ − t₀)l 길이 방향 변형률: εₗ = Δl / l = α(t₁ − t₀) 지름 변화: Δd = α(t₁ − t₀)d 지름 방향 변형률: εd = Δd / d = α(t₁ − t₀) 따라서 막대의 온도가 t₀에서 t₁으로 증가할 때 발생하는 변형률은 다음과 같이 나타낼 수 있다. ε = α(t₁ − t₀) = αΔt 여기서 α는 특정 재료의 열팽창계수이다. α는 재료와 온도에 따라 달라지며, 온도 조건이 일정하면 상수로 취급할 수 있다. 등방성 정육면체를 균일하게 가열하거나 냉각하면 길이, 너비, 높이의 세 방향에서 동일한 정도의 자유 팽창 또는 수축이 발생한다. 이때 전단변형은 발생하지 않고 종방향 변형만 나타난다. 1.2 구속 조건과 열응력의 발생 금속 막대가 구속되지 않은 상태에서 자유롭게 팽창하면 열응력은 발생하지 않는다. 그러나 막대를 두 개의 강체 벽 사이에 두고 양 끝을 고정한 뒤 온도를 t₁까지 높이면, 강체 벽이 팽창을 방해하므로 막대 내부에 압축 열응력이 발생한다. 외력이 작용하지 않더라도 열변형이 외부 조건에 의해 구속되면 물체 내부에 응력이 형성되는 것이다. 같은 물체 내부에서도 온도가 균일하게 분포하지 않으면 외부 구속이 없어도 열응력이 발생할 수 있다. 위치마다 온도가 다르면 각 부분이 서로 다른 정도로 팽창하거나 수축하려 하지만, 인접한 부분의 영향을 받아 자유로운 변형이 제한되기 때문이다. 또한 서로 다른 재료로 만든 여러 부품이 결합된 구성품은 동일한 가열 또는 냉각 조건에서도 각 부품의 열팽창계수나 팽창 방식이 다를 수 있다. 이 차이로 인해 부품들이 서로의 변형을 구속하면서 각각 다른 열응력이 발생한다. 정리하면, 물체의 온도가 변할 때 물체와 다른 물체 사이 또는 물체 내부의 각 부분 사이에서 상호 구속이 발생하여 자유롭게 팽창하거나 수축하지 못할 때 생기는 응력이 열응력이다. 열응력은 외력이 아니라 온도 변화와 구속을 근본 원인으로 하며, 구속 형태는 다음 세 가지로 구분할 수 있다. 외부 변형 구속: 물체가 외부 조건의 영향을 받아 자유롭게 팽창하거나 수축할 수 없는 상태이다. 양 끝이 고정된 부재가 대표적인 예이다. 내부 변형 구속: 물체 내부의 온도 분포가 균일하지 않은 상태이다. 물체의 내부와 외부 또는 위쪽과 아래쪽 사이에 온도 차이가 존재하면 일부 영역이 휘어질 수 있다. 상호 변형 구속: 열팽창계수가 서로 다른 부품들이 결합되어 각 부품의 팽창과 수축이 서로 영향을 주는 상태이다. 열응력은 물체 내부와 표면에 불균일한 응력 분포를 만들며, 이로 인해 변형 또는 손상이 발생할 수 있다. 열응력의 크기와 방향은 재료, 물체의 형상과 크기, 온도 변화의 정도와 속도, 냉각 또는 가열 방식 등의 요인에 따라 달라진다. 2. 열탄성의 기본 방정식 좌표축과 평행한 모서리를 가지며 각 변의 길이가 dx, dy, dz인 미소 평행육면체를 생각한다. 다음 그림은 미소 요소와 각 면에 작용하는 응력 성분을 나타낸다. 미소 요소의 표면에 작용하는 응력 성분은 다음과 같이 나타낼 수 있다. σxx, σyy, σzz, τxy, τxz, τyx, τyz, τzx, τzy 전단응력 상반정리에 따르면 대응하는 전단응력 성분은 서로 같다. τxy = τyx, τyz = τzy, τxz = τzx 외력으로 발생하는 응력과 변형률은 재료역학 및 탄성학의 원리를 사용해 계산한다. 온도 변화로 발생하는 열응력과 열변형률은 열탄성역학의 원리를 사용해 계산하며, 외력에 의한 성분과 온도 변화에 의한 성분을 중첩하여 전체 거동을 평가한다. 표기 참고 응력 성분과 전단응력 관계는 일반적인 3차원 응력 텐서 및 전단응력 상반정리 표기에 맞추어 정리하였다. 3. SLA 3D 프린팅의 열응력 산업 기술이 빠르게 발전하면서 불균일한 온도 또는 서로 다른 열팽창계수로 인해 발생하는 열응력과 변형은 여러 공학 분야의 주요 문제로 다루어지고 있다. 대표적인 사례는 다음과 같다. 보일러 및 화학 기계가 작동할 때의 고온으로 발생하는 열응력 가공 및 공정에서 고온 상태와 냉각 과정의 전환으로 발생하는 열응력 대규모 수리 시설 및 토목 구조물에서 기온 또는 일사로 발생하는 온도 변형과 열응력 정밀 기기에 영향을 주는 온도 변형 자동차와 항공기의 고온 환경에서 발생하는 열응력 위성이 태양광 영역과 그늘 영역을 통과할 때 온도 변화로 발생하는 열유도 진동 장치의 발열과 재료 특성의 불일치로 발생하는 열응력 3.1 광경화 과정에서 열응력이 발생하는 원리 광경화 3D 프린팅에서는 액체 상태의 광경화성 레진이 자외선에 의해 활성화되고, 가교 반응을 통해 고체로 경화된다. 그러나 자외선에 의해 유도되는 화학 반응에는 에너지 방출이 동반되므로 재료의 국부 영역 온도가 상승할 수 있다. 경화 과정에서 발생한 온도 변화가 불균일하게 분포하면 출력물 내부에 변형 구속이 생긴다. 이때 재료가 수축하거나 팽창하면서 열응력이 발생한다. 열응력이 형성되는 과정은 다음과 같다. 광경화성 레진이 자외선에 의해 활성화되면서 경화가 시작된다. 경화 영역 내부의 화학 반응에서 열이 발생하여 국부 영역의 온도가 상승한다. 고온 영역의 재료가 수축하기 시작하는 동안 주변의 저온 영역은 상대적으로 안정된 상태를 유지한다. 서로 다른 온도 영역 사이의 수축 또는 팽창 차이로 인해 응력이 집중된다. 4. 열응력 영향 저감 열응력은 출력물의 변형, 균열 및 손상과 같은 문제를 유발할 수 있다. 일상생활과 산업 시스템에서도 열변형과 열응력은 부정적인 영향을 줄 수 있으며, 원리적으로 다음과 같은 대응 방법을 적용할 수 있다. 제거해야 하는 대상이 변형인지 응력인지 먼저 분석한다. 예를 들어 토목 구조물의 온도 이음은 구속을 완화하여 열응력을 줄이지만, 다른 조건에서는 구속과 구조 강성을 높여 열변형을 줄일 수 있다. 단열 및 보온과 같은 방법으로 온도 하중을 낮추는 동시에, 온도 분포의 불균일성을 최소화한다. 서로 인접한 재료의 열팽창계수 차이가 지나치게 커지지 않도록 서로 다른 재료의 열팽창계수를 적절히 조합한다. 4.1 광경화 3D 프린팅의 열응력 저감 방법 광경화 3D 프린팅에서 열응력의 영향을 줄이기 위해 다음 방법을 적용할 수 있다. 출력 과정의 온도를 제어하여 온도 변화 범위를 최소화하고 열응력을 완화한다. 저수축 레진 또는 나일론과 같이 경화 후 수축이 작거나 강성이 높은 재료를 사용하여 열변형을 줄인다. 모델 구조를 기준으로 설계를 최적화하여 응력이 집중되는 영역을 줄인다. 서포트 구조물을 추가하여 응력을 분산한다. 5. 실무 참고 사항 SLA뿐 아니라 DLP 및 LCD 방식도 광경화성 레진의 중합 반응을 이용하므로, 경화 중 국부 발열과 온도 차이에 따른 내부 구속이라는 동일한 관점에서 열응력을 검토할 수 있다. 실제 출력 조건에서는 레진의 수축 특성, 출력물의 단면 변화, 형상 전환부, 서포트 배치 및 주변 온도 안정성을 함께 확인해야 한다. 출력 실패 분석 시 단순 치수 오차뿐 아니라 휨, 균열, 층간 손상 및 서포트 주변의 응력 집중 여부를 함께 관찰한다. 두꺼운 단면과 얇은 단면이 급격히 연결되는 형상은 수축 차이와 응력 집중이 나타날 수 있으므로 모델 방향과 서포트 분산을 검토한다. 레진 또는 장비 조건을 변경할 때는 한 번에 여러 변수를 바꾸기보다 온도, 노출, 형상 및 서포트 조건을 구분하여 결과를 비교한다. 주의 열응력의 실제 크기와 방향은 재료, 형상, 크기, 온도 변화 속도 및 가열·냉각 방식에 따라 달라진다. 따라서 특정 출력물의 문제를 판단할 때는 레진 데이터와 장비 조건을 함께 검토해야 한다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 5}, "2": {"manualId": 2, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "SLA/DLP/LCD 방식의 레진 3D 프린팅에서는 서포트 구조가 출력 성공을 좌우하는 핵심 안전장치로 사용된다. 서포트는 출력 중 모델의 변형과 붕괴를 방지하고, 박리 과정에서 모델을 안정적으로 지지한다. 다만 서포트는 출력물과 함께 경화되므로 제거 후 접촉 흔적이 남을 수 있으며, 표면 상태를 복원하기 위한 후처리가 필요하다."}, {"type": "paragraph", "text": "이 문서는 탑다운과 바텀업 방식에서 서포트가 수행하는 역할의 차이, 바텀업 출력에서 서포트가 필요한 위치, 대표적인 서포트 형상, 그리고 안정성과 표면 품질을 함께 고려한 배치 원칙을 설명한다."}, {"type": "heading", "level": 2, "text": "1. 탑다운·바텀업 방식의 서포트 구조", "id": "section-2"}, {"type": "paragraph", "text": "탑다운(top-down)과 바텀업(bottom-up) 레진 3D 프린팅은 출력 방향과 박리 조건이 다르므로 서포트 구조를 설계할 때 우선적으로 고려해야 하는 기준도 서로 다르다."}, {"type": "table", "rows": [["구분", "탑다운 방식", "바텀업 방식"], ["핵심 역할", "FDM과 유사하게 오버행과 브리지를 정확하게 형성한다.", "박리력·분리력에 대응하여 모델을 빌드 플랫폼에 안정적으로 유지한다."], ["설계 우선순위", "표면 손상과 후처리를 줄이도록 서포트 수를 최소화하고, 전체 레이어 수를 줄여 출력 시간을 단축한다.", "레이어 단면적과 박리력을 줄이는 방향으로 모델을 배치하며, 서포트 수의 최소화는 우선순위가 아니다."]]}, {"type": "heading", "level": 3, "text": "1.1 탑다운 방식", "id": "section-3"}, {"type": "paragraph", "text": "탑다운 방식의 서포트는 FDM 방식의 서포트와 유사하며, 오버행과 브리지를 정확하게 출력하기 위해 사용된다. 출력 과정에서 박리력(peel force) 또는 분리력(separation force)이 발생하지 않으므로 모델의 배치 방향을 상대적으로 자유롭게 선택할 수 있다."}, {"type": "paragraph", "text": "탑다운 방식에서는 모델 표면의 손상을 줄이고 후처리 부담을 낮추기 위해 서포트의 양을 최소화하는 것이 중요하다. 또한 전체 레이어 수가 적어지도록 배치하면 출력 시간을 단축할 수 있다."}, {"type": "image", "path": "assets/manuals/2_서포트 완벽 가이드/top-down-and-bottom-up-3d-printing.gif", "alt": "서포트 완벽 가이드 시각 자료", "fileName": "top-down-and-bottom-up-3d-printing.gif"}, {"type": "heading", "level": 3, "text": "1.2 바텀업 방식", "id": "section-4"}, {"type": "paragraph", "text": "바텀업 방식은 매 레이어가 FEP 필름에서 분리되는 과정에서 박리력 또는 분리력의 영향을 받기 때문에 조건이 더 복잡하다. 박리력에는 레진 점도, 리프트 속도, 새로 경화된 레이어의 반경·단면적, 경화 레이어와 FEP 필름 사이의 거리 등 여러 요소가 영향을 미친다."}, {"type": "paragraph", "text": "특히 각 레이어의 단면적은 서포트 구조 및 모델 배치와 직접 관련된다. 따라서 모델을 적절한 각도로 기울여 레이어별 단면적을 줄이는 것이 중요하며, 단순히 서포트 수를 줄이는 것을 우선해서는 안 된다. 이후 내용은 바텀업 방식의 SLA/DLP/LCD 출력에 초점을 맞춘다."}, {"type": "heading", "level": 2, "text": "2. 바텀업 방식에서 서포트가 필요한 위치", "id": "section-5"}, {"type": "heading", "level": 3, "text": "2.1 오버행과 브리지", "id": "section-6"}, {"type": "paragraph", "text": "오버행과 브리지의 출력 가능 여부는 흔히 Y, H, T 형상을 이용해 설명한다. 수직 방향을 기준으로 오버행의 기울기가 45도보다 작으면 서포트 없이 출력할 수 있는 경우가 있다. 예를 들어 Y 형상의 가지는 수직선과 약 30도의 각도를 이루므로 서포트 없이 출력될 수 있지만, T 형상의 오버행은 수직선과 90도를 이루므로 서포트가 필요하다."}, {"type": "paragraph", "text": "일반적으로 브리지 길이가 5 mm보다 짧으면 서포트 없이 출력할 수 있는 경우가 있다. 그러나 이 기준은 프린터의 실제 상태, 사용 레진, 출력 설정에 따라 달라질 수 있으므로 오버행 및 브리지 테스트 모델을 출력하여 장비별 한계를 확인하는 것이 좋다."}, {"type": "paragraph", "text": "판단 기준 45도와 5 mm는 절대값이 아니라 일반적인 출발점이다. 장비의 Z축 안정성, FEP 상태, 광원 성능, 레진 강성 및 출력 파라미터를 함께 고려해야 한다."}, {"type": "image", "path": "assets/manuals/2_서포트 완벽 가이드/overhangs.png", "alt": "서포트 완벽 가이드 시각 자료", "fileName": "overhangs.png"}, {"type": "image", "path": "assets/manuals/2_서포트 완벽 가이드/bridges.png", "alt": "서포트 완벽 가이드 시각 자료", "fileName": "bridges.png"}, {"type": "heading", "level": 3, "text": "2.2 브리지 길이와 레이어 분리", "id": "section-7"}, {"type": "paragraph", "text": "브리지는 일반적으로 부품의 두 지점을 연결하는 수평 오버행을 의미하며, 기호 Π의 가운데 가로 부분과 같은 형상으로 생각할 수 있다. 모든 브리지에 서포트가 필요한 것은 아니며, 경간이 짧으면 SLA/DLP/LCD 프린터에서도 서포트 없이 형성될 수 있다."}, {"type": "paragraph", "text": "브리지 경간이 길고 서포트가 없거나 부족하면 공중에서 레이어를 형성해야 하므로 레이어 파손이 발생할 수 있다. 첫 레이어가 형성되더라도 이후 레이어를 계속 출력하는 과정에서 층간 분리 현상이 나타날 수 있다. 비교 사례에서는 가장 긴 브리지의 층간 분리가 뚜렷하며, 두 번째로 긴 브리지는 분리가 눈에 잘 띄지 않더라도 경간 중앙부가 양 끝보다 두꺼워지는 형태로 문제가 나타난다."}, {"type": "paragraph", "text": "출력 가능한 최대 브리지 경간은 Z축의 불안정, FEP 필름의 분리 성능 저하, 광원 출력 감소와 같은 프린터 상태뿐 아니라 레진의 강성 부족에도 크게 좌우된다. 브리지가 포함된 부품을 출력하기 전에는 해당 장비와 레진 조합으로 시험 출력하여 최대 경간을 확인하는 것이 바람직하다."}, {"type": "paragraph", "text": "장비가 안정적으로 출력할 수 있는 최대 브리지 길이를 확인한 뒤, 이 길이를 초과하는 브리지에는 CHITUBOX에서 서포트 또는 작은 기둥을 추가하여 출력 성공률을 높인다."}, {"type": "heading", "level": 3, "text": "2.3 슬라이싱 미리보기로 서포트 위치 판단", "id": "section-8"}, {"type": "paragraph", "text": "바텀업 방식에서 서포트가 필요한 위치는 CHITUBOX의 슬라이싱 미리보기를 이용하면 비교적 쉽게 판단할 수 있다. 레이어를 순서대로 확인하면서 새로 나타나는 영역이 이전 레이어와 연결되어 있는지 살펴본다."}, {"type": "paragraph", "text": "베이스 형상 사례에서는 오버행이 시작되고 형상이 분리되는 지점을 중점적으로 확인한다. 초기 레이어가 이전에 경화된 레이어와 연결되어 있다면 서포트 없이도 레이어를 차례로 중첩할 수 있다. 오버행이 양쪽으로 확장되면서 한 레이어가 두 영역으로 나뉘더라도, 새 레이어가 이전 레이어와 계속 연결되어 있다면 오버행 구조가 완성될 때까지 출력될 수 있다."}, {"type": "paragraph", "text": "반면 ‘마우스’ 형상과 같이 슬라이싱 미리보기에서 이전 레이어와 연결되지 않은 채 공중에 새로 나타나는 부분은 모두 서포트로 받쳐야 한다. 이러한 부유 영역은 출력 실패로 이어질 수 있으므로 레이어별로 확인해야 한다."}, {"type": "image", "path": "assets/manuals/2_서포트 완벽 가이드/suspendings01.jpg", "alt": "서포트 완벽 가이드 시각 자료", "fileName": "suspendings01.jpg"}, {"type": "image", "path": "assets/manuals/2_서포트 완벽 가이드/suspendings02.jpg", "alt": "서포트 완벽 가이드 시각 자료", "fileName": "suspendings02.jpg"}, {"type": "image", "path": "assets/manuals/2_서포트 완벽 가이드/suspendings03.jpg", "alt": "서포트 완벽 가이드 시각 자료", "fileName": "suspendings03.jpg"}, {"type": "heading", "level": 3, "text": "2.4 강도가 약한 구조", "id": "section-9"}, {"type": "paragraph", "text": "바텀업 출력의 박리력·분리력은 얇거나 약한 구조에 변형, 눈에 띄는 라인, 파손을 일으킬 수 있다. 해당 구조가 형상적으로는 서포트 없이 출력 가능하더라도 출력 중 흔들림과 변형을 억제하려면 안정화용 서포트를 추가해야 한다."}, {"type": "heading", "level": 2, "text": "3. SLA/DLP/LCD 서포트 구조의 형태", "id": "section-10"}, {"type": "heading", "level": 3, "text": "3.1 리브형 서포트", "id": "section-11"}, {"type": "paragraph", "text": "SLA/DLP/LCD 3D 프린팅에서 가장 일반적인 서포트는 얇은 리브(rib) 형태이며, 재료 사용량을 줄이기 위해 작은 팁만 모델에 접촉한다. 리브형 서포트는 대부분의 출력 조건에 적용할 수 있고, 모델 표면 품질에 미치는 손상을 비교적 작게 유지할 수 있다는 장점이 있다."}, {"type": "heading", "level": 3, "text": "3.2 네트형 서포트", "id": "section-12"}, {"type": "paragraph", "text": "네트형 서포트는 얇은 플레이크가 서로 얽힌 것과 같은 구조로, 출력물 아래에 안정적인 기반을 형성한다. 출력물의 바닥면은 네트 구조에 가깝게 둘러싸이며 접촉점도 촘촘하게 배치된다."}, {"type": "paragraph", "text": "네트 구조는 플레이크형 구조보다 얇기 때문에 제거가 비교적 쉽고, 많은 접촉점으로 하중을 분산할 수 있다. 다만 접촉점이 조밀하므로 후처리가 필요한 표면에서는 제거 흔적과 표면 품질을 함께 고려해야 한다."}, {"type": "heading", "level": 2, "text": "4. 서포트 추가 시 고려 사항", "id": "section-13"}, {"type": "heading", "level": 3, "text": "4.1 복잡하거나 중요한 표면의 서포트 회피", "id": "section-14"}, {"type": "paragraph", "text": "SLA/DLP/LCD 방식은 외관과 매끄러운 표면 품질이 중요한 부품에 자주 사용된다. 이 경우 정면으로 보이는 면이나 외관상 중요한 면이 서포트와 접촉하지 않도록 모델을 설계하고 배치해야 한다."}, {"type": "paragraph", "text": "모델 방향은 접촉 흔적을 제어하는 핵심 요소다. 특정 표면의 미관이 가장 중요하다면 그 면에 서포트가 거의 닿지 않거나 전혀 닿지 않도록 모델을 회전하고 기울이는 방법을 사용할 수 있다."}, {"type": "image", "path": "assets/manuals/2_서포트 완벽 가이드/spider-man.gif", "alt": "서포트 완벽 가이드 시각 자료", "fileName": "spider-man.gif"}, {"type": "heading", "level": 3, "text": "4.2 서포트의 균등한 분포", "id": "section-15"}, {"type": "paragraph", "text": "바텀업 광조형 프린터에서는 서포트를 고르게 분포시켜야 출력물이 박리 하중을 균일하게 받는다. 서포트가 조밀한 영역은 빌드 플랫폼과 수조 바닥의 FEP 필름 사이에서 발생하는 당김을 견딜 수 있지만, 서포트가 드문 영역은 서포트에서 떨어져 매달린 상태가 될 수 있다. 이 상태는 미출력, 형상 누락 또는 변형으로 이어질 수 있다."}, {"type": "heading", "level": 3, "text": "4.3 상호 연결된 서포트 사용", "id": "section-16"}, {"type": "paragraph", "text": "서포트를 생성할 때는 각각을 독립적으로 배치하기보다 서포트 사이를 브리지로 연결하는 편이 좋다. 슬라이서가 이러한 연결 구조를 지원하지 않는다면 해당 방식을 억지로 적용하기 어렵지만, CHITUBOX의 상호 연결 구조를 활용하면 서포트 실패 가능성을 크게 줄일 수 있다."}, {"type": "paragraph", "text": "서포트 사이의 연결은 베이스 서포트와 보조 서포트를 더 단단한 하나의 구조로 만들며, 개별 서포트가 휘거나 끊어져 출력이 실패할 가능성을 낮춘다."}, {"type": "image", "path": "assets/manuals/2_서포트 완벽 가이드/interconnected-supports-and-individual-supports.png", "alt": "서포트 완벽 가이드 시각 자료", "fileName": "interconnected-supports-and-individual-supports.png"}, {"type": "paragraph", "text": "왼쪽: 상호 연결된 서포트 | 오른쪽: 개별 서포트"}, {"type": "heading", "level": 3, "text": "4.4 모델과 서포트의 겹침 방지", "id": "section-17"}, {"type": "paragraph", "text": "모델 표면에 실제로 접촉해야 하는 부분은 서포트 끝의 작은 팁뿐이다. 복잡한 모델에서는 서포트를 세밀하게 편집하지 않으면 서포트 몸체가 모델 표면과 겹칠 수 있다."}, {"type": "paragraph", "text": "겹친 서포트를 후처리 과정에서 제거하면 접촉 영역에 돌출부가 남을 수 있으며, 이를 연마하는 과정에서 모델 표면이 손상될 수 있다. 슬라이싱 전 여러 방향에서 모델과 서포트의 간섭 여부를 확인해야 한다."}, {"type": "heading", "level": 3, "text": "4.5 높고 약한 서포트의 보강", "id": "section-18"}, {"type": "paragraph", "text": "모델 높이가 커지면 서포트 파라미터를 조정하더라도 전체 서포트 길이가 지나치게 길어지고 몸체가 약해질 수 있다. 이 경우 서포트 자체의 출력에 문제가 생겨 전체 출력이 실패할 수 있다."}, {"type": "paragraph", "text": "이때는 독립 서포트 또는 서포트 보강 기능을 사용한다. 이미 추가한 서포트를 하나의 출력 대상처럼 간주하고 그 서포트에 다시 보조 서포트를 추가하면 전체 구조의 안정성을 높일 수 있다."}, {"type": "heading", "level": 2, "text": "5. 실무 참고 사항", "id": "section-19"}, {"type": "paragraph", "text": "바텀업 출력에서는 서포트 수보다 레이어 단면적과 박리력에 먼저 대응한다."}, {"type": "paragraph", "text": "오버행 45도와 브리지 5 mm 기준은 시험 출력을 시작하기 위한 참고값으로 사용한다."}, {"type": "paragraph", "text": "CHITUBOX 슬라이싱 미리보기에서 이전 레이어와 연결되지 않고 새로 나타나는 부유 영역을 확인한다."}, {"type": "paragraph", "text": "표면 품질이 중요한 면에는 접촉점을 피하고, 모델 방향을 조정해 서포트 흔적을 덜 중요한 면으로 보낸다."}, {"type": "paragraph", "text": "서포트는 균등하게 분포시키고 가능한 경우 서로 연결하여 박리 하중에 대한 강성을 높인다."}, {"type": "paragraph", "text": "높거나 가느다란 서포트는 독립 서포트 또는 보조 서포트로 보강하고 모델과의 겹침을 최종 점검한다."}, {"type": "callout", "tone": "warning", "text": "주의 장비 성능과 레진 특성이 달라지면 안정적으로 출력 가능한 오버행 각도와 브리지 경간도 달라진다. 장비, 레진, 레이어 높이, 노출 및 리프트 조건을 변경한 경우에는 시험 모델로 기준을 다시 확인한다."}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "bridges.png", "path": "assets/manuals/2_서포트 완벽 가이드/bridges.png", "kind": "image", "alt": "서포트 완벽 가이드 시각 자료 2-1"}, {"fileName": "interconnected-supports-and-individual-supports.png", "path": "assets/manuals/2_서포트 완벽 가이드/interconnected-supports-and-individual-supports.png", "kind": "image", "alt": "서포트 완벽 가이드 시각 자료 2-2"}, {"fileName": "overhangs.png", "path": "assets/manuals/2_서포트 완벽 가이드/overhangs.png", "kind": "image", "alt": "서포트 완벽 가이드 시각 자료 2-3"}, {"fileName": "spider-man.gif", "path": "assets/manuals/2_서포트 완벽 가이드/spider-man.gif", "kind": "gif", "alt": "서포트 완벽 가이드 시각 자료 2-4"}, {"fileName": "suspendings01.jpg", "path": "assets/manuals/2_서포트 완벽 가이드/suspendings01.jpg", "kind": "image", "alt": "서포트 완벽 가이드 시각 자료 2-5"}, {"fileName": "suspendings02.jpg", "path": "assets/manuals/2_서포트 완벽 가이드/suspendings02.jpg", "kind": "image", "alt": "서포트 완벽 가이드 시각 자료 2-6"}, {"fileName": "suspendings03.jpg", "path": "assets/manuals/2_서포트 완벽 가이드/suspendings03.jpg", "kind": "image", "alt": "서포트 완벽 가이드 시각 자료 2-7"}, {"fileName": "top-down-and-bottom-up-3d-printing.gif", "path": "assets/manuals/2_서포트 완벽 가이드/top-down-and-bottom-up-3d-printing.gif", "kind": "gif", "alt": "서포트 완벽 가이드 시각 자료 2-8"}], "searchText": "0. 개요 SLA/DLP/LCD 방식의 레진 3D 프린팅에서는 서포트 구조가 출력 성공을 좌우하는 핵심 안전장치로 사용된다. 서포트는 출력 중 모델의 변형과 붕괴를 방지하고, 박리 과정에서 모델을 안정적으로 지지한다. 다만 서포트는 출력물과 함께 경화되므로 제거 후 접촉 흔적이 남을 수 있으며, 표면 상태를 복원하기 위한 후처리가 필요하다. 이 문서는 탑다운과 바텀업 방식에서 서포트가 수행하는 역할의 차이, 바텀업 출력에서 서포트가 필요한 위치, 대표적인 서포트 형상, 그리고 안정성과 표면 품질을 함께 고려한 배치 원칙을 설명한다. 1. 탑다운·바텀업 방식의 서포트 구조 탑다운(top-down)과 바텀업(bottom-up) 레진 3D 프린팅은 출력 방향과 박리 조건이 다르므로 서포트 구조를 설계할 때 우선적으로 고려해야 하는 기준도 서로 다르다. 구분 탑다운 방식 바텀업 방식 핵심 역할 FDM과 유사하게 오버행과 브리지를 정확하게 형성한다. 박리력·분리력에 대응하여 모델을 빌드 플랫폼에 안정적으로 유지한다. 설계 우선순위 표면 손상과 후처리를 줄이도록 서포트 수를 최소화하고, 전체 레이어 수를 줄여 출력 시간을 단축한다. 레이어 단면적과 박리력을 줄이는 방향으로 모델을 배치하며, 서포트 수의 최소화는 우선순위가 아니다. 1.1 탑다운 방식 탑다운 방식의 서포트는 FDM 방식의 서포트와 유사하며, 오버행과 브리지를 정확하게 출력하기 위해 사용된다. 출력 과정에서 박리력(peel force) 또는 분리력(separation force)이 발생하지 않으므로 모델의 배치 방향을 상대적으로 자유롭게 선택할 수 있다. 탑다운 방식에서는 모델 표면의 손상을 줄이고 후처리 부담을 낮추기 위해 서포트의 양을 최소화하는 것이 중요하다. 또한 전체 레이어 수가 적어지도록 배치하면 출력 시간을 단축할 수 있다. 1.2 바텀업 방식 바텀업 방식은 매 레이어가 FEP 필름에서 분리되는 과정에서 박리력 또는 분리력의 영향을 받기 때문에 조건이 더 복잡하다. 박리력에는 레진 점도, 리프트 속도, 새로 경화된 레이어의 반경·단면적, 경화 레이어와 FEP 필름 사이의 거리 등 여러 요소가 영향을 미친다. 특히 각 레이어의 단면적은 서포트 구조 및 모델 배치와 직접 관련된다. 따라서 모델을 적절한 각도로 기울여 레이어별 단면적을 줄이는 것이 중요하며, 단순히 서포트 수를 줄이는 것을 우선해서는 안 된다. 이후 내용은 바텀업 방식의 SLA/DLP/LCD 출력에 초점을 맞춘다. 2. 바텀업 방식에서 서포트가 필요한 위치 2.1 오버행과 브리지 오버행과 브리지의 출력 가능 여부는 흔히 Y, H, T 형상을 이용해 설명한다. 수직 방향을 기준으로 오버행의 기울기가 45도보다 작으면 서포트 없이 출력할 수 있는 경우가 있다. 예를 들어 Y 형상의 가지는 수직선과 약 30도의 각도를 이루므로 서포트 없이 출력될 수 있지만, T 형상의 오버행은 수직선과 90도를 이루므로 서포트가 필요하다. 일반적으로 브리지 길이가 5 mm보다 짧으면 서포트 없이 출력할 수 있는 경우가 있다. 그러나 이 기준은 프린터의 실제 상태, 사용 레진, 출력 설정에 따라 달라질 수 있으므로 오버행 및 브리지 테스트 모델을 출력하여 장비별 한계를 확인하는 것이 좋다. 판단 기준 45도와 5 mm는 절대값이 아니라 일반적인 출발점이다. 장비의 Z축 안정성, FEP 상태, 광원 성능, 레진 강성 및 출력 파라미터를 함께 고려해야 한다. 2.2 브리지 길이와 레이어 분리 브리지는 일반적으로 부품의 두 지점을 연결하는 수평 오버행을 의미하며, 기호 Π의 가운데 가로 부분과 같은 형상으로 생각할 수 있다. 모든 브리지에 서포트가 필요한 것은 아니며, 경간이 짧으면 SLA/DLP/LCD 프린터에서도 서포트 없이 형성될 수 있다. 브리지 경간이 길고 서포트가 없거나 부족하면 공중에서 레이어를 형성해야 하므로 레이어 파손이 발생할 수 있다. 첫 레이어가 형성되더라도 이후 레이어를 계속 출력하는 과정에서 층간 분리 현상이 나타날 수 있다. 비교 사례에서는 가장 긴 브리지의 층간 분리가 뚜렷하며, 두 번째로 긴 브리지는 분리가 눈에 잘 띄지 않더라도 경간 중앙부가 양 끝보다 두꺼워지는 형태로 문제가 나타난다. 출력 가능한 최대 브리지 경간은 Z축의 불안정, FEP 필름의 분리 성능 저하, 광원 출력 감소와 같은 프린터 상태뿐 아니라 레진의 강성 부족에도 크게 좌우된다. 브리지가 포함된 부품을 출력하기 전에는 해당 장비와 레진 조합으로 시험 출력하여 최대 경간을 확인하는 것이 바람직하다. 장비가 안정적으로 출력할 수 있는 최대 브리지 길이를 확인한 뒤, 이 길이를 초과하는 브리지에는 CHITUBOX에서 서포트 또는 작은 기둥을 추가하여 출력 성공률을 높인다. 2.3 슬라이싱 미리보기로 서포트 위치 판단 바텀업 방식에서 서포트가 필요한 위치는 CHITUBOX의 슬라이싱 미리보기를 이용하면 비교적 쉽게 판단할 수 있다. 레이어를 순서대로 확인하면서 새로 나타나는 영역이 이전 레이어와 연결되어 있는지 살펴본다. 베이스 형상 사례에서는 오버행이 시작되고 형상이 분리되는 지점을 중점적으로 확인한다. 초기 레이어가 이전에 경화된 레이어와 연결되어 있다면 서포트 없이도 레이어를 차례로 중첩할 수 있다. 오버행이 양쪽으로 확장되면서 한 레이어가 두 영역으로 나뉘더라도, 새 레이어가 이전 레이어와 계속 연결되어 있다면 오버행 구조가 완성될 때까지 출력될 수 있다. 반면 ‘마우스’ 형상과 같이 슬라이싱 미리보기에서 이전 레이어와 연결되지 않은 채 공중에 새로 나타나는 부분은 모두 서포트로 받쳐야 한다. 이러한 부유 영역은 출력 실패로 이어질 수 있으므로 레이어별로 확인해야 한다. 2.4 강도가 약한 구조 바텀업 출력의 박리력·분리력은 얇거나 약한 구조에 변형, 눈에 띄는 라인, 파손을 일으킬 수 있다. 해당 구조가 형상적으로는 서포트 없이 출력 가능하더라도 출력 중 흔들림과 변형을 억제하려면 안정화용 서포트를 추가해야 한다. 3. SLA/DLP/LCD 서포트 구조의 형태 3.1 리브형 서포트 SLA/DLP/LCD 3D 프린팅에서 가장 일반적인 서포트는 얇은 리브(rib) 형태이며, 재료 사용량을 줄이기 위해 작은 팁만 모델에 접촉한다. 리브형 서포트는 대부분의 출력 조건에 적용할 수 있고, 모델 표면 품질에 미치는 손상을 비교적 작게 유지할 수 있다는 장점이 있다. 3.2 네트형 서포트 네트형 서포트는 얇은 플레이크가 서로 얽힌 것과 같은 구조로, 출력물 아래에 안정적인 기반을 형성한다. 출력물의 바닥면은 네트 구조에 가깝게 둘러싸이며 접촉점도 촘촘하게 배치된다. 네트 구조는 플레이크형 구조보다 얇기 때문에 제거가 비교적 쉽고, 많은 접촉점으로 하중을 분산할 수 있다. 다만 접촉점이 조밀하므로 후처리가 필요한 표면에서는 제거 흔적과 표면 품질을 함께 고려해야 한다. 4. 서포트 추가 시 고려 사항 4.1 복잡하거나 중요한 표면의 서포트 회피 SLA/DLP/LCD 방식은 외관과 매끄러운 표면 품질이 중요한 부품에 자주 사용된다. 이 경우 정면으로 보이는 면이나 외관상 중요한 면이 서포트와 접촉하지 않도록 모델을 설계하고 배치해야 한다. 모델 방향은 접촉 흔적을 제어하는 핵심 요소다. 특정 표면의 미관이 가장 중요하다면 그 면에 서포트가 거의 닿지 않거나 전혀 닿지 않도록 모델을 회전하고 기울이는 방법을 사용할 수 있다. 4.2 서포트의 균등한 분포 바텀업 광조형 프린터에서는 서포트를 고르게 분포시켜야 출력물이 박리 하중을 균일하게 받는다. 서포트가 조밀한 영역은 빌드 플랫폼과 수조 바닥의 FEP 필름 사이에서 발생하는 당김을 견딜 수 있지만, 서포트가 드문 영역은 서포트에서 떨어져 매달린 상태가 될 수 있다. 이 상태는 미출력, 형상 누락 또는 변형으로 이어질 수 있다. 4.3 상호 연결된 서포트 사용 서포트를 생성할 때는 각각을 독립적으로 배치하기보다 서포트 사이를 브리지로 연결하는 편이 좋다. 슬라이서가 이러한 연결 구조를 지원하지 않는다면 해당 방식을 억지로 적용하기 어렵지만, CHITUBOX의 상호 연결 구조를 활용하면 서포트 실패 가능성을 크게 줄일 수 있다. 서포트 사이의 연결은 베이스 서포트와 보조 서포트를 더 단단한 하나의 구조로 만들며, 개별 서포트가 휘거나 끊어져 출력이 실패할 가능성을 낮춘다. 왼쪽: 상호 연결된 서포트 | 오른쪽: 개별 서포트 4.4 모델과 서포트의 겹침 방지 모델 표면에 실제로 접촉해야 하는 부분은 서포트 끝의 작은 팁뿐이다. 복잡한 모델에서는 서포트를 세밀하게 편집하지 않으면 서포트 몸체가 모델 표면과 겹칠 수 있다. 겹친 서포트를 후처리 과정에서 제거하면 접촉 영역에 돌출부가 남을 수 있으며, 이를 연마하는 과정에서 모델 표면이 손상될 수 있다. 슬라이싱 전 여러 방향에서 모델과 서포트의 간섭 여부를 확인해야 한다. 4.5 높고 약한 서포트의 보강 모델 높이가 커지면 서포트 파라미터를 조정하더라도 전체 서포트 길이가 지나치게 길어지고 몸체가 약해질 수 있다. 이 경우 서포트 자체의 출력에 문제가 생겨 전체 출력이 실패할 수 있다. 이때는 독립 서포트 또는 서포트 보강 기능을 사용한다. 이미 추가한 서포트를 하나의 출력 대상처럼 간주하고 그 서포트에 다시 보조 서포트를 추가하면 전체 구조의 안정성을 높일 수 있다. 5. 실무 참고 사항 바텀업 출력에서는 서포트 수보다 레이어 단면적과 박리력에 먼저 대응한다. 오버행 45도와 브리지 5 mm 기준은 시험 출력을 시작하기 위한 참고값으로 사용한다. CHITUBOX 슬라이싱 미리보기에서 이전 레이어와 연결되지 않고 새로 나타나는 부유 영역을 확인한다. 표면 품질이 중요한 면에는 접촉점을 피하고, 모델 방향을 조정해 서포트 흔적을 덜 중요한 면으로 보낸다. 서포트는 균등하게 분포시키고 가능한 경우 서로 연결하여 박리 하중에 대한 강성을 높인다. 높거나 가느다란 서포트는 독립 서포트 또는 보조 서포트로 보강하고 모델과의 겹침을 최종 점검한다. 주의 장비 성능과 레진 특성이 달라지면 안정적으로 출력 가능한 오버행 각도와 브리지 경간도 달라진다. 장비, 레진, 레이어 높이, 노출 및 리프트 조건을 변경한 경우에는 시험 모델로 기준을 다시 확인한다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 5}, "3": {"manualId": 3, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "레진 3D 프린팅의 치수 정확도는 한 가지 사양으로 결정되지 않는다. XY 방향에서는 해상도와 표시 영역, 광학계 및 노광 조건이 함께 작용하고, Z 방향에서는 레이어 높이와 이송계의 분해능·강성·직진성이 결과를 좌우한다. 여기에 서포트, 모델 배치, 세척과 후경화 조건이 더해지면 동일한 모델도 서로 다른 치수와 표면 상태로 출력될 수 있다."}, {"type": "paragraph", "text": "설명 자료는 캐리마텍의 IML 16K LCD 3D 프린터를 기준이자 예시로 한다."}, {"type": "heading", "level": 2, "text": "1. XY 해상도와 출력 크기", "id": "section-2"}, {"type": "paragraph", "text": "XY 해상도는 레진 표면에 형성할 수 있는 UV 단위의 개수이며, 출력 크기는 그 UV 단위가 배치되는 물리적 영역이다. 같은 픽셀 수라면 표시 영역이 작을수록 픽셀 피치가 작아지고 미세 형상 표현에 유리하다. 반대로 표시 영역이 커지면 한 픽셀이 담당하는 길이가 증가한다."}, {"type": "paragraph", "text": "PPI(pixel per inch)는 화면 대각선 방향의 픽셀 밀도를 나타내는 지표다. 프린터 간 개략적인 비교에는 유용하지만, 실제 치수 교정에서는 X축과 Y축의 픽셀 피치를 각각 확인하는 편이 더 직접적이다."}, {"type": "table", "rows": [["PPI = √(Nₓ² + Nᵧ²) ÷ [√(Lₓ² + Lᵧ²) ÷ 25.4] N: 축별 픽셀 수, L: 축별 물리 길이(mm)"]]}, {"type": "table", "rows": [["축별 픽셀 피치(μm) = 물리 길이(mm) ÷ 픽셀 수(px) × 1000 값이 작을수록 이론적으로 더 미세한 형상을 표현할 수 있다."]]}, {"type": "table", "rows": [["항목", "계산", "결과", "해석"], ["X축 피치", "211.680 ÷ 15120", "14 μm", "X 방향의 이론적 유효 픽셀 간격"], ["Y축 피치", "118.370 ÷ 6230", "19 μm", "Y 방향의 이론적 유효 픽셀 간격"], ["대각 PPI", "대각 픽셀 ÷ 대각 길이", "약 1,713 PPI", "대각선 기준의 밀도 요약값"]]}, {"type": "table", "rows": [["해석 주의 제공 프로필은 X와 Y의 유효 피치가 서로 다르다. 이는 축별 스케일 특성을 개별적으로 관리해야 함을 의미한다. 대각 PPI만으로 동일한 XY 정확도를 가정하지 말고, X·Y 치수 쿠폰을 각각 측정하여 결과를 확인한다."]]}, {"type": "paragraph", "text": "계산값은 픽셀 배열과 물리 크기에서 얻은 이론값이다. 실제 출력에서는 픽셀 사이의 비발광 영역, 광원 확산, 안티앨리어싱, 레진의 광투과·산란, 노광 시간 등이 최소 형상과 최종 치수에 영향을 준다."}, {"type": "heading", "level": 2, "text": "2. 방식별 이미징 원리", "id": "section-3"}, {"type": "heading", "level": 3, "text": "2.1 SLA", "id": "section-4"}, {"type": "paragraph", "text": "SLA는 X축과 Y축 갈바노 미러로 레이저를 이동시키며 각 레이어의 점과 선을 순차적으로 경화한다. 따라서 UV 단위는 주로 레이저 빔 직경과 스캔 광학계의 특성으로 결정된다."}, {"type": "image", "path": "assets/manuals/3_프린팅 정확도 영향 요인/sla-imaging-principle.png", "alt": "프린팅 정확도 영향 요인 시각 자료", "fileName": "sla-imaging-principle.png"}, {"type": "heading", "level": 3, "text": "2.2 DLP", "id": "section-5"}, {"type": "paragraph", "text": "DLP는 디지털 프로젝터로 한 레이어의 이미지를 플랫폼 전체에 동시에 투사한다. 레이어 이미지는 다수의 정사각형 픽셀로 구성되며, 레진 표면에 투사된 픽셀 크기가 UV 단위가 된다."}, {"type": "image", "path": "assets/manuals/3_프린팅 정확도 영향 요인/dlp-imaging-principle.png", "alt": "프린팅 정확도 영향 요인 시각 자료", "fileName": "dlp-imaging-principle.png"}, {"type": "heading", "level": 3, "text": "2.3 LCD", "id": "section-6"}, {"type": "paragraph", "text": "LCD 방식은 LED 배열의 자외선이 LCD 패널을 통과하도록 하고, LCD가 현재 레이어에 필요한 픽셀만 통과시키는 마스크 역할을 한다. 이 경우 UV 단위는 LCD 화면의 픽셀 크기와 광학 확산 특성에 의해 결정된다."}, {"type": "image", "path": "assets/manuals/3_프린팅 정확도 영향 요인/lcd-imaging-principle.png", "alt": "프린팅 정확도 영향 요인 시각 자료", "fileName": "lcd-imaging-principle.png"}, {"type": "table", "rows": [["방식", "광원·이미징", "UV 단위를 좌우하는 요소"], ["SLA", "레이저를 갈바노 미러로 주사", "레이저 빔 직경, 스캔 광학계"], ["DLP", "레이어 이미지를 프로젝터로 일괄 투사", "레진 표면에 투사된 픽셀 크기"], ["LCD", "LCD를 마스크로 사용하여 LED 광을 선택 통과", "패널 픽셀 크기, 광원 확산과 마스크 특성"]]}, {"type": "heading", "level": 2, "text": "3. CHITUBOX에서 IML 16K 설정", "id": "section-7"}, {"type": "paragraph", "text": "해상도와 물리 크기가 서로 맞지 않으면 슬라이서가 모델을 잘못 스케일링하여 XY 방향의 치수 왜곡이 발생한다. 따라서 장비 프로필에는 픽셀 수와 대응하는 표시 영역 값을 정확히 입력해야 한다."}, {"type": "heading", "level": 3, "text": "3.1 입력 및 확인 순서", "id": "section-8"}, {"type": "paragraph", "text": "장비 프로필의 이름을 IML 16K로 지정하고 기계 유형을 제공값과 동일하게 유지한다."}, {"type": "paragraph", "text": "미러 방식이 LCD_mirror로 설정되어 있는지 확인한다."}, {"type": "paragraph", "text": "해상도 X 15120 px, Y 6230 px를 입력한다. X와 Y를 서로 바꾸지 않는다."}, {"type": "paragraph", "text": "크기 X 211.680 mm, Y 118.370 mm, Z 200.000 mm를 입력한다."}, {"type": "paragraph", "text": "프로필 저장 후 비대칭 문자 또는 방향 표식을 슬라이스하여 미러 방향과 축 방향을 확인한다."}, {"type": "heading", "level": 3, "text": "3.2 표시 영역과 실제 출력 가능 영역", "id": "section-9"}, {"type": "paragraph", "text": "LCD 장비에서는 프레임, 보호 유리 또는 조립 구조로 인해 화면의 가장자리가 실제로 노광되지 않을 수 있다. 이때도 해상도와 매핑되는 물리 크기에는 표시 영역 값을 유지해야 한다. 가장자리의 사용 불가 영역은 Build Area Offset으로 제한하며, 화면 크기를 임의로 줄여 보정하지 않는다."}, {"type": "table", "rows": [["Build Area Offset의 역할 출력 가능한 경계만 조정하는 기능이다. 모델 치수 오차나 축별 스케일 오차를 보정하는 값으로 사용하지 않는다."]]}, {"type": "heading", "level": 3, "text": "3.3 프로필 값 검증", "id": "section-10"}, {"type": "paragraph", "text": "IML 16K 프로필의 해상도 비율과 물리 크기 비율은 서로 다르므로 축별 유효 피치도 다르게 계산된다. 제공된 값을 임의로 정사각 픽셀 값으로 바꾸지 말고, 제조사 또는 사내 기준 프로필과 실제 치수 쿠폰을 함께 확인한다."}, {"type": "heading", "level": 2, "text": "20 mm 이상의 X·Y 방향 치수 쿠폰을 동일한 위치와 방향에서 3회 이상 출력한다.", "id": "section-11"}, {"type": "paragraph", "text": "후경화 전후 측정 시점을 통일하고, 캘리퍼 또는 측정 현미경의 측정 조건을 기록한다."}, {"type": "paragraph", "text": "노광 조건을 먼저 안정화한 뒤 축별 평균 오차를 계산한다."}, {"type": "paragraph", "text": "스케일 보정이 필요하면 X와 Y를 개별 관리하고, 변경 전 프로필을 복제하여 이력을 남긴다."}, {"type": "table", "rows": [["축별 보정 배율 = 기준 치수 ÷ 측정 치수 예: 기준 20.00 mm, 측정 19.80 mm이면 보정 배율은 약 1.0101"]]}, {"type": "heading", "level": 2, "text": "4. Z 방향 정확도", "id": "section-12"}, {"type": "heading", "level": 3, "text": "4.1 레이어 높이", "id": "section-13"}, {"type": "paragraph", "text": "XY 방향의 기본 단위가 해상도와 표시 영역으로 결정되는 반면, Z 방향의 기본 단위는 레이어 높이다. 레이어 높이가 작을수록 곡면과 경사면의 계단 현상이 줄고 세부 표현이 향상되지만, 레이어 수와 출력 시간은 증가한다."}, {"type": "paragraph", "text": "레이어 높이를 낮추는 것만으로 치수 정확도가 자동으로 향상되는 것은 아니다. 리프트 동작, 레진 재유입, 노광량, Z축 유격과 빌드 플랫폼 평행도가 함께 안정되어야 한다."}, {"type": "heading", "level": 3, "text": "4.2 이론적 최소 이동 거리", "id": "section-14"}, {"type": "paragraph", "text": "빌드 플랫폼은 스테퍼 모터와 리드 스크루를 통해 이동한다. 이론적 최소 이동 거리는 모터 1회전의 총 스텝 수와 리드 스크루가 1회전할 때 이동하는 거리로 계산할 수 있다."}, {"type": "table", "rows": [["최소 이동 거리 = 리드(mm/rev) ÷ [360° ÷ 스텝각 × 마이크로스텝 수] 실제 반복 정밀도는 백래시, 하중, 드라이버와 구조 강성의 영향을 받는다."]]}, {"type": "paragraph", "text": "스텝각 1.8°, 16 마이크로스텝, 리드 2 mm를 적용하면 1회전당 3200 스텝이며 최소 이동 거리는 2 mm ÷ 3200 = 0.000625 mm, 즉 0.625 μm이다. 이 값은 계산 예시이며 IML 16K의 모터·리드 스크루 사양으로 단정해서는 안 된다."}, {"type": "heading", "level": 3, "text": "4.3 Z축 안정성", "id": "section-15"}, {"type": "table", "rows": [["점검 항목", "정상 기준", "정확도에 미치는 영향"], ["수직도", "Z축과 화면 평면의 관계가 90°에 가깝다.", "기울기와 축 방향 치수 편차 감소"], ["직진도", "이동 전 구간에서 가이드가 곧게 유지된다.", "층별 위치 흔들림과 밴딩 감소"], ["평행·중심 정렬", "가이드와 리드 스크루 간격이 이동 중 일정하다.", "구속과 편하중 감소"], ["체결 상태", "플랫폼 고정부와 조인트가 풀리지 않는다.", "레이어 시프트와 반복 오차 감소"], ["캔틸레버 강성", "박리 하중에서 처짐이 작다.", "Z 방향 압축·늘어짐과 표면 흔들림 감소"]]}, {"type": "heading", "level": 2, "text": "5. 정확도에 영향을 주는 기타 요인", "id": "section-16"}, {"type": "heading", "level": 3, "text": "5.1 서포트 부족과 모델 배치", "id": "section-17"}, {"type": "paragraph", "text": "서포트가 부족하거나 접점이 너무 가늘고 위치가 부적절하면 출력 중 모델이 기울거나 변형될 수 있다. CHITUBOX에서 서포트 굵기와 접점, 밀도를 조정하고 레이어 단면적이 급격히 증가하지 않도록 모델 방향을 최적화한다."}, {"type": "heading", "level": 3, "text": "5.2 노광 부족과 과다 노광", "id": "section-18"}, {"type": "paragraph", "text": "노광 부족은 형상 경계가 충분히 경화되지 않아 치수가 작아지거나 구조가 약해지는 원인이 될 수 있다. 과다 노광은 빛 번짐과 주변 경화를 증가시켜 구멍이 작아지고 외형 치수가 커지는 방향으로 작용할 수 있다. 단, 변화 방향과 크기는 레진 색상, 형상, 배치와 후경화 조건에 따라 달라질 수 있다."}, {"type": "heading", "level": 3, "text": "5.3 이소프로필알코올 세척", "id": "section-19"}, {"type": "paragraph", "text": "일부 레진은 알코올을 흡수하여 팽윤하거나 휘어질 수 있으며, 얇은 벽과 기둥처럼 세부 형상이 작은 부품에서 영향이 커질 수 있다. 초음파 세척은 2분 이내, 이소프로필알코올 침지는 10분 이내를 초기 기준으로 관리한다. 실무에서는 사용 레진 제조사의 세척 지침을 우선하고, 세척 후 충분히 건조한 뒤 후경화한다."}, {"type": "table", "rows": [["요인", "대표 증상", "우선 조치"], ["서포트 부족", "기울어짐, 휨, 일부 형상 손실", "모델 각도와 접점·굵기·밀도 조정"], ["노광 부족", "외형 축소, 약한 모서리, 박리 실패", "노광 테스트 후 시간을 단계적으로 증가"], ["과다 노광", "외형 확대, 구멍 축소, 디테일 뭉침", "노광 시간을 단계적으로 감소"], ["과도한 IPA 침지", "팽윤, 휨, 얇은 구조 변형", "세척 시간을 제한하고 완전 건조"]]}, {"type": "heading", "level": 2, "text": "6. IML 16K 정확도 교정 절차", "id": "section-20"}, {"type": "paragraph", "text": "기준 프로필 복제: IML 16K 원본 프로필을 보존하고 재료·레이어 높이별 작업용 프로필을 만든다."}, {"type": "paragraph", "text": "기계 상태 확인: 빌드 플랫폼 평행도, 체결 상태, 필름 상태, 레진 온도와 교반 상태를 확인한다."}, {"type": "paragraph", "text": "노광 안정화: 작은 노광 테스트로 핀·구멍·벽 두께가 동시에 재현되는 범위를 찾는다."}, {"type": "paragraph", "text": "XY 편차 측정: X와 Y 방향의 기준 길이를 각각 3회 이상 측정하고 평균과 편차를 기록한다."}, {"type": "paragraph", "text": "축별 보정: 일정한 비율 오차가 반복될 때만 X와 Y 보정값을 개별 적용한다."}, {"type": "paragraph", "text": "Z 검증: 서로 다른 높이의 스텝 또는 기둥을 측정하여 레이어 높이, 축 유격과 후경화 수축을 구분한다."}, {"type": "paragraph", "text": "재검증과 동결: 보정 후 동일 쿠폰을 재출력하고 허용 오차를 만족하면 프로필 버전을 고정한다."}, {"type": "table", "rows": [["변수 관리 원칙 한 번에 하나의 변수만 변경한다. 노광, XY 스케일, 서포트, 세척 시간을 동시에 바꾸면 어떤 변경이 결과를 개선했는지 판단할 수 없다."]]}, {"type": "table", "rows": [["기록 항목", "권장 기록값"], ["프로필", "해상도, 크기, 미러, 레이어 높이, 프로필 버전"], ["재료", "레진명, 배치 번호, 색상, 작업 온도"], ["노광", "바닥·일반 노광, 전환층, 리프트 조건"], ["측정", "기준 치수, X/Y/Z 측정값, 반복 횟수, 측정 도구"], ["후처리", "세척액, 세척 시간, 건조 시간, 후경화 조건"], ["판정", "평균 오차, 반복 편차, 합격 기준과 조치"]]}, {"type": "heading", "level": 2, "text": "7. 실무 참고 사항", "id": "section-21"}, {"type": "paragraph", "text": "이론적 픽셀 피치는 최소 형상 보증값이 아니다. 실제 출력 시험으로 검증한다."}, {"type": "paragraph", "text": "장비 크기 값은 픽셀 매핑 기준이다. 가장자리 제한과 치수 보정을 구분한다."}, {"type": "paragraph", "text": "세척·건조·후경화 중 치수 측정 시점을 고정한다."}, {"type": "paragraph", "text": "긴 부품과 얇은 벽은 지그 또는 대칭 배치를 검토한다."}, {"type": "paragraph", "text": "허용 오차는 부품 기능과 측정 시스템 능력을 기준으로 정한다."}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "dlp-imaging-principle.png", "path": "assets/manuals/3_프린팅 정확도 영향 요인/dlp-imaging-principle.png", "kind": "image", "alt": "프린팅 정확도 영향 요인 시각 자료 3-1"}, {"fileName": "lcd-imaging-principle.png", "path": "assets/manuals/3_프린팅 정확도 영향 요인/lcd-imaging-principle.png", "kind": "image", "alt": "프린팅 정확도 영향 요인 시각 자료 3-2"}, {"fileName": "sla-imaging-principle.png", "path": "assets/manuals/3_프린팅 정확도 영향 요인/sla-imaging-principle.png", "kind": "image", "alt": "프린팅 정확도 영향 요인 시각 자료 3-3"}], "searchText": "0. 개요 레진 3D 프린팅의 치수 정확도는 한 가지 사양으로 결정되지 않는다. XY 방향에서는 해상도와 표시 영역, 광학계 및 노광 조건이 함께 작용하고, Z 방향에서는 레이어 높이와 이송계의 분해능·강성·직진성이 결과를 좌우한다. 여기에 서포트, 모델 배치, 세척과 후경화 조건이 더해지면 동일한 모델도 서로 다른 치수와 표면 상태로 출력될 수 있다. 설명 자료는 캐리마텍의 IML 16K LCD 3D 프린터를 기준이자 예시로 한다. 1. XY 해상도와 출력 크기 XY 해상도는 레진 표면에 형성할 수 있는 UV 단위의 개수이며, 출력 크기는 그 UV 단위가 배치되는 물리적 영역이다. 같은 픽셀 수라면 표시 영역이 작을수록 픽셀 피치가 작아지고 미세 형상 표현에 유리하다. 반대로 표시 영역이 커지면 한 픽셀이 담당하는 길이가 증가한다. PPI(pixel per inch)는 화면 대각선 방향의 픽셀 밀도를 나타내는 지표다. 프린터 간 개략적인 비교에는 유용하지만, 실제 치수 교정에서는 X축과 Y축의 픽셀 피치를 각각 확인하는 편이 더 직접적이다. PPI = √(Nₓ² + Nᵧ²) ÷ [√(Lₓ² + Lᵧ²) ÷ 25.4] N: 축별 픽셀 수, L: 축별 물리 길이(mm) 축별 픽셀 피치(μm) = 물리 길이(mm) ÷ 픽셀 수(px) × 1000 값이 작을수록 이론적으로 더 미세한 형상을 표현할 수 있다. 항목 계산 결과 해석 X축 피치 211.680 ÷ 15120 14 μm X 방향의 이론적 유효 픽셀 간격 Y축 피치 118.370 ÷ 6230 19 μm Y 방향의 이론적 유효 픽셀 간격 대각 PPI 대각 픽셀 ÷ 대각 길이 약 1,713 PPI 대각선 기준의 밀도 요약값 해석 주의 제공 프로필은 X와 Y의 유효 피치가 서로 다르다. 이는 축별 스케일 특성을 개별적으로 관리해야 함을 의미한다. 대각 PPI만으로 동일한 XY 정확도를 가정하지 말고, X·Y 치수 쿠폰을 각각 측정하여 결과를 확인한다. 계산값은 픽셀 배열과 물리 크기에서 얻은 이론값이다. 실제 출력에서는 픽셀 사이의 비발광 영역, 광원 확산, 안티앨리어싱, 레진의 광투과·산란, 노광 시간 등이 최소 형상과 최종 치수에 영향을 준다. 2. 방식별 이미징 원리 2.1 SLA SLA는 X축과 Y축 갈바노 미러로 레이저를 이동시키며 각 레이어의 점과 선을 순차적으로 경화한다. 따라서 UV 단위는 주로 레이저 빔 직경과 스캔 광학계의 특성으로 결정된다. 2.2 DLP DLP는 디지털 프로젝터로 한 레이어의 이미지를 플랫폼 전체에 동시에 투사한다. 레이어 이미지는 다수의 정사각형 픽셀로 구성되며, 레진 표면에 투사된 픽셀 크기가 UV 단위가 된다. 2.3 LCD LCD 방식은 LED 배열의 자외선이 LCD 패널을 통과하도록 하고, LCD가 현재 레이어에 필요한 픽셀만 통과시키는 마스크 역할을 한다. 이 경우 UV 단위는 LCD 화면의 픽셀 크기와 광학 확산 특성에 의해 결정된다. 방식 광원·이미징 UV 단위를 좌우하는 요소 SLA 레이저를 갈바노 미러로 주사 레이저 빔 직경, 스캔 광학계 DLP 레이어 이미지를 프로젝터로 일괄 투사 레진 표면에 투사된 픽셀 크기 LCD LCD를 마스크로 사용하여 LED 광을 선택 통과 패널 픽셀 크기, 광원 확산과 마스크 특성 3. CHITUBOX에서 IML 16K 설정 해상도와 물리 크기가 서로 맞지 않으면 슬라이서가 모델을 잘못 스케일링하여 XY 방향의 치수 왜곡이 발생한다. 따라서 장비 프로필에는 픽셀 수와 대응하는 표시 영역 값을 정확히 입력해야 한다. 3.1 입력 및 확인 순서 장비 프로필의 이름을 IML 16K로 지정하고 기계 유형을 제공값과 동일하게 유지한다. 미러 방식이 LCD_mirror로 설정되어 있는지 확인한다. 해상도 X 15120 px, Y 6230 px를 입력한다. X와 Y를 서로 바꾸지 않는다. 크기 X 211.680 mm, Y 118.370 mm, Z 200.000 mm를 입력한다. 프로필 저장 후 비대칭 문자 또는 방향 표식을 슬라이스하여 미러 방향과 축 방향을 확인한다. 3.2 표시 영역과 실제 출력 가능 영역 LCD 장비에서는 프레임, 보호 유리 또는 조립 구조로 인해 화면의 가장자리가 실제로 노광되지 않을 수 있다. 이때도 해상도와 매핑되는 물리 크기에는 표시 영역 값을 유지해야 한다. 가장자리의 사용 불가 영역은 Build Area Offset으로 제한하며, 화면 크기를 임의로 줄여 보정하지 않는다. Build Area Offset의 역할 출력 가능한 경계만 조정하는 기능이다. 모델 치수 오차나 축별 스케일 오차를 보정하는 값으로 사용하지 않는다. 3.3 프로필 값 검증 IML 16K 프로필의 해상도 비율과 물리 크기 비율은 서로 다르므로 축별 유효 피치도 다르게 계산된다. 제공된 값을 임의로 정사각 픽셀 값으로 바꾸지 말고, 제조사 또는 사내 기준 프로필과 실제 치수 쿠폰을 함께 확인한다. 20 mm 이상의 X·Y 방향 치수 쿠폰을 동일한 위치와 방향에서 3회 이상 출력한다. 후경화 전후 측정 시점을 통일하고, 캘리퍼 또는 측정 현미경의 측정 조건을 기록한다. 노광 조건을 먼저 안정화한 뒤 축별 평균 오차를 계산한다. 스케일 보정이 필요하면 X와 Y를 개별 관리하고, 변경 전 프로필을 복제하여 이력을 남긴다. 축별 보정 배율 = 기준 치수 ÷ 측정 치수 예: 기준 20.00 mm, 측정 19.80 mm이면 보정 배율은 약 1.0101 4. Z 방향 정확도 4.1 레이어 높이 XY 방향의 기본 단위가 해상도와 표시 영역으로 결정되는 반면, Z 방향의 기본 단위는 레이어 높이다. 레이어 높이가 작을수록 곡면과 경사면의 계단 현상이 줄고 세부 표현이 향상되지만, 레이어 수와 출력 시간은 증가한다. 레이어 높이를 낮추는 것만으로 치수 정확도가 자동으로 향상되는 것은 아니다. 리프트 동작, 레진 재유입, 노광량, Z축 유격과 빌드 플랫폼 평행도가 함께 안정되어야 한다. 4.2 이론적 최소 이동 거리 빌드 플랫폼은 스테퍼 모터와 리드 스크루를 통해 이동한다. 이론적 최소 이동 거리는 모터 1회전의 총 스텝 수와 리드 스크루가 1회전할 때 이동하는 거리로 계산할 수 있다. 최소 이동 거리 = 리드(mm/rev) ÷ [360° ÷ 스텝각 × 마이크로스텝 수] 실제 반복 정밀도는 백래시, 하중, 드라이버와 구조 강성의 영향을 받는다. 스텝각 1.8°, 16 마이크로스텝, 리드 2 mm를 적용하면 1회전당 3200 스텝이며 최소 이동 거리는 2 mm ÷ 3200 = 0.000625 mm, 즉 0.625 μm이다. 이 값은 계산 예시이며 IML 16K의 모터·리드 스크루 사양으로 단정해서는 안 된다. 4.3 Z축 안정성 점검 항목 정상 기준 정확도에 미치는 영향 수직도 Z축과 화면 평면의 관계가 90°에 가깝다. 기울기와 축 방향 치수 편차 감소 직진도 이동 전 구간에서 가이드가 곧게 유지된다. 층별 위치 흔들림과 밴딩 감소 평행·중심 정렬 가이드와 리드 스크루 간격이 이동 중 일정하다. 구속과 편하중 감소 체결 상태 플랫폼 고정부와 조인트가 풀리지 않는다. 레이어 시프트와 반복 오차 감소 캔틸레버 강성 박리 하중에서 처짐이 작다. Z 방향 압축·늘어짐과 표면 흔들림 감소 5. 정확도에 영향을 주는 기타 요인 5.1 서포트 부족과 모델 배치 서포트가 부족하거나 접점이 너무 가늘고 위치가 부적절하면 출력 중 모델이 기울거나 변형될 수 있다. CHITUBOX에서 서포트 굵기와 접점, 밀도를 조정하고 레이어 단면적이 급격히 증가하지 않도록 모델 방향을 최적화한다. 5.2 노광 부족과 과다 노광 노광 부족은 형상 경계가 충분히 경화되지 않아 치수가 작아지거나 구조가 약해지는 원인이 될 수 있다. 과다 노광은 빛 번짐과 주변 경화를 증가시켜 구멍이 작아지고 외형 치수가 커지는 방향으로 작용할 수 있다. 단, 변화 방향과 크기는 레진 색상, 형상, 배치와 후경화 조건에 따라 달라질 수 있다. 5.3 이소프로필알코올 세척 일부 레진은 알코올을 흡수하여 팽윤하거나 휘어질 수 있으며, 얇은 벽과 기둥처럼 세부 형상이 작은 부품에서 영향이 커질 수 있다. 초음파 세척은 2분 이내, 이소프로필알코올 침지는 10분 이내를 초기 기준으로 관리한다. 실무에서는 사용 레진 제조사의 세척 지침을 우선하고, 세척 후 충분히 건조한 뒤 후경화한다. 요인 대표 증상 우선 조치 서포트 부족 기울어짐, 휨, 일부 형상 손실 모델 각도와 접점·굵기·밀도 조정 노광 부족 외형 축소, 약한 모서리, 박리 실패 노광 테스트 후 시간을 단계적으로 증가 과다 노광 외형 확대, 구멍 축소, 디테일 뭉침 노광 시간을 단계적으로 감소 과도한 IPA 침지 팽윤, 휨, 얇은 구조 변형 세척 시간을 제한하고 완전 건조 6. IML 16K 정확도 교정 절차 기준 프로필 복제: IML 16K 원본 프로필을 보존하고 재료·레이어 높이별 작업용 프로필을 만든다. 기계 상태 확인: 빌드 플랫폼 평행도, 체결 상태, 필름 상태, 레진 온도와 교반 상태를 확인한다. 노광 안정화: 작은 노광 테스트로 핀·구멍·벽 두께가 동시에 재현되는 범위를 찾는다. XY 편차 측정: X와 Y 방향의 기준 길이를 각각 3회 이상 측정하고 평균과 편차를 기록한다. 축별 보정: 일정한 비율 오차가 반복될 때만 X와 Y 보정값을 개별 적용한다. Z 검증: 서로 다른 높이의 스텝 또는 기둥을 측정하여 레이어 높이, 축 유격과 후경화 수축을 구분한다. 재검증과 동결: 보정 후 동일 쿠폰을 재출력하고 허용 오차를 만족하면 프로필 버전을 고정한다. 변수 관리 원칙 한 번에 하나의 변수만 변경한다. 노광, XY 스케일, 서포트, 세척 시간을 동시에 바꾸면 어떤 변경이 결과를 개선했는지 판단할 수 없다. 기록 항목 권장 기록값 프로필 해상도, 크기, 미러, 레이어 높이, 프로필 버전 재료 레진명, 배치 번호, 색상, 작업 온도 노광 바닥·일반 노광, 전환층, 리프트 조건 측정 기준 치수, X/Y/Z 측정값, 반복 횟수, 측정 도구 후처리 세척액, 세척 시간, 건조 시간, 후경화 조건 판정 평균 오차, 반복 편차, 합격 기준과 조치 7. 실무 참고 사항 이론적 픽셀 피치는 최소 형상 보증값이 아니다. 실제 출력 시험으로 검증한다. 장비 크기 값은 픽셀 매핑 기준이다. 가장자리 제한과 치수 보정을 구분한다. 세척·건조·후경화 중 치수 측정 시점을 고정한다. 긴 부품과 얇은 벽은 지그 또는 대칭 배치를 검토한다. 허용 오차는 부품 기능과 측정 시스템 능력을 기준으로 정한다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 5}, "4": {"manualId": 4, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "바텀업 방식 레진 3D 프린팅에서는 첫 레이어가 빌드 플랫폼에 부착되지 않거나, 이후 레이어가 이전 레이어와 결합되지 않는 현상이 대표적인 출력 실패로 나타난다. 경화층이 FEP 필름에 남거나, 출력 중 모델이 떨어지거나, 서포트만 출력되는 현상도 같은 계열의 문제다."}, {"type": "paragraph", "text": "이러한 실패는 대체로 부분·전체 노광 부족, 레진 탱크와 빌드 플랫폼의 잔여물, 출력물이 견딜 수 있는 범위를 초과한 박리력과 중력으로 정리할 수 있다. 실제 원인은 여러 항목이 동시에 작용할 수 있으므로 한 번에 하나의 변수만 변경하며 진단해야 한다."}, {"type": "table", "rows": [["대표 증상", "관찰 위치", "우선 의심 항목"], ["경화층이 FEP에 부착", "레진 탱크 바닥", "바닥 노광, 레벨링·영점, 플랫폼 청결"], ["출력 중 모델 탈락", "플랫폼 또는 탱크", "박리력, 리프트 속도, 서포트 강도"], ["서포트만 출력", "서포트 끝단", "접촉 깊이·직경, 노광, 단면적"], ["바닥층 말림", "모델 하부", "바닥 노광, 수축, 배치와 단면 변화"], ["층상 막·기포 형상", "모델 중간층", "부분 박리, 아일랜드, 잔여물"], ["형상 일부 누락", "오버행·경계", "아일랜드와 서포트 밀도"]]}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/upwarped-bottom-layers.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "upwarped-bottom-layers.png"}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/only-supports-were-printed-01.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "only-supports-were-printed-01.png"}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/sticking-on-the-fep.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "sticking-on-the-fep.png"}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/laminaria-like-layers-or-bubbles-01.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "laminaria-like-layers-or-bubbles-01.png"}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/laminaria-like-layers-or-bubbles-02.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "laminaria-like-layers-or-bubbles-02.png"}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/misrun.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "misrun.png"}, {"type": "heading", "level": 2, "text": "1. 레벨링과 영점 설정 오류", "id": "section-2"}, {"type": "paragraph", "text": "빌드 플랫폼이 출력 화면과 평행하지 않으면 위치별 간격이 달라진다. 간격이 큰 영역에서는 설정된 바닥 노광으로 충분히 중합되지 않아 첫 레이어 접착이 약해질 수 있다. 영점이 실제 위치보다 높게 설정된 경우에도 첫 레이어 간격이 슬라이서의 레이어 높이보다 커져 같은 문제가 발생한다."}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/improper-leveling-and-zeroing.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "improper-leveling-and-zeroing.png"}, {"type": "table", "rows": [["점검 기준 레벨링은 플랫폼과 화면의 평행도를 맞추는 작업이고, 영점 설정은 첫 레이어 시작 간격을 정하는 작업이다. 두 작업을 서로 다른 항목으로 점검한다."]]}, {"type": "heading", "level": 2, "text": "2. 레이어 높이와 노광 부족", "id": "section-3"}, {"type": "heading", "level": 3, "text": "2.1 레이어 높이가 너무 두꺼운 경우", "id": "section-4"}, {"type": "paragraph", "text": "레이어 높이가 지나치게 크면 UV 광이 빌드 플랫폼 또는 이전 경화층에 도달하기 전에 감쇠되며, 현재 레이어 전체가 충분히 경화되지 않을 수 있다. 레이어 높이를 변경한 뒤에는 기존 노광 시간을 그대로 사용하지 말고 노광 테스트를 다시 수행한다."}, {"type": "heading", "level": 3, "text": "2.2 부분 또는 전체 노광 부족", "id": "section-5"}, {"type": "paragraph", "text": "빌드 플랫폼 부착 실패는 결과적으로 플랫폼에 도달한 유효 UV 에너지가 부족한 문제로 볼 수 있다. 바닥층 노광 시간은 일반층보다 충분히 길게 설정하며, 초기 검토 범위로 일반층의 5~10배를 사용할 수 있다. 적정값은 광원 강도와 레진 감광성, 레이어 높이와 장비 구조에 따라 달라진다. 과다 노광은 디테일 손실과 치수 팽창을 유발할 수 있다."}, {"type": "table", "rows": [["항목", "초기 검토 기준", "적용 시 주의"], ["바닥층 노광", "일반층의 5~10배", "장비·레진별 노광 시험으로 확정"], ["일반층 노광", "단일 고정값 없음", "레이어 높이와 레진 온도를 함께 기록"], ["과다 노광", "디테일 손실 가능", "접착력만 보고 무제한 증가하지 않음"]]}, {"type": "heading", "level": 2, "text": "3. 단면적과 박리력", "id": "section-6"}, {"type": "heading", "level": 3, "text": "3.1 과도한 레이어 단면적", "id": "section-7"}, {"type": "paragraph", "text": "빌드 플랫폼이 FEP 필름에서 상승할 때 출력물에는 박리력이 작용한다. 현재 레이어의 형상이 원형에 가깝다고 가정하면 Stefan 법칙을 이용해 단면 반경과 박리력의 관계를 계산할 수 있다."}, {"type": "table", "rows": [["F = (3πηR⁴ / 2h³) × (dh/dt) η: 레진 점도, R: 평행한 원판의 반경, h: 원판 사이 거리, dh/dt: 분리 속도"]]}, {"type": "paragraph", "text": "다른 조건이 동일하면 반경 R이 n배가 될 때 박리력은 이론적으로 n⁴배 수준으로 증가할 수 있다. 따라서 모델을 기울여 한 레이어에 형성되는 단일 대형 단면을 줄이고, 단면 변화가 갑자기 커지지 않도록 배치한다."}, {"type": "heading", "level": 3, "text": "3.2 밀폐 공간 형성", "id": "section-8"}, {"type": "paragraph", "text": "모델과 FEP 필름 사이에 밀폐된 챔버가 형성되면 상승 초기 챔버 내부 압력이 외부보다 낮아져 추가적인 흡착력이 발생한다. 챔버를 관통하는 배출구와 통기구를 배치하여 공기가 유입되도록 하고, 배출구가 플랫폼이나 FEP에 의해 막히지 않는 방향으로 모델을 배치한다."}, {"type": "table", "rows": [["설계 원칙 속이 빈 모델은 단순히 배출구 개수만 확인하지 말고, 출력 전 과정에서 갇힌 체적이 생기는 레이어가 있는지 슬라이스 화면으로 확인한다."]]}, {"type": "heading", "level": 2, "text": "4. 아일랜드와 리프트 조건", "id": "section-9"}, {"type": "heading", "level": 3, "text": "4.1 아일랜드", "id": "section-10"}, {"type": "paragraph", "text": "슬라이스 후 이전 레이어와 연결되지 않은 독립 영역이 생기면 해당 영역은 FEP 위에서 경화되거나 출력되지 않을 수 있다. 특히 이 영역이 이후 형상을 지지하는 역할을 해야 한다면 연결되는 부분 전체가 누락되거나 변형된다. CHITUBOX의 Island Detection 기능으로 중요 영역의 아일랜드를 검사하고 서포트를 추가한다."}, {"type": "heading", "level": 3, "text": "4.2 리프트 속도가 너무 빠른 경우", "id": "section-11"}, {"type": "paragraph", "text": "Stefan 법칙에서 분리 시간이 짧아질수록 박리력은 커지는 방향으로 작용한다. 리프트 속도가 너무 빠르면 현재 레이어가 이전 레이어에서 분리되거나 출력물 전체가 플랫폼에서 떨어질 수 있다. 단면적과 레진 점도가 큰 조건에서는 속도를 낮추고, 필요하면 리프트 거리를 조정하여 완전 분리를 확보한다."}, {"type": "heading", "level": 2, "text": "5. FEP 필름과 청결 상태", "id": "section-12"}, {"type": "heading", "level": 3, "text": "5.1 FEP 필름의 심한 마모", "id": "section-13"}, {"type": "paragraph", "text": "FEP 필름이 심하게 마모되거나 흐려지고 표면 손상이 누적되면 출력물이 상승할 때 박리력이 증가할 수 있다. 경화층이 정상적으로 분리되지 않고 필름에 남는 현상이 반복되면 필름 장력, 혼탁, 주름, 긁힘과 국부 손상을 확인한다."}, {"type": "heading", "level": 3, "text": "5.2 레진 탱크와 빌드 플랫폼의 오염", "id": "section-14"}, {"type": "paragraph", "text": "레진 탱크의 경화 잔여물은 FEP를 손상시키거나 다음 출력의 UV 경로를 방해한다. 플랫폼 표면의 레진 찌꺼기와 오염도 첫 레이어 접착을 불균일하게 만든다. 매 출력 전후 탱크와 플랫폼을 검사하고, 실패 후에는 레진을 여과하여 작은 경화 조각까지 제거한다."}, {"type": "paragraph", "text": "플랫폼에 뚜렷한 긁힘이 있을 때는 #8000 연마지를 사용하는 방법이나 자석식 플렉스 플레이트를 대안으로 검토할 수 있다. 연마는 평탄도와 표면 처리를 변경할 수 있으므로 반드시 장비 제조사의 허용 여부와 작업 절차를 확인한 뒤 실시한다."}, {"type": "heading", "level": 2, "text": "6. 서포트 파라미터", "id": "section-15"}, {"type": "paragraph", "text": "서포트는 빌드 플랫폼 측에서 모델을 잡아 주어 FEP가 가하는 인장력에 대응한다. 특히 모델과 서포트를 연결하는 상단 접점의 Contact Depth와 Upper Diameter가 연결 강도에 직접적인 영향을 준다."}, {"type": "table", "rows": [["파라미터", "증가 시 효과", "과도할 때의 영향"], ["Contact Depth", "서포트 팁이 모델 내부로 더 깊게 들어가 연결 강도 증가", "접점 흔적과 제거 손상 증가"], ["Upper Diameter", "접촉 면적과 연결부 강성 증가", "표면 손상과 후처리량 증가"], ["Middle Diameter", "서포트 몸체 강성과 좌굴 저항 증가", "재료 사용량과 제거 부담 증가"], ["Support Density", "오버행과 경계의 분산 지지 증가", "접점 수와 표면 흔적 증가"]]}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/claws.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "claws.png"}, {"type": "paragraph", "text": "서포트 파라미터 비교에는 Thingiverse에서 내려받은 발톱 한 쌍을 시험 모델로 사용하였다. 모델 크기는 26.63 × 60.46 × 47.21 mm이며, 대형 모델에 해당하지 않는 조건에서 비교를 진행하였다."}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/the-top-of-the-support.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "the-top-of-the-support.png"}, {"type": "paragraph", "text": "모델과 서포트를 연결하는 Top 영역은 박리 하중을 전달하는 핵심 구간이다. 이 영역에서는 Contact Depth와 Upper Diameter를 핵심 파라미터로 관리한다. Contact Depth가 커질수록 서포트 팁이 모델에 더 깊이 들어가 FEP 필름과 빌드 플랫폼 사이의 인장 경쟁을 견디는 힘이 커진다."}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/different-exposure-strength-on-supports-and-the-model.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "different-exposure-strength-on-supports-and-the-model.png"}, {"type": "paragraph", "text": "Picture Grayscale을 사용하고 회색조 값이 255보다 낮으면 서포트와 모델에 적용되는 노광 강도가 서로 달라질 수 있다. 따라서 같은 치수의 접점이라도 실제 연결 강도가 달라질 수 있다. Contact Shape가 None인 경우에는 Upper Diameter를 키울수록 접촉 면적이 넓어져 모델과 서포트의 결합이 더 단단해진다."}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/add-light-supports-to-claws.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "add-light-supports-to-claws.png"}, {"type": "paragraph", "text": "첫 번째 시험에서는 Light 서포트를 적용했다. 이 프리셋의 기본 Contact Depth와 Upper Diameter는 모두 0.3 mm였다."}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/only-supports-were-printe-02.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "only-supports-were-printe-02.png"}, {"type": "paragraph", "text": "Light 설정은 실제 박리력을 충분히 견디지 못했다. 그 결과 모델 본체는 형성되지 않고 서포트만 출력되었으며, 상단 접점의 유지력이 FEP 필름이 가하는 인장력보다 부족했음을 보여 준다."}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/add-medium-supports-to-claws.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "add-medium-supports-to-claws.png"}, {"type": "paragraph", "text": "다음 시험에서는 서포트 유형을 Light에서 Medium으로 변경했다. Medium 프리셋의 기본 Contact Depth와 Upper Diameter는 모두 0.4 mm였다."}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/claws-were-printed.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "claws-were-printed.png"}, {"type": "paragraph", "text": "Medium 서포트로 변경한 뒤 발톱 모델 출력에 성공했다. 프리셋 변경에 따라 서포트 중간부의 직경도 0.4 mm 증가하여 전체 서포트 구조의 강성이 함께 높아졌다."}, {"type": "table", "rows": [["수치 해석 0.3 mm와 0.4 mm는 해당 시험 모델과 기본 프리셋의 비교값이다. 모든 모델에 적용되는 권장값이 아니며 모델 크기, 레진, 단면적과 노광 조건에 맞추어 시험해야 한다."]]}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/insufficient-support-density.jpg", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "insufficient-support-density.jpg"}, {"type": "paragraph", "text": "접촉 파라미터가 적절하더라도 서포트 밀도가 부족하거나 구조 배치가 부적절하면 오버행과 경계 레이어가 충분히 지지되지 않는다. 해당 위치의 레이어가 출력되지 않은 뒤 후속 레이어가 연결되더라도 형상은 변형되거나 누락될 수 있으며, 문서 앞부분의 미출력 사례가 대표적인 예다."}, {"type": "heading", "level": 2, "text": "7. 온도와 레진 점도", "id": "section-16"}, {"type": "paragraph", "text": "온도가 낮으면 레진 점도가 증가하여 재유입과 중합 반응이 느려지고 박리력은 증가할 수 있다. 작업 온도는 약 27 °C를 기준으로 검토하고 최소 21 °C 이상을 유지한다. 실제 작업 온도는 레진 제조사의 권장 범위를 우선하며, 레진과 장비가 실내 온도에 충분히 안정된 후 출력한다."}, {"type": "table", "rows": [["온도 기준", "검토 수치", "실무 적용"], ["권장 온도", "약 27 °C (80.6 °F)", "레진 제조사 범위와 비교"], ["최소 제시 온도", "21 °C (69.8 °F) 이상", "저온에서는 예열 및 점도 안정화"], ["기록 항목", "단일 수치 없음", "실내·레진 온도와 출력 시작 시각 기록"]]}, {"type": "heading", "level": 2, "text": "8. 하드웨어 문제", "id": "section-17"}, {"type": "paragraph", "text": "LCD 화면 또는 UV 광원이 노화되거나 고장 나면 정격 광량이 나오지 않거나, 통과해야 할 영역이 화면에서 차단될 수 있다. 탱크를 제거한 뒤 장비의 노광 테스트 기능으로 패턴 또는 전체 화면을 표시하여 화면 결함과 광량 균일도를 점검한다."}, {"type": "table", "rows": [["안전 경고 UV 광원이 켜진 상태에서 화면을 점검할 때는 UV 차단 보안경을 착용하고 피부 노출을 피한다. 광원을 직접 응시하지 말고 장비 제조사의 안전 절차를 따른다."]]}, {"type": "heading", "level": 3, "text": "8.1 데드 픽셀과 화면 손상", "id": "section-18"}, {"type": "paragraph", "text": "화면의 데드 픽셀은 FEP 위에 작은 경화 잔여물을 만들거나 모델에 구멍과 누락을 발생시킬 수 있다. LCD 패널은 사용 수명이 있으며, 출력 중 온도가 지나치게 높거나 내부 방열이 부족하면 일시적 또는 영구적인 손상이 발생한다. 냉각 후 회복되는 영역이 있더라도 반복적으로 나타나면 방열 상태와 패널 교체 여부를 점검한다."}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/a-screen-with-dead-pixels.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "a-screen-with-dead-pixels.png"}, {"type": "paragraph", "text": "데드 픽셀이 발생한 LCD 화면"}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/a-fep-film-with-cured-small-debris.jpg", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "a-fep-film-with-cured-small-debris.jpg"}, {"type": "paragraph", "text": "데드 픽셀로 인해 FEP에 형성된 작은 경화 잔여물"}, {"type": "image", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/holes-on-the-model.png", "alt": "프린팅 실패 원인 및 해결 시각 자료", "fileName": "holes-on-the-model.png"}, {"type": "paragraph", "text": "화면 결함으로 모델에 형성된 구멍"}, {"type": "heading", "level": 3, "text": "8.2 화면 광량 균일도", "id": "section-19"}, {"type": "paragraph", "text": "UV 광량계를 사용할 경우 프로브를 화면 전 영역에 걸쳐 천천히 이동하여 위치별 광량을 측정한다. 일반적인 평균 강도는 4500 μW/cm² 이상을 검토 기준으로 사용할 수 있지만, 이 값은 모든 장비의 공통 합격 기준이 아니다. 측정 파장, 프로브 특성, 장비 정격값을 확인하고 평균이 제조사 기준보다 현저히 낮을 때 광원 또는 패널 점검을 요청한다."}, {"type": "heading", "level": 2, "text": "9. 단계별 문제 해결 절차", "id": "section-20"}, {"type": "paragraph", "text": "실패 증상을 기록하고 FEP, 플랫폼, 모델 또는 서포트 중 어느 위치에서 분리가 시작되었는지 확인한다."}, {"type": "paragraph", "text": "탱크의 경화 잔여물을 제거하고 레진을 여과한 뒤 플랫폼과 FEP의 청결·손상 상태를 점검한다."}, {"type": "paragraph", "text": "빌드 플랫폼의 레벨링과 영점을 다시 설정하고 체결 상태를 확인한다."}, {"type": "paragraph", "text": "레이어 높이와 바닥·일반 노광 시간을 레진 및 장비 기준과 비교한다."}, {"type": "paragraph", "text": "모델 방향을 조정하여 대형 단면과 밀폐 공간을 줄이고 배출구가 막히지 않는지 확인한다."}, {"type": "paragraph", "text": "아일랜드를 검사하고 서포트 접점, 몸체 굵기와 밀도를 조정한다."}, {"type": "paragraph", "text": "리프트 속도와 거리를 검토하고 저온·고점도 조건이면 레진 온도를 안정화한다."}, {"type": "paragraph", "text": "노광 테스트로 데드 픽셀과 화면 이상을 확인하고 필요 시 UV 광량과 균일도를 측정한다."}, {"type": "paragraph", "text": "수정 후 동일 파일로 재출력하며 한 번에 하나의 변수만 변경한다."}, {"type": "table", "rows": [["증상", "우선 확인", "다음 조치"], ["전체가 FEP에 남음", "레벨링·영점, 바닥 노광", "플랫폼 청결, 화면·광원"], ["일부만 FEP에 남음", "단면적, 아일랜드, FEP 상태", "배치, 서포트, 리프트 속도"], ["서포트만 출력", "접점 깊이·직경, 노광", "서포트 등급과 밀도 증가"], ["중간층 분리", "리프트 속도, 온도, 일반 노광", "점도 안정화와 FEP 점검"], ["구멍·반복 누락", "데드 픽셀, 잔여물", "노광 패턴과 화면 점검"], ["모델 변형·누락", "오버행 서포트, 아일랜드", "접점과 경계 지지 보강"]]}, {"type": "table", "rows": [["변수 관리 원칙 문제가 사라졌더라도 여러 변수를 동시에 변경했다면 실제 원인을 특정할 수 없다. 변경 전후의 설정, 온도, 레진 배치와 결과 사진을 기록한다."]]}, {"type": "heading", "level": 2, "text": "10. 실무 참고 사항", "id": "section-21"}, {"type": "paragraph", "text": "실패 후 FEP 위의 경화 조각을 제거하지 않은 상태로 다음 출력을 시작하지 않는다."}, {"type": "paragraph", "text": "바닥 접착력을 높이기 위해 노광만 계속 증가시키지 말고 레벨링, 영점과 청결 상태를 먼저 확인한다."}, {"type": "paragraph", "text": "대형 모델은 단면적, 밀폐 공간, 서포트와 리프트 조건을 하나의 시스템으로 검토한다."}, {"type": "paragraph", "text": "광량 측정값은 측정기 파장 범위와 교정 상태를 포함하여 기록하며, 장비 분해·패널 교체·플랫폼 연마는 제조사 또는 담당 기술자의 절차를 따른다."}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "a-fep-film-with-cured-small-debris.jpg", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/a-fep-film-with-cured-small-debris.jpg", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-1"}, {"fileName": "a-screen-with-dead-pixels.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/a-screen-with-dead-pixels.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-2"}, {"fileName": "add-light-supports-to-claws.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/add-light-supports-to-claws.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-3"}, {"fileName": "add-medium-supports-to-claws.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/add-medium-supports-to-claws.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-4"}, {"fileName": "claws-were-printed.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/claws-were-printed.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-5"}, {"fileName": "claws.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/claws.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-6"}, {"fileName": "different-exposure-strength-on-supports-and-the-model.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/different-exposure-strength-on-supports-and-the-model.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-7"}, {"fileName": "holes-on-the-model.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/holes-on-the-model.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-8"}, {"fileName": "improper-leveling-and-zeroing.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/improper-leveling-and-zeroing.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-9"}, {"fileName": "insufficient-support-density.jpg", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/insufficient-support-density.jpg", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-10"}, {"fileName": "laminaria-like-layers-or-bubbles-01.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/laminaria-like-layers-or-bubbles-01.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-11"}, {"fileName": "laminaria-like-layers-or-bubbles-02.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/laminaria-like-layers-or-bubbles-02.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-12"}, {"fileName": "misrun.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/misrun.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-13"}, {"fileName": "only-supports-were-printe-02.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/only-supports-were-printe-02.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-14"}, {"fileName": "only-supports-were-printed-01.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/only-supports-were-printed-01.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-15"}, {"fileName": "sticking-on-the-fep.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/sticking-on-the-fep.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-16"}, {"fileName": "the-top-of-the-support.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/the-top-of-the-support.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-17"}, {"fileName": "upwarped-bottom-layers.png", "path": "assets/manuals/4_프린팅 실패 원인 및 해결/upwarped-bottom-layers.png", "kind": "image", "alt": "프린팅 실패 원인 및 해결 시각 자료 4-18"}], "searchText": "0. 개요 바텀업 방식 레진 3D 프린팅에서는 첫 레이어가 빌드 플랫폼에 부착되지 않거나, 이후 레이어가 이전 레이어와 결합되지 않는 현상이 대표적인 출력 실패로 나타난다. 경화층이 FEP 필름에 남거나, 출력 중 모델이 떨어지거나, 서포트만 출력되는 현상도 같은 계열의 문제다. 이러한 실패는 대체로 부분·전체 노광 부족, 레진 탱크와 빌드 플랫폼의 잔여물, 출력물이 견딜 수 있는 범위를 초과한 박리력과 중력으로 정리할 수 있다. 실제 원인은 여러 항목이 동시에 작용할 수 있으므로 한 번에 하나의 변수만 변경하며 진단해야 한다. 대표 증상 관찰 위치 우선 의심 항목 경화층이 FEP에 부착 레진 탱크 바닥 바닥 노광, 레벨링·영점, 플랫폼 청결 출력 중 모델 탈락 플랫폼 또는 탱크 박리력, 리프트 속도, 서포트 강도 서포트만 출력 서포트 끝단 접촉 깊이·직경, 노광, 단면적 바닥층 말림 모델 하부 바닥 노광, 수축, 배치와 단면 변화 층상 막·기포 형상 모델 중간층 부분 박리, 아일랜드, 잔여물 형상 일부 누락 오버행·경계 아일랜드와 서포트 밀도 1. 레벨링과 영점 설정 오류 빌드 플랫폼이 출력 화면과 평행하지 않으면 위치별 간격이 달라진다. 간격이 큰 영역에서는 설정된 바닥 노광으로 충분히 중합되지 않아 첫 레이어 접착이 약해질 수 있다. 영점이 실제 위치보다 높게 설정된 경우에도 첫 레이어 간격이 슬라이서의 레이어 높이보다 커져 같은 문제가 발생한다. 점검 기준 레벨링은 플랫폼과 화면의 평행도를 맞추는 작업이고, 영점 설정은 첫 레이어 시작 간격을 정하는 작업이다. 두 작업을 서로 다른 항목으로 점검한다. 2. 레이어 높이와 노광 부족 2.1 레이어 높이가 너무 두꺼운 경우 레이어 높이가 지나치게 크면 UV 광이 빌드 플랫폼 또는 이전 경화층에 도달하기 전에 감쇠되며, 현재 레이어 전체가 충분히 경화되지 않을 수 있다. 레이어 높이를 변경한 뒤에는 기존 노광 시간을 그대로 사용하지 말고 노광 테스트를 다시 수행한다. 2.2 부분 또는 전체 노광 부족 빌드 플랫폼 부착 실패는 결과적으로 플랫폼에 도달한 유효 UV 에너지가 부족한 문제로 볼 수 있다. 바닥층 노광 시간은 일반층보다 충분히 길게 설정하며, 초기 검토 범위로 일반층의 5~10배를 사용할 수 있다. 적정값은 광원 강도와 레진 감광성, 레이어 높이와 장비 구조에 따라 달라진다. 과다 노광은 디테일 손실과 치수 팽창을 유발할 수 있다. 항목 초기 검토 기준 적용 시 주의 바닥층 노광 일반층의 5~10배 장비·레진별 노광 시험으로 확정 일반층 노광 단일 고정값 없음 레이어 높이와 레진 온도를 함께 기록 과다 노광 디테일 손실 가능 접착력만 보고 무제한 증가하지 않음 3. 단면적과 박리력 3.1 과도한 레이어 단면적 빌드 플랫폼이 FEP 필름에서 상승할 때 출력물에는 박리력이 작용한다. 현재 레이어의 형상이 원형에 가깝다고 가정하면 Stefan 법칙을 이용해 단면 반경과 박리력의 관계를 계산할 수 있다. F = (3πηR⁴ / 2h³) × (dh/dt) η: 레진 점도, R: 평행한 원판의 반경, h: 원판 사이 거리, dh/dt: 분리 속도 다른 조건이 동일하면 반경 R이 n배가 될 때 박리력은 이론적으로 n⁴배 수준으로 증가할 수 있다. 따라서 모델을 기울여 한 레이어에 형성되는 단일 대형 단면을 줄이고, 단면 변화가 갑자기 커지지 않도록 배치한다. 3.2 밀폐 공간 형성 모델과 FEP 필름 사이에 밀폐된 챔버가 형성되면 상승 초기 챔버 내부 압력이 외부보다 낮아져 추가적인 흡착력이 발생한다. 챔버를 관통하는 배출구와 통기구를 배치하여 공기가 유입되도록 하고, 배출구가 플랫폼이나 FEP에 의해 막히지 않는 방향으로 모델을 배치한다. 설계 원칙 속이 빈 모델은 단순히 배출구 개수만 확인하지 말고, 출력 전 과정에서 갇힌 체적이 생기는 레이어가 있는지 슬라이스 화면으로 확인한다. 4. 아일랜드와 리프트 조건 4.1 아일랜드 슬라이스 후 이전 레이어와 연결되지 않은 독립 영역이 생기면 해당 영역은 FEP 위에서 경화되거나 출력되지 않을 수 있다. 특히 이 영역이 이후 형상을 지지하는 역할을 해야 한다면 연결되는 부분 전체가 누락되거나 변형된다. CHITUBOX의 Island Detection 기능으로 중요 영역의 아일랜드를 검사하고 서포트를 추가한다. 4.2 리프트 속도가 너무 빠른 경우 Stefan 법칙에서 분리 시간이 짧아질수록 박리력은 커지는 방향으로 작용한다. 리프트 속도가 너무 빠르면 현재 레이어가 이전 레이어에서 분리되거나 출력물 전체가 플랫폼에서 떨어질 수 있다. 단면적과 레진 점도가 큰 조건에서는 속도를 낮추고, 필요하면 리프트 거리를 조정하여 완전 분리를 확보한다. 5. FEP 필름과 청결 상태 5.1 FEP 필름의 심한 마모 FEP 필름이 심하게 마모되거나 흐려지고 표면 손상이 누적되면 출력물이 상승할 때 박리력이 증가할 수 있다. 경화층이 정상적으로 분리되지 않고 필름에 남는 현상이 반복되면 필름 장력, 혼탁, 주름, 긁힘과 국부 손상을 확인한다. 5.2 레진 탱크와 빌드 플랫폼의 오염 레진 탱크의 경화 잔여물은 FEP를 손상시키거나 다음 출력의 UV 경로를 방해한다. 플랫폼 표면의 레진 찌꺼기와 오염도 첫 레이어 접착을 불균일하게 만든다. 매 출력 전후 탱크와 플랫폼을 검사하고, 실패 후에는 레진을 여과하여 작은 경화 조각까지 제거한다. 플랫폼에 뚜렷한 긁힘이 있을 때는 #8000 연마지를 사용하는 방법이나 자석식 플렉스 플레이트를 대안으로 검토할 수 있다. 연마는 평탄도와 표면 처리를 변경할 수 있으므로 반드시 장비 제조사의 허용 여부와 작업 절차를 확인한 뒤 실시한다. 6. 서포트 파라미터 서포트는 빌드 플랫폼 측에서 모델을 잡아 주어 FEP가 가하는 인장력에 대응한다. 특히 모델과 서포트를 연결하는 상단 접점의 Contact Depth와 Upper Diameter가 연결 강도에 직접적인 영향을 준다. 파라미터 증가 시 효과 과도할 때의 영향 Contact Depth 서포트 팁이 모델 내부로 더 깊게 들어가 연결 강도 증가 접점 흔적과 제거 손상 증가 Upper Diameter 접촉 면적과 연결부 강성 증가 표면 손상과 후처리량 증가 Middle Diameter 서포트 몸체 강성과 좌굴 저항 증가 재료 사용량과 제거 부담 증가 Support Density 오버행과 경계의 분산 지지 증가 접점 수와 표면 흔적 증가 서포트 파라미터 비교에는 Thingiverse에서 내려받은 발톱 한 쌍을 시험 모델로 사용하였다. 모델 크기는 26.63 × 60.46 × 47.21 mm이며, 대형 모델에 해당하지 않는 조건에서 비교를 진행하였다. 모델과 서포트를 연결하는 Top 영역은 박리 하중을 전달하는 핵심 구간이다. 이 영역에서는 Contact Depth와 Upper Diameter를 핵심 파라미터로 관리한다. Contact Depth가 커질수록 서포트 팁이 모델에 더 깊이 들어가 FEP 필름과 빌드 플랫폼 사이의 인장 경쟁을 견디는 힘이 커진다. Picture Grayscale을 사용하고 회색조 값이 255보다 낮으면 서포트와 모델에 적용되는 노광 강도가 서로 달라질 수 있다. 따라서 같은 치수의 접점이라도 실제 연결 강도가 달라질 수 있다. Contact Shape가 None인 경우에는 Upper Diameter를 키울수록 접촉 면적이 넓어져 모델과 서포트의 결합이 더 단단해진다. 첫 번째 시험에서는 Light 서포트를 적용했다. 이 프리셋의 기본 Contact Depth와 Upper Diameter는 모두 0.3 mm였다. Light 설정은 실제 박리력을 충분히 견디지 못했다. 그 결과 모델 본체는 형성되지 않고 서포트만 출력되었으며, 상단 접점의 유지력이 FEP 필름이 가하는 인장력보다 부족했음을 보여 준다. 다음 시험에서는 서포트 유형을 Light에서 Medium으로 변경했다. Medium 프리셋의 기본 Contact Depth와 Upper Diameter는 모두 0.4 mm였다. Medium 서포트로 변경한 뒤 발톱 모델 출력에 성공했다. 프리셋 변경에 따라 서포트 중간부의 직경도 0.4 mm 증가하여 전체 서포트 구조의 강성이 함께 높아졌다. 수치 해석 0.3 mm와 0.4 mm는 해당 시험 모델과 기본 프리셋의 비교값이다. 모든 모델에 적용되는 권장값이 아니며 모델 크기, 레진, 단면적과 노광 조건에 맞추어 시험해야 한다. 접촉 파라미터가 적절하더라도 서포트 밀도가 부족하거나 구조 배치가 부적절하면 오버행과 경계 레이어가 충분히 지지되지 않는다. 해당 위치의 레이어가 출력되지 않은 뒤 후속 레이어가 연결되더라도 형상은 변형되거나 누락될 수 있으며, 문서 앞부분의 미출력 사례가 대표적인 예다. 7. 온도와 레진 점도 온도가 낮으면 레진 점도가 증가하여 재유입과 중합 반응이 느려지고 박리력은 증가할 수 있다. 작업 온도는 약 27 °C를 기준으로 검토하고 최소 21 °C 이상을 유지한다. 실제 작업 온도는 레진 제조사의 권장 범위를 우선하며, 레진과 장비가 실내 온도에 충분히 안정된 후 출력한다. 온도 기준 검토 수치 실무 적용 권장 온도 약 27 °C (80.6 °F) 레진 제조사 범위와 비교 최소 제시 온도 21 °C (69.8 °F) 이상 저온에서는 예열 및 점도 안정화 기록 항목 단일 수치 없음 실내·레진 온도와 출력 시작 시각 기록 8. 하드웨어 문제 LCD 화면 또는 UV 광원이 노화되거나 고장 나면 정격 광량이 나오지 않거나, 통과해야 할 영역이 화면에서 차단될 수 있다. 탱크를 제거한 뒤 장비의 노광 테스트 기능으로 패턴 또는 전체 화면을 표시하여 화면 결함과 광량 균일도를 점검한다. 안전 경고 UV 광원이 켜진 상태에서 화면을 점검할 때는 UV 차단 보안경을 착용하고 피부 노출을 피한다. 광원을 직접 응시하지 말고 장비 제조사의 안전 절차를 따른다. 8.1 데드 픽셀과 화면 손상 화면의 데드 픽셀은 FEP 위에 작은 경화 잔여물을 만들거나 모델에 구멍과 누락을 발생시킬 수 있다. LCD 패널은 사용 수명이 있으며, 출력 중 온도가 지나치게 높거나 내부 방열이 부족하면 일시적 또는 영구적인 손상이 발생한다. 냉각 후 회복되는 영역이 있더라도 반복적으로 나타나면 방열 상태와 패널 교체 여부를 점검한다. 데드 픽셀이 발생한 LCD 화면 데드 픽셀로 인해 FEP에 형성된 작은 경화 잔여물 화면 결함으로 모델에 형성된 구멍 8.2 화면 광량 균일도 UV 광량계를 사용할 경우 프로브를 화면 전 영역에 걸쳐 천천히 이동하여 위치별 광량을 측정한다. 일반적인 평균 강도는 4500 μW/cm² 이상을 검토 기준으로 사용할 수 있지만, 이 값은 모든 장비의 공통 합격 기준이 아니다. 측정 파장, 프로브 특성, 장비 정격값을 확인하고 평균이 제조사 기준보다 현저히 낮을 때 광원 또는 패널 점검을 요청한다. 9. 단계별 문제 해결 절차 실패 증상을 기록하고 FEP, 플랫폼, 모델 또는 서포트 중 어느 위치에서 분리가 시작되었는지 확인한다. 탱크의 경화 잔여물을 제거하고 레진을 여과한 뒤 플랫폼과 FEP의 청결·손상 상태를 점검한다. 빌드 플랫폼의 레벨링과 영점을 다시 설정하고 체결 상태를 확인한다. 레이어 높이와 바닥·일반 노광 시간을 레진 및 장비 기준과 비교한다. 모델 방향을 조정하여 대형 단면과 밀폐 공간을 줄이고 배출구가 막히지 않는지 확인한다. 아일랜드를 검사하고 서포트 접점, 몸체 굵기와 밀도를 조정한다. 리프트 속도와 거리를 검토하고 저온·고점도 조건이면 레진 온도를 안정화한다. 노광 테스트로 데드 픽셀과 화면 이상을 확인하고 필요 시 UV 광량과 균일도를 측정한다. 수정 후 동일 파일로 재출력하며 한 번에 하나의 변수만 변경한다. 증상 우선 확인 다음 조치 전체가 FEP에 남음 레벨링·영점, 바닥 노광 플랫폼 청결, 화면·광원 일부만 FEP에 남음 단면적, 아일랜드, FEP 상태 배치, 서포트, 리프트 속도 서포트만 출력 접점 깊이·직경, 노광 서포트 등급과 밀도 증가 중간층 분리 리프트 속도, 온도, 일반 노광 점도 안정화와 FEP 점검 구멍·반복 누락 데드 픽셀, 잔여물 노광 패턴과 화면 점검 모델 변형·누락 오버행 서포트, 아일랜드 접점과 경계 지지 보강 변수 관리 원칙 문제가 사라졌더라도 여러 변수를 동시에 변경했다면 실제 원인을 특정할 수 없다. 변경 전후의 설정, 온도, 레진 배치와 결과 사진을 기록한다. 10. 실무 참고 사항 실패 후 FEP 위의 경화 조각을 제거하지 않은 상태로 다음 출력을 시작하지 않는다. 바닥 접착력을 높이기 위해 노광만 계속 증가시키지 말고 레벨링, 영점과 청결 상태를 먼저 확인한다. 대형 모델은 단면적, 밀폐 공간, 서포트와 리프트 조건을 하나의 시스템으로 검토한다. 광량 측정값은 측정기 파장 범위와 교정 상태를 포함하여 기록하며, 장비 분해·패널 교체·플랫폼 연마는 제조사 또는 담당 기술자의 절차를 따른다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 7}, "5": {"manualId": 5, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "바텀업 방식 레진 3D 프린팅에서는 경화층이 FEP 필름에서 분리될 때마다 출력물과 빌드 플랫폼에 박리력이 작용한다. 이 과정에서 첫 레이어 또는 바닥부가 위로 말리거나, 플랫폼에서 일부·전체가 떨어지는 현상이 발생할 수 있다."}, {"type": "paragraph", "text": "주요 원인은 열변형, 빌드 플랫폼의 경화 잔여물, 부적절한
