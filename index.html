 넘어서는 속도는 실제 출력에 반영되지 않거나 출력 실패 위험을 높인다. 하부 조사 방식에서는 한 레이어가 경화된 뒤 FEP 필름 또는 탱크 바닥에서 출력물을 분리하는 과정이 필요하다. 이 박리 과정이 안정적으로 끝나야 다음 레이어를 만들 수 있으므로, 리프트 속도와 대기 시간은 출력 속도와 성공률을 동시에 좌우한다. 장비 파라미터 | 레이어 이동 관련 파라미터는 단축 대상으로만 보지 말고, 분리 안정성과 레진 재유입 시간을 확보하는 값으로 관리한다. 4. 광원 출력과 노광 시간 레진 출력은 광원으로 액상 레진을 경화하는 공정이다. 광원 출력이 높으면 같은 경화량을 얻기 위한 노광 시간을 줄일 수 있어 출력 속도 향상에 도움이 된다. 다만 노광 시간을 과도하게 줄이면 층간 접착이 부족해질 수 있고, 반대로 광원 출력이나 노광 시간이 과하면 형상이 두꺼워지거나 세부 표현이 무너질 수 있다. 따라서 광원 출력과 노광 시간은 레진의 감도, 색상, 레이어 두께, 모델 형상에 맞춰 함께 조정한다. 5. 레이어 두께와 총 출력 시간 전체 출력 시간은 모델 높이를 몇 개의 레이어로 나누는지에 크게 영향을 받는다. 예를 들어 같은 높이의 모델이라도 레이어 두께를 얇게 설정하면 필요한 레이어 수가 증가해 출력 시간이 길어진다. 레이어 두께 출력 시간 품질 경향 얇게 설정 레이어 수 증가로 시간이 길어짐 층 자국이 줄고 세부 표현에 유리 두껍게 설정 레이어 수 감소로 시간이 짧아짐 표면 단차가 커지고 세부 표현이 거칠어질 수 있음 치수 정확도나 표면 품질이 중요한 부품은 얇은 레이어를 우선 검토하고, 대형 형상이나 빠른 확인용 출력은 허용 가능한 범위에서 두꺼운 레이어를 사용할 수 있다. 6. 레진 재료 조성과 경화 특성 레진은 단량체, 올리고머, 광개시제, 첨가제 등의 조합으로 구성된다. 이 조합에 따라 점도, 색상, 광 반응성, 경화 깊이, 기계적 물성이 달라지며 필요한 노광 시간도 달라진다. 레진 조성에 따라 경화 반응과 요구 노광 조건이 달라진다. 광 반응성이 빠른 레진은 짧은 노광 시간으로도 경화가 가능할 수 있다. 불투명하거나 색상이 진한 레진은 빛 투과가 제한되어 더 긴 노광 시간이 필요할 수 있다. 강도, 탄성, 내열성 등 기능성 물성을 얻기 위한 첨가제는 경화 조건에도 영향을 준다. 7. 모델 형상과 배치 방향 모델의 높이와 단면적은 출력 시간에 직접적인 영향을 준다. 같은 모델이라도 세워서 배치하면 총 레이어 수가 늘어날 수 있고, 눕혀서 배치하면 높이가 낮아져 출력 시간이 줄어들 수 있다. 속이 비워진 출력물(Hollow Model)은 내부가 채워진 출력물보다 사용 레진량과 단면 부담을 줄일 수 있다. 다만 배출구, 내부 세척, 후경화 조건이 함께 설계되지 않으면 내부 잔류 레진과 응력 문제가 발생할 수 있다. 배치 방향에 따라 전체 높이와 레이어 수가 달라진다. 배치 판단 | 빠른 출력을 위해 무조건 눕히는 방식이 항상 정답은 아니다. 서포트 위치, 표면 품질, 박리 단면적, 후처리 흔적까지 함께 고려한다. 8. 출력 속도 조정 시 주의 사항 속도 설정을 변경할 때는 한 번에 여러 값을 크게 바꾸지 말고, 결과를 확인할 수 있는 범위에서 단계적으로 조정한다. 레이어 두께를 키우면 시간은 줄어들 수 있지만 표면 단차와 세부 표현 저하가 발생할 수 있다. 리프트 속도를 높이면 시간이 줄어들 수 있으나, 박리 실패와 출력물 흔들림이 커질 수 있다. 노광 시간을 줄이면 생산성은 올라갈 수 있지만, 층간 접착 부족과 형상 불안정이 발생할 수 있다. 장비, 레진, 모델 형상, 배치 방향이 바뀌면 기존 속도 조건도 다시 검증한다. 9. 핵심 요약 구분 핵심 내용 출력 방식 DLP/LCD는 면 단위 노광으로 빠른 출력에 유리하고, SLA는 경로 제어 기반의 정밀 표현에 유리하다. 장비 구조 레이어 이동, 박리, 레진 재유입 시간이 전체 출력 시간을 결정한다. 광원/노광 광원 출력과 노광 시간은 속도와 경화 안정성을 함께 결정한다. 레이어 두께 얇은 레이어는 품질에 유리하지만 레이어 수가 늘어나 시간이 길어진다. 재료 레진 조성에 따라 경화 속도와 권장 노광 조건이 달라진다. 모델/배치 모델 높이, 단면적, 속이 빈 구조, 배치 방향이 출력 시간과 성공률에 영향을 준다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 4}, "17": {"manualId": 17, "blocks": [{"type": "heading", "level": 2, "text": "0. 개요", "id": "section-1"}, {"type": "paragraph", "text": "MSLA(LCD/DLP) 방식의 출력 정확도는 XY 방향의 픽셀 피치, Z 방향의 레이어 두께, 그리고 각 픽셀에 전달되는 광량의 조합으로 결정된다. 픽셀은 화면에서 가장 작은 노광 단위이고, 레이어 두께는 한 층의 높이를 정하므로 두 값이 합쳐져 최소 출력 단위인 복셀(voxel)을 구성한다."}, {"type": "table", "rows": [["핵심 관점 | 광원 강도는 단순히 밝고 어두운 문제가 아니라, 가장자리 픽셀의 경화 범위를 조절해 실제 출력 치수와 표면 품질을 바꾸는 변수이다."]]}, {"type": "heading", "level": 2, "text": "1. 복셀과 출력 정확도", "id": "section-2"}, {"type": "paragraph", "text": "복셀은 3D 출력에서 부피를 가진 최소 표현 단위이다. XY 방향은 LCD 또는 DLP 이미지의 픽셀 크기와 연결되고, Z 방향은 레이어 두께와 연결된다. 따라서 픽셀 피치가 작고 레이어가 얇을수록 이론적인 표현 단위는 작아진다."}, {"type": "paragraph", "text": "다만 실제 출력에서는 광원 확산, 레진 반응성, 노광 시간, 산란, 안티앨리어싱 설정이 함께 작용한다. 화면 해상도만으로 최종 치수가 결정된다고 보면 작은 구멍, 얇은 벽, 모서리 품질을 안정적으로 관리하기 어렵다."}, {"type": "heading", "level": 2, "text": "2. MSLA(LCD/DLP) 이미지 형성 원리", "id": "section-3"}, {"type": "heading", "level": 2, "text": "50 µm 격자를 예로 들면, LCD 화면은 XY 방향으로 50 × 50 µm 픽셀 단위로 나뉘어 있다고 볼 수 있다. 흰색 픽셀은 빛을 통과시켜 액상 레진을 경화시키고, 검은색 픽셀은 빛을 차단해 해당 위치의 레진이 경화되지 않도록 한다.", "id": "section-4"}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/50-50µm-pixels.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "50-50µm-pixels.png"}, {"type": "paragraph", "text": "그림 1. 50 × 50 µm 픽셀 격자 예시"}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/whiteblack-pixels.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "whiteblack-pixels.png"}, {"type": "paragraph", "text": "그림 2. 흰색 픽셀과 검은색 픽셀의 노광 차이"}, {"type": "paragraph", "text": "이 방식은 구조가 명확하지만, 흑백만 사용할 경우 픽셀 격자보다 더 세밀한 중간 위치를 직접 표현하기 어렵다. 즉 화면상에서 1픽셀 단위로 켜고 끄는 제어만 가능하면 형상 간격도 픽셀 피치의 배수로 제한된다."}, {"type": "heading", "level": 2, "text": "3. 흑백 픽셀 방식의 간격 한계", "id": "section-5"}, {"type": "paragraph", "text": "네 개의 50 × 50 × 50 µm 복셀로 구성된 작은 형상을 배치한다고 가정하면, 두 형상 사이의 간격은 50 µm, 100 µm, 200 µm처럼 픽셀 피치의 배수로 쉽게 표현된다."}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/50µm-spacing.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "50µm-spacing.png"}, {"type": "paragraph", "text": "50 µm 간격"}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/100µm-spacing.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "100µm-spacing.png"}, {"type": "paragraph", "text": "100 µm 간격"}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/200µm-spacing.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "200µm-spacing.png"}, {"type": "paragraph", "text": "200 µm 간격"}, {"type": "paragraph", "text": "반대로 175 µm처럼 픽셀 피치의 정수 배수가 아닌 간격은 흑백 픽셀만으로 정확히 만들기 어렵다. 어느 픽셀을 켜면 과노광되고, 끄면 부족노광되는 중간 영역이 생기기 때문이다."}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/175µm-spacing.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "175µm-spacing.png"}, {"type": "paragraph", "text": "그림 3. 픽셀 피치의 배수가 아닌 간격 표현의 한계"}, {"type": "heading", "level": 2, "text": "4. 회색조와 부분 노광", "id": "section-6"}, {"type": "paragraph", "text": "회색 픽셀은 흰색과 검은색 사이의 중간 광량을 제공한다. 여기서 중요한 점은 회색이 픽셀의 절반만 켜진다는 뜻이 아니라, 같은 픽셀 면적 안에서 레진에 전달되는 총 광량이 줄어든다는 뜻이다."}, {"type": "paragraph", "text": "회색조 노광 시험에서는 어두운 회색에서 흰색까지 픽셀 밝기를 단계적으로 바꾸어 경화 반응을 확인한다. 일정 밝기 이하에서는 경화 반응이 거의 나타나지 않고, 임계 밝기를 넘으면 이전 층 위에 작은 반구형 경화 영역이 형성되기 시작한다."}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/pixels-gray-value.jpg", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "pixels-gray-value.jpg"}, {"type": "paragraph", "text": "그림 4. 픽셀 회색조 단계"}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/research-results.gif", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "research-results.gif"}, {"type": "paragraph", "text": "그림 5. 회색조 변화에 따른 경화 영역 성장"}, {"type": "heading", "level": 2, "text": "5. 광원 강도에 따른 복셀 크기 제어", "id": "section-7"}, {"type": "paragraph", "text": "광량이 증가하면 경화 영역은 먼저 옆 방향으로 빠르게 넓어지고, 이후 높이 방향으로도 점차 성장한다. 이 현상 때문에 픽셀의 밝기를 조절하면 흑백 격자의 한계를 일부 넘어서는 가장자리 보정이 가능하다."}, {"type": "paragraph", "text": "실제 출력에서는 회색 픽셀로 만들어진 작은 경화 영역이 인접한 흰색 픽셀의 경화 영역과 합쳐진다. 이때 가장자리의 유효 경화 폭이 달라지므로, 픽셀 하나보다 작은 수준의 치수 보정 효과를 얻을 수 있다."}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/gray-pixel.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "gray-pixel.png"}, {"type": "paragraph", "text": "회색 픽셀 배치"}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/hemivoxel.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "hemivoxel.png"}, {"type": "paragraph", "text": "인접 복셀과 합쳐진 부분 복셀"}, {"type": "heading", "level": 2, "text": "6. 출력 결과 해석", "id": "section-8"}, {"type": "paragraph", "text": "검증용 형상은 10 × 10 최소 복셀로 구성된 5개의 정사각형을 일정 간격으로 배치하여 광량 변화가 실제 치수에 미치는 영향을 확인한다. 각 정사각형의 상단 픽셀은 왼쪽에서 오른쪽으로 갈수록 흰색에서 검은색으로 낮아지고, 하단 픽셀은 반대로 검은색에서 흰색으로 높아지는 구조이다."}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/experiment-demonstration-illustration.png", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "experiment-demonstration-illustration.png"}, {"type": "paragraph", "text": "그림 6. 회색조 노광 검증용 형상 구성"}, {"type": "paragraph", "text": "출력 결과에서는 광량 단계에 따라 결손 또는 보정되는 거리가 약 0 µm, 12.5 µm, 25 µm, 37.5 µm, 50 µm 수준으로 달라진다. 이는 광원 강도 제어가 최소 픽셀 단위보다 세밀한 치수 조정에 활용될 수 있음을 보여준다."}, {"type": "image", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/print-results.jpg", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료", "fileName": "print-results.jpg"}, {"type": "paragraph", "text": "그림 7. 광량 단계에 따른 실제 출력 결과"}, {"type": "heading", "level": 2, "text": "7. 안티앨리어싱 설정 항목", "id": "section-9"}, {"type": "paragraph", "text": "안티앨리어싱은 픽셀 가장자리에 회색조를 적용해 계단 현상을 줄이고, 모서리와 곡면의 유효 경화 범위를 조절하는 기능이다. 장비 프로파일과 저장 포맷에 따라 표시되는 항목은 달라질 수 있으나, 핵심적으로는 다음 세 값을 이해하면 된다."}, {"type": "table", "rows": [["항목", "역할", "조정 시 확인할 점"], ["Anti-aliasing Level", "가장자리 픽셀에 적용되는 회색조 단계 또는 보정 강도를 조절한다.", "값이 높으면 계단이 완화되지만, 작은 문자나 얇은 홈이 흐려질 수 있다."], ["Gray Level", "회색 픽셀의 광량 수준을 정해 가장자리 경화 폭에 영향을 준다.", "너무 높으면 치수가 커지고 틈이 메워질 수 있으며, 너무 낮으면 가장자리 보정 효과가 약하다."], ["Image Blur", "인접 픽셀 사이의 밝기 변화를 부드럽게 만들어 표면 거칠기를 낮춘다.", "과도하면 날카로운 모서리와 미세 디테일이 둔해질 수 있다."]]}, {"type": "heading", "level": 2, "text": "8. 현장 적용 기준", "id": "section-10"}, {"type": "paragraph", "text": "광원 강도와 안티앨리어싱은 표면 품질과 치수 정확도를 동시에 건드리는 설정이다. 한 번에 여러 값을 바꾸기보다, 레이어 두께와 기본 노광 조건이 안정된 상태에서 가장자리 보정 값을 단계적으로 조정해야 결과 해석이 명확해진다."}, {"type": "paragraph", "text": "계단 현상이나 픽셀 입자가 눈에 띄면 안티앨리어싱 단계와 블러 값을 소폭 높여 비교한다."}, {"type": "paragraph", "text": "구멍이 작아지거나 얇은 간격이 메워지면 Gray Level, Image Blur 또는 기본 노광 조건을 낮추는 방향으로 확인한다."}, {"type": "paragraph", "text": "레진 종류, 색상, 온도, 장비 광학 상태가 달라지면 동일 설정에서도 결과가 변할 수 있으므로 시험편으로 기록을 남긴다."}, {"type": "paragraph", "text": "실제 생산물에서는 외곽 치수뿐 아니라 홀, 슬롯, 문자, 얇은 벽처럼 민감한 형상을 함께 확인한다."}, {"type": "heading", "level": 2, "text": "9. 핵심 요약", "id": "section-11"}, {"type": "table", "rows": [["구분", "핵심 내용"], ["복셀", "출력 정확도의 최소 표현 단위는 픽셀 피치와 레이어 두께의 조합으로 결정된다."], ["흑백 한계", "픽셀을 완전히 켜거나 끄는 방식만 사용하면 간격과 가장자리는 픽셀 피치의 배수에 묶인다."], ["회색조", "중간 광량을 적용하면 가장자리의 유효 경화 폭을 조절할 수 있다."], ["안티앨리어싱", "회색조와 블러를 이용해 계단 현상을 줄이고 치수 보정을 수행한다."], ["검증", "작은 간격, 구멍, 얇은 벽, 문자 형상을 포함한 시험편으로 장비와 레진별 기준값을 잡는다."]]}, {"type": "reference", "text": "참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다."}], "media": [{"fileName": "100µm-spacing.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/100µm-spacing.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-1"}, {"fileName": "175µm-spacing.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/175µm-spacing.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-2"}, {"fileName": "200µm-spacing.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/200µm-spacing.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-3"}, {"fileName": "50-50µm-pixels.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/50-50µm-pixels.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-4"}, {"fileName": "50µm-spacing.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/50µm-spacing.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-5"}, {"fileName": "experiment-demonstration-illustration.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/experiment-demonstration-illustration.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-6"}, {"fileName": "gray-pixel.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/gray-pixel.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-7"}, {"fileName": "hemivoxel.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/hemivoxel.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-8"}, {"fileName": "pixels-gray-value.jpg", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/pixels-gray-value.jpg", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-9"}, {"fileName": "print-results.jpg", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/print-results.jpg", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-10"}, {"fileName": "research-results.gif", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/research-results.gif", "kind": "gif", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-11"}, {"fileName": "whiteblack-pixels.png", "path": "assets/manuals/17_광원 강도가 출력 정확도에 미치는 영향 검증/whiteblack-pixels.png", "kind": "image", "alt": "광원 강도가 출력 정확도에 미치는 영향 검증 시각 자료 17-12"}], "searchText": "0. 개요 MSLA(LCD/DLP) 방식의 출력 정확도는 XY 방향의 픽셀 피치, Z 방향의 레이어 두께, 그리고 각 픽셀에 전달되는 광량의 조합으로 결정된다. 픽셀은 화면에서 가장 작은 노광 단위이고, 레이어 두께는 한 층의 높이를 정하므로 두 값이 합쳐져 최소 출력 단위인 복셀(voxel)을 구성한다. 핵심 관점 | 광원 강도는 단순히 밝고 어두운 문제가 아니라, 가장자리 픽셀의 경화 범위를 조절해 실제 출력 치수와 표면 품질을 바꾸는 변수이다. 1. 복셀과 출력 정확도 복셀은 3D 출력에서 부피를 가진 최소 표현 단위이다. XY 방향은 LCD 또는 DLP 이미지의 픽셀 크기와 연결되고, Z 방향은 레이어 두께와 연결된다. 따라서 픽셀 피치가 작고 레이어가 얇을수록 이론적인 표현 단위는 작아진다. 다만 실제 출력에서는 광원 확산, 레진 반응성, 노광 시간, 산란, 안티앨리어싱 설정이 함께 작용한다. 화면 해상도만으로 최종 치수가 결정된다고 보면 작은 구멍, 얇은 벽, 모서리 품질을 안정적으로 관리하기 어렵다. 2. MSLA(LCD/DLP) 이미지 형성 원리 50 µm 격자를 예로 들면, LCD 화면은 XY 방향으로 50 × 50 µm 픽셀 단위로 나뉘어 있다고 볼 수 있다. 흰색 픽셀은 빛을 통과시켜 액상 레진을 경화시키고, 검은색 픽셀은 빛을 차단해 해당 위치의 레진이 경화되지 않도록 한다. 그림 1. 50 × 50 µm 픽셀 격자 예시 그림 2. 흰색 픽셀과 검은색 픽셀의 노광 차이 이 방식은 구조가 명확하지만, 흑백만 사용할 경우 픽셀 격자보다 더 세밀한 중간 위치를 직접 표현하기 어렵다. 즉 화면상에서 1픽셀 단위로 켜고 끄는 제어만 가능하면 형상 간격도 픽셀 피치의 배수로 제한된다. 3. 흑백 픽셀 방식의 간격 한계 네 개의 50 × 50 × 50 µm 복셀로 구성된 작은 형상을 배치한다고 가정하면, 두 형상 사이의 간격은 50 µm, 100 µm, 200 µm처럼 픽셀 피치의 배수로 쉽게 표현된다. 50 µm 간격 100 µm 간격 200 µm 간격 반대로 175 µm처럼 픽셀 피치의 정수 배수가 아닌 간격은 흑백 픽셀만으로 정확히 만들기 어렵다. 어느 픽셀을 켜면 과노광되고, 끄면 부족노광되는 중간 영역이 생기기 때문이다. 그림 3. 픽셀 피치의 배수가 아닌 간격 표현의 한계 4. 회색조와 부분 노광 회색 픽셀은 흰색과 검은색 사이의 중간 광량을 제공한다. 여기서 중요한 점은 회색이 픽셀의 절반만 켜진다는 뜻이 아니라, 같은 픽셀 면적 안에서 레진에 전달되는 총 광량이 줄어든다는 뜻이다. 회색조 노광 시험에서는 어두운 회색에서 흰색까지 픽셀 밝기를 단계적으로 바꾸어 경화 반응을 확인한다. 일정 밝기 이하에서는 경화 반응이 거의 나타나지 않고, 임계 밝기를 넘으면 이전 층 위에 작은 반구형 경화 영역이 형성되기 시작한다. 그림 4. 픽셀 회색조 단계 그림 5. 회색조 변화에 따른 경화 영역 성장 5. 광원 강도에 따른 복셀 크기 제어 광량이 증가하면 경화 영역은 먼저 옆 방향으로 빠르게 넓어지고, 이후 높이 방향으로도 점차 성장한다. 이 현상 때문에 픽셀의 밝기를 조절하면 흑백 격자의 한계를 일부 넘어서는 가장자리 보정이 가능하다. 실제 출력에서는 회색 픽셀로 만들어진 작은 경화 영역이 인접한 흰색 픽셀의 경화 영역과 합쳐진다. 이때 가장자리의 유효 경화 폭이 달라지므로, 픽셀 하나보다 작은 수준의 치수 보정 효과를 얻을 수 있다. 회색 픽셀 배치 인접 복셀과 합쳐진 부분 복셀 6. 출력 결과 해석 검증용 형상은 10 × 10 최소 복셀로 구성된 5개의 정사각형을 일정 간격으로 배치하여 광량 변화가 실제 치수에 미치는 영향을 확인한다. 각 정사각형의 상단 픽셀은 왼쪽에서 오른쪽으로 갈수록 흰색에서 검은색으로 낮아지고, 하단 픽셀은 반대로 검은색에서 흰색으로 높아지는 구조이다. 그림 6. 회색조 노광 검증용 형상 구성 출력 결과에서는 광량 단계에 따라 결손 또는 보정되는 거리가 약 0 µm, 12.5 µm, 25 µm, 37.5 µm, 50 µm 수준으로 달라진다. 이는 광원 강도 제어가 최소 픽셀 단위보다 세밀한 치수 조정에 활용될 수 있음을 보여준다. 그림 7. 광량 단계에 따른 실제 출력 결과 7. 안티앨리어싱 설정 항목 안티앨리어싱은 픽셀 가장자리에 회색조를 적용해 계단 현상을 줄이고, 모서리와 곡면의 유효 경화 범위를 조절하는 기능이다. 장비 프로파일과 저장 포맷에 따라 표시되는 항목은 달라질 수 있으나, 핵심적으로는 다음 세 값을 이해하면 된다. 항목 역할 조정 시 확인할 점 Anti-aliasing Level 가장자리 픽셀에 적용되는 회색조 단계 또는 보정 강도를 조절한다. 값이 높으면 계단이 완화되지만, 작은 문자나 얇은 홈이 흐려질 수 있다. Gray Level 회색 픽셀의 광량 수준을 정해 가장자리 경화 폭에 영향을 준다. 너무 높으면 치수가 커지고 틈이 메워질 수 있으며, 너무 낮으면 가장자리 보정 효과가 약하다. Image Blur 인접 픽셀 사이의 밝기 변화를 부드럽게 만들어 표면 거칠기를 낮춘다. 과도하면 날카로운 모서리와 미세 디테일이 둔해질 수 있다. 8. 현장 적용 기준 광원 강도와 안티앨리어싱은 표면 품질과 치수 정확도를 동시에 건드리는 설정이다. 한 번에 여러 값을 바꾸기보다, 레이어 두께와 기본 노광 조건이 안정된 상태에서 가장자리 보정 값을 단계적으로 조정해야 결과 해석이 명확해진다. 계단 현상이나 픽셀 입자가 눈에 띄면 안티앨리어싱 단계와 블러 값을 소폭 높여 비교한다. 구멍이 작아지거나 얇은 간격이 메워지면 Gray Level, Image Blur 또는 기본 노광 조건을 낮추는 방향으로 확인한다. 레진 종류, 색상, 온도, 장비 광학 상태가 달라지면 동일 설정에서도 결과가 변할 수 있으므로 시험편으로 기록을 남긴다. 실제 생산물에서는 외곽 치수뿐 아니라 홀, 슬롯, 문자, 얇은 벽처럼 민감한 형상을 함께 확인한다. 9. 핵심 요약 구분 핵심 내용 복셀 출력 정확도의 최소 표현 단위는 픽셀 피치와 레이어 두께의 조합으로 결정된다. 흑백 한계 픽셀을 완전히 켜거나 끄는 방식만 사용하면 간격과 가장자리는 픽셀 피치의 배수에 묶인다. 회색조 중간 광량을 적용하면 가장자리의 유효 경화 폭을 조절할 수 있다. 안티앨리어싱 회색조와 블러를 이용해 계단 현상을 줄이고 치수 보정을 수행한다. 검증 작은 간격, 구멍, 얇은 벽, 문자 형상을 포함한 시험편으로 장비와 레진별 기준값을 잡는다. 참고자료 | 본 교육자료의 기술 내용과 시각자료는 CHITUBOX Academy 매뉴얼을 참고하였다.", "readingMinutes": 3}}, "categories": [{"name": "출력 품질 및 실패 분석", "slug": "print-quality-failure-analysis", "description": "출력 변형, 탈락, 균열, 정확도 저하 등 실패 원인을 진단하는 문서", "accent": "#6F2DA8"}, {"name": "서포트 및 모델 배치", "slug": "support-model-placement", "description": "모델 방향, 서포트 구조, 접촉 형상이 표면 품질에 미치는 영향", "accent": "#0F766E"}, {"name": "출력 설정 및 파라미터", "slug": "print-settings-parameters", "description": "레이어 두께, 노출, 속도, 장비 파라미터를 조정하는 기준", "accent": "#B45309"}, {"name": "레진 및 재료 관리", "slug": "resin-material-management", "description": "레진 사용량, 보관, 경화, 응력과 변형 특성을 다루는 자료", "accent": "#2563EB"}, {"name": "모델 구조 및 내구성", "slug": "model-structure-durability", "description": "출력물 강도와 내구성을 높이는 구조 설계 및 재료 선택 기준", "accent": "#475569"}]}</script>
  <script>
    (function () {

      const categories = data.categories;
      const app = document.getElementById("app");

          if (!q) return true;
          const body = content(manual.id).searchText || "";

            .toLocaleLowerCase("ko-KR")
            .includes(q);

        <section>
          <div class="section-head"><div><span class="eyebrow">Categories</span><h2>대분류</h2></div><button class="back" data-route="manuals" style="border:0;background:transparent;">전체 보기 ›</button></div>
          <div class="categories">${categories.map((category) => `<article class="category" data-category="${category.slug}" style="--accent:${category.accent}"><small>${countByCategory(category.name)}개 문서</small><h3>${html(category.name)}</h3><p>${html(category.description)}</p></article>`).join("")}</div>
        </section>
        <section>
          <div class="section-head"><div><span class="eyebrow">Featured</span><h2>추천 문서</h2></div></div>
          <div class="cards">${featured.map(card).join("")}</div>
        </section>
        <section>
          <div class="section-head"><div><span class="eyebrow">Recent</span><h2>최근 추가 문서</h2></div></div>
          <div class="cards">${recent.map(card).join("")}</div>
        </section>`;
      }

      function manualsPage(categoryName = "all") {
        const results = searchManuals(listState.query, categoryName).sort((a, b) => a.id - b.id);
        return `<section class="page-header"><span class="eyebrow">Manuals</span><h1>전체 기술 매뉴얼</h1><p>관리 번호 1~17번 기준으로 정리된 캐리마텍 기술 문서 목록입니다.</p></section>
        <section class="filter">
          <label class="search"><span>검색</span><input id="list-search" value="${html(listState.query)}" placeholder="문서 제목, 키워드, 본문 검색"></label>
          <div class="tabs">
            <button data-filter="all" class="${categoryName === "all" ? "active" : ""}">전체</button>
            ${categories.map((category) => `<button data-filter="${html(category.name)}" class="${categoryName === category.name ? "active" : ""}">${html(category.name)}</button>`).join("")}
          </div>
          <strong>${results.length} / ${manuals.length}</strong>
        </section>
        <section class="cards">${results.map(card).join("")}</section>`;
      }

      function categoryPage(slug) {
        const category = byCategorySlug(slug);
        if (!category) return manualsPage();
        listState.category = category.name;
        const items = manuals.filter((manual) => manual.category === category.name);
        return `<section class="page-header" style="border-top:5px solid ${category.accent}">
          <button class="back" data-route="manuals" style="border:0;background:transparent;text-align:left;">‹ 전체 매뉴얼</button>
          <span class="eyebrow">Category</span><h1>${html(category.name)}</h1><p>${html(category.description)}</p><strong>${items.length}개 문서</strong>
        </section>
        <section class="cards" style="margin-top:22px;">${items.map(card).join("")}</section>`;
      }

      function blockToHtml(block, manualTitle) {
        if (block.type === "heading") return `<h${block.level} id="${html(block.id)}">${html(block.text)}</h${block.level}>`;
        if (block.type === "paragraph") return `<p>${html(block.text)}</p>`;
        if (block.type === "formula") return `<p class="formula">${html(block.text)}</p>`;
        if (block.type === "callout") return `<aside class="callout ${block.tone === "warning" ? "warning" : ""}">${html(block.text)}</aside>`;
        if (block.type === "reference") return `<p class="reference">${html(block.text)}</p>`;
        if (block.type === "image") return `<figure><img src="${html(block.path)}" alt="${html(block.alt || manualTitle + " 시각 자료")}"><figcaption>${html(block.fileName)}</figcaption></figure>`;
        if (block.type === "table") return `<div class="table-wrap"><table><tbody>${block.rows.map((row, rowIndex) => `<tr>${row.map((cell) => rowIndex === 0 ? `<th>${html(cell)}</th>` : `<td>${html(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
        return "";
      }

      function detailPage(slug) {
        const manual = bySlug(slug);
        if (!manual) return manualsPage();
        const manualContent = content(manual.id);
        const headings = manualContent.blocks.filter((block) => block.type === "heading");
        const related = manuals.filter((candidate) => candidate.category === manual.category && candidate.id !== manual.id).slice(0, 3);
        return `<section class="detail-head">
          <div class="detail-title">
            <button class="back" data-route="manuals" style="border:0;background:transparent;text-align:left;">‹ 전체 매뉴얼</button>
            <div class="manual-no">No. ${pad(manual.id)}</div>
            <h1>${html(manual.title)}</h1>
            <p>${html(manual.summary)}</p>
            <p><span class="pill">${html(manual.category)}</span> · ${html(manual.author)} · ${html(manual.version)} · ${html(manual.displayDate)}</p>
          </div>
          <img class="detail-cover" src="${html(manual.coverImage)}" alt="${html(manual.title)} 표지">
        </section>
        <div class="detail-layout">
          <aside class="toc"><h2>목차</h2>${headings.map((heading) => `<a class="l${heading.level}" data-scroll="${heading.id}">${html(heading.text)}</a>`).join("")}</aside>
          <div>
            <article class="content">${manualContent.blocks.map((block) => blockToHtml(block, manual.title)).join("")}</article>
          </div>
        </div>
        ${related.length ? `<section><div class="section-head"><div><span class="eyebrow">Related</span><h2>같은 대분류 문서</h2></div></div><div class="cards">${related.map(card).join("")}</div></section>` : ""}`;
      }

      function render() {
        const current = route();
        document.querySelectorAll(".nav button").forEach((button) => button.classList.toggle("active", button.dataset.route === current || (button.dataset.route === "manuals" && current.startsWith("manual"))));
        if (current === "home") app.innerHTML = home();
        else if (current === "manuals") app.innerHTML = manualsPage(listState.category);
        else if (current.startsWith("category:")) app.innerHTML = categoryPage(current.split(":")[1]);
        else if (current.startsWith("manual:")) app.innerHTML = detailPage(current.split(":")[1]);
        else app.innerHTML = home();
        window.scrollTo(0, 0);
      }

      document.addEventListener("click", (event) => {
        const routeButton = event.target.closest("[data-route]");
        if (routeButton) setRoute(routeButton.dataset.route);
        const manual = event.target.closest("[data-manual]");
        if (manual) setRoute("manual:" + manual.dataset.manual);
        const category = event.target.closest("[data-category]");
        if (category) setRoute("category:" + category.dataset.category);
        const scroll = event.target.closest("[data-scroll]");
        if (scroll) document.getElementById(scroll.dataset.scroll)?.scrollIntoView();
      });

      document.addEventListener("input", (event) => {
        if (event.target.id === "home-search") {
          listState.query = event.target.value;
          listState.category = "all";
          setRoute("manuals");
        }
        if (event.target.id === "list-search") {
          listState.query = event.target.value;
          app.innerHTML = manualsPage(listState.category);
          const input = document.getElementById("list-search");
          input.focus();
          input.selectionStart = input.selectionEnd = input.value.length;
        }
      });

      document.addEventListener("click", (event) => {
        const filter = event.target.closest("[data-filter]");
        if (!filter) return;
        listState.category = filter.dataset.filter;
        app.innerHTML = manualsPage(listState.category);
      });

      window.addEventListener("hashchange", render);
      if (!location.hash) location.hash = "home";
      render();
    })();
  </script>
</body>
</html>
